<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sud Italia CRM — Regulars</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap">
<style>
  :root{
    /* surfaces — Atlas dark (shared with POS + KDS) */
    --canvas:#0A0C10;
    --panel:#11151B;
    --raised:#1A2129;
    --hair:rgba(255,255,255,0.08);
    --hair-strong:rgba(255,255,255,0.14);
    /* text */
    --text:#E9EDF2;
    --dim:#9098A3;
    --faint:#5C6571;
    /* tone palette */
    --accent:#3DD68C;   /* green — fleet/relationship feel */
    --firing:#3B82F6;
    --warn:#F5A623;
    --risk:#8B5CF6;
    --late:#E5484D;
    --gold:#E0A458;     /* VIP / Oro tier */
    /* soft tints */
    --accent-soft:rgba(61,214,140,0.13);
    --firing-soft:rgba(59,130,246,0.14);
    --warn-soft:rgba(245,166,35,0.13);
    --risk-soft:rgba(139,92,246,0.14);
    --late-soft:rgba(229,72,77,0.14);
    --gold-soft:rgba(224,164,88,0.14);
    /* 8px grid */
    --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px; --s7:48px;
    --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Monaco,"Cascadia Code",monospace;
    --sans:"Inter",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--canvas);color:var(--text);font-family:var(--sans);
    font-size:13px;line-height:1.4;-webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;display:flex;flex-direction:column;overflow:hidden;
  }
  .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}

  /* ====================== Header (shared chrome) ====================== */
  header{
    flex:0 0 auto;display:flex;align-items:center;gap:var(--s4);
    height:56px;padding:0 var(--s5);background:var(--panel);border-bottom:1px solid var(--hair);
  }
  .brand{display:flex;align-items:baseline;gap:var(--s3);min-width:max-content}
  .wordmark{font-weight:700;font-size:14px;letter-spacing:0.22em;color:var(--text)}
  .kd-label{
    font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--faint);
    border-left:1px solid var(--hair);padding-left:var(--s3);
  }
  .design-tag{
    font-family:var(--mono);font-size:11px;letter-spacing:0.06em;color:var(--dim);
    padding:3px 8px;border:1px solid var(--hair);border-radius:5px;white-space:nowrap;
  }

  .ctl{display:flex;align-items:center;gap:var(--s2)}
  .ctl-lbl{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--faint)}
  .seg-group{display:flex;align-items:stretch;border:1px solid var(--hair);border-radius:7px;overflow:hidden;background:var(--canvas)}
  .seg{
    appearance:none;border:0;background:transparent;cursor:pointer;
    font-family:var(--sans);font-size:11.5px;letter-spacing:0.01em;color:var(--dim);
    padding:6px 11px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
    border-right:1px solid var(--hair);transition:color .16s ease,background .16s ease;
  }
  .seg:last-child{border-right:0}
  .seg:hover{color:var(--text)}
  .seg[aria-pressed="true"]{background:var(--raised);color:var(--accent);font-weight:600}
  .seg svg{width:13px;height:13px}

  .spacer{margin-left:auto}
  .fsbtn{
    appearance:none;cursor:pointer;border:1px solid var(--hair);background:transparent;
    color:var(--dim);font-family:var(--sans);font-size:11px;letter-spacing:0.02em;
    padding:6px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:6px;
    transition:color .16s ease,border-color .16s ease;white-space:nowrap;
  }
  .fsbtn:hover{color:var(--text);border-color:var(--hair-strong)}
  .fsbtn svg{width:13px;height:13px;display:block}
  .fsbtn .fs-on{display:none}
  .is-fullscreen .fsbtn .fs-on{display:inline-flex}
  .is-fullscreen .fsbtn .fs-off{display:none}
  .gallery-link{
    font-size:11px;color:var(--faint);text-decoration:none;border:1px solid var(--hair);
    padding:5px 9px;border-radius:6px;transition:color .16s ease,border-color .16s ease;white-space:nowrap;
  }
  .gallery-link:hover{color:var(--text);border-color:var(--hair-strong)}
  .clock{font-family:var(--mono);font-size:14px;letter-spacing:0.04em;color:var(--text);min-width:78px;text-align:right}

  .is-fullscreen header{height:50px}
  .is-fullscreen .kd-label,.is-fullscreen .gallery-link,.is-fullscreen .design-tag{display:none}
  .is-fullscreen footer{display:none}

  /* ====================== CRM bar (book + filters) ====================== */
  .crmbar{
    flex:0 0 auto;background:var(--panel);border-bottom:1px solid var(--hair);
    padding:var(--s3) var(--s5);display:flex;flex-direction:column;gap:var(--s3);
  }
  .cb-eyebrow{display:flex;align-items:center;gap:var(--s3)}
  .cb-brandline{display:flex;align-items:center;gap:7px;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--dim);font-weight:700;white-space:nowrap}
  .cb-brandline svg{width:13px;height:13px;opacity:.7;flex:0 0 auto}
  .cb-sep{flex:1 1 auto;height:1px;background:var(--hair)}
  /* KPI strip — mirrors the KDS pace metrics */
  .kpis{display:flex;gap:var(--s2);flex-wrap:wrap}
  .kpi{
    display:inline-flex;flex-direction:column;gap:1px;padding:5px 11px;border-radius:8px;
    background:var(--raised);border:1px solid var(--hair);white-space:nowrap;
  }
  .kpi .k-val{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text);line-height:1.1}
  .kpi .k-lbl{font-size:9px;letter-spacing:0.10em;text-transform:uppercase;color:var(--faint);font-weight:700}
  .kpi.alert .k-val{color:var(--late)}
  .kpi.good .k-val{color:var(--accent)}

  .cb-controls{display:flex;align-items:center;gap:var(--s3);flex-wrap:wrap}
  .search{
    display:inline-flex;align-items:center;gap:8px;flex:1 1 280px;min-width:200px;max-width:420px;
    background:var(--canvas);border:1px solid var(--hair);border-radius:8px;padding:0 11px;height:34px;
    transition:border-color .16s ease;
  }
  .search:focus-within{border-color:var(--accent)}
  .search svg{width:15px;height:15px;color:var(--faint);flex:0 0 auto}
  .search input{
    appearance:none;border:0;background:transparent;color:var(--text);font-family:var(--sans);
    font-size:13px;width:100%;outline:none;
  }
  .search input::placeholder{color:var(--faint)}
  .search .clr{appearance:none;border:0;background:transparent;color:var(--faint);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;display:none}
  .search.has-q .clr{display:block}
  .search .clr:hover{color:var(--text)}

  .segchips{display:flex;gap:var(--s1);flex-wrap:wrap}
  .segchip{
    appearance:none;background:transparent;border:1px solid var(--hair);color:var(--dim);
    font-family:var(--sans);font-size:12px;letter-spacing:0.01em;padding:6px 11px;border-radius:7px;
    cursor:pointer;transition:color .16s ease,border-color .16s ease,background .16s ease;white-space:nowrap;
    display:inline-flex;align-items:center;gap:7px;
  }
  .segchip:hover{border-color:var(--hair-strong);color:var(--text)}
  .segchip[aria-pressed="true"]{background:var(--raised);border-color:var(--hair-strong);color:var(--text);font-weight:600}
  .segchip i{width:8px;height:8px;border-radius:50%;flex:0 0 auto;background:var(--faint)}
  .segchip .sc-n{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--faint);background:var(--hair);border-radius:4px;padding:1px 5px;min-width:18px;text-align:center}
  .segchip[aria-pressed="true"] .sc-n{background:var(--hair-strong);color:var(--text)}
  .segchip.s-vip i{background:var(--gold)} .segchip.s-vip[aria-pressed="true"]{color:var(--gold)}
  .segchip.s-active i{background:var(--accent)} .segchip.s-active[aria-pressed="true"]{color:var(--accent)}
  .segchip.s-repeat i{background:var(--risk)} .segchip.s-repeat[aria-pressed="true"]{color:var(--risk)}
  .segchip.s-new i{background:var(--firing)} .segchip.s-new[aria-pressed="true"]{color:var(--firing)}
  .segchip.s-lapsed i{background:var(--late)} .segchip.s-lapsed[aria-pressed="true"]{color:var(--late)}

  .sort-ctl{display:flex;align-items:center;gap:var(--s2);margin-left:auto}

  /* ====================== Workspace (list | detail) ====================== */
  .workspace{flex:1 1 auto;min-height:0;display:grid;grid-template-columns:452px 1fr;gap:1px;background:var(--hair)}

  /* LEFT — customer list */
  .list-col{background:var(--canvas);display:flex;flex-direction:column;min-height:0;min-width:0}
  .list-head{
    flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
    padding:var(--s3) var(--s5);background:var(--panel);border-bottom:1px solid var(--hair);
    font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--faint);font-weight:700;
  }
  .list-head b{color:var(--text)}
  .list-scroll{flex:1 1 auto;overflow-y:auto;padding:var(--s3) var(--s4);min-height:0;display:flex;flex-direction:column;gap:var(--s2)}
  .cust{
    appearance:none;text-align:left;cursor:pointer;font-family:var(--sans);width:100%;
    background:var(--raised);border:1px solid var(--hair);border-radius:11px;
    padding:var(--s3);position:relative;overflow:hidden;display:flex;gap:var(--s3);align-items:center;
    transition:border-color .16s ease,background .16s ease,transform .1s ease;
  }
  .cust::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--faint);transition:background .16s ease}
  .cust.seg-vip::before{background:var(--gold)}
  .cust.seg-active::before{background:var(--accent)}
  .cust.seg-repeat::before{background:var(--risk)}
  .cust.seg-new::before{background:var(--firing)}
  .cust.seg-lapsed::before{background:var(--late)}
  .cust:hover{border-color:var(--hair-strong);transform:translateY(-1px)}
  .cust.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 12px 28px -16px rgba(61,214,140,0.4)}
  .avatar{
    flex:0 0 auto;width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    font-size:16px;font-weight:700;color:var(--text);background:#202832;border:1px solid var(--hair-strong);letter-spacing:0.02em;
  }
  .cust.seg-vip .avatar{color:var(--gold);border-color:rgba(224,164,88,0.45);background:var(--gold-soft)}
  .c-main{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:3px}
  .c-row1{display:flex;align-items:center;gap:7px}
  .c-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .c-vip{flex:0 0 auto;font-size:8.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--gold);background:var(--gold-soft);border:1px solid rgba(224,164,88,0.32);border-radius:5px;padding:1px 6px}
  .c-chan{flex:0 0 auto;color:var(--faint);display:inline-flex}
  .c-chan svg{width:13px;height:13px}
  .c-sub{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--dim);min-width:0}
  .c-phone{font-family:var(--mono);font-size:10.5px;color:var(--faint);letter-spacing:0.02em;white-space:nowrap}
  .c-dot{width:3px;height:3px;border-radius:50%;background:var(--faint);flex:0 0 auto}
  .c-seen{white-space:nowrap}
  .c-seen.cold{color:var(--late)}
  .c-fig{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
  .c-ltv{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text);line-height:1}
  .c-pts{font-family:var(--mono);font-size:10px;color:var(--faint);display:inline-flex;align-items:center;gap:4px}
  .c-pts svg{width:10px;height:10px;color:var(--gold);opacity:.9}
  .tier-pill{font-size:8px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;border-radius:4px;padding:1px 5px}
  .tier-Oro{color:var(--gold);background:var(--gold-soft)}
  .tier-Argento{color:#C6CDD6;background:rgba(198,205,214,0.10)}
  .tier-Bronzo{color:#C08457;background:rgba(192,132,87,0.12)}

  /* health pip on the row */
  .c-health{position:absolute;right:var(--s3);bottom:var(--s3);width:42px;height:3px;border-radius:2px;background:var(--hair);overflow:hidden}
  .c-health i{display:block;height:100%;border-radius:2px}

  .list-empty{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--faint);text-align:center;padding:var(--s6)}
  .list-empty .le-emoji{font-size:30px;opacity:.5}

  /* RIGHT — customer detail */
  .detail{background:var(--panel);display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .detail-scroll{flex:1 1 auto;overflow-y:auto;min-height:0;display:flex;flex-direction:column}
  .list-scroll::-webkit-scrollbar,.detail-scroll::-webkit-scrollbar{width:7px}
  .list-scroll::-webkit-scrollbar-thumb,.detail-scroll::-webkit-scrollbar-thumb{background:var(--hair-strong);border-radius:4px}

  /* profile header */
  .prof{flex:0 0 auto;padding:var(--s5);border-bottom:1px solid var(--hair);display:flex;flex-direction:column;gap:var(--s4)}
  .prof-top{display:flex;align-items:center;gap:var(--s4)}
  .prof-av{
    flex:0 0 auto;width:60px;height:60px;border-radius:15px;display:flex;align-items:center;justify-content:center;
    font-size:24px;font-weight:700;color:var(--text);background:#202832;border:1px solid var(--hair-strong);
  }
  .prof.is-vip .prof-av{color:var(--gold);border-color:rgba(224,164,88,0.45);background:var(--gold-soft)}
  .prof-id{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:5px}
  .prof-name-row{display:flex;align-items:center;gap:var(--s2);flex-wrap:wrap}
  .prof-name{font-size:21px;font-weight:650;letter-spacing:-0.01em;color:var(--text)}
  .badge{font-size:9.5px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;border-radius:6px;padding:3px 8px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .badge.seg-vip{color:var(--gold);background:var(--gold-soft);border:1px solid rgba(224,164,88,0.34)}
  .badge.seg-active{color:var(--accent);background:var(--accent-soft);border:1px solid rgba(61,214,140,0.3)}
  .badge.seg-repeat{color:var(--risk);background:var(--risk-soft);border:1px solid rgba(139,92,246,0.34)}
  .badge.seg-new{color:var(--firing);background:var(--firing-soft);border:1px solid rgba(59,130,246,0.34)}
  .badge.seg-lapsed{color:var(--late);background:var(--late-soft);border:1px solid rgba(229,72,77,0.34)}
  .prof-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--dim)}
  .prof-meta .pm{display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .prof-meta .pm svg{width:13px;height:13px;color:var(--faint);flex:0 0 auto}
  .prof-meta .pm.mono{font-family:var(--mono);font-size:11.5px;letter-spacing:0.02em}
  .prof-meta .pipe{width:3px;height:3px;border-radius:50%;background:var(--faint)}

  /* action row */
  .actions{display:flex;gap:var(--s2);flex-wrap:wrap}
  .act-btn{
    appearance:none;cursor:pointer;font-family:var(--sans);font-size:12.5px;font-weight:600;letter-spacing:0.01em;
    border:1px solid var(--hair-strong);background:var(--raised);color:var(--dim);
    border-radius:9px;padding:9px 13px;display:inline-flex;align-items:center;gap:7px;
    transition:color .16s ease,border-color .16s ease,background .16s ease;
  }
  .act-btn:hover{color:var(--text);border-color:var(--text)}
  .act-btn svg{width:15px;height:15px;flex:0 0 auto}
  .act-btn.primary{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
  .act-btn.primary:hover{filter:brightness(1.1)}

  /* section scaffolding */
  .sec{padding:var(--s5);border-bottom:1px solid var(--hair);display:flex;flex-direction:column;gap:var(--s3)}
  .sec:last-child{border-bottom:0}
  .sec-head{display:flex;align-items:center;gap:8px;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim)}
  .sec-head .sh-n{font-family:var(--mono);font-size:10px;color:var(--faint);background:var(--raised);border:1px solid var(--hair);border-radius:5px;padding:1px 6px}
  .sec-head .sh-sep{flex:1 1 auto;height:1px;background:var(--hair)}

  /* stat tiles */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:var(--s2)}
  .stat{background:var(--raised);border:1px solid var(--hair);border-radius:10px;padding:var(--s3);display:flex;flex-direction:column;gap:3px}
  .stat .s-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text);line-height:1}
  .stat .s-lbl{font-size:9.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--faint);font-weight:700}
  .stat .s-sub{font-size:10.5px;color:var(--dim)}
  .stat.pts .s-val{color:var(--gold)}

  /* health meter */
  .health-wrap{display:flex;flex-direction:column;gap:8px}
  .health-top{display:flex;align-items:baseline;justify-content:space-between;gap:var(--s2)}
  .health-score{font-family:var(--mono);font-size:26px;font-weight:700;line-height:1}
  .health-tier{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}
  .health-note{font-size:11.5px;color:var(--dim)}
  .health-bar{position:relative;height:8px;border-radius:5px;background:linear-gradient(90deg,var(--late) 0%,var(--warn) 42%,var(--accent) 100%);overflow:visible}
  .health-bar .hm{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:var(--text);border:3px solid var(--canvas);box-shadow:0 2px 8px rgba(0,0,0,0.5)}
  .rfm{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s2);margin-top:var(--s1)}
  .rfm-cell{display:flex;flex-direction:column;gap:5px}
  .rfm-cell .rf-lbl{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--faint);font-weight:700;display:flex;justify-content:space-between}
  .rfm-cell .rf-lbl b{font-family:var(--mono);color:var(--dim);font-weight:700}
  .rfm-track{height:5px;border-radius:3px;background:var(--hair);overflow:hidden}
  .rfm-track i{display:block;height:100%;border-radius:3px;background:var(--accent)}

  /* favourites */
  .favs{display:flex;gap:var(--s2);flex-wrap:wrap}
  .fav{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text);background:var(--raised);border:1px solid var(--hair);border-radius:999px;padding:5px 11px}
  .fav .fv-emoji{font-size:13px}
  .fav .fv-n{font-family:var(--mono);font-size:10px;color:var(--faint)}

  /* order history */
  .hist{display:flex;flex-direction:column;gap:var(--s2)}
  .horder{display:flex;align-items:center;gap:var(--s3);padding:var(--s2) 0;border-bottom:1px solid var(--hair)}
  .horder:last-child{border-bottom:0}
  .ho-chan{flex:0 0 auto;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--raised);border:1px solid var(--hair);color:var(--dim)}
  .ho-chan svg{width:14px;height:14px}
  .ho-chan.takeout{color:var(--firing)} .ho-chan.delivery{color:var(--warn)} .ho-chan.dinein{color:var(--risk)}
  .ho-body{flex:1 1 auto;min-width:0}
  .ho-items{font-size:12.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ho-meta{font-size:10.5px;color:var(--faint);font-family:var(--mono);letter-spacing:0.02em;margin-top:1px}
  .ho-total{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);flex:0 0 auto}
  .hist-more{font-size:11.5px;color:var(--faint);text-align:center;padding-top:var(--s1)}

  /* notes */
  .notes{display:flex;flex-direction:column;gap:var(--s2)}
  .note{background:var(--raised);border:1px solid var(--hair);border-radius:9px;padding:var(--s3)}
  .note-head{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:10px;letter-spacing:0.04em;color:var(--faint);text-transform:uppercase;font-weight:700}
  .note-head b{color:var(--dim)}
  .note-body{font-size:12.5px;color:var(--text);line-height:1.5}

function seenLabel(days){
  if(days<=0) return "today";

  if(days<30) return days+"d ago";

function daysToBirthday(mmdd){
  if(!mmdd) return null;

/* ====================== Derived fields ====================== */
function tierOf(c){ return c.points>=1500?"Oro":c.points>=500?"Argento":"Bronzo"; }
function aov(c){ return c.orders>0 ? Math.round(c.spent/c.orders) : 0; }
function initials(name){ return name.split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase(); }

// RFM-style component scores (0-100) and a blended health score.
function rfm(c){
  const r = c.lastDays<=7?100 : c.lastDays<=14?86 : c.lastDays<=30?66 : c.lastDays<=45?46 : c.lastDays<=75?26 : 9;
  const f = Math.min(100, c.orders*9);
  const m = Math.min(100, Math.round(c.spent/1600)); // ~1600 zł caps the bar
  return {r,f,m};
}
function health(c){ const {r,f,m}=rfm(c); return Math.round(0.5*r + 0.3*f + 0.2*m); }
function healthTier(h){
  if(h>=70) return {key:"loyal", label:"Loyal", color:"var(--accent)"};
  if(h>=50) return {key:"steady", label:"Steady", color:"var(--accent)"};
  if(h>=34) return {key:"cooling", label:"Cooling", color:"var(--warn)"};
  if(h>=18) return {key:"at-risk", label:"At risk", color:"var(--warn)"};
  return {key:"churned", label:"Churned", color:"var(--late)"};
}
function healthColor(h){ return healthTier(h).color; }

let LOC="All";
let SEG="all";
let SORT="ltv";
let QUERY="";
let selectedId = CUSTOMERS[0].id;

const SEGS=[
  {key:"all",   label:"All",    cls:""},
  {key:"vip",   label:"VIP",    cls:"s-vip"},
  {key:"active",label:"Active", cls:"s-active"},
  {key:"repeat",label:"Repeat", cls:"s-repeat"},
  {key:"new",   label:"New",    cls:"s-new"},
  {key:"lapsed",label:"Lapsed", cls:"s-lapsed"},
];
const SORTS=[
  {key:"ltv",   label:"Value"},
  {key:"recent",label:"Recent"},
  {key:"orders",label:"Orders"},
  {key:"points",label:"Points"},
  {key:"name",  label:"A–Z"},
];

function inSeg(c,seg){ return seg==="all" ? true : seg==="vip" ? c.vip : c.seg===seg; }
function inLoc(c){ return LOC==="All" ? true : c.loc===LOC; }
function matchQuery(c){
  if(!QUERY) return true;
  const q=QUERY.toLowerCase();
  return c.name.toLowerCase().includes(q) || c.id.replace(/\s/g,"").includes(q.replace(/\s/g,"")) || (c.email||"").toLowerCase().includes(q);
}
function visibleCustomers(){
  let list=CUSTOMERS.filter(c=>inLoc(c)&&inSeg(c,SEG)&&matchQuery(c));
  const cmp={
    ltv:(a,b)=>b.spent-a.spent,
    recent:(a,b)=>a.lastDays-b.lastDays,
    orders:(a,b)=>b.orders-a.orders,
    points:(a,b)=>b.points-a.points,
    name:(a,b)=>a.name.localeCompare(b.name),
  }[SORT];
  return list.sort(cmp);
}
function getSelected(){ return CUSTOMERS.find(c=>c.id===selectedId)||null; }

/* ====================== Render: KPI strip ====================== */
function renderKpis(){
  const pool=CUSTOMERS.filter(inLoc);
  const total=pool.length;
  const active=pool.filter(c=>c.seg==="active"||c.seg==="repeat").length;
  const lapsed=pool.filter(c=>c.seg==="lapsed").length;
  const ltv=pool.reduce((s,c)=>s+c.spent,0);
  const pts=pool.reduce((s,c)=>s+c.points,0);
  const newCt=pool.filter(c=>c.seg==="new").length;
  const k=[
    {v:total, l:"Customers"},
    {v:active, l:"Active", cls:"good"},
    {v:lapsed, l:"Lapsed", cls:lapsed>0?"alert":""},
    {v:newCt, l:"New"},
    {v:fmtPLN0(ltv), l:"Total LTV"},
    {v:pts.toLocaleString("pl-PL"), l:"Points out"},
  ];
  document.getElementById("kpis").innerHTML = k.map(x=>
    `<div class="kpi ${x.cls||""}"><span class="k-val tnum">${x.v}</span><span class="k-lbl">${x.l}</span></div>`).join("");
}

/* ====================== AI next-best-action ====================== */
function nextBestAction(c){
  const h=health(c), risk=100-h;
  const bday=daysToBirthday(c.bday);
  let title, sub, cta, action;
  if(c.seg==="lapsed"){
    title="Win-back — send a comeback code";
    sub=`Last seen ${seenLabel(c.lastDays)}. SMS −15% off the next order.`;
    cta="Send SMS"; action=()=>toast("Win-back SMS queued → "+c.name);
  } else if(bday!=null && bday<=14){
    title="Birthday offer — free dolce";
    sub=`Birthday in ${bday} day${bday===1?"":"s"}. Comp a Tiramisù on the next visit.`;
    cta="Schedule"; action=()=>toast("Birthday offer scheduled → "+c.name);
  } else if(c.seg==="new"){
    title="Welcome — nudge the 2nd order";
    sub="Double points on order #2 to lock in the habit.";
    cta="Send SMS"; action=()=>toast("Welcome offer sent → "+c.name);
  } else if(c.vip){
    title="VIP — early access to the LTO";
    sub="Offer the Tartufata Reale before it hits the public menu.";
    cta="Invite"; action=()=>toast("VIP invite sent → "+c.name);
  } else {
    title="Grow the check — pair a dessert";
    sub="High-margin Tiramisù pairs with their usual main.";
    cta="Send SMS"; action=()=>toast("Upsell nudge sent → "+c.name);
  }
  const cls = risk>=60?"high":risk>=35?"mid":"low";
  return {title,sub,cta,action,risk,cls};
}

function escapeHtml(s){ return s.replace(/[&<>"]/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[ch])); }

/* ====================== Actions ====================== */
function doAction(act,c){
  if(act==="sms"){ if(!c.sms) return toast("⚠ SMS marketing is off for "+c.name.split(" ")[0]); toast("✉ Texting "+c.name.split(" ")[0]+" · "+c.id); }
  else if(act==="email"){ if(!(c.mail&&c.email)) return toast("⚠ No email consent on file"); toast("✉ Email to "+c.email); }
  else if(act==="points"){ c.points+=50; toast("+50 points → "+c.name.split(" ")[0]+" · "+c.points.toLocaleString("pl-PL")+" total"); renderAll(); }
  else if(act==="note"){ const ni=document.getElementById("noteInput"); if(ni){ ni.focus(); ni.scrollIntoView({behavior:"smooth",block:"center"}); } }
}
function toggleConsent(kind,c){
  c[kind]=!c[kind];
  toast((kind==="sms"?"SMS":"Email")+" marketing "+(c[kind]?"opted in":"opted out")+" — saved");
  renderDetail();
}
function addNote(c){
  const ni=document.getElementById("noteInput");
  const v=ni.value.trim();
  if(!v) return;
  c.notes.unshift({by:"You",d:0,text:v});
  toast("Note saved → "+c.name.split(" ")[0]);
  renderDetail();
}

function toast(msg){
  const el=document.getElementById("toast");
  el.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>${msg}`;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove("show"),2200);
}

/* ====================== Fullscreen ====================== */
const fsbtn=document.getElementById("fsbtn");
function syncFs(){
  const on=!!document.fullscreenElement;
  document.documentElement.classList.toggle("is-fullscreen",on);
  fsbtn.setAttribute("aria-pressed",String(on));
}
function fallbackToggle(){
  const on=!document.documentElement.classList.contains("is-fullscreen");
  document.documentElement.classList.toggle("is-fullscreen",on);
  fsbtn.setAttribute("aria-pressed",String(on));
}
function toggleFs(){
  if(document.fullscreenElement){
    if(document.exitFullscreen) document.exitFullscreen().catch(fallbackToggle); else fallbackToggle();
  } else {
    const req=document.documentElement.requestFullscreen;
    if(req) req.call(document.documentElement).catch(fallbackToggle); else fallbackToggle();
  }
}
fsbtn.addEventListener("click",toggleFs);
document.addEventListener("fullscreenchange",syncFs);

/* ====================== Keyboard ====================== */
document.addEventListener("keydown",e=>{
  const el=e.target;
  const typing = el && (el.tagName==="INPUT"||el.tagName==="TEXTAREA"||el.isContentEditable);
  if(e.key==="Escape"){
    if(QUERY){ QUERY="";searchInput.value="";searchWrap.classList.remove("has-q");afterFilterChange(); }
    if(typing) el.blur();
    return;
  }
  if(typing) return;
  if(e.key==="/"){ e.preventDefault(); searchInput.focus(); return; }
  if(e.key.toLowerCase()==="f"){ toggleFs(); return; }
  if(e.key==="ArrowDown"||e.key==="ArrowUp"||e.key.toLowerCase()==="j"||e.key.toLowerCase()==="k"){
    const vis=visibleCustomers();
    if(!vis.length) return;
    const i=vis.findIndex(c=>c.id===selectedId);
    const dir=(e.key==="ArrowDown"||e.key.toLowerCase()==="j")?1:-1;
    const ni=Math.max(0,Math.min(vis.length-1,(i<0?0:i)+dir));
    selectCustomer(vis[ni].id);
    const node=document.querySelector(".cust.active");
    if(node) node.scrollIntoView({block:"nearest"});
    e.preventDefault();
  }
});

/* ====================== Clock ====================== */
function tick(){ document.getElementById("clock").textContent=fmtClock(new Date()); }

/* ====================== Boot ====================== */
buildLocSwitcher();
buildSortSwitcher();
syncFs();
renderAll();
tick();
setInterval(tick,1000);
</script>
