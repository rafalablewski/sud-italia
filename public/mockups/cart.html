<script>
  /* ----------------------------------------------------------------
     V9 — light, slow, museum-tempo interactivity.
     No springs. No bounces. Opacity fades.
     ---------------------------------------------------------------- */

  // ----- helpers ---------------------------------------------------
  const fmt = (n) => n.toFixed(2).replace('.', ',') + ' zł';
  const fmtNeg = (n) => '— ' + n.toFixed(2).replace('.', ',') + ' zł';

  const state = {
    items: [
      { id: 'margh', name: 'Margherita D.O.P.', price: 42.00, qty: 1, sold: false },
      { id: 'diav',  name: 'Diavola del Vesuvio', price: 48.00, qty: 1, sold: false },
      { id: 'burr',  name: 'Burrata di Andria', price: 36.00, qty: 1, sold: true  }
    ],
    pairings: { added: new Set() },
    quickadd: false,
    combo: false,
    delivery: 9.00,
    tip: 5.00,
    bundleDiscount: 8.00,
    method: 'delivery'
  };

  // ----- compute &amp; render totals -----------------------------------
  function compute() {
    let subtotal = 0;
    state.items.forEach(it => { if (!it.sold) subtotal += it.price * it.qty; });

    // pairings
    const pairingPrices = {
      'Espresso': 8.00,
      'Tiramisù della nonna': 22.00,
      'Falanghina, chilled': 26.00,
      'Limonata della Costiera': 12.00
    };
    let pairTotal = 0;
    state.pairings.added.forEach(name => { pairTotal += pairingPrices[name] || 0; });
    subtotal += pairTotal;
    if (state.quickadd) subtotal += 9.00;

    // combo: 10% off limonata + tiramisu when both added
    let comboDisc = 0;
    if (state.combo) {
      comboDisc = (pairingPrices['Limonata della Costiera'] + pairingPrices['Tiramisù della nonna']) * 0.10;
    }

    const delivery = state.method === 'delivery' ? state.delivery : 0;
    const tip = state.tip;
    const bundle = state.bundleDiscount;
    const total = Math.max(0, subtotal - bundle - comboDisc + delivery + tip);

    return { subtotal, bundle, comboDisc, delivery, tip, total, pairTotal };
  }

  function render() {
    const r = compute();
    const itemCount = state.items.filter(i => !i.sold).reduce((a,i)=>a+i.qty,0)
      + state.pairings.added.size + (state.quickadd ? 1 : 0);

    // aside card
    document.getElementById('sum-subtotal').textContent = fmt(r.subtotal);
    document.getElementById('sum-bundle').textContent  = fmtNeg(r.bundle);
    document.getElementById('sum-delivery').textContent= state.method === 'delivery' ? fmt(r.delivery) : '— gratis';
    document.getElementById('sum-tip').textContent     = fmt(r.tip);
    document.getElementById('sum-total').textContent   = fmt(r.total);

    const comboLine = document.getElementById('combo-line');
    if (state.combo) {
      comboLine.style.display = 'flex';
      document.getElementById('sum-combo').textContent = fmtNeg(r.comboDisc);
    } else {
      comboLine.style.display = 'none';
    }

    // pay bar
    document.getElementById('bar-subtotal').textContent = fmt(r.subtotal);
    document.getElementById('bar-fee').textContent      = fmt(r.delivery + r.tip);
    document.getElementById('bar-disc').textContent     = fmtNeg(r.bundle + r.comboDisc);
    document.getElementById('bar-total').textContent    = fmt(r.total);
    document.getElementById('cta-total').textContent    = fmt(r.total);
  }

  // ----- qty steppers ----------------------------------------------
  document.querySelectorAll('.item').forEach((node, idx) => {
    const qtyEl = node.querySelector('.qty');
    if (!qtyEl) return;
    qtyEl.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        const step = parseInt(btn.dataset.step, 10);
        const valEl = qtyEl.querySelector('.val');
        let v = parseInt(valEl.textContent, 10) + step;
        if (v < 1) v = 1; if (v > 9) v = 9;
        valEl.textContent = v;
        if (state.items[idx]) state.items[idx].qty = v;
        render();
      });
    });
  });

  // ----- pairing add toggle ----------------------------------------
  document.querySelectorAll('.pair__add').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.closest('.pair').querySelector('.pair__name').textContent.trim();
      if (state.pairings.added.has(name)) {
        state.pairings.added.delete(name);
        btn.classList.remove('added');
        btn.textContent = 'Add →';
      } else {
        state.pairings.added.add(name);
        btn.classList.add('added');
        btn.textContent = 'Added ·  remove';
      }
      render();
    });
  });

  // ----- quick add -------------------------------------------------
  const quickaddBtn = document.getElementById('quickadd-btn');
  quickaddBtn.addEventListener('click', () => {
    state.quickadd = !state.quickadd;
    quickaddBtn.textContent = state.quickadd ? 'Added · remove' : 'Add · 9,00 zł';
    quickaddBtn.style.background = state.quickadd ? 'transparent' : '';
    quickaddBtn.style.color = state.quickadd ? 'var(--ink)' : '';
    render();
  });

  // ----- combo deal -------------------------------------------------
  const comboBtn = document.getElementById('combo-btn');
  comboBtn.addEventListener('click', () => {
    state.combo = !state.combo;
    comboBtn.classList.toggle('added', state.combo);
    comboBtn.textContent = state.combo ? 'Pair added' : 'Add the pair';
    // also add the two items to pairings if not present
    if (state.combo) {
      ['Limonata della Costiera', 'Tiramisù della nonna'].forEach(n => {
        if (!state.pairings.added.has(n)) {
          state.pairings.added.add(n);
          document.querySelectorAll('.pair').forEach(p => {
            if (p.querySelector('.pair__name').textContent.trim() === n) {
              const b = p.querySelector('.pair__add');
              b.classList.add('added');
              b.textContent = 'Added ·  remove';
            }
          });
        }
      });
    }
    render();
  });

  // ----- fulfillment toggle ----------------------------------------
  document.querySelectorAll('.fulfill button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.fulfill button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.method = btn.dataset.method;
      render();
    });
  });

  // ----- time slots ------------------------------------------------
  document.querySelectorAll('#slots li').forEach(li => {
    li.addEventListener('click', () => {
      document.querySelectorAll('#slots li').forEach(l => l.classList.remove('selected'));
      li.classList.add('selected');
    });
  });

  // ----- tip picker ------------------------------------------------
  document.querySelectorAll('#tips button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#tips button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const t = btn.dataset.tip;
      state.tip = t === 'custom' ? 8.00 : (t === '0' ? 0 : parseFloat(t));
      render();
    });
  });

  // ----- weekly usual toggle ---------------------------------------
  const weekly = document.getElementById('weekly');
  weekly.addEventListener('click', (e) => {
    e.preventDefault();
    weekly.classList.toggle('active');
  });

  // ----- remove links ----------------------------------------------
  document.querySelectorAll('.textlink--delete').forEach((btn, idx) => {
    btn.addEventListener('click', () => {
      const li = btn.closest('.item');
      // confirm gently in copy
      btn.textContent = 'removing…';
      li.style.transition = 'opacity 800ms ease, max-height 800ms ease';
      li.style.opacity = '0';
      setTimeout(() => {
        li.style.maxHeight = '0';
        li.style.overflow = 'hidden';
        li.style.padding = '0';
        li.style.borderBottom = '0';
      }, 600);
    });
  });

  // ----- gentle reveal on scroll -----------------------------------
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('in');
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.08 });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));

  // initial paint
  render();

  // gently reveal the first sections on load
  window.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.reveal').forEach((el, i) => {
      setTimeout(() => el.classList.add('in'), 120 + i * 90);
    });
  });

  /* ==================================================================
     SUD ITALIA — Editorial homepage extensions
     Real interactivity: category tabs, search, qty steppers,
     surprise-me, bundle add, location nav, cart-chip pulse.
     ================================================================== */
  (function homepage() {

    // ---------- shared cart-count badge --------------------------------
    const cartCountTopnav = document.getElementById('topnavCartCount');
    const cartCountChip   = document.getElementById('cartChipCount');

    // Persisted local &quot;menu-side&quot; cart counters, separate from the cart drawer.
    // These reflect adds from the homepage menu and are surfaced in the chip.
    const homeCart = {
      margherita: 3, // matches the demo cart that lives in the drawer
      tartufina: 0,
      diavola: 0,
      carbonara: 0,
      tiramisu: 0
    };

    function totalHomeCart() {
      return Object.values(homeCart).reduce((s, n) => s + n, 0);
    }
    function pad2(n) { return n < 10 ? '0' + n : '' + n; }
    function refreshBadges() {
      const total = totalHomeCart();
      if (cartCountTopnav) cartCountTopnav.textContent = pad2(total);
      if (cartCountChip)   cartCountChip.textContent   = pad2(total);
    }
    refreshBadges();

    // ---------- qty steppers on every menu item ------------------------
    document.querySelectorAll('.menuitem__qty').forEach(group => {
      const id = group.dataset.id;
      const val = group.querySelector('.val');
      const dec = group.querySelector('[data-act=&quot;dec&quot;]');
      const inc = group.querySelector('[data-act=&quot;inc&quot;]');
      const item = group.closest('.menuitem');
      const incartLine = item ? item.querySelector('.menuitem__incart') : null;

      function setIncart(n) {
        if (!incartLine) return;
        if (n <= 0) {
          incartLine.innerHTML = '';
        } else if (n === 1) {
          incartLine.innerHTML = '<em>One in the cart.</em>';
        } else {
          const words = ['','one','two','three','four','five','six','seven','eight','nine'];
          const word = words[n] || ('' + n);
          incartLine.innerHTML = '<em>' + word.charAt(0).toUpperCase() + word.slice(1) + ' in the cart.</em>';
        }
      }

      dec.addEventListener('click', () => {
        const cur = parseInt(val.textContent, 10) || 0;
        const next = Math.max(0, cur - 1);
        val.textContent = next;
        if (id) homeCart[id] = next;
        setIncart(next);
        refreshBadges();
      });
      inc.addEventListener('click', () => {
        const cur = parseInt(val.textContent, 10) || 0;
        const next = Math.min(99, cur + 1);
        val.textContent = next;
        if (id) homeCart[id] = next;
        setIncart(next);
        refreshBadges();
      });
    });

    // ---------- &quot;Add&quot; text-links on menu items -------------------------
    document.querySelectorAll('.menuitem__add').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.add;
        const item = btn.closest('.menuitem');
        const qtyGroup = item ? item.querySelector('.menuitem__qty') : null;
        if (qtyGroup) {
          const valEl = qtyGroup.querySelector('.val');
          const cur = parseInt(valEl.textContent, 10) || 0;
          const next = cur + 1;
          valEl.textContent = next;
          if (id) homeCart[id] = next;
          // small textlink confirmation
          const original = btn.firstChild ? btn.firstChild.textContent : 'Add';
          const orig = btn.innerHTML;
          btn.innerHTML = 'Added';
          btn.classList.add('added');
          setTimeout(() => {
            btn.innerHTML = orig;
            btn.classList.remove('added');
          }, 1400);
          // refresh &quot;in the cart&quot; line
          const incartLine = item.querySelector('.menuitem__incart');
          if (incartLine) {
            const words = ['','one','two','three','four','five','six','seven','eight','nine'];
            const word = words[next] || ('' + next);
            incartLine.innerHTML = '<em>' + word.charAt(0).toUpperCase() + word.slice(1) + ' in the cart.</em>';
          }
        }
        refreshBadges();
      });
    });

    // ---------- category tabs -----------------------------------------
    const catLabels = {
      all: { label: 'All', count: 'twenty-nine numbers', pull: 'Wood-fired, twirled, fried, poured.' },
      pizza: { label: 'Pizza', count: 'nine numbers', pull: 'Wood-fired, ninety seconds at four-fifty degrees.' },
      pasta: { label: 'Pasta', count: 'four numbers', pull: 'Dried bronze-cut, cooked to order, eight minutes flat.' },
      antipasti: { label: 'Antipasti', count: 'five numbers', pull: 'Small plates, large opinions.' },
      panini: { label: 'Panini', count: 'two numbers', pull: 'Pressed, wrapped in butcher paper, eaten standing.' },
      drinks: { label: 'Drinks', count: 'five numbers', pull: 'San Pellegrino, espresso, one small wine.' },
      desserts: { label: 'Desserts', count: 'four numbers', pull: 'Made each morning. They sell out by ten.' }
    };
    const catHead = document.getElementById('catHead');
    function applyCategory(cat) {
      const items = document.querySelectorAll('#menuList .menuitem');
      let visible = 0;
      items.forEach(li => {
        const matches = (cat === 'all') || (li.dataset.cat === cat);
        if (matches) { li.classList.remove('menuitem--hidden'); visible++; }
        else { li.classList.add('menuitem--hidden'); }
      });
      if (catHead) {
        const meta = catLabels[cat] || catLabels.all;
        catHead.querySelector('.micro').textContent = meta.label;
        catHead.querySelector('.count').textContent = '· ' + meta.count;
        catHead.querySelector('.pull').textContent = meta.pull;
      }
      const empty = document.getElementById('menuEmpty');
      if (empty) empty.style.display = visible === 0 ? '' : 'none';
    }
    document.querySelectorAll('#menuTabs .menu__tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('#menuTabs .menu__tab').forEach(b => b.classList.remove('active'));
        t.classList.add('active');
        applyCategory(t.dataset.cat);
      });
    });

    // ---------- search filter -----------------------------------------
    const search = document.getElementById('menuSearch');
    if (search) {
      search.addEventListener('input', () => {
        const q = (search.value || '').trim().toLowerCase();
        const activeTab = document.querySelector('#menuTabs .menu__tab.active');
        const cat = activeTab ? activeTab.dataset.cat : 'all';
        const items = document.querySelectorAll('#menuList .menuitem');
        let visible = 0;
        items.forEach(li => {
          const catOk = (cat === 'all') || (li.dataset.cat === cat);
          const text = (li.dataset.name || '') + ' ' + li.textContent.toLowerCase();
          const searchOk = !q || text.indexOf(q) !== -1;
          if (catOk &amp;&amp; searchOk) { li.classList.remove('menuitem--hidden'); visible++; }
          else { li.classList.add('menuitem--hidden'); }
        });
        const empty = document.getElementById('menuEmpty');
        if (empty) empty.style.display = visible === 0 ? '' : 'none';
      });
    }

    // ---------- surprise me -------------------------------------------
    const surprise = document.getElementById('surpriseBtn');
    if (surprise) {
      surprise.addEventListener('click', () => {
        const visible = Array.from(document.querySelectorAll('#menuList .menuitem'))
          .filter(li => !li.classList.contains('menuitem--hidden'));
        if (!visible.length) return;
        const pick = visible[Math.floor(Math.random() * visible.length)];
        // scroll into view
        pick.scrollIntoView({ behavior: 'smooth', block: 'center' });
        // brief outline highlight
        const prevOutline = pick.style.outline;
        const prevOffset = pick.style.outlineOffset;
        pick.style.outline = '1px solid var(--ink)';
        pick.style.outlineOffset = '8px';
        setTimeout(() => {
          pick.style.outline = prevOutline;
          pick.style.outlineOffset = prevOffset;
        }, 1600);
        // bump qty by one
        const valEl = pick.querySelector('.menuitem__qty .val');
        const id = pick.dataset.id;
        if (valEl) {
          const cur = parseInt(valEl.textContent, 10) || 0;
          valEl.textContent = cur + 1;
          if (id) homeCart[id] = cur + 1;
          refreshBadges();
        }
      });
    }

    // ---------- bundle &quot;Add to cart&quot; ----------------------------------
    document.querySelectorAll('.bundle__add').forEach(btn => {
      btn.addEventListener('click', () => {
        const orig = btn.innerHTML;
        btn.classList.add('added');
        btn.innerHTML = 'Added to cart';
        // bump count visually (one bundle = one line)
        const bundleId = btn.dataset.bundle || 'b';
        if (!homeCart['bundle_' + bundleId]) homeCart['bundle_' + bundleId] = 0;
        homeCart['bundle_' + bundleId] += 1;
        refreshBadges();
        setTimeout(() => {
          btn.classList.remove('added');
          btn.innerHTML = orig;
        }, 1800);
      });
    });

    // ---------- location-card &quot;View menu&quot; CTAs → dedicated location page
    document.querySelectorAll('.loc__cta[data-loc]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        const loc = el.dataset.loc;
        if (loc === 'krakow' || loc === 'warszawa') {
          window.location.hash = '#/locations/' + loc;
        }
      });
    });

    // ---------- topnav link active state on scroll --------------------
    const sectionIds = ['tonight', 'menu', 'bundles', 'locations'];
    const linkMap = {
      tonight: null,
      menu: 'Menu',
      bundles: 'Bundles',
      locations: 'Locations'
    };
    const links = Array.from(document.querySelectorAll('.topnav__links a'));
    function setActiveLink(label) {
      links.forEach(a => {
        a.classList.toggle('active', a.textContent.trim() === label);
      });
    }
    const scrollIo = new IntersectionObserver((entries) => {
      entries.forEach(en => {
        if (en.isIntersecting) {
          const id = en.target.id;
          const label = linkMap[id];
          if (label) setActiveLink(label);
        }
      });
    }, { rootMargin: '-40% 0px -50% 0px' });
    sectionIds.forEach(id => {
      const el = document.getElementById(id);
      if (el) scrollIo.observe(el);
    });

    // ---------- cart chip — gentle pulse on cart-mutation -------------
    // (Triggered on any qty change; subtle scale, monochrome.)
    const chip = document.getElementById('cartChip');
    function pulseChip() {
      if (!chip) return;
      chip.animate(
        [
          { transform: 'translateY(0)' },
          { transform: 'translateY(-3px)' },
          { transform: 'translateY(0)' }
        ],
        { duration: 360, easing: 'cubic-bezier(.22,.61,.36,1)' }
      );
    }
    // hook pulse into qty changes &amp; adds
    document.addEventListener('click', (e) => {
      const t = e.target.closest('.menuitem__qty button, .menuitem__add, .bundle__add');
      if (t) pulseChip();
    });

    // ---------- cart chip close (hover X) — hide for the session ------
    const chipClose = chip ? chip.querySelector('.cartchip__close') : null;
    if (chipClose) {
      chipClose.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        chip.style.transition = 'opacity 320ms ease, transform 320ms ease';
        chip.style.opacity = '0';
        chip.style.transform = 'translateY(8px)';
        setTimeout(() => { chip.style.display = 'none'; }, 360);
      });
    }

    // ---------- topnav cart click — smooth scroll to cart -------------
    const topCart = document.getElementById('topnavCart');
    if (topCart) {
      topCart.addEventListener('click', (e) => {
        e.preventDefault();
        const c = document.getElementById('cart');
        if (c) c.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    }

    // ---------- topnav nav link smooth-scroll (home-anchored) ---------
    document.querySelectorAll('.topnav__links a[href^=&quot;#&quot;]').forEach(a => {
      a.addEventListener('click', (e) => {
        const id = a.getAttribute('href').slice(1);
        e.preventDefault();
        // ensure we're on home, then scroll
        const isHome = !window.location.hash || window.location.hash === '#/' || window.location.hash === '#';
        const doScroll = () => {
          const target = document.getElementById(id);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        if (isHome) {
          doScroll();
        } else {
          window.location.hash = '#/';
          // wait one frame for route to render
          requestAnimationFrame(() => requestAnimationFrame(doScroll));
        }
      });
    });

    // ---------- topnav brand → home -----------------------------------
    const brandLink = document.querySelector('.topnav__brand');
    if (brandLink) {
      brandLink.addEventListener('click', (e) => {
        e.preventDefault();
        window.location.hash = '#/';
      });
    }

    // ---------- hero CTAs (ORDER · Kraków / Warszawa) → location page -
    document.querySelectorAll('.hero__ctas .btn-ink').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const loc = btn.dataset.loc;
        if (loc === 'krakow' || loc === 'warszawa') {
          // tiny red-ink ack
          const orig = btn.style.background;
          if (btn.style.background !== 'transparent') {
            btn.style.background = 'var(--red)';
            btn.style.borderColor = 'var(--red)';
            setTimeout(() => {
              btn.style.background = orig || '';
              btn.style.borderColor = '';
            }, 300);
          }
          window.location.hash = '#/locations/' + loc;
        }
      });
    });

    // ---------- read story link → scroll to cart (story lives at end) -
    const story = document.querySelector('.btn-text');
    if (story) {
      story.addEventListener('click', (e) => {
        e.preventDefault();
        const isHome = !window.location.hash || window.location.hash === '#/' || window.location.hash === '#';
        const doScroll = () => {
          const c = document.getElementById('cart');
          if (c) c.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        if (isHome) {
          doScroll();
        } else {
          window.location.hash = '#/';
          requestAnimationFrame(() => requestAnimationFrame(doScroll));
        }
      });
    }

    // ===================================================================
    // HASH ROUTER — toggles #page-home / #page-krakow / #page-warszawa
    // Routes:
    //   #/                       → home
    //   #/locations/krakow       → Kraków page
    //   #/locations/warszawa     → Warszawa page
    // Cart drawer + cart chip stay globally available.
    // ===================================================================
    const PAGE_TITLES = {
      home:     'Sud Italia — Your Order',
      krakow:   'Sud Italia — Kraków',
      warszawa: 'Sud Italia — Warszawa'
    };
    const pages = {
      home:     document.getElementById('page-home'),
      krakow:   document.getElementById('page-krakow'),
      warszawa: document.getElementById('page-warszawa')
    };

    function parseRoute() {
      const h = (window.location.hash || '').replace(/^#/, '');
      // strip leading slash
      const path = h.replace(/^\//, '');
      if (path === '' || path === '/') return { name: 'home' };
      const m = path.match(/^locations\/(krakow|warszawa)\/?$/);
      if (m) return { name: m[1] };
      // legacy in-page anchors (e.g. #menu, #cart) → treat as home + scroll
      return { name: 'home', anchor: path };
    }

    function applyRoute(opts) {
      const route = parseRoute();
      // toggle pages
      Object.keys(pages).forEach(k => {
        const el = pages[k];
        if (!el) return;
        if (k === route.name) {
          el.classList.add('is-active');
        } else {
          el.classList.remove('is-active');
        }
      });
      // title
      document.title = PAGE_TITLES[route.name] || PAGE_TITLES.home;
      // scroll behaviour — top on route change, anchor if specified
      if (route.anchor) {
        const tgt = document.getElementById(route.anchor);
        if (tgt) {
          requestAnimationFrame(() => tgt.scrollIntoView({ behavior: 'smooth', block: 'start' }));
          return;
        }
      }
      if (!opts || !opts.preserveScroll) {
        // jump to top on route change (no smooth — feels like a new page)
        window.scrollTo({ top: 0, left: 0, behavior: 'auto' });
      }
    }

    // first paint + every hashchange
    window.addEventListener('hashchange', () => applyRoute());
    // initial route on load — preserve initial scroll if landing on home with anchor handled
    applyRoute({ preserveScroll: false });

    // ---------- back links on location pages --------------------------
    document.querySelectorAll('[data-route-home]').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        window.location.hash = '#/';
      });
    });

    // ---------- final CTA on each location page → open cart drawer ----
    document.querySelectorAll('.loccta[data-cta-loc]').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        // route home, then scroll to the cart drawer
        window.location.hash = '#/';
        requestAnimationFrame(() => requestAnimationFrame(() => {
          const c = document.getElementById('cart');
          if (c) c.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }));
      });
    });

    // ---------- bundle add buttons inside location pages --------------
    // Reuse the same homeCart counter logic the home bundles use.
    document.querySelectorAll('.locpage .bundle__add').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        if (typeof homeCart !== 'undefined') {
          const bundleId = btn.dataset.bundle || 'bundle';
          homeCart['bundle_' + bundleId] = (homeCart['bundle_' + bundleId] || 0) + 1;
          if (typeof refreshBadges === 'function') refreshBadges();
        }
        const orig = btn.innerHTML;
        btn.classList.add('added');
        btn.innerHTML = 'Added &amp;nbsp;·&amp;nbsp; in cart';
        setTimeout(() => {
          btn.classList.remove('added');
          btn.innerHTML = orig;
        }, 1800);
      });
    });

  })();
</script>

  <div class="hint" aria-hidden="true">← → to switch concepts</div>
  <script>
    (function(){
      const tabs = document.querySelectorAll('.tab');
      const frames = document.querySelectorAll('.frame');
      function activate(id, push){
        tabs.forEach(t => {
          const on = t.dataset.frame === id;
          t.classList.toggle('active', on);
          t.setAttribute('aria-selected', on ? 'true' : 'false');
        });
        frames.forEach(f => f.classList.toggle('active', f.id === id));
        if (push !== false) {
          try { history.replaceState(null, '', '#' + id.replace('frame-', '')); } catch (e) {}
        }
      }
      tabs.forEach(tab => tab.addEventListener('click', () => activate(tab.dataset.frame)));
      const initial = location.hash.replace('#','').trim();
      if (initial && document.getElementById('frame-' + initial)) {
        activate('frame-' + initial, false);
      }
      document.addEventListener('keydown', e => {
        if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
        const arr = Array.from(tabs);
        const cur = arr.findIndex(t => t.classList.contains('active'));
        if (cur < 0) return;
        if (e.key === 'ArrowRight') { arr[(cur+1) % arr.length].click(); e.preventDefault(); }
        if (e.key === 'ArrowLeft')  { arr[(cur-1+arr.length) % arr.length].click(); e.preventDefault(); }
      });
    })();
  </script>
