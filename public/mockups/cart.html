    transition: transform .35s ease, box-shadow .35s ease;
  }
  .loc-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 28px 50px -28px rgba(61,40,23,0.45);
  }
  .loc-illus {
    position: relative;
    height: 180px;
    background:
      linear-gradient(180deg, rgba(184,92,56,0.08), rgba(201,162,62,0.10)),
      var(--parchment-deep);
    border-bottom: 1px solid var(--line-soft);
    display: grid;
    place-items: center;
    overflow: hidden;
  }
  .loc-illus svg { display: block; }
  .loc-illus::before {
    /* paper texture */
    content: &quot;&quot;;
    position: absolute; inset: 0;
    background-image: url(&quot;data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.42 0 0 0 0 0.32 0 0 0 0 0.18 0 0 0 0.04 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>&quot;);
    opacity: 0.7;
    pointer-events: none;
  }
  .loc-tricolore {
    height: 2.5px;
    background: linear-gradient(90deg,
      var(--italy-green) 0 33.3%,
      var(--italy-white) 33.3% 66.6%,
      var(--italy-red) 66.6% 100%);
    opacity: 0.85;
  }
  .loc-body { padding: 22px 22px 24px; flex: 1; display: flex; flex-direction: column; }
  .loc-head {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }
  .loc-name {
    font-family: var(--serif-display);
    font-weight: 600;
    font-size: 32px;
    line-height: 1;
    color: var(--espresso);
    letter-spacing: -0.3px;
  }
  .loc-status {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 12.5px;
    color: var(--basil-deep);
    letter-spacing: 0.6px;
    padding: 4px 10px;
    background: rgba(74,124,89,0.10);
    border: 1px solid rgba(74,124,89,0.3);
    border-radius: 999px;
  }
  .loc-status .terra-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--terracotta);
    box-shadow: 0 0 0 3px rgba(184,92,56,0.15);
    animation: pulse 2s ease-in-out infinite;
  }
  .loc-info {
    margin-top: 6px;
    color: var(--espresso-soft);
    font-size: 14px;
    line-height: 1.5;
  }
  .loc-info-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px dashed var(--line-soft);
  }
  .loc-info-row:last-child { border-bottom: none; }
  .loc-info-row svg { flex: 0 0 18px; margin-top: 2px; }
  .loc-desc {
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 16px;
    color: var(--espresso);
    margin: 14px 0 6px;
    line-height: 1.45;
  }
  .loc-note {
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 18px;
    padding-left: 12px;
    border-left: 2px solid var(--ochre);
  }
  .loc-cta {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    flex-wrap: wrap; text-align: center;
    background: var(--terracotta);
    color: var(--parchment);
    border: 1px solid var(--terracotta-dark);
    border-radius: var(--r-md);
    padding: 13px 18px;
    font-family: var(--serif-display);
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: all .25s ease;
    margin-top: auto;
    text-decoration: none;
    box-shadow: var(--shadow-cta);
  }
  .loc-cta:hover {
    background: var(--terracotta-dark);
    transform: translateY(-1px);
  }
  .loc-cta .it { font-style: italic; font-weight: 500; opacity: 0.85; }

  /* ============================================================
     BUNDLES
     ============================================================ */
  /* Bundles section (homepage + cloned on location pages). Wider than
     the default 1180px page-inner but always leaves a parchment gutter
     against the iframe edges, hard-capped at 1500px on huge screens. */
  .bundles-section .page-inner {
    width: min(calc(100% - 48px), 1500px);
    max-width: none;
    margin: 0 auto;
    padding: 0;
  }
  @media (min-width: 768px) {
    .bundles-section .page-inner { width: min(calc(100% - 96px), 1500px); }
  }
  @media (min-width: 1400px) {
    .bundles-section .page-inner { width: min(calc(100% - 128px), 1500px); }
  }
  .bundles {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }
  @media (min-width: 640px) {
    .bundles { grid-template-columns: 1fr 1fr; }
  }
  @media (min-width: 1000px) {
    .bundles { grid-template-columns: repeat(4, 1fr); gap: 22px; }
  }
  @media (min-width: 1400px) {
    .bundles { gap: 28px; }
  }
  .bundle {
    --accent: var(--terracotta);
    --accent-soft: var(--terracotta-soft);
    background: linear-gradient(180deg, #FBF4E1 0%, var(--parchment) 100%);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px 20px 24px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-card);
    display: flex;
    flex-direction: column;
    transition: transform .3s ease, box-shadow .3s ease;
  }
  .bundle::before {
    content: &quot;&quot;;
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--accent), var(--accent-soft));
  }
  .bundle:hover {
    transform: translateY(-4px);
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 24px 40px -22px rgba(61,40,23,0.45);
  }
  .bundle.b-family { --accent: #C75A6A; --accent-soft: #E89AA1; }
  .bundle.b-lunch  { --accent: var(--ochre); --accent-soft: var(--ochre-light); }
  .bundle.b-night  { --accent: var(--espresso); --accent-soft: var(--espresso-soft); }
  .bundle.b-classic{ --accent: var(--basil); --accent-soft: #88B196; }

  .bundle-icon {
    width: 56px; height: 56px;
    display: grid; place-items: center;
    background: rgba(255,255,255,0.45);
    border: 1px solid var(--line-soft);
    border-radius: 50%;
    margin-bottom: 14px;
    color: var(--accent);
  }
  .bundle-name {
    font-family: var(--serif-display);
    font-style: italic;
    font-weight: 600;
    font-size: 24px;
    color: var(--espresso);
    line-height: 1.05;
    margin-bottom: 2px;
  }
  .bundle-name .en {
    display: block;
    font-style: normal;
    font-size: 13.5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-top: 3px;
  }
  .bundle-price {
    margin-top: 14px;
    display: flex; align-items: baseline; gap: 10px;
  }
  .bundle-price .now {
    font-family: var(--serif-display);
    font-weight: 600;
    font-size: 28px;
    color: var(--oxblood);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .bundle-price .was {
    font-family: var(--serif-display);
    color: var(--muted);
    font-size: 15px;
    text-decoration: line-through;
    font-variant-numeric: tabular-nums;
    font-style: italic;
  }
  .bundle-price .savings {
    font-family: var(--serif-display);
    font-weight: 600;
    font-size: 22px;
    color: var(--basil-deep);
  }
  .bundle-desc {
    font-family: var(--serif-body);
    color: var(--espresso-soft);
    font-size: 14px;
    line-height: 1.55;
    margin: 12px 0 14px;
    flex: 1;
  }
  .bundle-desc em { font-family: var(--serif-display); font-style: italic; color: var(--espresso); }
  .bundle-tag {
    display: inline-block;
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.5px;
    border: 1px dashed var(--accent-soft);
    background: rgba(255,255,255,0.5);
    border-radius: 999px;
    padding: 3px 10px;
    margin-bottom: 14px;
    align-self: flex-start;
  }
  .bundle-foot-note {
    text-align: center;
    margin-top: 28px;
    font-family: var(--serif-display);
    font-style: italic;
    color: var(--muted);
    font-size: 14.5px;
  }
  .bundle-cta-wrap {
    text-align: center;
    margin-top: 24px;
  }

  /* ============================================================
     MENU SECTION
     ============================================================ */
  .menu-search {
    display: flex; align-items: center; gap: 12px;
    background: #FBF4E1;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 18px;
    box-shadow: var(--shadow-paper);
    margin-bottom: 18px;
  }
  .menu-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--serif-body);
    font-size: 16px;
    color: var(--ink);
  }
  .menu-search input::placeholder {
    color: var(--muted);
    font-style: italic;
    font-family: var(--serif-display);
  }
  .menu-search svg { color: var(--terracotta-dark); flex-shrink: 0; }

  .live-act {
    font-family: var(--serif-display);
    font-style: italic;
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 22px;
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap;
  }
  .live-act .pip {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--basil);
    box-shadow: 0 0 0 3px rgba(74,124,89,0.18);
    animation: pulse 2s ease-in-out infinite;
  }
  .live-act .num,
  .live-act strong {
    font-family: var(--serif-display);
    color: var(--espresso);
    font-style: normal;
    font-weight: 600;
  }
  .live-act .trend {
    color: var(--oxblood);
    font-style: italic;
  }

  .cat-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 22px;
  }
  .cat-tab {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--espresso);
    padding: 8px 16px;
    border-radius: 999px;
    font-family: var(--serif-display);
    font-size: 15px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all .2s ease;
  }
  .cat-tab:hover { background: var(--parchment-deep); border-color: var(--terracotta-soft); }
  .cat-tab.on {
    background: var(--terracotta);
    color: var(--parchment);
    border-color: var(--terracotta-dark);
    font-weight: 600;
  }
  .cat-tab .count {
    font-family: var(--serif-body);
    font-size: 11.5px;
    font-style: italic;
    opacity: 0.7;
  }
  .cat-tab.on .count { color: var(--ochre-light); opacity: 0.95; }

  .guarantee {
    margin: 22px 0;
    padding: 16px 18px;
    background: linear-gradient(180deg, rgba(201,162,62,0.18), rgba(201,162,62,0.06));
    border: 1px solid rgba(201,162,62,0.5);
    border-radius: 12px;
    display: flex; gap: 14px; align-items: center;
    position: relative;
    overflow: hidden;
  }
  .guarantee::before {
    content: &quot;&quot;;
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, var(--ochre), var(--terracotta));
  }
  .guarantee-icon { flex: 0 0 56px; color: var(--terracotta-dark); }
  .guarantee-text { flex: 1; }
  .guarantee-title {
    font-family: var(--serif-display);
    font-style: italic;
    font-weight: 600;
    font-size: 20px;
    color: var(--espresso);
    line-height: 1.1;
  }
  .guarantee-sub {
    font-size: 13.5px; color: var(--espresso-soft);
    margin-top: 3px;
    font-style: italic;
    font-family: var(--serif-display);
  }

  .combos {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    margin: 18px 0 22px;
  }
  @media (min-width: 640px) {
    .combos { grid-template-columns: 1fr 1fr; }
  }
  .combo-card {
    background: linear-gradient(180deg, #FBF4E1, var(--parchment));
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px 18px;
    display: flex; gap: 14px; align-items: center;
    position: relative;
    overflow: hidden;
  }
  .combo-card::before {
    content: &quot;&quot;;
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--italy-green) 0 33%, var(--italy-white) 33% 66%, var(--italy-red) 66%);
  }
  .combo-card-illus {
    flex: 0 0 44px; height: 44px;
    display: grid; place-items: center;
    color: var(--terracotta-dark);
  }
  .combo-card-body { flex: 1; min-width: 0; }
  .combo-card-title {
    font-family: var(--serif-display);
    font-style: italic;
    font-weight: 600;
    font-size: 18px;
    color: var(--espresso);
    line-height: 1.1;
  }
  .combo-card-sub {
    font-size: 12.5px;
    color: var(--muted);
    margin-top: 2px;
    font-style: italic;
  }
  .wax-seal {
    flex: 0 0 56px; height: 56px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 32%, var(--oxblood-soft), var(--oxblood) 70%);
    color: var(--parchment);
    font-family: var(--serif-display);
    font-weight: 700;
    font-style: italic;
    font-size: 15px;
    display: grid; place-items: center;
    box-shadow:
      inset 0 1px 2px rgba(255,255,255,0.2),
      inset 0 -2px 6px rgba(0,0,0,0.3),
      0 4px 10px -4px rgba(122,43,43,0.6);
    transform: rotate(-8deg);
    border: 1px solid rgba(122,43,43,0.6);
    position: relative;
  }
  .wax-seal::after {
    content: &quot;&quot;;
    position: absolute;
    inset: 6px;
    border: 1px dashed rgba(244,245,240,0.4);
    border-radius: 50%;
  }

  .surprise {
    background: linear-gradient(180deg, rgba(201,162,62,0.15), rgba(201,162,62,0.05));
    border: 1px dashed var(--ochre);
    color: var(--espresso);
    padding: 12px 18px;
    border-radius: 999px;
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 15.5px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 10px;
    margin: 0 0 24px;
    transition: all .2s ease;
  }
  .surprise:hover {
    background: linear-gradient(180deg, rgba(201,162,62,0.28), rgba(201,162,62,0.1));
    transform: translateY(-1px);
  }
  .surprise svg { color: var(--terracotta-dark); }

  /* Menu items */
  .menu-items {
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
  }
  @media (min-width: 900px) {
    .menu-items { grid-template-columns: 1fr 1fr; gap: 22px; }
  }
  .mi {
    background: linear-gradient(180deg, #FBF4E1 0%, var(--parchment) 100%);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px;
    box-shadow: var(--shadow-card);
    display: flex;
    flex-direction: column;
    position: relative;
    transition: transform .25s ease, box-shadow .25s ease, opacity .3s ease;
  }
  .mi.hidden-by-filter { display: none; }
  .mi:hover {
    transform: translateY(-3px);
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 22px 40px -22px rgba(61,40,23,0.4);
  }
  .mi-top { display: flex; gap: 16px; }
  .mi-illus {
    flex: 0 0 84px;
    width: 84px; height: 84px;
    background: var(--parchment-deep);
    border: 1px solid var(--line-soft);
    border-radius: 12px;
    display: grid; place-items: center;
    color: var(--terracotta-dark);
    transition: transform .4s ease;
  }
  .mi:hover .mi-illus { transform: rotate(-3deg); }
  .mi-info { flex: 1; min-width: 0; }
  .mi-name {
    font-family: var(--serif-display);
    font-style: italic;
    font-weight: 600;
    font-size: 24px;
    color: var(--espresso);
    line-height: 1.05;
  }
  .mi-name .en {
    display: block;
    font-style: normal;
    font-size: 11.5px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: var(--italy-red);
    font-weight: 600;
    margin-top: 4px;
  }
  .mi-origin {
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 13.5px;
    color: var(--muted);
    margin-top: 4px;
    line-height: 1.4;
  }
  .mi-chips {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 8px;
  }
  .chip {
    font-family: var(--serif-display);
    font-size: 11px;
    letter-spacing: 0.6px;
    padding: 3px 9px;
    border-radius: 999px;
    background: rgba(74,124,89,0.10);
    color: var(--basil-deep);
    border: 1px solid rgba(74,124,89,0.3);
    font-weight: 600;
  }
  .chip.it { font-style: italic; font-weight: 500; }
  .chip.warn { background: rgba(122,43,43,0.07); color: var(--oxblood); border-color: rgba(122,43,43,0.3); }
  .chip.gold { background: rgba(201,162,62,0.15); color: var(--ochre); border-color: rgba(201,162,62,0.4); }

  .mi-meta {
    margin-top: 12px;
    display: flex; flex-wrap: wrap; align-items: center; gap: 14px;
    font-size: 13px;
    color: var(--espresso-soft);
  }
  .mi-meta .star { color: var(--ochre); }
  .mi-meta .details {
    font-family: var(--serif-display);
    font-style: italic;
    color: var(--terracotta);
    border-bottom: 1px solid var(--terracotta-soft);
    cursor: pointer;
    background: none; border-left: none; border-right: none; border-top: none;
    padding: 0;
    font-size: 13.5px;
  }
  .mi-meta .details:hover { color: var(--terracotta-dark); border-bottom-color: var(--terracotta-dark); }

  .mi-foot {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px dashed var(--line-soft);
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .mi-price {
    font-family: var(--serif-display);
    font-weight: 600;
    font-size: 22px;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }
  .mi-add {
    background: var(--terracotta);
    color: var(--parchment);
    border: 1px solid var(--terracotta-dark);
    border-radius: var(--r-md);
    padding: 10px 18px;
    font-family: var(--serif-display);
    font-weight: 600;
    font-size: 14.5px;
    cursor: pointer;
    transition: all .2s ease;
    box-shadow: var(--shadow-cta);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .mi-add:hover { background: var(--terracotta-dark); transform: translateY(-1px); }
  .mi-add .it { font-style: italic; font-weight: 500; opacity: 0.9; }

  .mi-in-cart {
    display: flex; align-items: center; gap: 10px;
  }
  .mi-in-cart-note {
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 13px;
    color: var(--basil-deep);
  }

  /* Floating tags on items */
  .mi-flags {
    position: absolute;
    top: -10px; left: 16px;
    display: flex; gap: 6px;
  }
  .flag {
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 11px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--terracotta);
    color: var(--parchment);
    border: 1px solid var(--terracotta-dark);
    box-shadow: 0 6px 14px -8px rgba(184,92,56,0.6);
  }
  .flag.gold { background: var(--ochre); color: var(--espresso); border-color: #B58F36; }
  .flag.basil { background: var(--basil); color: var(--parchment); border-color: var(--basil-deep); }

  /* CHEF'S SIGNATURE crown badge */
  .signature {
    position: absolute;
    top: 10px; right: 12px;
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--espresso);
    color: var(--ochre-light);
    border: 1px solid var(--espresso-soft);
    padding: 4px 10px;
    border-radius: 999px;
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 11px;
    letter-spacing: 1px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .countdown-pill {
    position: absolute;
    top: 46px; right: 12px;
    background: var(--oxblood);
    color: var(--parchment);
    padding: 3px 10px;
    border-radius: 999px;
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 11px;
    letter-spacing: 1px;
    font-weight: 600;
  }

  /* ============================================================
     STORY / FAMIGLIA strip (between sections)
     ============================================================ */
  .famiglia {
    text-align: center;
    padding: 64px 0;
    background:
      radial-gradient(at 50% 50%, rgba(184,92,56,0.06), transparent 70%);
  }
  .famiglia blockquote {
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 28px;
    color: var(--espresso);
    line-height: 1.3;
    margin: 0 auto 18px;
    max-width: 720px;
    position: relative;
  }
  @media (min-width: 768px) {
    .famiglia blockquote { font-size: 36px; }
  }
  .famiglia blockquote::before, .famiglia blockquote::after {
    content: &quot;\201C&quot;;
    color: var(--oxblood);
    opacity: 0.4;
    font-family: var(--serif-display);
    font-size: 60px;
    line-height: 0;
    position: relative;
    top: 12px;
  }
  .famiglia blockquote::after { content: &quot;\201D&quot;; }
  .famiglia cite {
    font-family: var(--serif-display);
    font-style: normal;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-size: 12px;
  }

  /* ============================================================
     PAGE FOOTER
     ============================================================ */
  .pfoot {
    background: var(--espresso);
    color: var(--parchment);
    padding: 50px 0 32px;
  }
  .pfoot-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 28px;
  }
  @media (min-width: 768px) {
    .pfoot-grid { grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 36px; }
  }
  .pfoot h4 {
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 18px;
    margin: 0 0 12px;
    color: var(--ochre-light);
    font-weight: 600;
  }
  .pfoot p, .pfoot a, .pfoot li {
    font-family: var(--serif-body);
    font-size: 13.5px;
    color: rgba(244,245,240,0.75);
    line-height: 1.65;
  }
  .pfoot a {
    text-decoration: none;
    display: block;
    padding: 3px 0;
    transition: color .2s ease;
  }
  .pfoot a:hover { color: var(--ochre-light); }
  .pfoot ul { list-style: none; padding: 0; margin: 0; }
  .pfoot-brand {
    display: flex; align-items: center; gap: 12px;
    font-family: var(--serif-display);
    font-size: 26px;
    font-weight: 600;
    color: var(--parchment);
    margin-bottom: 12px;
  }
  .pfoot-bottom {
    margin-top: 36px;
    padding-top: 22px;
    border-top: 1px solid rgba(244,245,240,0.12);
    display: flex; flex-wrap: wrap; gap: 12px; justify-content: space-between;
    font-family: var(--serif-display);
    font-style: italic;
    color: rgba(244,245,240,0.5);
    font-size: 12.5px;
  }
  .pfoot-trico {
    width: 90px; height: 3px;
    margin-top: 14px;
    background: linear-gradient(90deg,
      var(--italy-green) 0 33.3%,
      var(--italy-white) 33.3% 66.6%,
      var(--italy-red) 66.6% 100%);
    opacity: 0.85;
  }

  /* ============================================================
     FLOATING CART BUTTON (bottom-right)
     ============================================================ */
  .float-cart {
    position: fixed;
    bottom: 22px;
    right: 22px;
    z-index: 75;
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(180deg, #FBF4E1, var(--parchment-deep));
    border: 1px solid var(--line);
    color: var(--espresso);
    padding: 12px 18px 12px 14px;
    border-radius: 999px;
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 15.5px;
    cursor: pointer;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.6) inset,
      0 14px 32px -12px rgba(61,40,23,0.45);
    transition: all .25s ease;
  }
  .float-cart:hover {
    background: var(--terracotta);
    color: var(--parchment);
    border-color: var(--terracotta-dark);
    transform: translateY(-2px);
    box-shadow: 0 18px 36px -12px rgba(184,92,56,0.55);
  }
  .float-cart:hover svg path,
  .float-cart:hover svg line { stroke: var(--parchment); }
  .float-cart .float-cart-count {
    background: var(--terracotta);
    color: var(--parchment);
    border-radius: 999px;
    font-family: var(--serif-display);
    font-style: normal;
    font-weight: 600;
    font-size: 12px;
    min-width: 22px; height: 22px; padding: 0 7px;
    display: inline-grid; place-items: center;
  }
  .float-cart:hover .float-cart-count { background: var(--parchment); color: var(--terracotta-dark); }

  /* ============================================================
     PAGES — hash routing
     ============================================================ */
  .page-route { display: none; }
  .page-route.active { display: block; }

  /* ============================================================
     LOCATION PAGE — back link + hero + cards
     ============================================================ */
  .loc-page { background: var(--parchment); }
  .back-chip-wrap {
    padding: 14px 18px 4px;
    max-width: 700px;
    margin: 0 auto;
  }
  .back-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(184,92,56,0.08);
    border: 1px solid rgba(184,92,56,0.28);
    color: var(--terracotta-dark);
    font-family: var(--serif-display);
    font-size: 15px;
    font-style: italic;
    font-weight: 500;
    text-decoration: none;
    letter-spacing: 0.01em;
    transition: background .2s ease, color .2s ease, transform .2s ease;
    cursor: pointer;
  }
  .back-chip:hover {
    background: var(--terracotta);
    color: var(--parchment);
    transform: translateX(-2px);
  }
  .back-chip svg { display: block; flex-shrink: 0; }
  .back-chip .bi-sec { color: rgba(122, 43, 43, 0.6); }
  .back-chip:hover .bi-sec { color: rgba(255, 247, 232, 0.88); }

  .loc-hero {
    position: relative;
    padding: 18px 20px 26px;
    overflow: hidden;
    background:
      linear-gradient(180deg, rgba(248,239,222,0) 0%, rgba(232,214,181,0.45) 100%),
      var(--parchment);
    border-bottom: 1px solid var(--line-soft);
  }
  .loc-hero-inner {
    position: relative;
    z-index: 2;
    max-width: 640px;
    margin: 0 auto;
    text-align: center;
  }
  .loc-hero-illus {
    width: 100%;
    max-width: 360px;
    margin: 0 auto 12px;
    display: block;
  }
  .loc-hero-name {
    font-family: var(--serif-display);
    font-weight: 600;
    font-size: 44px;
    line-height: 1.02;
    letter-spacing: -0.01em;
    color: var(--espresso);
    margin: 8px 0 6px;
  }
  @media (min-width: 768px) {
    .loc-hero-name { font-size: 60px; }
  }
  .loc-hero-name .it { color: var(--terracotta); }
  .loc-hero-sub .bi-sec { color: var(--muted); opacity: 0.65; }
  .loc-hero-sub .bi-pri { color: var(--espresso-soft); }
  .loc-hero-sub {
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 17px;
    color: var(--espresso-soft);
    margin: 0 0 12px;
  }
  .loc-hero-tricolore {
    display: inline-block;
    width: 80px;
    height: 3px;
    margin: 4px auto 10px;
    background: linear-gradient(90deg, var(--italy-green) 0 33%, var(--italy-white) 33% 66%, var(--italy-red) 66% 100%);
    border-radius: 2px;
  }
  .loc-hero-status .bi-sec { color: var(--basil); opacity: 0.7; }
  .loc-hero-status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 999px;
    background: rgba(74,124,89,0.10);
    border: 1px solid rgba(74,124,89,0.32);
    font-family: var(--serif-body);
    font-size: 13px;
    color: var(--basil-deep);
  }
  .loc-hero-status .terra-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--basil);
    box-shadow: 0 0 0 3px rgba(74,124,89,0.18);
  }

  /* Address + hours + contact cards row */
  .loc-section { padding: 22px 18px; max-width: 700px; margin: 0 auto; }
  @media (min-width: 768px) { .loc-section { padding: 28px 24px; } }

  .loc-card-soft svg[width] { flex-shrink: 0; }
  .loc-card-soft {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.55) 0%, rgba(248,239,222,0.6) 100%),
      var(--parchment-deep);
    border: 1px solid var(--line-soft);
    border-radius: 14px;
    padding: 18px 18px 20px;
    box-shadow: var(--shadow-paper);
    margin-bottom: 16px;
  }
  .loc-card-eyebrow {
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 13px;
    color: var(--terracotta);
    letter-spacing: 0.02em;
    text-transform: lowercase;
    margin-bottom: 6px;
  }
  .loc-card-title {
    font-family: var(--serif-display);
    font-weight: 600;
    font-size: 22px;
    color: var(--espresso);
    margin: 0 0 10px;
    line-height: 1.15;
  }
  .loc-card-title .en {
    display: block;
    font-style: italic;
    font-size: 14px;
    color: var(--espresso-soft);
    font-weight: 400;
  }

  .addr-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    font-size: 15px;
    line-height: 1.45;
    color: var(--ink);
  }
  .addr-row svg {
    flex: 0 0 22px; width: 22px; height: 22px;
    margin-top: 2px; /* baseline-align with the first text line */
    display: block;
  }
  .addr-row strong {
    display: block;
    font-family: var(--serif-display);
    font-weight: 600;
    color: var(--espresso);
  }

  /* Hours grid */
  .hours-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-top: 6px;
  }
  .hours-cell {
    text-align: center;
    padding: 8px 2px 10px;
    background: rgba(255,255,255,0.45);
    border: 1px solid var(--line-soft);
    border-radius: 8px;
  }
  .hours-cell.today {
    background: rgba(184,92,56,0.10);
    border-color: rgba(184,92,56,0.35);
  }
  .hours-day-it {
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 13px;
    color: var(--terracotta-dark);
    font-weight: 600;
    line-height: 1;
  }
  .hours-day-en {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 2px;
  }
  .hours-time {
    font-family: var(--serif-body);
    font-size: 11px;
    color: var(--espresso);
    margin-top: 6px;
    font-feature-settings: &quot;tnum&quot; 1, &quot;lnum&quot; 1;
    line-height: 1.2;
  }

  /* Contact grid */
  .contact-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin-top: 6px;
  }
  @media (min-width: 540px) {
    .contact-grid { grid-template-columns: 1fr 1fr; }
  }
  .contact-row svg { flex-shrink: 0; width: 22px; height: 22px; display: block; }
  .contact-row {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 10px 12px;
    background: rgba(255,255,255,0.5);
    border: 1px solid var(--line-soft);
    border-radius: 10px;
    text-decoration: none;
    color: var(--ink);
    font-size: 14px;
    transition: background .2s ease, transform .2s ease;
  }
  .contact-row:hover {
    background: rgba(184,92,56,0.08);
    transform: translateY(-1px);
  }
  .contact-row .lbl {
    display: block;
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 11px;
    color: var(--terracotta);
    line-height: 1;
    margin-bottom: 3px;
  }
  .contact-row .val {
    font-family: var(--serif-body);
    font-weight: 600;
    color: var(--espresso);
    font-size: 14px;
  }

  /* Story panel */
  .loc-story {
    background:
      linear-gradient(180deg, rgba(122,43,43,0.05) 0%, rgba(184,92,56,0.06) 100%),
      var(--parchment);
    border: 1px solid rgba(122,43,43,0.20);
    border-radius: 14px;
    padding: 22px 22px 24px;
    margin-bottom: 16px;
    position: relative;
  }
  .loc-story .ps-eyebrow {
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 13px;
    color: var(--oxblood);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }
  .loc-story h3 {
    font-family: var(--serif-display);
    font-weight: 600;
    font-size: 22px;
    color: var(--espresso);
    margin: 0 0 10px;
    line-height: 1.15;
  }
  .loc-story p {
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 17px;
    line-height: 1.55;
    color: var(--espresso);
    margin: 0 0 8px;
  }
  .loc-story cite {
    display: block;
    font-family: var(--serif-body);
    font-style: normal;
    font-size: 13px;
    color: var(--espresso-soft);
    margin-top: 8px;
    letter-spacing: 0.02em;
  }

  /* Mini menu list */
  /* Location-page menu — matches the homepage menu rhythm:
     single column on phone, two columns from 768px, escaping the
     700px .loc-section parent cap so it spans the full viewport. */
  .mini-menu {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    margin-top: 8px;
  }
  @media (min-width: 768px) {
    .mini-menu { grid-template-columns: 1fr 1fr; gap: 18px; }
  }
  /* Menu inside a location page: unwrap the card chrome so the menu
     reads as a full-width section, not a card-within-a-card. The
     .loc-menu-card div still exists for routing/scoping, but visually
     it inherits the page parchment background. */

      margin-top: 24px;

    .loc-section .loc-card-soft.loc-menu-card {

      margin-right: calc(50% - 50vw + 80px);

  .mini-item {

    gap: 14px;
    padding: 14px 14px;

  .mini-item .mini-emoji {
    width: 52px; height: 52px;
    border-radius: 12px;
    flex: 0 0 52px;
  }
  .mini-item .mini-emoji svg { width: 30px; height: 30px; }
  .mini-item .mini-name { font-size: 17px; }
  .mini-item .mini-desc { font-size: 13.5px; line-height: 1.45; }
  .mini-item-foot {
    display: flex; align-items: center; justify-content: space-between;

    display: inline-flex; align-items: center; gap: 6px;

  .mini-item .mini-add:hover {
    background: var(--terracotta-dark); transform: translateY(-1px);

  .mini-item .mini-add.added {
    background: var(--basil); color: var(--parchment);
  }
  .mini-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .mini-tab {
    appearance: none;
    background: rgba(255,255,255,0.5);
    border: 1px solid var(--line-soft);
    color: var(--espresso);
    padding: 6px 12px;
    border-radius: 999px;
    font-family: var(--serif-display);
    font-size: 14px;
    cursor: pointer;
    transition: background .2s ease, color .2s ease, border-color .2s ease;
  }
  .mini-tab.on {
    background: var(--terracotta);
    color: var(--parchment);
    border-color: var(--terracotta-dark);
  }
  .mini-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 12px;
    background: rgba(255,255,255,0.5);
    border: 1px solid var(--line-soft);
    border-radius: 10px;
    transition: background .2s ease, transform .2s ease;
  }
  .mini-item.hero-pick {
    background:
      linear-gradient(180deg, rgba(184,92,56,0.05), rgba(201,162,62,0.06)),
      rgba(255,255,255,0.55);
    border-color: rgba(184,92,56,0.35);
    box-shadow: 0 6px 16px -10px rgba(184,92,56,0.45);
  }
  .mini-item:hover { background: rgba(184,92,56,0.06); }
  .mini-item .mini-emoji {
    width: 38px; height: 38px;
    border-radius: 8px;
    background: rgba(184,92,56,0.12);
    display: grid; place-items: center;
    flex: 0 0 38px;
  }
  .mini-item .mini-body { flex: 1; min-width: 0; }
  .mini-item .mini-name {
    font-family: var(--serif-display);
    font-weight: 600;
    font-size: 17px;
    color: var(--espresso);
    line-height: 1.15;
  }
  .mini-item .mini-name .en {
    display: block;
    font-style: italic;
    font-size: 12px;
    color: var(--espresso-soft);
    font-weight: 400;
    margin-top: 1px;
  }
  .mini-item .mini-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
    margin-top: 3px;
  }
  .mini-item .mini-price {
    font-family: var(--serif-display);
    font-weight: 600;
    font-size: 16px;
    color: var(--terracotta-dark);
    font-feature-settings: &quot;tnum&quot; 1, &quot;lnum&quot; 1;
    flex: 0 0 auto;
  }
  .mini-item .mini-pick-tag {
    display: inline-block;
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 11px;
    color: var(--oxblood);
    background: rgba(122,43,43,0.10);
    border: 1px solid rgba(122,43,43,0.25);
    padding: 1px 7px;
    border-radius: 999px;
    margin-top: 4px;
  }

  /* Pickup slots */
  .pickup-slots {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 8px;
  }
  @media (min-width: 540px) {
    .pickup-slots { grid-template-columns: repeat(6, 1fr); }
  }
  .pickup-slot {
    appearance: none;
    background: rgba(255,255,255,0.55);
    border: 1px solid var(--line-soft);
    border-radius: 10px;
    padding: 10px 6px;
    cursor: pointer;
    text-align: center;
    transition: background .2s ease, border-color .2s ease, transform .2s ease;
    font-family: var(--serif-body);
  }
  .pickup-slot:hover:not([disabled]) {
    background: rgba(184,92,56,0.08);
    border-color: rgba(184,92,56,0.4);
    transform: translateY(-2px);
  }
  .pickup-slot.on {
    background: var(--terracotta);
    border-color: var(--terracotta-dark);
    color: var(--parchment);
  }
  .pickup-slot .ps-time {
    font-family: var(--serif-display);
    font-weight: 600;
    font-size: 16px;
    color: var(--espresso);
    line-height: 1;
    font-feature-settings: &quot;tnum&quot; 1, &quot;lnum&quot; 1;
  }
  .pickup-slot.on .ps-time { color: var(--parchment); }
  .pickup-slot .ps-scar {
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 11px;
    color: var(--oxblood);
    margin-top: 4px;
    line-height: 1.2;
  }
  .pickup-slot.on .ps-scar { color: rgba(244,245,240,0.85); }
  .pickup-slot[disabled] {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .pickup-slot[disabled] .ps-scar { color: var(--muted); }

  /* CTA &amp; live activity */
  .order-cta-wrap {
    text-align: center;
    margin: 22px 0 16px;
  }
  .order-cta-big {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 26px;

    font-size: 18px;

    transform: translateY(-2px);

  }
  @keyframes ink-pip {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .loc-live-row {
    text-align: center;
    margin: 8px 0 22px;
  }

  /* tighter bundles in loc page */
  .loc-bundles-strip {
    margin-top: 8px;
  }
  /* Bundles in location pages: rendered as a full bundles-section sibling
     of .loc-section (see HTML), so the same .bundles-section .page-inner
     CSS above applies — no escape gymnastics needed. */
  /* Guard against horizontal scroll caused by 100vw inside iframes */
  html, body { overflow-x: hidden; }

  /* ============================================================
     CART SHEET (modal / slide-up containing the original cart)
     ============================================================ */
  .cart-overlay {
    position: fixed; inset: 0;
    background: rgba(45,24,16,0.45);
    backdrop-filter: blur(3px);
    z-index: 90;
    opacity: 0;
    pointer-events: none;
    transition: opacity .35s ease;
  }
  .cart-overlay.open { opacity: 1; pointer-events: auto; }

  .cart-sheet {
    position: fixed;
    z-index: 95;
    left: 50%;
    transform: translate(-50%, 100%);
    bottom: 0;
    width: 100%;
    max-width: 460px;
    /* Part A — drawer feels like a near-full-screen sheet on mobile,
       with a small parchment breathing strip up top */
    height: 96vh;
    max-height: 96vh;
    min-height: 96vh;
    background: var(--parchment);
    border-radius: 18px 18px 0 0;
    border: 1px solid var(--line);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.6) inset,
      0 -30px 80px -20px rgba(61,40,23,0.5);
    overflow: hidden;
    transition: transform .45s cubic-bezier(.2,.8,.2,1);
    display: flex;
    flex-direction: column;
  }
  @media (min-width: 768px) {
    .cart-sheet {
      max-width: 520px;
      bottom: 20px;
      /* Side-drawer-like, but generous so internals breathe */
      height: calc(100vh - 40px);
      max-height: calc(100vh - 40px);
      min-height: 0;
      border-radius: 18px;
    }
    /* a little extra interior padding on desktop so it isn't cramped */
    .cart-sheet .cart-scroll > .frame { padding-left: 4px; padding-right: 4px; }
  }
  .cart-sheet.open { transform: translate(-50%, 0); }
  body.sheet-open .float-cart { opacity: 0; pointer-events: none; transform: translateY(20px); }
  .cart-grip {
    position: relative;
    height: 22px;
    display: grid; place-items: center;
    background: var(--parchment);
    border-bottom: 1px solid var(--line-soft);
    flex: 0 0 auto;
  }
  .cart-grip::before {
    content: &quot;&quot;;
    width: 44px; height: 4px;
    background: var(--line);
    border-radius: 4px;
  }
  .cart-scroll {
    overflow-y: auto;
    flex: 1;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 0;
  }
  /* override the original .frame inside the sheet so it fills */
  .cart-sheet .frame {
    max-width: 100%;
    margin: 0;
    border-radius: 0;
    min-height: 0;
    box-shadow: none;
    padding-bottom: 0;
    background: transparent;
    overflow: visible;
  }
  @media (min-width: 768px) {
    .cart-sheet .frame {
      margin: 0;
      box-shadow: none;
      min-height: 0;
    }
  }
  /* keep the cart drawer's own sticky header pinned inside the sheet (not the page) */
  .cart-sheet .top {
    position: sticky;
    top: 0;
    z-index: 8;
  }
  /* original paybar is fixed — inside the sheet we want it pinned to sheet bottom */
  .cart-sheet .paybar {
    position: sticky;
    bottom: 0;
    left: auto; right: auto;
    transform: none;
    max-width: 100%;
  }
  @media (min-width: 768px) {
    .cart-sheet .paybar {
      max-width: 100%;
      border-radius: 0;
    }
  }
  .cart-sheet .toast { display: none; }

  /* When cart sheet is closed, completely hide the original paybar (it lives inside the sheet now) */

  /* ============================================================
     Reduced motion
     ============================================================ */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
    .hero-cta:hover, .loc-cta:hover, .bundle:hover, .mi:hover, .loc-card:hover, .float-cart:hover, .nav-cart:hover {
      transform: none;
    }
  }
</style>

      <h3>Anna e la Vespa di via Nowy Świat</h3>
      <p>
        Anna è arrivata a Varsavia con un sogno semplice: portare il <em>fior di latte</em> di Agerola nei giorni grigi di marzo.
        Ha aperto la <em>bottega</em> di Nowy Świat nell'estate del 2022, con una Vespa rossa parcheggiata fuori e
        un forno che canta dalle undici alle ventidue. La <em>Diavola</em> è la sua firma &amp;mdash; perché Anna, come dice lei,
        ha bisogno di un po' di fuoco per ricordarsi del sole di Napoli.
      </p>
      <p style=&quot;font-style:normal;font-size:14px;color:var(--espresso-soft);&quot;>
        Anna arrived in Warsaw with a simple dream: to carry the fior di latte of Agerola through the grey days of March.
        She opened the Nowy Świat kitchen in summer 2022, with a red Vespa parked outside and an oven that sings from eleven
        to ten. The Diavola is her signature &amp;mdash; because Anna, as she says, needs a little fire to remember the Naples sun.
      </p>
      <cite>&amp;mdash; Anna Bianchi, <em>pizzaiola</em></cite>

<!-- ============================================================
     VANILLA JS — gentle interactivity
     ============================================================ -->
<script>
(function () {
  'use strict';

  // ============================================================
  // LANGUAGE PICKER — primary language (Italian is always 2nd)
  // ============================================================
  var LANG_KEY = 'sud-italia-v8-lang';
  var SUPPORTED = ['en', 'pl'];
  function getStoredLang() {
    try {
      var v = localStorage.getItem(LANG_KEY);
      if (v &amp;&amp; SUPPORTED.indexOf(v) >= 0) return v;
    } catch (e) {}
    return 'en';
  }
  function applyLang(lang) {
    if (SUPPORTED.indexOf(lang) < 0) lang = 'en';
    document.documentElement.setAttribute('lang', lang);
    document.documentElement.setAttribute('data-lang', lang);
    document.body &amp;&amp; document.body.setAttribute('data-lang', lang);
    var nodes = document.querySelectorAll('[data-en],[data-pl]');
    for (var i = 0; i < nodes.length; i++) {
      var el = nodes[i];
      if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') continue;
      var val = el.getAttribute('data-' + lang);
      if (val != null) el.textContent = val;
    }
    var phNodes = document.querySelectorAll('[data-ph-en],[data-ph-pl]');
    for (var p = 0; p < phNodes.length; p++) {
      var pv = phNodes[p].getAttribute('data-ph-' + lang);
      if (pv != null) phNodes[p].setAttribute('placeholder', pv);
    }
    var opts = document.querySelectorAll('.lang-opt[data-set-lang]');
    for (var j = 0; j < opts.length; j++) {
      var on = opts[j].getAttribute('data-set-lang') === lang;
      opts[j].classList.toggle('active', on);
      opts[j].setAttribute('aria-checked', on ? 'true' : 'false');
    }
    try { localStorage.setItem(LANG_KEY, lang); } catch (e) {}
    var live = document.getElementById('lang-live');
    if (live) live.textContent = lang === 'pl' ? 'Język główny: polski' : 'Primary language: English';
  }
  document.addEventListener('click', function (e) {
    var btn = e.target &amp;&amp; e.target.closest ? e.target.closest('.lang-opt[data-set-lang]') : null;
    if (!btn) return;
    applyLang(btn.getAttribute('data-set-lang'));
  });
  applyLang(getStoredLang());

  // ----- Toast -----
  var toastEl = document.getElementById('toast');
  var toastTimer;
  function toast(msg) {
    if (!toastEl) return;
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      toastEl.classList.remove('show');
    }, 2000);

      var q = (input.value || '').trim().toLowerCase();
      grid.querySelectorAll('.mi').forEach(function (it) {
        var name = (it.getAttribute('data-name') || it.textContent || '').toLowerCase();
        if (!q || name.indexOf(q) >= 0) it.classList.remove('hidden-by-search');
        else it.classList.add('hidden-by-search');
      });
    });
  });

  document.querySelectorAll('[id^=&quot;surprise-btn&quot;]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var card = btn.closest('.page-inner, .loc-menu-card');
      if (!card) return;
      var grid = card.querySelector('.menu-items');
      if (!grid) return;
      var visible = Array.from(grid.querySelectorAll('.mi')).filter(function (el) {
        return !el.classList.contains('hidden-by-filter') &amp;&amp; !el.classList.contains('hidden-by-search');
      });
      if (!visible.length) { toast('Try another category.'); return; }
      var pick = visible[Math.floor(Math.random() * visible.length)];
      pick.classList.add('surprise-pick');
      pick.scrollIntoView({ behavior: 'smooth', block: 'center' });
      setTimeout(function () { pick.classList.remove('surprise-pick'); }, 2400);
    });
  });

  // Surprise me — picks a random visible menu item and pulses it
  var surpriseBtn = document.getElementById('surprise-btn');
  if (surpriseBtn) {
    surpriseBtn.addEventListener('click', function () {
      var visible = miEls.filter(function (el) { return !el.classList.contains('hidden-by-filter'); });
      if (!visible.length) { toast('Niente da scegliere — try another category.'); return; }
      var pick = visible[Math.floor(Math.random() * visible.length)];
      var name = pick.querySelector('.mi-name');
      var clean = name ? name.firstChild.textContent.trim() : 'questa';
      toast('Stasera: ' + clean + ' — buona scelta!');
      // Scroll to pick + pulse
      var y = pick.getBoundingClientRect().top + window.pageYOffset - 80;
      window.scrollTo({ top: y, behavior: 'smooth' });
      pick.style.transition = 'box-shadow .4s ease, transform .4s ease';
      pick.style.boxShadow = '0 0 0 3px rgba(201,162,62,0.5), 0 24px 50px -20px rgba(184,92,56,0.5)';

  document.querySelectorAll('.mi-add').forEach(function (b) {
    b.addEventListener('click', function () {
      var price = parseFloat(b.getAttribute('data-price')) || 0;
      var added = b.classList.contains('added');
      if (added) {
        state.extras -= price;
        state.extrasCount = Math.max(0, state.extrasCount - 1);

      } else {
        state.extras += price;
        state.extrasCount += 1;
        b.classList.add('added');
        var lng = document.documentElement.getAttribute('data-lang') || 'en';
        var addedEn = '✓ Added', addedPl = '✓ Dodano';
        var addedPrim = lng === 'pl' ? addedPl : addedEn;
        b.innerHTML = '<span class=&quot;bi-pri&quot; data-en=&quot;' + addedEn + '&quot; data-pl=&quot;' + addedPl + '&quot;>' + addedPrim + '</span> <span class=&quot;bi-sec it&quot;>· aggiunto</span>';
        var miName = b.closest('.mi') &amp;&amp; b.closest('.mi').querySelector('.mi-name');
        var clean = miName ? miName.firstChild.textContent.trim() : 'piatto';
        toast(clean + ' aggiunta al carrello');
      }
      render();
    });
  });

  // Menu qty stepper for Margherita-style (data-mi)
  document.querySelectorAll('.qty[data-mi]').forEach(function (q) {
    var nEl = q.querySelector('.n');
    var price = parseFloat(q.getAttribute('data-price')) || 0;
    q.addEventListener('click', function (e) {
      var btn = e.target.closest('button');
      if (!btn) return;
      var act = btn.getAttribute('data-act');
      if (!act) return;
      var cur = parseInt(nEl.textContent, 10) || 0;
      if (act === 'inc') {
        cur += 1;
        state.extras += price;
        state.extrasCount += 1;
      } else if (act === 'dec') {
        if (cur > 0) {
          cur -= 1;
          state.extras -= price;
          state.extrasCount = Math.max(0, state.extrasCount - 1);
        }
      }
      nEl.textContent = cur;
      render();
    });
  });

  // Details buttons (menu item)
  document.querySelectorAll('.mi-meta .details').forEach(function (b) {
    b.addEventListener('click', function () {
      var name = b.closest('.mi') &amp;&amp; b.closest('.mi').querySelector('.mi-name');

      toast('Apro la ricetta di ' + clean + '…');
    });
  });

  // Initial render
  render();

  // Gentle ink-bleed reveal of pair items on scroll
  if ('IntersectionObserver' in window) {
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) {
          e.target.style.animation = 'ink-bleed .8s ease both';
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.15 });
    document.querySelectorAll('.pair, .ladder, .combo, .delivery, .perk, .loc-card, .bundle, .mi').forEach(function (el) {
      io.observe(el);
    });
  }


  // Live activity ticker — gentle increments / variations every few seconds.
  (function () {
    var oh = document.getElementById('live-orders-hour');
    var op = document.getElementById('live-orders-prep');
    var tr = document.getElementById('live-trending');
    var ap = document.getElementById('live-avg-prep');
    if (!oh &amp;&amp; !op &amp;&amp; !tr &amp;&amp; !ap) return;
    var trending = ['Margherita', 'Spaghetti Carbonara', 'Diavola', 'Tartufina', 'Tiramisù'];
    setInterval(function () {
      if (oh &amp;&amp; Math.random() < 0.4) {
        oh.textContent = String(parseInt(oh.textContent, 10) + 1);
      }
      if (op &amp;&amp; Math.random() < 0.3) {
        var n = parseInt(op.textContent, 10);
        op.textContent = String(Math.max(2, Math.min(11, n + (Math.random() < 0.5 ? 1 : -1))));
      }
      if (tr &amp;&amp; Math.random() < 0.18) {
        tr.textContent = trending[Math.floor(Math.random() * trending.length)];
      }
      if (ap &amp;&amp; Math.random() < 0.2) {
        var m = parseInt(ap.textContent, 10);
        ap.textContent = Math.max(11, Math.min(18, m + (Math.random() < 0.5 ? 1 : -1))) + ' min';
      }
    }, 5000);
  })();
})();
</script>

    transition: background 240ms ease, color 240ms ease;
  }
  .combo button:hover { background: var(--ink); color: var(--bone); }
  .combo button.added { background: var(--ink); color: var(--bone); }

  /* ------------------------------------------------------------------
     Cross-sell / pairing notes
     ------------------------------------------------------------------ */
  .pairings { list-style: none; }
  .pair {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 18px;
    padding: 18px 0;
    border-bottom: 1px solid var(--hairline);
    align-items: center;
  }
  .pair:first-child { padding-top: 6px; }
  .pair:last-child { border-bottom: 0; }
  .pair__name {
    font-family: var(--serif);
    font-style: italic;
    font-size: 20px;
    line-height: 1.2;
  }
  .pair__desc {
    margin-top: 4px;
    font-family: var(--serif);
    font-size: 14px;
    color: var(--ink-mute);
    line-height: 1.4;
    max-width: 60ch;
  }
  .pair__foot {
    margin-top: 6px;
    font-family: var(--sans);
    font-size: 9.5px;
    color: var(--ink-faint);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .pair__right {
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  .pair__price {
    font-family: var(--serif);
    font-size: 17px;
    font-feature-settings: &quot;lnum&quot; 1, &quot;tnum&quot; 1;
  }
  .pair__add {
    background: transparent;
    border: 0;
    padding: 0 0 1px 0;
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    border-bottom: 1px solid var(--ink);
    cursor: pointer;
    transition: color 240ms ease, border-color 240ms ease, letter-spacing 240ms ease;
  }
  .pair__add:hover { letter-spacing: 0.22em; }
  .pair__add.added { color: var(--ink-mute); border-color: var(--ink-mute); }

  /* Quick-add essay-style row */
  .quickadd {
    margin-top: 22px;
    padding: 18px 18px;
    border: 1px solid var(--hairline-strong);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 18px;
    align-items: center;
  }
  .quickadd__essay {
    font-family: var(--serif);
    font-style: italic;
    font-size: 15px;
    color: var(--ink-soft);
    line-height: 1.45;
  }
  .quickadd__essay strong {
    font-style: normal;
    font-weight: 500;
    color: var(--ink);
    border-bottom: 1px solid var(--hairline-strong);
  }
  .quickadd button {
    background: var(--ink);
    color: var(--bone);
    border: 1px solid var(--ink);
    padding: 10px 16px;
    font-family: var(--sans);
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 240ms ease, color 240ms ease;
  }
  .quickadd button:hover { background: transparent; color: var(--ink); }

  /* ------------------------------------------------------------------
     Delivery meter
     ------------------------------------------------------------------ */
  .meter { padding: 22px 0; border-top: 1px solid var(--hairline); border-bottom: 1px solid var(--hairline); }
  .meter__head {
    display: flex; justify-content: space-between; align-items: baseline; gap: 12px;
  }
  .meter__head .micro { letter-spacing: 0.22em; }
  .meter__head em {
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    color: var(--ink-mute);
  }
  .meter__bar { margin-top: 12px; height: 1px; background: var(--hairline-strong); position: relative; }
  .meter__bar i { position: absolute; left: 0; top: -1px; height: 3px; background: var(--ink); }
  .meter__foot {
    margin-top: 10px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    color: var(--ink-mute);
  }

  /* ------------------------------------------------------------------
     Fulfillment toggle (text links, underlined active)
     ------------------------------------------------------------------ */
  .fulfill {
    margin-top: 8px;
    display: flex; align-items: baseline; gap: 24px;
  }
  .fulfill button {
    background: transparent; border: 0; padding: 4px 0;
    font-family: var(--serif);
    font-size: 19px;
    font-style: italic;
    color: var(--ink-mute);
    cursor: pointer;
    transition: color 240ms ease;
  }
  .fulfill button.active {
    color: var(--ink);
    border-bottom: 1px solid var(--ink);
  }
  .fulfill button:hover { color: var(--ink); }

  /* ------------------------------------------------------------------
     Form — underlined inputs only
     ------------------------------------------------------------------ */
  .field { margin-top: 22px; }
  .field label {
    display: block;
    font-family: var(--sans);
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 6px;
  }
  .field input, .field textarea {
    width: 100%;
    background: transparent;
    border: 0;
    border-bottom: 1px solid var(--hairline-strong);
    padding: 8px 0 8px;
    font-family: var(--serif);
    font-size: 17px;
    color: var(--ink);
    outline: none;
    transition: border-color 240ms ease;
    font-style: italic;
  }
  .field input::placeholder, .field textarea::placeholder { color: var(--ink-faint); font-style: italic; }
  .field input:focus, .field textarea:focus { border-color: var(--ink); }
  .field-grid { display: grid; gap: 22px; }
  @media (min-width: 480px) {
    .field-grid { grid-template-columns: 1fr 1fr; }
  }

  /* Time slot list */
  .slots { list-style: none; margin-top: 6px; }
  .slots li {
    padding: 14px 0;
    border-bottom: 1px solid var(--hairline);
    display: grid;
    grid-template-columns: 80px 1fr auto;
    gap: 16px;
    align-items: baseline;
    cursor: pointer;
    transition: background 240ms ease;
  }
  .slots li:hover { background: rgba(14,14,14,0.025); }
  .slots li.selected {
    background: rgba(14,14,14,0.045);
  }
  .slots li.selected .slot__time { color: var(--ink); }
  .slots li.selected .slot__radio i { background: var(--ink); }
  .slot__time {
    font-family: var(--serif);
    font-size: 19px;
    font-feature-settings: &quot;lnum&quot; 1, &quot;tnum&quot; 1;
    color: var(--ink-soft);
  }
  .slot__label {
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    color: var(--ink-mute);
  }
  .slot__label em { color: var(--red); font-style: italic; }
  .slot__radio {
    width: 14px; height: 14px;
    border: 1px solid var(--hairline-strong);
    border-radius: 50%;
    position: relative;
  }
  .slot__radio i {
    position: absolute;
    inset: 3px;
    background: transparent;
    border-radius: 50%;
    transition: background 240ms ease;
  }

  /* ------------------------------------------------------------------
     Tip picker — small chips, underlined when selected
     ------------------------------------------------------------------ */
  .tips {
    display: flex; gap: 22px; flex-wrap: wrap; align-items: baseline;
    margin-top: 4px;
  }
  .tips button {
    background: transparent;
    border: 0;
    padding: 4px 2px;
    font-family: var(--serif);
    font-size: 16px;
    font-style: italic;
    color: var(--ink-mute);
    cursor: pointer;
    transition: color 240ms ease;
  }
  .tips button.active {
    color: var(--ink);
    border-bottom: 1px solid var(--ink);
  }
  .tips button:hover { color: var(--ink); }

  /* ------------------------------------------------------------------
     Aside column (desktop) — summary excerpts
     ------------------------------------------------------------------ */
  .aside-col {}
  .aside-card {
    border: 1px solid var(--hairline-strong);
    padding: 22px;
    background: var(--bone-light);
  }
  .aside-card h4 {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-mute);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--hairline);
    margin-bottom: 14px;
  }
  .aside-card .line {
    display: flex; justify-content: space-between;
    padding: 6px 0;
    font-family: var(--serif);
    font-size: 15px;
    color: var(--ink-soft);
  }
  .aside-card .line .num { font-size: 16px; }
  .aside-card .line.discount { color: var(--ink-mute); font-style: italic; }
  .aside-card .line.total {
    border-top: 1px solid var(--hairline-strong);
    margin-top: 10px;
    padding-top: 14px;
    font-size: 22px;
    color: var(--ink);
  }
  .aside-card .line.total .num { font-size: 24px; color: var(--red); }
  .aside-foot {
    margin-top: 16px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 13.5px;
    color: var(--ink-mute);
    line-height: 1.5;
  }
  .aside-foot sup {
    font-family: var(--sans);
    font-size: 9px;
    color: var(--ink-faint);
    margin-right: 3px;
    vertical-align: 5px;
  }

  /* ------------------------------------------------------------------
     Olive branch divider (inline SVG)
     ------------------------------------------------------------------ */
  .olive {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin: 44px 0;
  }
  .olive .line { flex: 1; height: 1px; background: var(--hairline); }
  .olive svg { width: 64px; height: 24px; color: var(--ink-mute); }

  /* ------------------------------------------------------------------
     Sticky pay bar
     ------------------------------------------------------------------ */
  .paybar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--bone-light);
    border-top: 1px solid var(--hairline-strong);
    padding: 14px 0 16px;
    z-index: 50;
    box-shadow: 0 -8px 24px -16px rgba(14,14,14,0.18);
  }
  .paybar__inner {
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 var(--gutter);
  }
  .paybar__rows {
    display: none;
  }
  @media (min-width: 640px) {
    .paybar__rows {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--hairline);
      margin-bottom: 12px;
    }
    .paybar__rows .col {
      display: flex; justify-content: space-between;
      font-family: var(--serif);
      font-size: 14px;
      color: var(--ink-mute);
    }
    .paybar__rows .col span:last-child {
      font-family: var(--serif);
      font-feature-settings: &quot;lnum&quot; 1, &quot;tnum&quot; 1;
      color: var(--ink);
    }
  }
  .paybar__main {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 12px;
    align-items: center;
  }
  .paybar__totals {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .paybar__totals .micro { color: var(--ink-mute); }
  .paybar__totals .amt {
    font-family: var(--serif);
    font-size: 28px;
    font-feature-settings: &quot;lnum&quot; 1, &quot;tnum&quot; 1;
    color: var(--red);
    line-height: 1;
  }
  .paybar__trash {
    background: transparent;
    border: 1px solid var(--hairline-strong);
    width: 44px; height: 44px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 240ms ease, color 240ms ease, border-color 240ms ease;
    color: var(--ink);
  }
  .paybar__trash:hover { background: var(--ink); color: var(--bone); border-color: var(--ink); }
  .paybar__trash svg { width: 14px; height: 14px; }

  .paybar__cta {
    background: var(--ink);
    color: var(--red);
    border: 0;
    padding: 14px 22px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 12.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 14px;
    transition: background 240ms ease, color 240ms ease, letter-spacing 240ms ease;
    height: 52px;
  }
  .paybar__cta:hover { background: var(--red); color: var(--bone); letter-spacing: 0.26em; }
  .paybar__cta .num {
    font-family: var(--serif);
    font-style: italic;
    font-size: 18px;
    letter-spacing: 0;
    color: inherit;
  }
  .paybar__cta svg { width: 14px; height: 14px; }

  .weekly {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 13px;
    color: var(--ink-mute);
    cursor: pointer;
    user-select: none;
  }
  .weekly .box {
    width: 14px; height: 14px;
    border: 1px solid var(--hairline-strong);
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 240ms ease, border-color 240ms ease;
  }
  .weekly.active .box { background: var(--ink); border-color: var(--ink); }
  .weekly .box svg { width: 9px; height: 9px; color: var(--bone); opacity: 0; transition: opacity 240ms ease; }
  .weekly.active .box svg { opacity: 1; }
  .weekly__wrap {
    grid-column: 1 / -1;
    padding-top: 10px;
    border-top: 1px solid var(--hairline);
    margin-top: 10px;
    display: flex; justify-content: flex-end;
  }

  /* ------------------------------------------------------------------
     Reveal animations — opacity fade-ins, museum slow
     ------------------------------------------------------------------ */
  .reveal {
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 900ms ease, transform 900ms ease;
  }
  .reveal.in { opacity: 1; transform: none; }

  /* Footnotes */
  .footnotes {
    margin: 40px 0 0;
    padding-top: 22px;
    border-top: 1px solid var(--hairline);
    font-family: var(--serif);
    font-style: italic;
    font-size: 13px;
    color: var(--ink-mute);
    line-height: 1.6;
  }
  .footnotes sup {
    font-family: var(--sans);
    font-style: normal;
    font-size: 9px;
    color: var(--ink-faint);
    margin-right: 3px;
    vertical-align: 5px;
  }

  /* small-screen tweaks */
  @media (max-width: 480px) {
    .mast__title { font-size: 30px; }
    .item__name { font-size: 22px; }
    .item__price { font-size: 19px; }
    .ladder__title { font-size: 19px; }
    .item { grid-template-columns: 26px 1fr auto; gap: 12px; }
    .item__num { font-size: 18px; }
    .paybar__cta { padding: 12px 14px; font-size: 11.5px; letter-spacing: 0.18em; }
    .paybar__cta .num { font-size: 16px; }
    .paybar__totals .amt { font-size: 22px; }
  }

  /* ==================================================================
     SUD ITALIA — Editorial homepage extensions (V9 — full page)
     Sticky nav · Hero · Locations · Bundles · Menu · Floating cart chip
     ================================================================== */

  /* ------------------------------------------------------------------
     Sticky top nav (magazine masthead)
     ------------------------------------------------------------------ */
  .topnav {
    position: sticky;
    top: 0;
    z-index: 40;
    background: var(--bone);
    border-bottom: 1px solid var(--hairline);
  }
  .topnav__inner {
    max-width: 1180px;
    margin: 0 auto;
    padding: 14px var(--gutter) 12px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: center;
  }
  .topnav__brand {
    font-family: var(--serif);
    font-size: 17px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .topnav__brand .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--ink);
    display: inline-block;
    margin: 0 2px;
  }
  .topnav__links {
    display: none;
    align-items: center;
    gap: 26px;
  }
  @media (min-width: 768px) {
    .topnav__links { display: inline-flex; }
  }
  .topnav__links a {
    font-family: var(--sans);
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-decoration: none;
    padding-bottom: 2px;
    border-bottom: 1px solid transparent;
    transition: color 240ms ease, border-color 240ms ease;
  }
  .topnav__links a:hover,
  .topnav__links a.active {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }
  .topnav__right {
    display: inline-flex;
    align-items: center;
    gap: 14px;
  }
  .topnav__cart {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--hairline-strong);
    padding: 7px 12px;
    background: transparent;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-decoration: none;
    transition: background 240ms ease, color 240ms ease, border-color 240ms ease;
  }
  .topnav__cart .num {
    font-family: var(--serif);
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0;
    color: var(--red);
  }
  .topnav__cart:hover { background: var(--ink); color: var(--bone); border-color: var(--ink); }
  .topnav__cart:hover .num { color: var(--bone); }

  .topnav__bar {
    height: 1px;
    background: var(--hairline);
  }

  /* ------------------------------------------------------------------
     Hero / cover
     ------------------------------------------------------------------ */
  .hero {
    padding: 56px 0 56px;
    border-bottom: 1px solid var(--hairline);
  }
  .hero__inner {
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 var(--gutter);
  }
  .hero__eyebrow {
    font-family: var(--sans);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 26px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  .hero__eyebrow .dash { width: 28px; height: 1px; background: var(--ink-faint); display: inline-block; }
  .hero__title {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    font-size: 44px;
    line-height: 1.04;
    letter-spacing: -0.012em;
    color: var(--ink);
    max-width: 16ch;
  }
  @media (min-width: 768px) {
    .hero__title { font-size: 76px; max-width: 18ch; }
  }
  @media (min-width: 1024px) {
    .hero__title { font-size: 96px; }
  }
  .hero__title em { font-style: italic; }
  .hero__title .stroke { display: block; font-style: italic; }
  .hero__sub {
    margin-top: 22px;
    font-family: var(--sans);
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--ink-soft);
    max-width: 52ch;
  }
  .hero__sub em {
    font-family: var(--serif);
    font-style: italic;
    color: var(--ink);
  }

  .hero__ctas {
    margin-top: 36px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .btn-ink {
    background: var(--ink);
    color: var(--bone);
    border: 1px solid var(--ink);
    padding: 14px 22px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    transition: background 240ms ease, color 240ms ease, letter-spacing 240ms ease;
  }
  .btn-ink:hover { background: transparent; color: var(--ink); letter-spacing: 0.28em; }
  .btn-ink svg { width: 12px; height: 10px; }

  .btn-text {
    background: transparent;
    border: 0;
    padding: 0;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink);
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--ink);
    transition: letter-spacing 240ms ease, color 240ms ease;
  }
  .btn-text:hover { letter-spacing: 0.28em; }
  .btn-text svg { width: 14px; height: 10px; }

  .hero__divider {
    margin-top: 56px;
    height: 1px;
    background: var(--hairline);
  }
  .hero__notes {
    margin-top: 22px;
    display: grid;
    gap: 16px;
    grid-template-columns: 1fr;
  }
  @media (min-width: 768px) {
    .hero__notes { grid-template-columns: repeat(3, 1fr); gap: 36px; }
  }
  .hero__note {
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink-mute);
  }
  .hero__note sup {
    font-family: var(--sans);
    font-style: normal;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--ink-faint);
    margin-right: 6px;
    vertical-align: 5px;
  }
  .hero__note strong {
    font-weight: 500;
    font-style: normal;
    color: var(--ink);
    border-bottom: 1px solid var(--hairline-strong);
    padding-bottom: 1px;
  }

  /* ------------------------------------------------------------------
     Generic page-section header (full-bleed editorial)
     ------------------------------------------------------------------ */
  .pagesec {
    padding: 64px 0;
    border-bottom: 1px solid var(--hairline);
  }
  .pagesec__inner {
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 var(--gutter);
  }
  .pagesec__head {
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
    padding-bottom: 36px;
    border-bottom: 1px solid var(--hairline-strong);
    margin-bottom: 36px;
  }
  @media (min-width: 768px) {
    .pagesec__head {
      grid-template-columns: 200px 1fr 220px;
      gap: 48px;
      align-items: baseline;
    }
  }
  .pagesec__num {
    font-family: var(--sans);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }
  .pagesec__title {
    font-family: var(--serif);
    font-style: italic;

     ------------------------------------------------------------------ */

    bottom: 230px;
    z-index: 45;

    align-items: center;
    gap: 12px;

    background: var(--bone-light);
    border: 1px solid var(--ink);

    font-family: var(--sans);

    justify-content: center;
    width: 16px; height: 16px;

    .menu__live .lbl .pulse { animation: none; }
    .btn-ink, .btn-text, .menuitem__add, .bundle__add, .loc__cta, .surprise button {
      transition: none;
    }
  }

  /* small-screen tweaks for new sections */
  @media (max-width: 480px) {
