    grid-template-columns: 1fr;
    gap: 18px;
  }
  @media (min-width: 700px) {
    .menu-items { grid-template-columns: 1fr 1fr; }
  }
  @media (min-width: 1100px) {
    .menu-items { grid-template-columns: 1fr 1fr 1fr; }
  }

  .menu-item {
    border: 2px solid var(--border);
    border-radius: 24px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    box-shadow: 6px 6px 0 var(--ink);
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s, rotate 0.25s;
    cursor: pointer;
    display: grid;
    grid-template-columns: 88px 1fr;
    gap: 16px;
    align-items: start;
  }
  .menu-item:hover {
    transform: translate(-3px,-3px) rotate(-0.5deg);
    box-shadow: 9px 9px 0 var(--ink);
  }
  .menu-item.surprise-highlight {
    animation: surpriseGlow 1.4s ease-in-out;
  }
  @keyframes surpriseGlow {
    0%,100% { transform: scale(1) rotate(0); box-shadow: 6px 6px 0 var(--ink); }
    20% { transform: scale(1.04) rotate(-1deg); box-shadow: 0 0 0 6px var(--yellow), 6px 6px 0 var(--ink); }
    60% { transform: scale(1.02) rotate(1deg); box-shadow: 0 0 0 4px var(--pink), 6px 6px 0 var(--ink); }
  }
  .menu-item.mi-yellow { background: linear-gradient(160deg, #FFE74C 0%, #FF8C6A 100%); }
  .menu-item.mi-pink { background: linear-gradient(160deg, #FFB6D9 0%, #FF3CAC 100%); color: #fff; }
  .menu-item.mi-mint { background: linear-gradient(160deg, #B5F2D8 0%, #00E0A4 100%); }
  .menu-item.mi-purple { background: linear-gradient(160deg, #2A1B4E 0%, #1A0B2E 100%); color: var(--cream); }
  .menu-item.mi-coral { background: linear-gradient(160deg, #FFE8C2 0%, #FFB997 100%); }

  .mi-emoji-wrap {
    width: 88px; height: 88px;
    border-radius: 22px;
    background: rgba(255,255,255,0.6);
    border: 2px solid var(--border);
    display: grid; place-items: center;
    font-size: 56px;
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.08);
    flex-shrink: 0;
  }
  .menu-item.mi-pink .mi-emoji-wrap,
  .menu-item.mi-purple .mi-emoji-wrap { background: rgba(255,255,255,0.18); }
  .mi-emoji-wrap .em-big {
    display: block;
    animation: wobbleLight 5s ease-in-out infinite;
  }

  .mi-body { min-width: 0; }
  .mi-name {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 22px;
    line-height: 1.05;
    letter-spacing: -0.8px;
    text-transform: lowercase;
    margin: 0 0 4px;
  }
  .mi-subtitle {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.4px;
    color: var(--poppy);
    margin-bottom: 6px;
  }
  .menu-item.mi-pink .mi-subtitle { color: var(--yellow); }
  .menu-item.mi-purple .mi-subtitle { color: var(--yellow); }
  .mi-desc {
    font-size: 12px;
    line-height: 1.45;
    opacity: 0.78;
    margin-bottom: 10px;
    font-style: italic;
  }
  .mi-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 10px;
  }
  .mi-chip {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 100px;
    text-transform: lowercase;
    background: var(--ink);
    color: var(--cream);
    border: 1.5px solid var(--border);
  }
  .mi-chip.ch-veg { background: var(--basil); color: var(--ink); }
  .mi-chip.ch-spicy { background: var(--poppy); color: #fff; }
  .mi-chip.ch-fire { background: var(--yellow); color: var(--ink); }

  .mi-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 11px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    opacity: 0.78;
    margin-bottom: 12px;
  }
  .mi-stat { display: inline-flex; align-items: center; gap: 4px; }
  .mi-stat .mi-stat-em { font-size: 13px; }
  .mi-details {
    text-decoration: underline;
    text-decoration-thickness: 1.5px;
    cursor: pointer;
    font-weight: 700;
    opacity: 1;
  }

  .mi-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-top: auto;
    grid-column: 1 / -1;
    padding-top: 12px;
    border-top: 2px dashed rgba(26,11,46,0.25);
  }
  .menu-item.mi-purple .mi-bottom { border-top-color: rgba(255,248,238,0.3); }
  .menu-item.mi-pink .mi-bottom { border-top-color: rgba(255,255,255,0.4); }

  .mi-price {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.8px;
    background: var(--ink);
    color: var(--yellow);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 6px 12px;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.25);
    transform: rotate(-2deg);
    white-space: nowrap;
  }

  .mi-qty {
    display: inline-flex;
    align-items: center;
    background: rgba(255,255,255,0.7);
    border: 2px solid var(--border);
    border-radius: 100px;
    overflow: hidden;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .menu-item.mi-pink .mi-qty,
  .menu-item.mi-purple .mi-qty { background: rgba(255,255,255,0.2); }
  .mi-qty-btn {
    width: 34px; height: 34px;
    background: transparent;
    border: 0;
    font-size: 20px; font-weight: 800;
    color: inherit;
    cursor: pointer;
    line-height: 1;
  }
  .mi-qty-num {
    min-width: 26px;
    text-align: center;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 15px;
  }
  .mi-in-cart {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: #0B6E4F;
    text-transform: lowercase;
    margin-top: 4px;
    text-align: right;
  }
  .menu-item.mi-pink .mi-in-cart,
  .menu-item.mi-purple .mi-in-cart { color: var(--mint); }

  .mi-add-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 16px;
    background: var(--ink);
    color: var(--cream);
    border: 2px solid var(--border);
    border-radius: 100px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 13px;
    text-transform: lowercase;
    cursor: pointer;
    box-shadow: 2px 2px 0 var(--poppy);
    transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
  }
  .menu-item.mi-purple .mi-add-btn {
    background: var(--yellow);
    color: var(--ink);
    box-shadow: 2px 2px 0 var(--cream);
  }
  .mi-add-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--poppy); }
  .mi-add-btn.added-pulse { animation: bounceAdd 0.45s cubic-bezier(.34,1.56,.64,1); }
  @keyframes bounceAdd {
    0% { transform: scale(1); }
    40% { transform: scale(1.12); }
    70% { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  .mi-stickers {
    position: absolute;
    top: 12px; right: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
    z-index: 4;
  }
  .mi-sticker {
    display: inline-block;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 5px 10px;
    border: 2px solid var(--border);
    border-radius: 10px;
    box-shadow: 2px 2px 0 var(--ink);
    background: var(--yellow);
    color: var(--ink);
    transform: rotate(6deg);
  }
  .mi-sticker.st-pink {
    background: var(--pink);
    color: #fff;
    transform: rotate(-4deg);
  }
  .mi-sticker.st-crown {
    background: var(--ink);
    color: var(--yellow);
    transform: rotate(4deg);
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .mi-sticker.st-scarcity {
    background: var(--poppy);
    color: #fff;
    transform: rotate(-6deg);
    animation: pulse 2s ease-in-out infinite;
  }

  .menu-item.hidden {
    display: none;
  }

  /* === Floating cart button === */
  .floating-cart-btn {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 80;
    background: linear-gradient(120deg, #FF4458 0%, #FF3CAC 50%, #FFE74C 100%);
    background-size: 200% 200%;
    color: #fff;
    border: 2px solid var(--border);
    border-radius: 100px;
    padding: 14px 22px 14px 18px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 16px;
    text-transform: lowercase;
    cursor: pointer;
    box-shadow: 5px 5px 0 var(--ink), 0 0 28px rgba(255,68,88,0.4);
    display: inline-flex;
    align-items: center;
    gap: 9px;
    animation: btnGradient 6s ease-in-out infinite, fcbFloat 4s ease-in-out infinite;
    transition: transform 0.18s, box-shadow 0.18s;
  }
  @keyframes fcbFloat {
    0%,100% { translate: 0 0; }
    50% { translate: 0 -6px; }
  }
  .floating-cart-btn:active {
    transform: translate(3px,3px);
    box-shadow: 2px 2px 0 var(--ink), 0 0 18px rgba(255,68,88,0.3);
  }
  .floating-cart-btn .fcb-emoji {
    font-size: 22px;
    animation: wobbleLight 4s ease-in-out infinite;
  }
  .floating-cart-btn .fcb-badge {
    background: var(--ink);
    color: var(--yellow);
    border: 2px solid var(--border);
    border-radius: 100px;
    min-width: 26px; height: 26px;
    font-size: 13px;
    font-weight: 800;
    display: grid; place-items: center;
    padding: 0 7px;
    font-family: 'Space Grotesk', sans-serif;
  }

  /* === Cart sheet overlay === */
  .cart-overlay {
    position: fixed;
    inset: 0;
    z-index: 99;
    background: rgba(26,11,46,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .cart-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .cart-sheet {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    max-height: 96vh;
    background: #FFD9C2;
    border-top-left-radius: 32px;
    border-top-right-radius: 32px;
    border: 2px solid var(--border);
    border-bottom: 0;
    box-shadow: 0 -8px 32px rgba(26,11,46,0.3);
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .cart-sheet.open {
    transform: translateY(0);
  }
  .cart-sheet::-webkit-scrollbar { width: 6px; }
  .cart-sheet::-webkit-scrollbar-thumb { background: var(--ink); border-radius: 100px; }

  .cart-grabber {
    position: sticky;
    top: 0;
    z-index: 5;
    padding: 10px 0 4px;
    text-align: center;
    background: linear-gradient(180deg, rgba(255,217,194,1) 0%, rgba(255,217,194,0.85) 80%, rgba(255,217,194,0) 100%);
  }
  .cart-grabber-bar {
    display: inline-block;
    width: 56px; height: 5px;
    background: var(--ink);
    border-radius: 100px;
    opacity: 0.4;
  }

  @media (min-width: 768px) {
    .cart-sheet {
      max-width: 460px;
      left: auto;
      right: 24px;
      bottom: 24px;
      border-radius: 30px;
      border: 2px solid var(--border);
      max-height: calc(100vh - 48px);
    }
  }

  /* === Confetti &amp; floaters === */
  .confetti {
    position: fixed;
    width: 8px; height: 14px;
    z-index: 200;
    pointer-events: none;
  }
  .float-heart {
    position: absolute;
    font-size: 20px;
    pointer-events: none;
    animation: floatUp 1.4s ease-out forwards;
  }
  @keyframes floatUp {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(-10px,-90px) scale(1.5); opacity: 0; }
  }
  @keyframes pop {
    0% { transform: scale(1); }
    40% { transform: scale(1.05); }
    70% { transform: scale(0.98); }
    100% { transform: scale(1); }
  }
  @keyframes shineSweep { 0% { left: -100%; } 50%,100% { left: 200%; } }
  @keyframes shimmer { 0% { background-position: 0% 0; } 100% { background-position: 200% 0; } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }
  @keyframes swipeHint { 0%,100%{transform:translateX(0)} 50%{transform:translateX(8px)} }
  @keyframes rocketBob {
    0%,100% { transform: translate(0,-50%) rotate(-15deg); }
    50% { transform: translate(0,-60%) rotate(-5deg); }
  }
  .app {
    max-width: 430px;
    margin: 0 auto;
    padding: 16px 16px 40px;
    position: relative;
    z-index: 1;
  }

  /* === Header === */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 4px 18px;
    margin-bottom: 6px;
  }
  .header-title {
    font-family: 'Bricolage Grotesque', 'Space Grotesk', sans-serif;
    font-weight: 800;
    font-size: 30px;
    letter-spacing: -1px;
    color: var(--ink);
    line-height: 1;
  }
  .header-title .emoji {
    display: inline-block;
    animation: wobble 4s ease-in-out infinite;
    transform-origin: bottom center;
  }
  .header-sub {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    font-style: italic;
    color: rgba(26,11,46,0.65);
    margin-top: 4px;
    letter-spacing: 0;
  }
  .close-btn {
    width: 44px; height: 44px;
    border-radius: 14px;
    background: var(--ink);
    color: var(--cream);
    border: 2px solid var(--border);
    box-shadow: 4px 4px 0 var(--poppy);
    display: grid; place-items: center;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .close-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--poppy); }

  @keyframes wobble {
    0%,100% { transform: rotate(0); }
    25% { transform: rotate(-12deg); }
    75% { transform: rotate(12deg); }
  }

  /* === Marquee banner === */
  .marquee-banner {
    background: linear-gradient(90deg, var(--yellow), #FFC847, var(--yellow));
    border: 2px solid var(--border);
    border-radius: 18px;
    box-shadow: 4px 4px 0 var(--ink);
    overflow: hidden;
    position: relative;
    margin-bottom: 14px;
  }
  .marquee-track {
    display: flex;
    gap: 36px;
    white-space: nowrap;
    padding: 12px 0;
    animation: marquee 18s linear infinite;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    text-transform: lowercase;
    letter-spacing: 0.2px;
  }
  .marquee-track span { display: inline-flex; align-items: center; gap: 8px; }
  @keyframes marquee { to { transform: translateX(-50%); } }

  /* === Section title === */
  .section-title {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 18px;
    text-transform: lowercase;
    color: var(--ink);
    margin: 22px 4px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    letter-spacing: -0.4px;
  }
  .section-title .count {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    background: var(--ink);
    color: var(--cream);
    padding: 4px 10px;
    border-radius: 100px;
  }

  /* === Sold-out warning === */
  .sold-out {
    background: linear-gradient(135deg, #FF4458, #C9184A);
    color: #fff;
    border: 2px solid var(--border);
    border-radius: 18px;
    box-shadow: 4px 4px 0 #6B0F2A;
    padding: 14px 14px 14px 16px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }
  .sold-out::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 12px, rgba(255,255,255,0.06) 12px, rgba(255,255,255,0.06) 24px);
    pointer-events: none;
  }
  .sold-out .so-emoji {
    font-size: 28px;
    animation: shake 2s ease-in-out infinite;
  }
  .sold-out .so-text { flex: 1; }
  .sold-out .so-title { font-family: 'Bricolage Grotesque',sans-serif; font-weight: 800; font-size: 15px; letter-spacing: -0.2px; }
  .sold-out .so-sub { font-size: 12px; opacity: 0.9; margin-top: 2px; }
  .sold-out .so-cta {
    background: var(--yellow); color: var(--ink);
    border: 2px solid var(--border);
    border-radius: 100px;
    padding: 8px 14px;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    text-transform: lowercase;
  }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }

  /* === Cart item cards === */
  .item-card {
    border: 2px solid var(--border);
    border-radius: 22px;
    padding: 16px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
    display: grid;
    grid-template-columns: 76px 1fr auto;
    gap: 14px;
    align-items: center;
    box-shadow: 4px 4px 0 var(--ink);
    transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
  }
  .item-card.popping { animation: pop 0.5s cubic-bezier(.34,1.56,.64,1); }
  .item-card.deleting { transform: translateX(-120%) rotate(-6deg); opacity: 0; }

  @keyframes pop {
    0% { transform: scale(1); }
    40% { transform: scale(1.05); }
    70% { transform: scale(0.98); }
    100% { transform: scale(1); }
  }

  .item-card.c1 { background: linear-gradient(135deg, #FFE74C, #FF8C6A); }
  .item-card.c2 { background: linear-gradient(135deg, #FF3CAC, #784BA0); color: #fff; }
  .item-card.c2 .item-meta, .item-card.c2 .qty-btn { color: #fff; }
  .item-card.c3 { background: linear-gradient(135deg, #00E0A4, #4DD0E1); }

  .item-emoji-wrap {
    width: 76px; height: 76px;
    border-radius: 20px;
    background: rgba(255,255,255,0.55);
    border: 2px solid var(--border);
    display: grid; place-items: center;
    font-size: 44px;
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.06);
    cursor: pointer;
    transition: transform 0.3s;
  }
  .item-card.c2 .item-emoji-wrap { background: rgba(255,255,255,0.2); }
  .item-emoji-wrap:hover { transform: rotate(-10deg) scale(1.05); }
  .item-emoji-wrap .em { display: block; animation: wobbleLight 5s ease-in-out infinite; }
  @keyframes wobbleLight { 0%,100%{transform:rotate(0)} 50%{transform:rotate(8deg)} }

  .item-body { min-width: 0; }
  .item-name {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 19px;
    letter-spacing: -0.4px;
    line-height: 1.1;
    text-transform: lowercase;
  }
  .item-meta {
    font-size: 12px;
    font-weight: 500;
    opacity: 0.78;
    margin-top: 4px;
    line-height: 1.4;
  }
  .item-tags {
    display: flex; flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .tag {
    background: var(--ink);
    color: var(--cream);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 100px;
    text-transform: lowercase;
    letter-spacing: 0.3px;

  .tag.tag-fire { background: var(--poppy); }
  .tag.tag-mint { background: var(--mint); color: var(--ink); }

  .item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }

  .price-tag {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 18px;
    background: var(--ink);
    color: var(--yellow);
    padding: 6px 11px;
    border-radius: 14px;
    border: 2px solid var(--border);
    box-shadow: 2px 2px 0 rgba(0,0,0,0.25);
    transform: rotate(-2deg);
    white-space: nowrap;
  }

  .qty-wrap {
    display: inline-flex;
    align-items: center;
    background: rgba(255,255,255,0.6);
    border: 2px solid var(--border);
    border-radius: 100px;
    overflow: hidden;
  }
  .item-card.c2 .qty-wrap { background: rgba(255,255,255,0.2); }
  .qty-btn {
    width: 30px; height: 30px;
    background: transparent;
    border: 0;
    font-size: 18px; font-weight: 800;
    color: var(--ink);
    cursor: pointer;
    line-height: 1;
  }
  .qty-num {
    min-width: 22px;
    text-align: center;
    font-weight: 800;
    font-size: 14px;
  }

  .swipe-hint {
    position: absolute;
    top: 50%;
    right: -2px;
    transform: translateY(-50%);
    background: var(--poppy);
    color: #fff;
    border-radius: 100px 0 0 100px;
    padding: 4px 8px 4px 10px;
    font-size: 10px;
    font-weight: 700;
    text-transform: lowercase;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .item-card:hover .swipe-hint { opacity: 1; }

  /* Like reaction */
  .like-btn {
    position: absolute;
    top: 10px; right: 10px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    border: 2px solid var(--border);
    display: grid; place-items: center;
    cursor: pointer;
    z-index: 3;
    font-size: 16px;
    transition: transform 0.15s;
  }
  .like-btn:active { transform: scale(0.85); }
  .like-btn.liked { background: var(--poppy); color: #fff; }
  .float-heart {
    position: absolute;
    font-size: 20px;
    pointer-events: none;
    animation: floatUp 1.4s ease-out forwards;
  }
  @keyframes floatUp {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(-10px,-90px) scale(1.5); opacity: 0; }
  }

  /* === Corporate / squad banner === */
  .squad-banner {
    background: linear-gradient(135deg, #1A0B2E 0%, #2A1B4E 60%, #4B2A77 100%);
    color: #fff;
    border: 2px solid var(--border);
    border-radius: 22px;
    box-shadow: 4px 4px 0 var(--mint);
    padding: 16px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .squad-banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 20% 20%, rgba(0,224,164,0.25), transparent 50%);
    pointer-events: none;
  }
  .squad-glyph {
    width: 50px; height: 50px;
    border-radius: 14px;
    background: var(--mint);
    color: var(--ink);
    display: grid; place-items: center;
    font-size: 26px;
    border: 2px solid var(--border);
    box-shadow: 2px 2px 0 var(--ink);
    flex-shrink: 0;
    z-index: 1;
  }
  .squad-body { flex: 1; z-index: 1; }
  .squad-title {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: -0.2px;
    text-transform: lowercase;
  }
  .squad-sub {
    font-size: 11px;
    opacity: 0.8;
    margin-top: 2px;
    font-style: italic;
  }
  .squad-cta {
    background: var(--mint); color: var(--ink);
    border: 2px solid var(--border);
    border-radius: 100px;
    padding: 8px 12px;
    font-weight: 800;
    font-size: 11px;
    cursor: pointer;
    text-transform: lowercase;
    z-index: 1;
  }

  /* === Loyalty arcade === */
  .loyalty-arcade {
    background: linear-gradient(135deg, #FF3CAC, #784BA0);
    border: 2px solid var(--border);
    border-radius: 22px;
    box-shadow: 4px 4px 0 var(--ink);
    padding: 14px;
    margin-bottom: 14px;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .loyalty-arcade::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.04) 0, rgba(255,255,255,0.04) 1px, transparent 1px, transparent 4px);
    pointer-events: none;
  }
  .arcade-row {
    display: flex; align-items: center; gap: 12px; position: relative;
  }
  .arcade-display {
    background: var(--ink);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 8px 12px;
    font-family: 'Space Grotesk', monospace;
    font-weight: 700;
    color: var(--yellow);
    font-size: 22px;
    letter-spacing: 1px;
    text-shadow: 0 0 8px rgba(255,231,76,0.6);
    box-shadow: inset 0 0 12px rgba(255,231,76,0.15);
    min-width: 80px;
    text-align: center;
  }
  .arcade-label {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1.1;
  }
  .arcade-sub {
    font-size: 11px;
    opacity: 0.85;
    font-style: italic;
    margin-top: 2px;
  }
  .arcade-bonus {
    margin-left: auto;
    background: var(--yellow);
    color: var(--ink);
    font-weight: 800;
    font-size: 11px;
    padding: 5px 9px;
    border-radius: 100px;
    border: 2px solid var(--border);
    text-transform: lowercase;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }

  /* === Tier perk banner === */
  .tier-banner {
    background: linear-gradient(135deg, var(--mint), #4DD0E1);
    border: 2px solid var(--border);
    border-radius: 18px;
    box-shadow: 4px 4px 0 var(--ink);
    padding: 12px 14px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .tier-medal {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--yellow);
    border: 2px solid var(--border);
    display: grid; place-items: center;
    font-size: 18px;
    flex-shrink: 0;
    box-shadow: 2px 2px 0 var(--ink);
    transform: rotate(-8deg);
  }
  .tier-text { flex: 1; }
  .tier-title { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 14px; text-transform: lowercase; letter-spacing: -0.2px; }
  .tier-sub { font-size: 11px; opacity: 0.78; font-style: italic; margin-top: 1px; }

  /* === Bundle ladder === */
  .bundle-drop {
    background: linear-gradient(135deg, #FFE74C, #FF8C6A 60%, #FF4458);
    border: 2px solid var(--border);
    border-radius: 22px;
    box-shadow: 4px 4px 0 var(--ink);
    padding: 16px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .bundle-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .bundle-title {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 17px;
    letter-spacing: -0.3px;
    text-transform: lowercase;
  }
  .bundle-amount {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 12px;
    background: var(--ink);
    color: var(--yellow);
    padding: 5px 10px;
    border-radius: 100px;
  }
  .bundle-progress {
    height: 16px;
    background: rgba(26,11,46,0.18);
    border: 2px solid var(--border);
    border-radius: 100px;
    overflow: hidden;
    position: relative;
  }
  .bundle-fill {
    height: 100%;
    width: 64%;
    background: linear-gradient(90deg, var(--mint), #4DD0E1, var(--mint));
    background-size: 200% 100%;
    border-radius: 100px;
    animation: shimmer 2.5s linear infinite;
    position: relative;
  }
  @keyframes shimmer { 0% { background-position: 0% 0; } 100% { background-position: 200% 0; } }
  .bundle-ladder {
    display: flex; justify-content: space-between;
    margin-top: 8px;
    font-size: 10px;
    font-weight: 700;
    text-transform: lowercase;
  }
  .ladder-step { text-align: center; opacity: 0.55; }
  .ladder-step.active { opacity: 1; }
  .ladder-step.done { opacity: 1; }
  .ladder-emoji { font-size: 18px; display: block; }
  .ladder-label { display: block; margin-top: 1px; }
  .bundle-foot {
    font-size: 11px;
    font-weight: 600;
    margin-top: 10px;
    font-style: italic;
    line-height: 1.4;
  }

  /* === Combo deal sticker === */
  .combo-deal {
    background: linear-gradient(135deg, #00E0A4, #0EBF7E);
    border: 2px solid var(--border);
    border-radius: 22px;
    box-shadow: 4px 4px 0 var(--ink);
    padding: 16px 70px 16px 16px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .combo-title { font-family: 'Bricolage Grotesque',sans-serif; font-weight: 800; font-size: 16px; text-transform: lowercase; letter-spacing: -0.2px; }
  .combo-sub { font-size: 12px; opacity: 0.85; margin-top: 4px; line-height: 1.4; font-style: italic; }
  .combo-sticker {
    position: absolute;
    top: 50%; right: 12px;
    transform: translateY(-50%) rotate(12deg);
    background: var(--yellow);
    color: var(--ink);
    border: 2px solid var(--border);
    border-radius: 50%;
    width: 64px; height: 64px;
    display: grid; place-items: center;
    font-family: 'Bricolage Grotesque',sans-serif;
    font-weight: 800;
    font-size: 13px;
    line-height: 1;
    text-align: center;
    box-shadow: 3px 3px 0 var(--ink);
    animation: stickerWobble 4s ease-in-out infinite;
  }
  @keyframes stickerWobble { 0%,100%{transform:translateY(-50%) rotate(12deg)} 50%{transform:translateY(-50%) rotate(-8deg) scale(1.05)} }
  .combo-sticker span { display: block; font-size: 17px; }
  .combo-sticker small { display: block; font-size: 8px; font-weight: 700; }

  /* === Trending rail === */
  .trending-section { margin-bottom: 6px; }
  .trending-rail {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 6px 16px 16px;
    margin: 0 -16px;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .trending-rail::-webkit-scrollbar { display: none; }
  .trend-card {
    flex-shrink: 0;
    width: 168px;
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 12px;
    box-shadow: 4px 4px 0 var(--ink);
    position: relative;
    overflow: hidden;
    scroll-snap-align: start;
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
  }
  .trend-card.t1 { background: linear-gradient(160deg, #FFE74C, #FF8C6A); }
  .trend-card.t2 { background: linear-gradient(160deg, #00E0A4, #4DD0E1); }
  .trend-card.t3 { background: linear-gradient(160deg, #FF3CAC, #FFB997); }
  .trend-card.t4 { background: linear-gradient(160deg, #FFE74C, #00E0A4); }
  .trend-card:hover { transform: translateY(-3px) rotate(-1deg); }
  .trend-emoji {
    font-size: 50px;
    line-height: 1;
    text-align: center;
    padding: 6px 0 10px;
    animation: wobbleLight 4s ease-in-out infinite;
  }
  .trend-views {
    position: absolute;
    top: 8px; left: 8px;
    background: var(--ink);
    color: var(--cream);
    padding: 3px 8px;
    border-radius: 100px;
    font-size: 10px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .trend-name {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 14px;
    text-transform: lowercase;
    letter-spacing: -0.2px;
    line-height: 1.1;
  }
  .trend-price {
    margin-top: 2px;
    font-weight: 700;
    font-size: 13px;
  }
  .trend-add {
    margin-top: 10px;
    width: 100%;
    background: var(--ink); color: var(--cream);
    border: 2px solid var(--border);
    border-radius: 100px;
    padding: 7px;
    font-weight: 700;
    font-size: 11px;
    text-transform: lowercase;
    cursor: pointer;
    transition: all 0.25s;
  }
  .trend-card.added .trend-add {
    background: var(--mint);
    color: var(--ink);
  }
  .trend-card.added { animation: pop 0.4s cubic-bezier(.34,1.56,.64,1); }

  /* === Quick-add card === */
  .quick-add-card {
    background: linear-gradient(135deg, #1A0B2E, #4B2A77);
    color: #fff;
    border: 2px solid var(--border);
    border-radius: 22px;
    box-shadow: 4px 4px 0 var(--pink);
    padding: 16px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .qa-emoji {
    width: 56px; height: 56px;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 16px;
    display: grid; place-items: center;
    font-size: 32px;
    flex-shrink: 0;
  }
  .qa-body { flex: 1; }
  .qa-name {
    font-family: 'Bricolage Grotesque',sans-serif;
    font-weight: 800;
    font-size: 15px;
    text-transform: lowercase;
    letter-spacing: -0.2px;
  }
  .qa-hint {
    font-size: 11px;
    opacity: 0.8;
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .qa-hint .swipe-doodle {
    display: inline-block;
    animation: swipeHint 1.5s ease-in-out infinite;
  }
  @keyframes swipeHint { 0%,100%{transform:translateX(0)} 50%{transform:translateX(8px)} }
  .qa-price {
    background: var(--pink);
    color: #fff;
    border: 2px solid #fff;
    border-radius: 100px;
    padding: 6px 12px;
    font-family: 'Bricolage Grotesque',sans-serif;
    font-weight: 800;
    font-size: 13px;
  }

  /* === Delivery progress (rocket) === */
  .delivery-progress {
    background: linear-gradient(135deg, #FFE74C, #FFB997);
    border: 2px solid var(--border);
    border-radius: 22px;
    box-shadow: 4px 4px 0 var(--ink);
    padding: 16px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .dp-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 10px;
  }
  .dp-title { font-family: 'Bricolage Grotesque',sans-serif; font-weight: 800; font-size: 14px; text-transform: lowercase; letter-spacing: -0.2px; }
  .dp-amount { font-size: 11px; font-weight: 700; opacity: 0.7; font-family: 'Space Grotesk', sans-serif; }
  .dp-track {
    height: 28px;
    background: rgba(26,11,46,0.12);
    border: 2px solid var(--border);
    border-radius: 100px;
    position: relative;
    overflow: hidden;
  }
  .dp-fill {
    height: 100%;
    width: 72%;
    background: linear-gradient(90deg, var(--poppy), var(--pink));
    border-radius: 100px;
    position: relative;
    transition: width 0.6s ease-out;
  }
  .dp-rocket {
    position: absolute;
    right: -10px;
    top: 50%;
    transform: translate(0,-50%);
    font-size: 24px;
    animation: rocketBob 1.4s ease-in-out infinite;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.25));
  }
  @keyframes rocketBob {
    0%,100% { transform: translate(0,-50%) rotate(-15deg); }
    50% { transform: translate(0,-60%) rotate(-5deg); }
  }
  .dp-foot {
    font-size: 11px;
    margin-top: 8px;
    font-style: italic;
    font-weight: 600;
  }

  /* === Fulfillment pill toggle === */
  .pill-toggle {
    background: rgba(26,11,46,0.12);
    border: 2px solid var(--border);
    border-radius: 100px;
    padding: 4px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    margin-bottom: 14px;
    position: relative;
  }
  .pill-opt {
    text-align: center;
    padding: 10px 6px;
    border-radius: 100px;
    font-weight: 700;
    font-size: 12px;
    text-transform: lowercase;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
    z-index: 1;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .pill-opt.active.p1 { background: linear-gradient(135deg, var(--poppy), var(--pink)); color: #fff; box-shadow: 2px 2px 0 var(--ink); }
  .pill-opt.active.p2 { background: linear-gradient(135deg, var(--mint), #4DD0E1); color: var(--ink); box-shadow: 2px 2px 0 var(--ink); }
  .pill-opt.active.p3 { background: linear-gradient(135deg, var(--yellow), var(--coral)); color: var(--ink); box-shadow: 2px 2px 0 var(--ink); }

  /* === Address input === */
  .input-card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 2px solid var(--border);
    border-radius: 18px;
    padding: 14px;
    box-shadow: 4px 4px 0 var(--ink);
    margin-bottom: 14px;
  }
  .input-row {
    display: flex; align-items: center; gap: 10px;
  }
  .input-glyph {
    width: 38px; height: 38px;
    background: var(--poppy);
    color: #fff;
    border: 2px solid var(--border);
    border-radius: 12px;
    display: grid; place-items: center;
    font-size: 17px;
    flex-shrink: 0;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .input-glyph.green { background: var(--mint); color: var(--ink); }
  .input-glyph.pink { background: var(--pink); color: #fff; }
  .input-glyph.yellow { background: var(--yellow); color: var(--ink); }
  .input-body { flex: 1; }
  .input-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: rgba(26,11,46,0.6);
  }
  .input-value {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: 15px;
    margin-top: 1px;
    letter-spacing: -0.2px;
  }
  .input-chevron { color: rgba(26,11,46,0.4); }

  /* === Time slot stories === */
  .slot-rail {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 4px 16px 14px;
    margin: 0 -16px 6px;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .slot-rail::-webkit-scrollbar { display: none; }
  .slot {
    flex-shrink: 0;
    width: 80px;
    border-radius: 18px;
    padding: 3px;
    background: linear-gradient(135deg, var(--poppy), var(--pink), var(--yellow));
    cursor: pointer;
    scroll-snap-align: start;
    transition: transform 0.2s;
  }
  .slot:hover { transform: translateY(-2px); }
  .slot-inner {
    background: #fff;
    border-radius: 15px;
    padding: 10px 6px;
    text-align: center;
  }
  .slot.active .slot-inner { background: var(--ink); color: var(--cream); }
  .slot-emoji { font-size: 22px; display: block; }
  .slot-time { font-family: 'Bricolage Grotesque',sans-serif; font-weight: 800; font-size: 13px; margin-top: 4px; }
  .slot-label { font-size: 9px; font-weight: 700; opacity: 0.7; text-transform: lowercase; margin-top: 1px; }
  .slot.full { opacity: 0.55; cursor: not-allowed; }
  .slot.full .slot-inner { background: #f0e0e0; }

  .slot-expand {
    background: rgba(255,255,255,0.85);
    border: 2px solid var(--border);
    border-radius: 18px;
    padding: 12px 14px;
    box-shadow: 4px 4px 0 var(--ink);
    margin-bottom: 14px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px;
  }
  .slot-expand strong { font-family: 'Bricolage Grotesque',sans-serif; font-weight: 800; font-size: 14px; }

  /* === Floating-label fields === */
  .floating-field {
    position: relative;
    margin-bottom: 12px;
  }
  .floating-field input {
    width: 100%;
    padding: 22px 16px 8px;
    background: rgba(255,255,255,0.85);
    border: 2px solid var(--border);
    border-radius: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    outline: none;
    box-shadow: 4px 4px 0 var(--ink);
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .floating-field input:focus {
    box-shadow: 4px 4px 0 var(--poppy);
  }
  .floating-field label {
    position: absolute;
    top: 50%;
    left: 16px;
    transform: translateY(-50%);
    color: rgba(26,11,46,0.55);
    font-size: 14px;
    font-weight: 500;
    pointer-events: none;
    transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
    background: transparent;
  }
  .floating-field input:focus + label,
  .floating-field input:not(:placeholder-shown) + label {
    top: 12px;
    transform: translateY(0);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--poppy);
  }

  /* === Tip picker === */
  .tip-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 6px;
  }
  .tip-opt {
    aspect-ratio: 1 / 1.05;
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 10px 4px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(255,255,255,0.85);
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink);
    transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
    text-align: center;
  }
  .tip-opt .emoji { font-size: 24px; line-height: 1; }
  .tip-opt .pct {
    font-family: 'Bricolage Grotesque',sans-serif;
    font-weight: 800;
    font-size: 14px;
    margin-top: 4px;
  }
  .tip-opt .amt { font-size: 10px; opacity: 0.65; margin-top: 1px; font-weight: 600; }
  .tip-opt.active {
    background: linear-gradient(135deg, var(--poppy), var(--pink));
    color: #fff;
    transform: translateY(-3px) scale(1.03);
  }
  .tip-opt.active .amt { opacity: 0.9; }
  .tip-note {
    font-size: 11px;
    font-style: italic;
    color: rgba(26,11,46,0.7);
    margin-bottom: 14px;
    text-align: center;
  }

  /* === Social proof tile === */
  .social-tile {
    background: rgba(255,255,255,0.85);
    border: 2px solid var(--border);
    border-radius: 18px;
    box-shadow: 4px 4px 0 var(--ink);
    padding: 12px 14px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
  }
  .social-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--yellow));
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: grid; place-items: center;
    font-size: 13px;
  }
  .social-tile em { color: var(--poppy); font-style: normal; font-weight: 700; }

  /* === Quotes marquee === */
  .quote-marquee {
    background: var(--ink);
    color: var(--cream);
    border: 2px solid var(--border);
    border-radius: 18px;
    box-shadow: 4px 4px 0 var(--mint);
    padding: 12px 0;
    margin-bottom: 14px;
    overflow: hidden;
    position: relative;
  }
  .quote-track {
    display: flex; gap: 40px;
    white-space: nowrap;
    animation: marquee 32s linear infinite;
    font-style: italic;
    font-size: 13px;
    font-weight: 500;
  }
  .quote-track span { display: inline-flex; align-items: center; gap: 6px; }
  .quote-track .handle { color: var(--mint); font-style: normal; font-weight: 700; }

  /* === Limited drop card === */
  .drop-card {
    background: linear-gradient(135deg, #1A0B2E, #4B2A77 50%, #FF3CAC);
    color: #fff;
    border: 2px solid var(--border);
    border-radius: 22px;
    box-shadow: 4px 4px 0 var(--yellow);
    padding: 14px;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 12px;
    position: relative;
    overflow: hidden;
  }
  .drop-emoji {
    font-size: 36px;
    animation: wobble 5s ease-in-out infinite;
    flex-shrink: 0;
  }
  .drop-body { flex: 1; }
  .drop-title { font-family: 'Bricolage Grotesque',sans-serif; font-weight: 800; font-size: 14px; text-transform: lowercase; letter-spacing: -0.2px; }
  .drop-sub { font-size: 11px; opacity: 0.85; margin-top: 3px; font-style: italic; }
  .drop-timer {
    background: var(--yellow); color: var(--ink);
    border: 2px solid var(--border);
    border-radius: 100px;
    padding: 6px 10px;
    font-family: 'Space Grotesk',sans-serif;
    font-weight: 700;
    font-size: 11px;
    flex-shrink: 0;
  }

  /* === Totals === */
  .totals {
    background: rgba(255,255,255,0.85);
    border: 2px solid var(--border);
    border-radius: 22px;
    box-shadow: 4px 4px 0 var(--ink);
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .total-row {
    display: flex; justify-content: space-between;
    padding: 5px 0;
    font-size: 13px;
    font-weight: 500;
  }
  .total-row.discount { color: var(--mint); font-weight: 700; }
  .total-row.grand {
    font-family: 'Bricolage Grotesque',sans-serif;
    font-weight: 800;
    font-size: 20px;
    border-top: 2px dashed var(--border);
    margin-top: 8px;
    padding-top: 12px;
    letter-spacing: -0.4px;
  }
  .total-row.grand .num { color: var(--poppy); }

  /* === Sticky pay bar === */
  .pay-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    z-index: 50;
    padding: 12px 14px 18px;
    background: linear-gradient(180deg, rgba(255,217,194,0) 0%, rgba(255,217,194,0.95) 30%, rgba(255,217,194,1) 100%);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .pay-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .points-tag {
    background: linear-gradient(135deg, var(--mint), #4DD0E1);
    color: var(--ink);
    border: 2px solid var(--border);
    border-radius: 100px;
    padding: 6px 12px;
    font-weight: 800;
    font-size: 12px;
    box-shadow: 2px 2px 0 var(--ink);
    transform: rotate(-3deg);
    flex-shrink: 0;
  }
  .clear-cart-btn {
    margin-left: auto;
    background: rgba(255,255,255,0.85);
    color: var(--ink);
    border: 2px solid var(--border);
    border-radius: 100px;
    padding: 6px 12px;
    font-weight: 700;
    font-size: 11px;
    cursor: pointer;
    text-transform: lowercase;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .pay-btn {
    width: 100%;
    background: linear-gradient(120deg, #FF4458 0%, #FF3CAC 40%, #FFE74C 100%);
    background-size: 200% 200%;
    color: #fff;
    border: 2px solid var(--border);
    border-radius: 100px;
    padding: 16px 20px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 19px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 22px rgba(255,68,88,0.55), 4px 4px 0 var(--ink);
    text-transform: lowercase;
    letter-spacing: -0.3px;
    animation: btnGradient 6s ease-in-out infinite;
  }
  @keyframes btnGradient { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
  .pay-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    animation: shineSweep 3s ease-in-out infinite;
  }
  @keyframes shineSweep { 0% { left: -100%; } 50%,100% { left: 200%; } }
  .pay-btn:active { transform: translate(2px,2px); box-shadow: 0 0 18px rgba(255,68,88,0.5), 2px 2px 0 var(--ink); }
  .pay-btn .price-num { font-variant-numeric: tabular-nums; }
  .pay-btn .dot { display: inline-block; margin: 0 6px; opacity: 0.7; }

  /* === Floating reactions overlay === */
  .react-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: visible;
  }
  .confetti {
    position: fixed;
    width: 8px; height: 14px;
    z-index: 200;
    pointer-events: none;
  }

  /* === Responsive === */
  @media (min-width: 768px) {
    body { padding-bottom: 60px; }
    .app {
      max-width: 460px;
      margin-top: 30px;
      margin-bottom: 30px;
      padding: 22px;
      background: rgba(255,248,238,0.4);
      border-radius: 30px;
      border: 2px solid var(--border);
      box-shadow: 8px 8px 0 var(--ink);
    }
    .pay-bar {
      position: sticky;
      bottom: 22px;
      width: auto;
      max-width: none;
      transform: none;
      left: auto;
      background: transparent;
      backdrop-filter: none;
      margin: 18px -22px -22px;
      padding: 14px 22px 22px;
    }
    .mesh-blob.b2 { right: 5vw; }
    .mesh-blob.b4 { right: 5vw; }
  }

  /* === Reduced motion === */
  @media (prefers-reduced-motion: reduce) {
    .mesh-rotator, .mesh-blob,
    .marquee-track, .quote-track,
    .dp-rocket, .combo-sticker,
    .arcade-bonus, .header-title .emoji,
    .item-emoji-wrap .em, .bundle-fill,
    .pay-btn, .pay-btn::before,
    .stickerWobble, .trend-emoji, .drop-emoji,
    .qa-hint .swipe-doodle {
      animation: none !important;
    }
    * { transition-duration: 0.01ms !important; }
  }

  /* === Override base cart styles for sheet context === */
  .cart-sheet .app {
    max-width: none;
    margin: 0;
    padding: 8px 18px 30px;
    background: transparent;
    box-shadow: none;
    border: 0;
  }
  .cart-sheet .pay-bar {
    position: sticky;
    bottom: 0;
    left: 0; right: 0;
    width: 100%;
    max-width: none;
    transform: none;
    margin: 0;
    padding: 14px 18px 22px;
    background: linear-gradient(180deg, rgba(255,217,194,0) 0%, rgba(255,217,194,0.96) 30%, rgba(255,217,194,1) 100%);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  @media (min-width: 768px) {
    .cart-sheet .app {
      max-width: none;
      margin: 0;
      padding: 8px 22px 30px;
      background: transparent;
      border: 0;
      box-shadow: none;
    }
    .cart-sheet .pay-bar {
      position: sticky;
      bottom: 0;
      margin: 0;
      padding: 14px 22px 22px;
    }
  }

  body.cart-open .floating-cart-btn { opacity: 0; pointer-events: none; }
  body.cart-open .top-nav { opacity: 0; pointer-events: none; }
  .top-nav, .floating-cart-btn { transition: opacity 0.25s, background 0.25s, backdrop-filter 0.25s, box-shadow 0.25s, padding 0.25s, transform 0.18s; }

  /* === Reduced motion guard (extended) === */
  @media (prefers-reduced-motion: reduce) {
    .mesh-rotator, .mesh-blob,
    .marquee-track, .quote-track,
    .dp-rocket, .combo-sticker, .combo-starburst,
    .arcade-bonus, .header-title .emoji,
    .item-emoji-wrap .em, .bundle-fill,
    .pay-btn, .pay-btn::before,
    .nav-cart-btn, .floating-cart-btn,
    .hero-title .ht-served, .hero-title .ht-hot,
    .hero-eyebrow .eb-dot, .hero-ticker .live-dot,
    .hero-btn::before, .hero-btn .pin,
    .floating-emoji, .nav-logo .nav-pizza,
    .loc-card .loc-header, .loc-status .neon-dot, .loc-cta::before,
    .bundle-emoji-row span, .bundle-most-picked,
    .menu-live-line .quote-track, .bundles-note-marquee .quote-track,
    .guarantee-bolt, .surprise-card, .surprise-btn::before,
    .mi-emoji-wrap .em-big, .mi-sticker.st-scarcity,
    .nav-cart-badge,
    .trend-emoji, .drop-emoji,
    .qa-hint .swipe-doodle {
      animation: none !important;
    }
    * { transition-duration: 0.01ms !important; }
    html { scroll-behavior: auto; }
  }

  /* ====================================================
     ROUTER — page visibility toggles
     ==================================================== */
  .page { display: none; }
  .page.is-active { display: block; }

  /* ====================================================
     LOCATION PAGES
     ==================================================== */

  /* Body palette swap when a location page is shown */
  body.loc-krakow { background: #FFD5C2; }
  body.loc-warszawa { background: #C9F5E5; }
  body.loc-krakow .mesh-rotator {
    background: conic-gradient(from 0deg at 50% 50%, #FFD5C2, #FFB997, #FF8C6A, #FF4458, #FFE2B0, #FFD5C2);
  }
  body.loc-warszawa .mesh-rotator {
    background: conic-gradient(from 0deg at 50% 50%, #C9F5E5, #00E0A4, #FF3CAC, #B3F5FF, #FFE74C, #C9F5E5);
  }
  body.loc-krakow .mesh-blob.b1 { background: #FF4458; }
  body.loc-krakow .mesh-blob.b2 { background: #FF8C6A; }
  body.loc-krakow .mesh-blob.b3 { background: #FFB997; }
  body.loc-krakow .mesh-blob.b4 { background: #FFE74C; }
  body.loc-krakow .mesh-blob.b5 { background: #FF3CAC; }
  body.loc-warszawa .mesh-blob.b1 { background: #00E0A4; }
  body.loc-warszawa .mesh-blob.b2 { background: #FF3CAC; }
  body.loc-warszawa .mesh-blob.b3 { background: #FFE74C; }
  body.loc-warszawa .mesh-blob.b4 { background: #4DD0E1; }
  body.loc-warszawa .mesh-blob.b5 { background: #B5F2B0; }

  /* === Back chip === */
  .back-chip-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 92px 20px 0;
  }
  .back-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.85);
    color: var(--ink);
    border: 2px solid var(--border);
    border-radius: 100px;
    padding: 8px 14px 8px 12px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 12px;
    text-transform: lowercase;
    letter-spacing: 0.5px;
    text-decoration: none;
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .back-chip:hover {
    transform: translate(-2px,-2px);
    box-shadow: 5px 5px 0 var(--ink);
    background: #fff;
  }
  .back-chip:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }
  .back-chip .bc-arrow {
    display: inline-flex;
    transition: transform 0.2s;
  }
  .back-chip:hover .bc-arrow { transform: translateX(-3px); }

  /* === Location hero === */
  .loc-hero {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 20px 16px;
    position: relative;
  }
  .loc-hero-card {
    position: relative;
    border: 2px solid var(--border);
    border-radius: 32px;
    overflow: hidden;
    padding: 36px 24px 32px;
    box-shadow: 10px 10px 0 var(--ink);
  }
  .loc-hero-card.kr {
    background: linear-gradient(135deg, #FF4458 0%, #FF8C6A 35%, #FFE74C 100%);
    background-size: 220% 220%;
    animation: locHeroGradKr 14s ease-in-out infinite;
  }
  .loc-hero-card.wa {
    background: linear-gradient(135deg, #00E0A4 0%, #4DD0E1 40%, #FF3CAC 100%);
    background-size: 220% 220%;
    animation: locHeroGradWa 16s ease-in-out infinite;
  }
  @keyframes locHeroGradKr {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  @keyframes locHeroGradWa {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .loc-hero-card .lh-emoji {
    position: absolute;
    font-size: 140px;
    opacity: 0.22;
    filter: drop-shadow(0 8px 14px rgba(0,0,0,0.25));
    pointer-events: none;
    animation: wobbleLight 7s ease-in-out infinite;
  }
  .loc-hero-card .lh-emoji.e1 { top: -10px; right: -10px; transform: rotate(15deg); }
  .loc-hero-card .lh-emoji.e2 { bottom: -22px; left: -10px; transform: rotate(-12deg); font-size: 110px; animation-delay: 1.6s; }
  .loc-hero-card.kr .lh-emoji.e3 { top: 30%; right: 30%; font-size: 70px; opacity: 0.15; animation-delay: 0.8s; }
  .loc-hero-card.wa .lh-emoji.e3 { top: 30%; right: 30%; font-size: 70px; opacity: 0.15; animation-delay: 0.8s; }
  .lh-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--ink);
    color: var(--cream);
    border: 2px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.4px;
    margin-bottom: 18px;
    box-shadow: 3px 3px 0 rgba(255,255,255,0.45);
    position: relative;
    z-index: 2;
  }
  .lh-eyebrow .eb-dot {
    width: 7px; height: 7px;
    background: var(--mint);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--mint);
    animation: neonPulse 1.2s ease-in-out infinite;
  }
  .lh-title {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 76px;
    line-height: 0.86;
    letter-spacing: -3px;
    color: #fff;
    text-shadow: 4px 4px 0 var(--ink);
    text-transform: lowercase;
    margin: 0 0 14px;
    position: relative;
    z-index: 2;
  }
  .lh-title .lh-accent {
    display: inline-block;
    background: var(--yellow);
    color: var(--ink);
    padding: 0 8px;
    border: 2px solid var(--border);
    border-radius: 16px;
    transform: rotate(-3deg);
    box-shadow: 4px 4px 0 var(--ink);
    text-shadow: none;
    font-size: 0.7em;
    line-height: 1.1;
    margin-left: 6px;
    vertical-align: 4px;
  }
  .loc-hero-card.wa .lh-title { color: var(--ink); text-shadow: 4px 4px 0 #fff; }
  .lh-meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    position: relative;
    z-index: 2;
    margin-top: 18px;
  }
  .lh-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #fff;
    color: var(--ink);
    border: 2px solid var(--border);
    border-radius: 100px;
    padding: 7px 13px 7px 11px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 12px;
    text-transform: lowercase;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .lh-pill.open {
    background: var(--mint);
  }
  .lh-pill.open .lh-pill-dot {
    width: 7px; height: 7px;
    background: var(--ink);
    border-radius: 50%;
    animation: neonPulse 1.2s ease-in-out infinite;
  }
  .lh-pill svg { display: block; }
  @media (min-width: 640px) {
    .lh-title { font-size: 110px; letter-spacing: -4.5px; }
    .loc-hero-card { padding: 48px 36px 40px; }
  }
  @media (min-width: 1024px) {
    .lh-title { font-size: 150px; letter-spacing: -6px; }
    .loc-hero-card { padding: 64px 48px 56px; }
  }

  /* === Location ticker (under hero) === */
  .loc-ticker-row {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px 20px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .loc-ticker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--ink);
    color: var(--cream);
    border: 2px solid var(--border);
    border-radius: 100px;
    padding: 8px 14px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 12px;
    box-shadow: 3px 3px 0 rgba(255,255,255,0.4);
  }
  .loc-ticker em { font-style: normal; color: var(--yellow); font-weight: 800; }
  .loc-ticker .live-dot {
    width: 7px; height: 7px;
    background: var(--poppy);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--poppy);
    animation: neonPulse 1.2s ease-in-out infinite;
  }
  .loc-ticker.tk-pink em { color: var(--pink); }
  .loc-ticker.tk-mint em { color: var(--mint); }

  /* === Two-col grid block === */
  .loc-twocol {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 20px 0;
    display: grid;
    grid-template-columns: 1fr;
    gap: 22px;
  }
  @media (min-width: 768px) {
    .loc-twocol { grid-template-columns: 1.05fr 1fr; gap: 26px; }
  }

  /* === Generic glass card on loc pages === */
  .loc-card-block {
    background: #fff;
    border: 2px solid var(--border);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 7px 7px 0 var(--ink);
    position: relative;
  }
  .loc-card-block .lcb-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--ink);
    color: var(--cream);
    border-radius: 100px;
    padding: 4px 11px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .loc-card-block .lcb-title {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 26px;
    line-height: 1;
    letter-spacing: -1px;
    text-transform: lowercase;
    margin: 0 0 14px;
  }
  body.loc-krakow .loc-card-block { box-shadow: 7px 7px 0 #6B0F2A; }
  body.loc-warszawa .loc-card-block { box-shadow: 7px 7px 0 #0B6E4F; }

  /* === Hours grid === */
  .hours-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  @media (min-width: 480px) {
    .hours-grid { grid-template-columns: repeat(7, 1fr); }
  }
  .hours-cell {
    background: var(--cream);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 10px 8px 9px;
    text-align: center;
    box-shadow: 2px 2px 0 var(--ink);
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .hours-cell:hover {
    transform: translate(-1px,-1px);
    box-shadow: 3px 3px 0 var(--ink);
  }
  .hours-cell.today {
    background: var(--yellow);
    transform: rotate(-1.5deg);
  }
  .hours-cell.today:hover { transform: rotate(-1.5deg) translate(-1px,-1px); }
  .hours-day {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(26,11,46,0.65);
    margin-bottom: 4px;
  }
  .hours-cell.today .hours-day { color: var(--ink); }
  .hours-time {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 11px;
    line-height: 1.15;
  }

  /* === Map card === */
  .map-frame {
    position: relative;
    aspect-ratio: 16 / 11;
    border: 2px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    background:
      linear-gradient(rgba(26,11,46,0.12) 1px, transparent 1px) 0 0 / 28px 28px,
      linear-gradient(90deg, rgba(26,11,46,0.12) 1px, transparent 1px) 0 0 / 28px 28px,
      linear-gradient(135deg, #FFB997 0%, #FF8C6A 100%);
    box-shadow: inset 0 0 60px rgba(255,68,88,0.15);
  }
