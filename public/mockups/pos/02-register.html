<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sud Italia POS — Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap">
<style>
  :root{
    --bg:#0e1218;
    --bg2:#131922;
    --panel:#161d28;
    --panel2:#1a222f;
    --rail:#0b0f15;
    --line:#222c3a;
    --line-soft:#1c2531;
    --ink:#eef3f9;
    --ink2:#aebacc;
    --muted:#828fa6;
    --faint:#5d6a80;
    --accent:#5b9dff;
    --accent-dim:#2b4566;
    --neutral:#243044;
    --warn:#f2b53b;
    --warn-bg:#2c2410;
    --danger:#ff5d5d;
    --danger-bg:#311318;
    --green:#3fd08a;
    --green-bg:#10231b;
    --green-line:#1f4d3a;
    --violet:#8B5CF6;
    --violet-dim:#5b3aa6;
    --radius:12px;
    --space:16px;
    --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Monaco,"Cascadia Code",monospace;
    --sans:"Inter",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans);background:var(--bg);color:var(--ink);
    font-size:14px;line-height:1.4;-webkit-font-smoothing:antialiased;overflow:hidden;
  }
  .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
  .mono{font-family:var(--mono)}

  .app{display:grid;grid-template-columns:130px 1fr minmax(340px,30%);grid-template-rows:64px 1fr 38px;height:100vh}

  /* ===== Header ===== */
  header{
    grid-column:1 / -1;display:flex;align-items:center;gap:20px;padding:0 24px;
    background:var(--bg2);border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:baseline;gap:12px;min-width:max-content}
  .wordmark{font-weight:700;letter-spacing:.16em;font-size:15px;color:var(--ink)}
  .kd-label{font-size:11px;letter-spacing:.08em;color:var(--faint);text-transform:uppercase;border-left:1px solid var(--line);padding-left:12px}
  .tag{
    font-size:11px;letter-spacing:.05em;color:var(--accent);background:rgba(91,157,255,.1);
    border:1px solid rgba(91,157,255,.22);border-radius:999px;padding:3px 10px;font-family:var(--mono);
  }
  .head-spacer{flex:1}

  /* segmented controls */
  .seg-group{display:flex;align-items:stretch;gap:4px;background:var(--rail);border:1px solid var(--line);border-radius:10px;padding:4px}
  .seg{
    appearance:none;border:none;background:transparent;color:var(--muted);border-radius:7px;
    padding:6px 12px;cursor:pointer;font-family:var(--sans);font-size:12px;letter-spacing:.02em;
    display:flex;align-items:center;gap:7px;transition:background .15s,color .15s;white-space:nowrap;
  }
  .seg:hover{color:var(--ink2);background:var(--panel)}
  .seg.active{background:var(--accent);color:#06101f;font-weight:600}
  .seg svg{width:14px;height:14px}

  .fs-btn{
    appearance:none;display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);
    background:transparent;color:var(--ink2);border-radius:8px;padding:6px 11px;font-family:var(--sans);
    font-size:11.5px;letter-spacing:.03em;cursor:pointer;transition:color .15s,border-color .15s,background .15s;
  }
  .fs-btn svg{width:15px;height:15px;display:block}
  .fs-btn:hover{color:var(--ink);border-color:var(--accent-dim);background:var(--panel)}
  .fs-btn .fs-exit{display:none}
  html.is-fullscreen .fs-btn .fs-enter{display:none}
  html.is-fullscreen .fs-btn .fs-exit{display:inline-flex;align-items:center;gap:7px}

  .clock{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:18px;letter-spacing:.03em;color:var(--ink)}
  .clock .date{display:block;font-size:10px;color:var(--faint);letter-spacing:.06em;text-align:right;font-family:var(--sans)}
  .gallery-link{
    font-size:11.5px;color:var(--faint);text-decoration:none;letter-spacing:.03em;padding:5px 10px;
    border:1px solid var(--line);border-radius:8px;transition:color .15s,border-color .15s;
  }
  .gallery-link:hover{color:var(--ink2);border-color:var(--accent-dim)}

  html.is-fullscreen .gallery-link,html.is-fullscreen .tag{display:none}
  html.is-fullscreen .app{grid-template-rows:56px 1fr 0}
  html.is-fullscreen footer{display:none}

  /* ===== Left category rail ===== */
  .rail{background:var(--rail);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:12px 8px;gap:5px;overflow-y:auto}
  .rail-cap{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);padding:2px 8px 4px}
  .rail-btn{
    display:flex;flex-direction:column;align-items:center;gap:5px;padding:11px 6px;
    border:1px solid transparent;background:transparent;color:var(--muted);border-radius:10px;
    cursor:pointer;font-family:var(--sans);transition:background .15s,color .15s,border-color .15s;text-align:center;
  }
  .rail-btn .r-em{font-size:22px;line-height:1}
  .rail-btn .r-l{font-size:11px;letter-spacing:.02em}
  .rail-btn .r-ct{font-family:var(--mono);font-size:9.5px;color:var(--faint)}
  .rail-btn:hover{background:var(--panel);color:var(--ink2);border-color:var(--line-soft)}
  .rail-btn.active{background:var(--panel2);color:var(--ink);border-color:var(--accent-dim)}
  .rail-btn.active .r-ct{color:var(--accent)}

  /* ===== Center product grid ===== */
  .center{display:flex;flex-direction:column;min-height:0;background:var(--bg)}
  .center-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--line-soft)}
  .center-title{display:flex;align-items:center;gap:10px}
  .center-title h2{font-size:12.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2);font-weight:600}
  .center-title .ct-em{font-size:16px}
  .center-count{font-family:var(--mono);font-size:12px;color:var(--faint);background:var(--panel);border:1px solid var(--line-soft);border-radius:8px;padding:2px 9px}
  .grid{flex:1;overflow-y:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:12px;align-content:start}
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:13px 14px;
    cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:8px;position:relative;min-height:104px;
    transition:border-color .15s,box-shadow .15s,transform .1s;
  }
  .card:hover{border-color:var(--accent-dim);box-shadow:0 8px 24px -14px rgba(0,0,0,.6);transform:translateY(-2px)}
  .card:active{transform:translateY(0)}
  .card.flash{animation:cardFlash .4s ease}
  @keyframes cardFlash{0%{box-shadow:0 0 0 2px var(--accent)}100%{box-shadow:none}}
  .card-name{font-size:14px;font-weight:600;color:var(--ink);line-height:1.2}
  .card-bottom{margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between;gap:8px}
  .card-price{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--ink)}
  .card-dots{display:flex;gap:4px;align-items:center}
  .tagdot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
  .tagdot.veg{background:var(--green)}
  .tagdot.vegan{background:#2fb87a}
  .tagdot.spicy{background:var(--danger)}
  .tagdot.gf{background:var(--warn)}
  .role-badge{position:absolute;top:9px;right:9px;font-size:8.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 6px;border-radius:999px}
  .role-hero{background:rgba(91,157,255,.14);color:var(--accent)}
  .role-profit{background:rgba(63,208,138,.14);color:var(--green)}
  .role-limited{background:rgba(139,92,246,.16);color:#b794ff}
  .card .pizza-hint{font-size:9.5px;color:var(--faint);letter-spacing:.03em}

  /* ===== Right order column ===== */
  .order{display:flex;flex-direction:column;min-height:0;background:var(--bg2);border-left:1px solid var(--line)}
  .cust-bar{flex:0 0 auto;padding:12px 16px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:11px;background:var(--rail)}
  .cust-avatar{width:34px;height:34px;border-radius:50%;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:0 0 auto}
  .cust-info{min-width:0;flex:1 1 auto}
  .cust-name{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cust-sub{font-size:11px;color:var(--faint)}
  .cust-sub b{color:var(--green);font-family:var(--mono)}
  .cust-action{appearance:none;border:1px solid var(--line);background:transparent;color:var(--accent);font-family:var(--sans);font-size:11.5px;font-weight:600;padding:6px 10px;border-radius:8px;cursor:pointer;transition:all .15s ease;white-space:nowrap}
  .cust-action:hover{border-color:var(--accent-dim);background:var(--panel)}

  /* upper: line items (~50%) */
  .lines{flex:1 1 auto;overflow-y:auto;padding:8px 12px;min-height:80px}
  .empty-cart{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--faint);text-align:center;gap:6px;padding:24px}
  .empty-cart .ec-em{font-size:30px;opacity:.5}
  .empty-cart .ec-t{font-size:13px}
  .empty-cart .ec-s{font-size:11px}
  .line{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--line-soft)}
  .line:last-child{border-bottom:none}
  .line-main{flex:1 1 auto;min-width:0}
  .line-name{font-size:13px;font-weight:600;color:var(--ink);line-height:1.25}
  .line-mods{font-size:10.5px;color:var(--faint);margin-top:2px;line-height:1.3}
  .line-mods .mp{color:var(--warn);font-family:var(--mono)}
  .line-unit{font-size:10.5px;color:var(--faint);font-family:var(--mono);margin-top:2px}
  .line-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex:0 0 auto}
  .line-price{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--ink)}
  .stepper{display:flex;align-items:center;gap:2px;background:var(--rail);border:1px solid var(--line);border-radius:999px;padding:2px}
  .step-btn{appearance:none;width:24px;height:24px;border-radius:50%;border:none;background:transparent;color:var(--ink2);font-size:15px;font-weight:700;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;transition:all .1s ease}
  .step-btn:hover{background:var(--panel);color:var(--ink)}
  .step-btn.minus:hover{color:var(--danger)}
  .step-qty{font-family:var(--mono);font-size:13px;font-weight:700;min-width:20px;text-align:center;color:var(--ink)}

  /* totals */
  .totals{flex:0 0 auto;padding:10px 16px;border-top:1px solid var(--line);background:var(--rail)}
  .trow{display:flex;align-items:baseline;justify-content:space-between;font-size:12.5px;color:var(--ink2);padding:2px 0}
  .trow .tv{font-family:var(--mono);color:var(--ink)}
  .trow.combo{color:var(--green)}
  .trow.combo .tv{color:var(--green);font-weight:700}
  .trow.combo .combo-name{display:inline-flex;align-items:center;gap:6px}
  .trow.grand{margin-top:6px;padding-top:8px;border-top:1px solid var(--line)}
  .trow.grand .tl{font-size:14px;font-weight:700;color:var(--ink)}
  .trow.grand .tv{font-size:22px;font-weight:700;color:var(--ink)}
  .pts-hint{font-size:10.5px;color:var(--faint);text-align:right;margin-top:4px}
  .pts-hint b{color:#b794ff;font-family:var(--mono)}

  /* lower: tender zone */
  .tender{flex:0 0 auto;border-top:1px solid var(--line);background:var(--panel);padding:12px}
  .tender-tabs{display:flex;gap:8px;margin-bottom:10px}
  .tender-tab{
    flex:1 1 0;appearance:none;border:1px solid var(--line);background:var(--rail);color:var(--ink2);
    border-radius:9px;padding:11px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s ease;
  }
  .tender-tab .tt-em{font-size:17px}
  .tender-tab:hover:not(:disabled){border-color:var(--accent-dim);color:var(--ink)}
  .tender-tab.active{border-color:var(--accent);background:var(--accent-dim);color:var(--ink)}
  .tender-tab:disabled{opacity:.4;cursor:not-allowed}

  .tender-readout{display:flex;gap:8px;margin-bottom:10px}
  .ro-cell{flex:1 1 0;background:var(--rail);border:1px solid var(--line-soft);border-radius:9px;padding:7px 10px}
  .ro-cell .rl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
  .ro-cell .rv{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:19px;font-weight:700;color:var(--ink);letter-spacing:.01em;margin-top:1px}
  .ro-cell.change .rv{color:var(--green)}
  .ro-cell.change.short .rv{color:var(--warn)}

  .quick-cash{display:flex;gap:6px;margin-bottom:8px}
  .qc-btn{
    flex:1 1 0;appearance:none;border:1px solid var(--line);background:var(--rail);color:var(--ink2);
    border-radius:8px;padding:9px 0;font-family:var(--mono);font-size:13px;font-weight:700;cursor:pointer;transition:all .12s ease;
  }
  .qc-btn:hover{border-color:var(--accent-dim);color:var(--ink);background:var(--panel2)}

  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .kp-btn{
    appearance:none;border:1px solid var(--line);background:var(--panel2);color:var(--ink);
    border-radius:9px;padding:13px 0;font-family:var(--mono);font-size:18px;font-weight:700;cursor:pointer;
    transition:all .1s ease;
  }
  .kp-btn:hover{border-color:var(--accent-dim);background:var(--neutral)}
  .kp-btn:active{transform:translateY(1px)}
  .kp-btn.del{color:var(--danger);font-size:16px}

  .card-flow{padding:8px 4px}
  .card-status{
    display:flex;flex-direction:column;align-items:center;gap:12px;padding:18px 12px;
    border:1px dashed var(--line);border-radius:12px;background:var(--rail);text-align:center;
  }
  .card-status .cs-em{font-size:36px}
  .card-status .cs-t{font-size:14px;color:var(--ink2);font-weight:600}
  .card-status .cs-s{font-size:11.5px;color:var(--faint)}
  .card-status.approved{border-color:var(--green-line);background:var(--green-bg)}
  .card-status.approved .cs-t{color:var(--green)}
  .reader-dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin:0 3px;animation:readerPulse 1.2s ease-in-out infinite}
  .reader-dots span:nth-child(2){animation-delay:.2s}
  .reader-dots span:nth-child(3){animation-delay:.4s}
  @keyframes readerPulse{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

  .pay-btn{
    width:100%;appearance:none;border:none;border-radius:10px;padding:14px;font-family:var(--sans);
    font-size:15px;font-weight:700;letter-spacing:.02em;cursor:pointer;margin-top:10px;
    background:var(--green);color:#04130c;display:flex;align-items:center;justify-content:space-between;gap:10px;
    transition:filter .15s,transform .08s;
  }
  .pay-btn:hover:not(:disabled){filter:brightness(1.08)}
  .pay-btn:active:not(:disabled){transform:translateY(1px)}
  .pay-btn:disabled{opacity:.4;cursor:not-allowed;background:var(--neutral);color:var(--faint)}
  .pay-btn .pb-amt{font-family:var(--mono);font-weight:700}
  .tender-hint{font-size:10.5px;color:var(--faint);text-align:center;padding:18px 12px;line-height:1.5}

  /* ===== Footer ===== */
  footer{grid-column:1 / -1;display:flex;align-items:center;gap:24px;padding:0 24px;background:var(--bg2);border-top:1px solid var(--line);font-size:11px;color:var(--faint)}
  .legend{display:flex;gap:16px}
  .legend span{display:inline-flex;align-items:center;gap:6px;letter-spacing:.02em}
  .swatch{width:9px;height:9px;border-radius:2px}
  .kbd-hint{margin-left:auto;font-family:var(--mono);letter-spacing:.04em}
  .kbd{display:inline-block;padding:1px 5px;border:1px solid var(--line);border-radius:3px;color:var(--ink2);margin:0 1px}

  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}

  /* ===== Modal (modifiers) ===== */
  .overlay{position:fixed;inset:0;background:rgba(5,8,12,0.62);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:24px;opacity:0;pointer-events:none;transition:opacity .15s ease}
  .overlay.open{opacity:1;pointer-events:auto}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:100%;max-width:460px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 32px 80px -20px rgba(0,0,0,.7);transform:translateY(8px) scale(.98);transition:transform .18s ease}
  .overlay.open .modal{transform:none}
  .modal-head{padding:18px 20px 14px;border-bottom:1px solid var(--line-soft);display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
  .modal-title{font-size:17px;font-weight:700;color:var(--ink)}
  .modal-sub{font-size:12.5px;color:var(--faint);margin-top:3px}
  .modal-close{appearance:none;border:1px solid var(--line);background:transparent;color:var(--ink2);width:30px;height:30px;border-radius:50%;font-size:17px;cursor:pointer;line-height:1;transition:all .12s ease;flex:0 0 auto}
  .modal-close:hover{border-color:var(--accent-dim);color:var(--ink)}
  .modal-body{padding:18px 20px;overflow-y:auto;flex:1 1 auto}
  .mod-group{margin-bottom:18px}
  .mod-group:last-child{margin-bottom:0}
  .mod-glabel{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .mod-req{color:var(--danger);font-size:9.5px;letter-spacing:.06em}
  .mod-opt{display:flex;align-items:center;gap:11px;padding:10px 13px;border:1px solid var(--line);border-radius:10px;cursor:pointer;margin-bottom:7px;transition:all .12s ease}
  .mod-opt:hover{border-color:var(--accent-dim)}
  .mod-opt.active{border-color:var(--accent);background:var(--accent-dim)}
  .mod-mark{width:19px;height:19px;border-radius:6px;border:2px solid var(--line);flex:0 0 auto;display:flex;align-items:center;justify-content:center;transition:all .12s ease;color:transparent;font-size:12px}
  .mod-opt.radio .mod-mark{border-radius:50%}
  .mod-opt.active .mod-mark{border-color:var(--accent);background:var(--accent);color:#06101f}
  .mod-name{flex:1 1 auto;font-size:13.5px;color:var(--ink)}
  .mod-delta{font-family:var(--mono);font-size:12.5px;color:var(--ink2)}
  .mod-delta.free{color:var(--faint)}
  .modal-foot{padding:14px 20px 18px;border-top:1px solid var(--line-soft);background:var(--rail)}
  .modal-add{width:100%;appearance:none;border:none;border-radius:10px;padding:13px 16px;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;background:var(--accent);color:#06101f;display:flex;align-items:center;justify-content:space-between;gap:10px;transition:filter .15s}
  .modal-add:hover{filter:brightness(1.08)}
  .modal-add .ma-amt{font-family:var(--mono);font-weight:700}

  /* paid receipt overlay */
  .receipt{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:100%;max-width:380px;overflow:hidden;box-shadow:0 32px 80px -20px rgba(0,0,0,.7);transform:translateY(8px) scale(.98);transition:transform .18s ease}
  .overlay.open .receipt{transform:none}
  .receipt-top{padding:28px 24px 20px;text-align:center;border-bottom:1px dashed var(--line)}
  .paid-badge{width:74px;height:74px;border-radius:50%;background:var(--green-bg);border:1px solid var(--green-line);color:var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:38px;animation:paidPop .4s cubic-bezier(.2,.9,.3,1.2)}
  @keyframes paidPop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
  .paid-t{font-size:20px;font-weight:700;color:var(--ink)}
  .paid-amt{font-family:var(--mono);font-size:16px;color:var(--green);font-weight:700;margin-top:5px}
  .receipt-body{padding:18px 24px}
  .rline{display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink2);padding:4px 0}
  .rline .rv{font-family:var(--mono);color:var(--ink)}
  .rline.pts .rv{color:#b794ff}
  .receipt-foot{padding:0 24px 24px}
  .new-sale{width:100%;appearance:none;border:none;border-radius:10px;padding:13px;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;background:var(--green);color:#04130c;display:flex;align-items:center;justify-content:center;gap:8px;transition:filter .15s}
  .new-sale:hover{filter:brightness(1.08)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <span class="wordmark">SUD ITALIA</span>
      <span class="kd-label">Point of Sale</span>
    </div>
    <span class="tag">02 · Register</span>

    <div class="seg-group" id="locGroup" role="group" aria-label="Location"></div>
    <div class="seg-group" id="chanGroup" role="group" aria-label="Channel"></div>

    <div class="head-spacer"></div>

    <button class="fs-btn" id="fsBtn" type="button" aria-label="Toggle fullscreen">
      <span class="fs-enter"><svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>Fullscreen</span>
      <span class="fs-exit"><svg viewBox="0 0 24 24"><path d="M9 4v5H4M15 4v5h5M9 20v-5H4M15 20v-5h5" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>Exit</span>
    </button>
    <a class="gallery-link" href="index.html">← Gallery</a>
    <div class="clock">
      <span id="clock">--:--:--</span>
      <span class="date" id="date"></span>
    </div>
  </header>

  <!-- left category rail -->
  <nav class="rail" id="rail"></nav>

  <!-- center product grid -->
  <section class="center">
    <div class="center-head">
      <div class="center-title"><span class="ct-em" id="ctEm">🍕</span><h2 id="ctTitle">Pizza</h2></div>
      <span class="center-count" id="centerCount">0</span>
    </div>
    <div class="grid" id="grid"></div>
  </section>

  <!-- right order column -->
  <aside class="order">
    <div class="cust-bar" id="custBar"></div>
    <div class="lines" id="lines"></div>
    <div class="totals" id="totals"></div>
    <div class="tender" id="tender"></div>
  </aside>

  <footer>
    <div class="legend">
      <span><i class="swatch" style="background:var(--accent)"></i>Hero</span>
      <span><i class="swatch" style="background:var(--green)"></i>Profit driver</span>
      <span><i class="swatch" style="background:#b794ff"></i>Limited</span>
      <span><i class="swatch" style="background:var(--warn)"></i>Add-on</span>
    </div>
    <div class="kbd-hint"><span class="kbd">1</span>–<span class="kbd">6</span> category · keypad <span class="kbd">0</span>–<span class="kbd">9</span> tender · <span class="kbd">Esc</span> close · <span class="kbd">F</span> fullscreen</div>
  </footer>
</div>

<!-- Modifier modal -->
<div class="overlay" id="modOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modTitle">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="modTitle">Customize</div>
        <div class="modal-sub" id="modSub"></div>
      </div>
      <button class="modal-close" id="modClose" type="button" aria-label="Close">×</button>
    </div>
    <div class="modal-body" id="modBody"></div>
    <div class="modal-foot">
      <button class="modal-add" id="modAdd" type="button">
        <span>Add to order</span><span class="ma-amt tnum" id="modAmt">0,00 zł</span>
      </button>
    </div>
  </div>
</div>

<!-- Receipt overlay -->
<div class="overlay" id="receiptOverlay">
  <div class="receipt" role="dialog" aria-modal="true">
    <div class="receipt-top">
      <div class="paid-badge">✓</div>
      <div class="paid-t">Paid</div>
      <div class="paid-amt tnum" id="receiptAmt">0,00 zł</div>
    </div>
    <div class="receipt-body" id="receiptBody"></div>
    <div class="receipt-foot">
      <button class="new-sale" id="newSaleBtn" type="button"><span>↺ New sale</span></button>
    </div>
  </div>
</div>

<script>
"use strict";

/* ===== SHARED SAMPLE DATA ===== */
let LOC = "Kraków";
const fmtPLN = g => (g/100).toFixed(2).replace(".",",")+" zł";
const CATS = ["Pizza","Pasta","Antipasti","Panini","Drinks","Desserts"];
const CAT_EMOJI = {Pizza:"🍕",Pasta:"🍝",Antipasti:"🥖",Panini:"🥪",Drinks:"☕",Desserts:"🍰"};
const MENU = [
  {id:"margherita", n:"Margherita",              cat:"Pizza",     price:2790, tags:["veg"],         role:"hero"},
  {id:"quattro",    n:"Quattro Formaggi",        cat:"Pizza",     price:3390, tags:["veg"],         role:"profit"},
  {id:"diavola",    n:"Diavola",                 cat:"Pizza",     price:3290, tags:["spicy"]},
  {id:"prosciutto", n:"Prosciutto e Rucola",     cat:"Pizza",     price:3590, tags:[]},
  {id:"ortolana",   n:"Ortolana",                cat:"Pizza",     price:3090, tags:["veg"]},
  {id:"pizzaiolo",  n:"Pizza del Pizzaiolo",     cat:"Pizza",     price:4990, tags:["veg"],         role:"anchor", lto:true},
  {id:"tartufata",  n:"Tartufata Reale",         cat:"Pizza",     price:7990, tags:[],              role:"anchor", lto:true},
  {id:"personale",  n:'Margherita Personale 8"', cat:"Pizza",     price:1890, tags:["veg"]},
  {id:"slice",      n:"Slice (Margherita)",      cat:"Pizza",     price:1190, tags:["veg"]},
  {id:"carbonara",  n:"Spaghetti Carbonara",     cat:"Pasta",     price:2895, tags:[]},
  {id:"arrabbiata", n:"Penne Arrabbiata",        cat:"Pasta",     price:2390, tags:["vegan","spicy"]},
  {id:"pesto",      n:"Linguine al Pesto",       cat:"Pasta",     price:2695, tags:["veg"],         role:"profit"},
  {id:"bolognese",  n:"Tagliatelle Bolognese",   cat:"Pasta",     price:2995, tags:[]},
  {id:"bruschetta", n:"Bruschetta Classica",     cat:"Antipasti", price:1590, tags:["vegan"]},
  {id:"garlic",     n:"Garlic Bread",            cat:"Antipasti", price:990,  tags:["veg"],         role:"profit"},
  {id:"burrata",    n:"Burrata con Pomodorini",  cat:"Antipasti", price:2195, tags:["veg","gf"]},
  {id:"arancini",   n:"Arancini (3 pcs)",        cat:"Antipasti", price:1790, tags:[]},
  {id:"caprese",    n:"Panino Caprese",          cat:"Panini",    price:1990, tags:["veg"]},
  {id:"milano",     n:"Panino Milano",           cat:"Panini",    price:2290, tags:[]},
  {id:"espresso",   n:"Espresso",                cat:"Drinks",    price:990,  tags:["vegan","gf"],  role:"profit"},
  {id:"limonata",   n:"Limonata Fresca",         cat:"Drinks",    price:1190, tags:["vegan","gf"]},
  {id:"aranciata",  n:"Aranciata S.Pellegrino",  cat:"Drinks",    price:990,  tags:["vegan","gf"]},
  {id:"water",      n:"Acqua Minerale",          cat:"Drinks",    price:590,  tags:["vegan","gf"]},
  {id:"limonata1l", n:"Limonata 1L",             cat:"Drinks",    price:1990, tags:["vegan","gf"]},
  {id:"tiramisu",   n:"Tiramisù",                cat:"Desserts",  price:1800, tags:["veg"]},
  {id:"cannoli",    n:"Cannoli Siciliani (2)",   cat:"Desserts",  price:1600, tags:["veg"]},
  {id:"pannacotta", n:"Panna Cotta",             cat:"Desserts",  price:1500, tags:["veg","gf"],    role:"profit"},
];
const COMBOS = [
  {id:"lunch",  n:"Lunch Combo",    desc:"Any pizza + any drink",       off:300},
  {id:"trio",   n:"Pizzaiolo Trio", desc:"Pizza + espresso + tiramisù", off:400},
  {id:"family", n:"Family Pack",    desc:"2 pizzas + Limonata 1L",      off:800},
];
const PIZZA_MODS = [
  {g:"Crust", min:1, opts:[{n:"Neapolitan (standard)",d:0},{n:"48h sourdough",d:500},{n:"Gluten-free",d:500}]},
  {g:"Premium toppings", min:0, opts:[{n:"Buffalo mozzarella DOP",d:900},{n:"Extra cheese",d:600},{n:"Truffle oil",d:800},{n:"Prosciutto di Parma",d:1200}]},
];
// role badges: hero / profit (profit-driver) / anchor (lto = limited-time). tags: veg/vegan/spicy/gf
// Loyalty rule: 1 pt per 1 zł = Math.floor(totalGrosze/100)

/* ===== State ===== */
let activeCat = "Pizza";
let CHANNEL = "Takeout";
let ORDER = [];
let lineSeq = 1;
let tenderMode = null;      // null | "cash" | "card"
let cashEntered = 0;        // grosze entered on keypad
let cardState = "idle";     // idle | reading | approved
let cardTimer = null;

let member = { recognised:false, name:"Guest", phone:null, points:0 };
const SAMPLE_MEMBER = { recognised:true, name:"Giulia M.", phone:"•••  872", points:215 };

/* ===== Header controls ===== */
const CHAN_ICON = {
  Takeout:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2h12l-1 4H7L6 2Z"/><path d="M5 6h14l-1.2 14.5a1.5 1.5 0 0 1-1.5 1.5H7.7a1.5 1.5 0 0 1-1.5-1.5L5 6Z"/></svg>',
  Delivery:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3h13v11H1z"/><path d="M14 7h4l3 3v4h-7"/><circle cx="6" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg>',
  "Dine-in":'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3v8a3 3 0 0 0 6 0V3M8 11v10M16 3c-1.5 0-2 2-2 4s.5 4 2 4 2 0 2 0v10"/></svg>',
};
function buildLoc(){
  const wrap=document.getElementById("locGroup");wrap.innerHTML="";
  ["Kraków","Warszawa"].forEach(l=>{
    const b=document.createElement("button");
    b.className="seg"+(l===LOC?" active":"");b.type="button";b.textContent=l;
    b.onclick=()=>{LOC=l;buildLoc();};
    wrap.appendChild(b);
  });
}
function buildChan(){
  const wrap=document.getElementById("chanGroup");wrap.innerHTML="";
  ["Takeout","Delivery","Dine-in"].forEach(c=>{
    const b=document.createElement("button");
    b.className="seg"+(c===CHANNEL?" active":"");b.type="button";
    b.innerHTML=CHAN_ICON[c]+`<span>${c}</span>`;
    b.onclick=()=>{CHANNEL=c;buildChan();};
    wrap.appendChild(b);
  });
}

/* ===== Left rail (categories) ===== */
function catCount(cat){ return MENU.filter(m=>m.cat===cat).length; }
function buildRail(){
  const rail=document.getElementById("rail");rail.innerHTML="";
  const cap=document.createElement("div");cap.className="rail-cap";cap.textContent="Menu";rail.appendChild(cap);
  CATS.forEach(cat=>{
    const b=document.createElement("button");
    b.className="rail-btn"+(cat===activeCat?" active":"");b.type="button";
    b.innerHTML=`<span class="r-em">${CAT_EMOJI[cat]}</span><span class="r-l">${cat}</span><span class="r-ct tnum">${catCount(cat)}</span>`;
    b.onclick=()=>{activeCat=cat;buildRail();renderGrid();};
    rail.appendChild(b);
  });
}

/* ===== Center grid ===== */
function roleBadge(m){
  if(m.role==="hero") return `<span class="role-badge role-hero">Hero</span>`;
  if(m.role==="profit") return `<span class="role-badge role-profit">Profit</span>`;
  if(m.role==="anchor"&&m.lto) return `<span class="role-badge role-limited">Limited</span>`;
  return "";
}
function tagDots(m){
  if(!m.tags||!m.tags.length) return "";
  return `<span class="card-dots">`+m.tags.map(t=>`<i class="tagdot ${t}" title="${t}"></i>`).join("")+`</span>`;
}
function renderGrid(){
  document.getElementById("ctEm").textContent=CAT_EMOJI[activeCat];
  document.getElementById("ctTitle").textContent=activeCat;
  const items=MENU.filter(m=>m.cat===activeCat);
  document.getElementById("centerCount").textContent=items.length+" items";
  const grid=document.getElementById("grid");
  grid.innerHTML=items.map(m=>`
    <button class="card" type="button" data-id="${m.id}">
      ${roleBadge(m)}
      <div class="card-name">${m.n}</div>
      ${m.cat==="Pizza"?`<div class="pizza-hint">Tap to customize</div>`:""}
      <div class="card-bottom">
        <span class="card-price tnum">${fmtPLN(m.price)}</span>
        ${tagDots(m)}
      </div>
    </button>`).join("");
  grid.querySelectorAll(".card").forEach(c=>{ c.onclick=()=>onCardClick(c.dataset.id,c); });
}
function onCardClick(id,el){
  const m=MENU.find(x=>x.id===id);if(!m)return;
  if(m.cat==="Pizza"){ openModifiers(m); }
  else { addLine(m,[]); flash(el); }
}
function flash(el){ if(!el)return; el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash"); }

/* ===== Order lines ===== */
function modKey(id,mods){ return id+"|"+mods.map(x=>x.n).sort().join(","); }
function addLine(m,mods){
  const key=modKey(m.id,mods);
  const existing=ORDER.find(l=>l.key===key);
  if(existing){ existing.qty++; }
  else { ORDER.push({lkey:lineSeq++, key, id:m.id, n:m.n, base:m.price, mods:mods.slice(), qty:1}); }
  resetTenderEntry();
  renderOrder();
}
function lineUnit(l){ return l.base + l.mods.reduce((s,x)=>s+x.d,0); }
function lineTotal(l){ return lineUnit(l)*l.qty; }
function changeQty(lkey,delta){
  const l=ORDER.find(x=>x.lkey===lkey);if(!l)return;
  l.qty+=delta;
  if(l.qty<=0){ ORDER=ORDER.filter(x=>x.lkey!==lkey); }
  resetTenderEntry();
  renderOrder();
}

/* ===== Combo + totals ===== */
function hasCat(cat){ return ORDER.some(l=>{const m=MENU.find(x=>x.id===l.id);return m&&m.cat===cat;}); }
function activeCombo(){ if(hasCat("Pizza")&&hasCat("Drinks")) return COMBOS.find(c=>c.id==="lunch"); return null; }
function subtotal(){ return ORDER.reduce((s,l)=>s+lineTotal(l),0); }
function comboOff(){ const c=activeCombo(); return c?c.off:0; }
function grandTotal(){ return Math.max(0, subtotal()-comboOff()); }

/* ===== Customer ===== */
function renderCust(){
  const bar=document.getElementById("custBar");
  if(member.recognised){
    const initials=member.name.split(" ").map(s=>s[0]).join("").slice(0,2);
    bar.innerHTML=`
      <div class="cust-avatar">${initials}</div>
      <div class="cust-info">
        <div class="cust-name">${member.name} <span style="font-weight:400;color:var(--faint);font-size:11px">· ${member.phone}</span></div>
        <div class="cust-sub">Member · <b>${member.points}</b> pts</div>
      </div>
      <button class="cust-action" id="custToggle" type="button">Remove</button>`;
  } else {
    bar.innerHTML=`
      <div class="cust-avatar" style="background:var(--neutral);color:var(--faint)">G</div>
      <div class="cust-info">
        <div class="cust-name">Guest</div>
        <div class="cust-sub">No loyalty attached</div>
      </div>
      <button class="cust-action" id="custToggle" type="button">+ phone</button>`;
  }
  document.getElementById("custToggle").onclick=()=>{
    member = member.recognised ? {recognised:false,name:"Guest",phone:null,points:0} : {...SAMPLE_MEMBER};
    renderCust(); renderTotals();
  };
}

/* ===== Order render ===== */
function renderOrder(){
  const lines=document.getElementById("lines");
  if(ORDER.length===0){
    lines.innerHTML=`<div class="empty-cart">
      <div class="ec-em">🧾</div><div class="ec-t">No items yet</div>
      <div class="ec-s">Tap a product to ring it up</div></div>`;
  } else {
    lines.innerHTML=ORDER.map(l=>{
      const modsTxt=l.mods.length
        ? `<div class="line-mods">`+l.mods.map(x=>`${x.n}${x.d?` <span class="mp">+${fmtPLN(x.d)}</span>`:""}`).join(" · ")+`</div>`
        : "";
      return `<div class="line" data-lkey="${l.lkey}">
        <div class="line-main">
          <div class="line-name">${l.n}</div>${modsTxt}
          <div class="line-unit tnum">${fmtPLN(lineUnit(l))} ea</div>
        </div>
        <div class="line-right">
          <span class="line-price tnum">${fmtPLN(lineTotal(l))}</span>
          <div class="stepper">
            <button class="step-btn minus" type="button" data-act="minus" aria-label="Decrease">−</button>
            <span class="step-qty tnum">${l.qty}</span>
            <button class="step-btn plus" type="button" data-act="plus" aria-label="Increase">+</button>
          </div>
        </div>
      </div>`;
    }).join("");
    lines.querySelectorAll(".line").forEach(row=>{
      const lkey=parseInt(row.dataset.lkey,10);
      row.querySelector('[data-act="minus"]').onclick=()=>changeQty(lkey,-1);
      row.querySelector('[data-act="plus"]').onclick=()=>changeQty(lkey,1);
    });
  }
  renderTotals();
  renderTender();
}
function renderTotals(){
  const t=document.getElementById("totals");
  const sub=subtotal(), off=comboOff(), grand=grandTotal();
  const combo=activeCombo();
  const pts=member.recognised ? Math.floor(grand/100) : 0;
  let html=`<div class="trow"><span class="tl">Subtotal</span><span class="tv tnum">${fmtPLN(sub)}</span></div>`;
  if(combo){ html+=`<div class="trow combo"><span class="tl combo-name">✓ ${combo.n}</span><span class="tv tnum">−${fmtPLN(off)}</span></div>`; }
  html+=`<div class="trow grand"><span class="tl">Total</span><span class="tv tnum">${fmtPLN(grand)}</span></div>`;
  if(member.recognised && grand>0){ html+=`<div class="pts-hint">Earns <b>${pts}</b> pts · ${member.name}</div>`; }
  t.innerHTML=html;
}

/* ===== Tender (keypad / card) ===== */
function resetTenderEntry(){ tenderMode=null; cashEntered=0; cardState="idle"; if(cardTimer){clearTimeout(cardTimer);cardTimer=null;} }
function changeDue(){ return cashEntered - grandTotal(); }
function canPay(){
  if(grandTotal()<=0) return false;
  if(tenderMode==="cash") return cashEntered>=grandTotal();
  if(tenderMode==="card") return cardState==="approved";
  return false;
}
function renderTender(){
  const el=document.getElementById("tender");
  const grand=grandTotal();
  if(grand<=0){
    el.innerHTML=`<div class="tender-hint">Ring up items, then choose<br>Cash or Card to take payment.</div>`;
    return;
  }
  const cashActive=tenderMode==="cash", cardActive=tenderMode==="card";
  let html=`
    <div class="tender-tabs">
      <button class="tender-tab ${cashActive?"active":""}" type="button" data-tm="cash"><span class="tt-em">💵</span>Cash</button>
      <button class="tender-tab ${cardActive?"active":""}" type="button" data-tm="card"><span class="tt-em">💳</span>Card</button>
    </div>`;

  if(tenderMode==="cash"){
    const due=changeDue();
    const short=due<0;
    html+=`
      <div class="tender-readout">
        <div class="ro-cell"><div class="rl">Tendered</div><div class="rv tnum">${fmtPLN(cashEntered)}</div></div>
        <div class="ro-cell change ${short?"short":""}"><div class="rl">${short?"Still due":"Change"}</div><div class="rv tnum">${fmtPLN(Math.abs(due))}</div></div>
      </div>
      <div class="quick-cash">
        ${[2000,5000,10000,20000].map(v=>`<button class="qc-btn" type="button" data-cash="${v}">${(v/100)} zł</button>`).join("")}
      </div>
      <div class="keypad">
        ${["1","2","3","4","5","6","7","8","9","00","0","del"].map(k=>
          `<button class="kp-btn ${k==="del"?"del":""}" type="button" data-key="${k}">${k==="del"?"⌫":k}</button>`).join("")}
      </div>`;
  } else if(tenderMode==="card"){
    if(cardState==="reading"){
      html+=`<div class="card-flow"><div class="card-status">
        <div class="cs-em">💳</div>
        <div class="cs-t">Insert / tap card…</div>
        <div class="reader-dots"><span></span><span></span><span></span></div>
        <div class="cs-s">Contacting payment terminal</div>
      </div></div>`;
    } else if(cardState==="approved"){
      html+=`<div class="card-flow"><div class="card-status approved">
        <div class="cs-em">✓</div>
        <div class="cs-t">Approved</div>
        <div class="cs-s">Stripe terminal · ${fmtPLN(grand)}</div>
      </div></div>`;
    }
  } else {
    html+=`<div class="tender-hint">Select <b style="color:var(--ink2)">Cash</b> for the keypad, or<br><b style="color:var(--ink2)">Card</b> to run the terminal.</div>`;
  }

  // Pay button
  const payLabel = tenderMode==="cash" ? "Tender cash" : tenderMode==="card" ? "Finish sale" : "Take payment";
  html+=`<button class="pay-btn" id="payBtn" type="button" ${canPay()?"":"disabled"}>
    <span>${payLabel}</span><span class="pb-amt tnum">${fmtPLN(grand)}</span></button>`;

  el.innerHTML=html;

  // wire
  el.querySelectorAll(".tender-tab").forEach(b=>{
    b.onclick=()=>selectTender(b.dataset.tm);
  });
  el.querySelectorAll(".kp-btn").forEach(b=>{ b.onclick=()=>pressKey(b.dataset.key); });
  el.querySelectorAll(".qc-btn").forEach(b=>{ b.onclick=()=>{ cashEntered+=parseInt(b.dataset.cash,10); renderTender(); }; });
  const pay=el.querySelector("#payBtn");
  if(pay) pay.onclick=()=>{ if(canPay()) showReceipt(); };
}
function selectTender(mode){
  if(tenderMode===mode){ // toggle off
    resetTenderEntry();
    renderTender();
    return;
  }
  tenderMode=mode;
  cashEntered=0;
  cardState="idle";
  if(mode==="card"){
    cardState="reading";
    renderTender();
    cardTimer=setTimeout(()=>{ cardState="approved"; renderTender(); }, 1800);
    return;
  }
  renderTender();
}
function pressKey(k){
  if(k==="del"){ cashEntered=Math.floor(cashEntered/10); renderTender(); return; }
  const add = k==="00" ? "00" : k;
  // append digits as grosze (treating entry as a running integer of grosze)
  let str=String(cashEntered)+add;
  if(str.length>9) str=str.slice(0,9);
  cashEntered=parseInt(str,10)||0;
  renderTender();
}

/* ===== Receipt ===== */
function showReceipt(){
  const grand=grandTotal();
  const pts=member.recognised?Math.floor(grand/100):0;
  document.getElementById("receiptAmt").textContent=fmtPLN(grand);
  const method = tenderMode==="cash" ? "Cash" : "Card";
  let rows=`
    <div class="rline"><span>Method</span><span class="rv">${method}</span></div>
    <div class="rline"><span>Location · Channel</span><span class="rv">${LOC} · ${CHANNEL}</span></div>`;
  if(tenderMode==="cash"){
    rows+=`<div class="rline"><span>Tendered</span><span class="rv tnum">${fmtPLN(cashEntered)}</span></div>
           <div class="rline"><span>Change due</span><span class="rv tnum">${fmtPLN(Math.max(0,changeDue()))}</span></div>`;
  } else {
    rows+=`<div class="rline"><span>Auth</span><span class="rv">Approved ✓</span></div>`;
  }
  if(member.recognised){
    rows+=`<div class="rline pts"><span>Points earned</span><span class="rv tnum">+${pts} → ${member.points+pts}</span></div>`;
  }
  document.getElementById("receiptBody").innerHTML=rows;
  document.getElementById("receiptOverlay").classList.add("open");

  document.getElementById("newSaleBtn").onclick=()=>{
    if(member.recognised) member.points+=pts;
    ORDER=[];
    resetTenderEntry();
    document.getElementById("receiptOverlay").classList.remove("open");
    renderCust();
    renderOrder();
  };
}

/* ===== Modifier modal ===== */
let modCtx=null;
function openModifiers(m){
  modCtx={ m, sel:PIZZA_MODS.map(g=>{ const s=new Set(); if(g.min>=1) s.add(0); return s; }) };
  document.getElementById("modTitle").textContent=m.n;
  document.getElementById("modSub").textContent=`Base ${fmtPLN(m.price)} · choose options`;
  renderModBody();
  document.getElementById("modOverlay").classList.add("open");
}
function renderModBody(){
  const body=document.getElementById("modBody");
  body.innerHTML=PIZZA_MODS.map((g,gi)=>{
    const isRadio=g.min>=1;
    const opts=g.opts.map((o,oi)=>{
      const on=modCtx.sel[gi].has(oi);
      const delta=o.d===0?`<span class="mod-delta free">incl.</span>`:`<span class="mod-delta">+${fmtPLN(o.d)}</span>`;
      return `<div class="mod-opt ${isRadio?"radio":""} ${on?"active":""}" data-gi="${gi}" data-oi="${oi}">
        <span class="mod-mark">✓</span><span class="mod-name">${o.n}</span>${delta}</div>`;
    }).join("");
    return `<div class="mod-group"><div class="mod-glabel">${g.g}${isRadio?`<span class="mod-req">Required</span>`:""}</div>${opts}</div>`;
  }).join("");
  body.querySelectorAll(".mod-opt").forEach(el=>{
    el.onclick=()=>{
      const gi=+el.dataset.gi, oi=+el.dataset.oi, g=PIZZA_MODS[gi];
      if(g.min>=1){ modCtx.sel[gi]=new Set([oi]); }
      else { modCtx.sel[gi].has(oi)?modCtx.sel[gi].delete(oi):modCtx.sel[gi].add(oi); }
      renderModBody();
    };
  });
  updateModAmt();
}
function selectedMods(){
  const list=[];
  PIZZA_MODS.forEach((g,gi)=>{ [...modCtx.sel[gi]].forEach(oi=>{ list.push({n:g.opts[oi].n, d:g.opts[oi].d}); }); });
  return list;
}
function updateModAmt(){
  const total=modCtx.m.price + selectedMods().reduce((s,x)=>s+x.d,0);
  document.getElementById("modAmt").textContent=fmtPLN(total);
}
document.getElementById("modAdd").onclick=()=>{
  const mods=selectedMods().filter(x=>x.d!==0);
  addLine(modCtx.m, mods);
  document.getElementById("modOverlay").classList.remove("open");
};
document.getElementById("modClose").onclick=()=>document.getElementById("modOverlay").classList.remove("open");
document.getElementById("modOverlay").onclick=e=>{ if(e.target.id==="modOverlay") e.currentTarget.classList.remove("open"); };

/* ===== Fullscreen ===== */
function syncFullscreen(){ document.documentElement.classList.toggle("is-fullscreen", !!document.fullscreenElement); }
function toggleFullscreen(){
  const root=document.documentElement;
  if(!document.fullscreenElement){
    const req=root.requestFullscreen && root.requestFullscreen();
    if(req&&req.catch){ req.catch(()=>{root.classList.add("is-fullscreen");}); }
    else if(!req){ root.classList.toggle("is-fullscreen"); }
  } else {
    const exit=document.exitFullscreen && document.exitFullscreen();
    if(exit&&exit.catch){ exit.catch(()=>{}); }
    root.classList.remove("is-fullscreen");
  }
}
document.getElementById("fsBtn").addEventListener("click", toggleFullscreen);
document.addEventListener("fullscreenchange", syncFullscreen);

/* ===== Clock ===== */
function clockTick(){
  const d=new Date();const p=n=>String(n).padStart(2,"0");
  document.getElementById("clock").textContent=p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds());
  document.getElementById("date").textContent=d.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"});
}

/* ===== Keyboard ===== */
document.addEventListener("keydown",e=>{
  const modOpen=document.getElementById("modOverlay").classList.contains("open");
  const recOpen=document.getElementById("receiptOverlay").classList.contains("open");
  if(e.key==="Escape"){
    document.getElementById("modOverlay").classList.remove("open");
    document.getElementById("receiptOverlay").classList.remove("open");
    return;
  }
  if(modOpen||recOpen) return;
  if(e.key.toLowerCase()==="f"){ toggleFullscreen(); return; }
  // category 1-6
  if(/^[1-6]$/.test(e.key) && tenderMode!=="cash"){
    activeCat=CATS[parseInt(e.key,10)-1]; buildRail(); renderGrid(); return;
  }
  // keypad when in cash mode
  if(tenderMode==="cash"){
    if(/^[0-9]$/.test(e.key)){ pressKey(e.key); return; }
    if(e.key==="Backspace"){ pressKey("del"); return; }
    if(e.key==="Enter"){ if(canPay()) showReceipt(); return; }
  }
});

/* ===== Init ===== */
buildLoc();
buildChan();
buildRail();
renderGrid();
renderCust();
renderOrder();
clockTick();
setInterval(clockTick,1000);
</script>
