<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sud Italia POS — Tiles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap">
<style>
  :root{
    --bg:#0b0c0e;
    --surface:#141518;
    --panel:#16181c;
    --raised:#1c1f25;
    --border:rgba(255,255,255,0.09);
    --border-strong:rgba(255,255,255,0.18);
    --fg:#ededf0;
    --fg-muted:#9aa0a8;
    --fg-dim:#6b7178;
    --accent:#e0a458;
    --accent-soft:rgba(224,164,88,0.14);
    --accent-strong:rgba(224,164,88,0.5);
    --ready:#4ecb8d;
    --ready-soft:rgba(78,203,141,0.14);
    --danger:#ff5d5d;
    --danger-soft:rgba(255,93,93,0.14);
    --risk:#8b5cf6;
    --risk-soft:rgba(139,92,246,0.16);
    --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:28px;
    --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Monaco,"Cascadia Code",monospace;
    --sans:"Inter",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    /* category accent hues */
    --c-Pizza:#e0a458;
    --c-Pasta:#e8b84d;
    --c-Antipasti:#9ccc65;
    --c-Panini:#f0876b;
    --c-Drinks:#5fb3e0;
    --c-Desserts:#d98bc9;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(224,164,88,0.06), transparent 60%),
      var(--bg);
    color:var(--fg);
    font-family:var(--sans);
    font-size:13px;
    line-height:1.4;
    -webkit-font-smoothing:antialiased;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

  /* ---------- Header ---------- */
  header{
    flex:0 0 auto;
    display:flex;align-items:center;gap:var(--s4);
    height:58px;padding:0 var(--s6);
    background:var(--panel);
    border-bottom:1px solid var(--border);
  }
  .brand{display:flex;align-items:baseline;gap:var(--s3);min-width:max-content}
  .wordmark{font-weight:700;font-size:15px;letter-spacing:0.2em;color:var(--fg)}
  .kd-label{
    font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);
    border-left:1px solid var(--border);padding-left:var(--s3);font-weight:600;
  }
  .design-tag{
    font-family:var(--mono);font-size:11px;letter-spacing:0.06em;color:var(--fg-muted);
    padding:4px 9px;border:1px solid var(--border);border-radius:6px;white-space:nowrap;
  }
  .seg{
    display:flex;align-items:stretch;border:1px solid var(--border);border-radius:9px;
    overflow:hidden;background:var(--surface);
  }
  .seg button{
    appearance:none;border:0;background:transparent;cursor:pointer;
    font-family:var(--sans);font-size:12px;letter-spacing:0.01em;color:var(--fg-muted);
    padding:8px 13px;display:inline-flex;align-items:center;gap:6px;transition:all .14s ease;
    border-right:1px solid var(--border);white-space:nowrap;font-weight:500;
  }
  .seg button:last-child{border-right:0}
  .seg button:hover{color:var(--fg)}
  .seg button[aria-pressed="true"]{background:var(--accent);color:#1c1206;font-weight:700}
  .spacer{margin-left:auto}
  .fsbtn{
    appearance:none;cursor:pointer;border:1px solid var(--border);background:transparent;
    color:var(--fg-muted);font-family:var(--sans);font-size:11px;letter-spacing:0.02em;
    padding:8px 12px;border-radius:8px;display:inline-flex;align-items:center;gap:6px;
    transition:all .14s ease;white-space:nowrap;
  }
  .fsbtn:hover{color:var(--fg);border-color:var(--border-strong)}
  .fsbtn svg{width:14px;height:14px;display:block}
  .fsbtn .fs-on{display:none}
  .is-fullscreen .fsbtn .fs-on{display:inline}
  .is-fullscreen .fsbtn .fs-off{display:none}
  .gallery-link{
    font-size:11px;color:var(--fg-dim);text-decoration:none;border:1px solid var(--border);
    padding:7px 11px;border-radius:8px;transition:all .14s ease;white-space:nowrap;
  }
  .gallery-link:hover{color:var(--fg);border-color:var(--border-strong)}
  .clock{
    font-family:var(--mono);font-size:15px;letter-spacing:0.04em;color:var(--fg);
    min-width:80px;text-align:right;
  }

  /* ---------- Layout: tiles + order dock ---------- */
  .stage{flex:1 1 auto;min-height:0;display:grid;grid-template-columns:1fr 408px;gap:0}
  .menu-side{display:flex;flex-direction:column;min-height:0;min-width:0;border-right:1px solid var(--border)}

  /* ----- Category pills ----- */
  .cats{
    flex:0 0 auto;display:flex;gap:var(--s3);align-items:center;
    padding:var(--s4) var(--s6);overflow-x:auto;background:var(--panel);border-bottom:1px solid var(--border);
    scrollbar-width:none;
  }
  .cats::-webkit-scrollbar{display:none}
  .catpill{
    appearance:none;cursor:pointer;border:1px solid var(--border);background:var(--surface);
    color:var(--fg-muted);border-radius:999px;padding:11px 18px;display:inline-flex;align-items:center;gap:9px;
    font-family:var(--sans);font-size:14px;font-weight:600;white-space:nowrap;transition:all .14s ease;flex:0 0 auto;
  }
  .catpill:hover{border-color:var(--border-strong);color:var(--fg)}
  .catpill .emoji{font-size:18px;line-height:1}
  .catpill .cp-count{
    font-family:var(--mono);font-size:11px;font-weight:600;color:var(--fg-dim);
    background:rgba(255,255,255,0.06);border-radius:999px;padding:1px 8px;min-width:20px;text-align:center;
  }
  .catpill[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:#1c1206}
  .catpill[aria-pressed="true"] .cp-count{background:rgba(28,18,6,0.22);color:#1c1206}

  /* ----- Tile grid ----- */
  .tiles{
    flex:1 1 auto;overflow-y:auto;min-height:0;padding:var(--s5) var(--s6);
    display:grid;grid-template-columns:repeat(auto-fill,minmax(186px,1fr));gap:var(--s4);align-content:start;
  }
  .tiles::-webkit-scrollbar{width:9px}
  .tiles::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:5px}
  .tiles::-webkit-scrollbar-track{background:transparent}

  .tile{
    position:relative;appearance:none;cursor:pointer;text-align:left;
    background:var(--raised);border:1px solid var(--border);border-radius:16px;overflow:hidden;
    padding:0;display:flex;flex-direction:column;min-height:168px;
    transition:transform .12s ease,border-color .14s ease,box-shadow .14s ease;
    font-family:var(--sans);color:var(--fg);
  }
  .tile:hover{border-color:var(--border-strong);transform:translateY(-2px);box-shadow:0 10px 26px rgba(0,0,0,0.4)}
  .tile:active{transform:translateY(0) scale(0.97)}
  .tile.pop{animation:pop .32s cubic-bezier(.2,1.4,.5,1)}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.05)}100%{transform:scale(1)}}
  .tile .band{height:6px;flex:0 0 auto;background:var(--tcol,var(--accent))}
  .tile .glyph{
    flex:1 1 auto;display:flex;align-items:center;justify-content:center;font-size:54px;line-height:1;
    background:radial-gradient(120px 80px at 50% 38%, color-mix(in srgb, var(--tcol,var(--accent)) 16%, transparent), transparent 70%);
    filter:saturate(1.05);
  }
  .tile .body{flex:0 0 auto;padding:var(--s3) var(--s4) var(--s4)}
  .tile .t-name{font-size:14.5px;font-weight:600;line-height:1.25;color:var(--fg);margin-bottom:6px;min-height:2.5em;display:flex;align-items:flex-start}
  .tile .t-foot{display:flex;align-items:center;justify-content:space-between;gap:var(--s2)}
  .tile .t-price{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--fg);letter-spacing:-0.01em}
  .tile .add-dot{
    width:30px;height:30px;border-radius:50%;background:var(--accent-soft);border:1px solid var(--accent-strong);
    color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex:0 0 auto;
    transition:all .14s ease;
  }
  .tile:hover .add-dot{background:var(--accent);color:#1c1206}
  /* in-order count chip */
  .tile .qbadge{
    position:absolute;top:14px;right:12px;min-width:26px;height:26px;padding:0 7px;border-radius:13px;
    background:var(--accent);color:#1c1206;font-family:var(--mono);font-size:13px;font-weight:700;
    display:none;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(224,164,88,0.4);z-index:2;
  }
  .tile.has-qty .qbadge{display:flex}
  .tile.has-qty{border-color:var(--accent-strong);box-shadow:0 0 0 1px var(--accent-strong)}
  /* role / lto badges */
  .tile .rolebadge{
    position:absolute;top:14px;left:12px;display:inline-flex;align-items:center;gap:4px;
    font-size:10px;font-weight:700;letter-spacing:0.04em;padding:3px 8px;border-radius:8px;z-index:2;
    backdrop-filter:blur(2px);
  }
  .rolebadge.anchor{color:var(--risk);background:var(--risk-soft);border:1px solid rgba(139,92,246,0.5)}
  .rolebadge.profit{color:var(--ready);background:var(--ready-soft);border:1px solid rgba(78,203,141,0.5)}
  .rolebadge.hero{color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-strong)}
  .tile .ltochip{
    position:absolute;bottom:74px;left:12px;font-size:9px;font-weight:800;letter-spacing:0.12em;
    color:#1c1206;background:linear-gradient(90deg,#f0876b,#e0a458);border-radius:6px;padding:3px 8px;z-index:2;
    box-shadow:0 3px 10px rgba(240,135,107,0.4);
  }
  .tile .tags{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
  .tile .tag{font-size:9px;letter-spacing:0.04em;color:var(--fg-dim);text-transform:uppercase;border:1px solid var(--border);border-radius:5px;padding:1px 6px}
  .tag.spicy{color:var(--danger);border-color:rgba(255,93,93,0.4)}
  .tag.veg,.tag.vegan{color:var(--ready);border-color:rgba(78,203,141,0.35)}
  .tag.gf{color:var(--accent);border-color:var(--accent-strong)}

  /* ----- Order dock ----- */
  .dock{background:var(--panel);display:flex;flex-direction:column;min-height:0;min-width:0}
  .dock-head{
    flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:var(--s2);
    padding:var(--s5) var(--s5) var(--s4);border-bottom:1px solid var(--border);
  }
  .dock-head .dh-title{font-size:15px;font-weight:700;letter-spacing:0.02em;display:flex;align-items:center;gap:9px}
  .dock-head .dh-title svg{width:18px;height:18px;color:var(--accent)}
  .dock-head .dh-id{font-family:var(--mono);font-size:12px;color:var(--fg-dim)}
  .dock-meta{
    flex:0 0 auto;padding:var(--s2) var(--s5);border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:var(--s2);font-size:11px;color:var(--fg-muted);
  }
  .dock-meta .mchip{padding:2px 9px;border:1px solid var(--border);border-radius:999px;letter-spacing:0.02em}
  .dock-meta .grow{margin-left:auto;font-family:var(--mono);color:var(--fg-dim)}

  .dock-body{flex:1 1 auto;overflow-y:auto;min-height:0;padding:var(--s3) var(--s4)}
  .dock-body::-webkit-scrollbar{width:9px}
  .dock-body::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:5px}
  .dock-empty{
    margin:var(--s5) var(--s2);padding:var(--s6) var(--s4);text-align:center;color:var(--fg-dim);
    border:1px dashed var(--border);border-radius:14px;line-height:1.8;
  }
  .dock-empty .big{font-size:34px;display:block;margin-bottom:10px;opacity:.7}

  .oline{
    display:flex;align-items:center;gap:var(--s3);padding:var(--s3);border-radius:12px;margin-bottom:var(--s2);
    background:var(--surface);border:1px solid var(--border);transition:background .1s ease;
  }
  .oline.pop{animation:pop .3s cubic-bezier(.2,1.4,.5,1)}
  .oline .ol-glyph{font-size:24px;flex:0 0 auto;width:34px;text-align:center}
  .oline .ol-mid{flex:1 1 auto;min-width:0}
  .oline .ol-nm{font-size:13.5px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .oline .ol-each{font-family:var(--mono);font-size:11px;color:var(--fg-dim);margin-top:2px}
  .oline .ol-right{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex:0 0 auto}
  .oline .ol-line{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--fg)}
  .stepper{display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:9px;overflow:hidden;background:var(--bg)}
  .stepper button{
    appearance:none;border:0;background:transparent;cursor:pointer;color:var(--fg-muted);
    font-family:var(--mono);font-size:18px;width:34px;height:34px;transition:all .1s ease;
  }
  .stepper button:hover{background:var(--accent-soft);color:var(--accent)}
  .stepper button:active{transform:scale(0.9)}
  .stepper .q{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--fg);min-width:30px;text-align:center}

  .ocombo{
    display:flex;align-items:center;gap:9px;padding:var(--s3);border-radius:12px;margin-bottom:var(--s2);
    background:var(--ready-soft);border:1px solid rgba(78,203,141,0.4);
  }
  .ocombo .oc-ico{font-size:18px;flex:0 0 auto}
  .ocombo .oc-mid{flex:1 1 auto;min-width:0}
  .ocombo .oc-nm{font-size:12.5px;font-weight:700;color:var(--ready)}
  .ocombo .oc-desc{font-size:10.5px;color:var(--fg-muted);margin-top:1px}
  .ocombo .oc-off{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--ready);flex:0 0 auto}

  /* ----- Dock footer / totals / charge ----- */
  .dock-foot{flex:0 0 auto;border-top:1px solid var(--border);background:var(--surface);padding:var(--s4) var(--s5) var(--s5)}
  .totals{display:flex;flex-direction:column;gap:8px;margin-bottom:var(--s4)}
  .tline{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--fg-muted)}
  .tline .tv{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .tline.disc{color:var(--ready)} .tline.disc .tv{color:var(--ready)}
  .tline.grand{
    margin-top:6px;padding-top:var(--s3);border-top:1px solid var(--border);align-items:baseline;
    font-size:14px;color:var(--fg);
  }
  .tline.grand .tlab{font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg-muted);font-weight:600}
  .tline.grand .tv{font-size:30px;font-weight:700;letter-spacing:-0.02em;color:var(--fg)}
  .charge-row{display:flex;gap:var(--s2)}
  .btn-charge{
    flex:1 1 auto;appearance:none;cursor:pointer;border:0;
    background:linear-gradient(180deg,#ecb56a,#e0a458);color:#1c1206;
    font-family:var(--sans);font-size:17px;font-weight:800;letter-spacing:0.02em;
    border-radius:14px;padding:18px;transition:all .14s ease;display:flex;align-items:center;justify-content:center;gap:10px;
    box-shadow:0 8px 22px rgba(224,164,88,0.32);
  }
  .btn-charge:hover{filter:brightness(1.06)}
  .btn-charge:active{transform:scale(0.98)}
  .btn-charge:disabled{opacity:.35;cursor:not-allowed;filter:grayscale(.4);box-shadow:none}
  .btn-charge .ch-amt{font-family:var(--mono)}
  .btn-clear{
    appearance:none;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--fg-muted);
    font-family:var(--sans);font-size:13px;border-radius:14px;padding:0 18px;transition:all .14s ease;
  }
  .btn-clear:hover{border-color:var(--danger);color:var(--danger)}

  /* ---------- Footer legend ---------- */
  footer{
    flex:0 0 auto;display:flex;align-items:center;gap:var(--s5);flex-wrap:wrap;
    padding:9px var(--s6);background:var(--panel);border-top:1px solid var(--border);
  }
  footer .lg{display:inline-flex;align-items:center;gap:7px;font-size:11px;color:var(--fg-muted);letter-spacing:0.02em}
  footer .lg .sw{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
  footer .lg .rb{font-size:9px;font-weight:800;letter-spacing:0.06em;padding:1px 6px;border-radius:5px}
  footer .fsep{width:1px;height:14px;background:var(--border)}
  footer .fmeta{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--fg-dim);letter-spacing:0.03em}

  /* ---------- Tender sheet ---------- */
  .overlay{
    position:fixed;inset:0;z-index:100;display:none;align-items:flex-end;justify-content:center;
    background:rgba(6,6,8,0.7);backdrop-filter:blur(4px);
  }
  .overlay.open{display:flex;animation:fade .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{
    width:560px;max-width:calc(100vw - 24px);margin-bottom:max(env(safe-area-inset-bottom),0px);
    background:var(--panel);border:1px solid var(--border-strong);border-bottom:0;
    border-radius:22px 22px 0 0;overflow:hidden;box-shadow:0 -20px 60px rgba(0,0,0,0.5);
    animation:rise .26s cubic-bezier(.2,.9,.3,1);
  }
  .overlay.open .sheet{animation:rise .26s cubic-bezier(.2,.9,.3,1)}
  @keyframes rise{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
  .sheet-grip{width:44px;height:5px;border-radius:3px;background:var(--border-strong);margin:12px auto 0}
  .sheet-head{padding:var(--s4) var(--s6) var(--s5);display:flex;align-items:flex-end;justify-content:space-between;gap:var(--s3)}
  .sheet-head .sh-lab{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-dim)}
  .sheet-head .sh-amt{font-family:var(--mono);font-size:40px;font-weight:800;color:var(--fg);line-height:1;margin-top:7px}
  .sheet-close{
    appearance:none;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--fg-muted);
    width:38px;height:38px;border-radius:11px;font-size:18px;transition:all .14s ease;flex:0 0 auto;
  }
  .sheet-close:hover{border-color:var(--danger);color:var(--danger)}
  .sheet-body{padding:0 var(--s6) var(--s6);display:flex;flex-direction:column;gap:var(--s4)}
  .pay-methods{display:grid;grid-template-columns:1fr 1fr;gap:var(--s4)}
  .pm{
    appearance:none;cursor:pointer;border:1px solid var(--border-strong);background:var(--surface);color:var(--fg);
    border-radius:16px;padding:var(--s6) var(--s4);display:flex;flex-direction:column;align-items:center;gap:12px;
    transition:all .14s ease;
  }
  .pm:hover{border-color:var(--accent);background:var(--accent-soft);transform:translateY(-2px)}
  .pm:active{transform:scale(0.97)}
  .pm svg{width:40px;height:40px;color:var(--fg-muted)}
  .pm:hover svg{color:var(--accent)}
  .pm .pm-lab{font-size:18px;font-weight:700}
  .pm .pm-hint{font-size:11px;color:var(--fg-dim)}
  .sheet-note{text-align:center;font-size:11.5px;color:var(--fg-dim);letter-spacing:0.02em}

  /* paid state */
  .paid{display:none;flex-direction:column;align-items:center;gap:var(--s4);padding:var(--s6) var(--s6) calc(var(--s6) + 8px);text-align:center}
  .sheet.is-paid .sheet-body,.sheet.is-paid .sheet-head{display:none}
  .sheet.is-paid .paid{display:flex}
  .paid .check{
    width:88px;height:88px;border-radius:50%;background:var(--ready-soft);border:2px solid var(--ready);
    display:flex;align-items:center;justify-content:center;animation:pop .4s cubic-bezier(.2,1.4,.5,1);
  }
  .paid .check svg{width:46px;height:46px;color:var(--ready)}
  .paid .paid-title{font-size:26px;font-weight:800;color:var(--ready);letter-spacing:0.02em}
  .paid .paid-sub{font-size:13px;color:var(--fg-muted);line-height:1.8}
  .paid .paid-sub b{color:var(--fg);font-family:var(--mono)}
  .btn-new{
    appearance:none;cursor:pointer;border:0;background:linear-gradient(180deg,#ecb56a,#e0a458);color:#1c1206;
    font-family:var(--sans);font-size:16px;font-weight:800;letter-spacing:0.02em;border-radius:14px;
    padding:16px 34px;margin-top:var(--s2);transition:all .14s ease;box-shadow:0 8px 22px rgba(224,164,88,0.32);
  }
  .btn-new:hover{filter:brightness(1.06)}
  .btn-new:active{transform:scale(0.98)}

  /* ---------- Fullscreen tweaks ---------- */
  .is-fullscreen header{height:50px}
  .is-fullscreen .kd-label,.is-fullscreen .gallery-link{display:none}
  .is-fullscreen .tline.grand .tv{font-size:32px}

  /* ---------- Responsive ---------- */
  @media (max-width:980px){
    .stage{grid-template-columns:1fr}
    .dock{display:none}
  }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="wordmark">SUD ITALIA</span>
      <span class="kd-label">Point of Sale</span>
    </div>
    <span class="design-tag">04 · Tiles</span>
    <div class="seg" id="locSeg" role="group" aria-label="Location"></div>
    <div class="seg" id="chanSeg" role="group" aria-label="Channel"></div>
    <div class="spacer"></div>
    <button class="fsbtn" id="fsbtn" type="button" aria-pressed="false" aria-label="Toggle fullscreen">
      <svg class="fs-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M21 16v3a2 2 0 0 1-2 2h-3"/></svg>
      <svg class="fs-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>
      <span class="fs-off">Fullscreen</span><span class="fs-on">Exit</span>
    </button>
    <a class="gallery-link" href="index.html">&larr; Gallery</a>
    <div class="clock tnum" id="clock">--:--:--</div>
  </header>

  <div class="stage">
    <section class="menu-side">
      <div class="cats" id="cats" role="group" aria-label="Category"></div>
      <div class="tiles" id="tiles"></div>
    </section>

    <aside class="dock">
      <div class="dock-head">
        <span class="dh-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          Order
        </span>
        <span class="dh-id mono" id="dockId">#———————</span>
      </div>
      <div class="dock-meta">
        <span class="mchip" id="metaLoc">Kraków</span>
        <span class="mchip" id="metaChan">Takeout</span>
        <span class="grow" id="metaCount">0 items</span>
      </div>
      <div class="dock-body" id="dockBody"></div>
      <div class="dock-foot">
        <div class="totals" id="totals"></div>
        <div class="charge-row">
          <button class="btn-charge" id="btnCharge" type="button" disabled>
            CHARGE <span class="ch-amt" id="chargeAmt">0,00 zł</span>
          </button>
          <button class="btn-clear" id="btnClear" type="button" title="Clear order">Clear</button>
        </div>
      </div>
    </aside>
  </div>

  <footer>
    <span class="lg"><span class="rb anchor" style="color:var(--risk);background:var(--risk-soft)">&#10022; Signature</span></span>
    <span class="lg"><span class="rb profit" style="color:var(--ready);background:var(--ready-soft)">&#9670; Profit</span></span>
    <span class="lg"><span class="rb" style="color:#1c1206;background:linear-gradient(90deg,#f0876b,#e0a458)">LIMITED</span></span>
    <span class="fsep"></span>
    <span class="lg"><span class="sw" style="background:var(--accent)"></span>Tap a tile to add</span>
    <span class="lg">&minus;/+ steppers adjust qty</span>
    <span class="lg">Combo discounts auto-apply</span>
    <span class="fmeta" id="footMeta"></span>
  </footer>

  <!-- Tender sheet -->
  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Payment">
      <div class="sheet-grip"></div>
      <div class="sheet-head">
        <div>
          <div class="sh-lab">Amount due</div>
          <div class="sh-amt tnum" id="sheetAmt">0,00 zł</div>
        </div>
        <button class="sheet-close" id="sheetClose" type="button" aria-label="Close">&times;</button>
      </div>
      <div class="sheet-body">
        <div class="pay-methods">
          <button class="pm" data-method="cash" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/><path d="M6 12h.01M18 12h.01"/></svg>
            <span class="pm-lab">Cash</span><span class="pm-hint">Pay at counter</span>
          </button>
          <button class="pm" data-method="card" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/><path d="M6 15h4"/></svg>
            <span class="pm-lab">Card</span><span class="pm-hint">Tap / chip / contactless</span>
          </button>
        </div>
        <div class="sheet-note">Choose a tender to complete the sale &middot; tap outside or &times; to cancel</div>
      </div>
      <div class="paid">
        <div class="check">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="paid-title">Paid &check;</div>
        <div class="paid-sub" id="paidSub"></div>
        <button class="btn-new" id="btnNew" type="button">New order</button>
      </div>
    </div>
  </div>

<script>
  "use strict";

  /* ====================== SHARED SAMPLE DATA ====================== */
  const LOC = "Kraków";
  const fmtPLN = g => (g/100).toFixed(2).replace(".",",")+" zł";
  const CATS = ["Pizza","Pasta","Antipasti","Panini","Drinks","Desserts"];
  const CAT_EMOJI = {Pizza:"🍕",Pasta:"🍝",Antipasti:"🥖",Panini:"🥪",Drinks:"☕",Desserts:"🍰"};
  const MENU = [
    {id:"margherita", n:"Margherita",              cat:"Pizza",     price:2790, tags:["veg"],         role:"hero"},
    {id:"quattro",    n:"Quattro Formaggi",        cat:"Pizza",     price:3390, tags:["veg"],         role:"profit"},
    {id:"diavola",    n:"Diavola",                 cat:"Pizza",     price:3290, tags:["spicy"]},
    {id:"prosciutto", n:"Prosciutto e Rucola",     cat:"Pizza",     price:3590, tags:[]},
    {id:"ortolana",   n:"Ortolana",                cat:"Pizza",     price:3090, tags:["veg"]},
    {id:"pizzaiolo",  n:"Pizza del Pizzaiolo",     cat:"Pizza",     price:4990, tags:["veg"],         role:"anchor", lto:true},
    {id:"tartufata",  n:"Tartufata Reale",         cat:"Pizza",     price:7990, tags:[],              role:"anchor", lto:true},
    {id:"personale",  n:'Margherita Personale 8"', cat:"Pizza",     price:1890, tags:["veg"]},
    {id:"slice",      n:"Slice (Margherita)",      cat:"Pizza",     price:1190, tags:["veg"]},
    {id:"carbonara",  n:"Spaghetti Carbonara",     cat:"Pasta",     price:2895, tags:[]},
    {id:"arrabbiata", n:"Penne Arrabbiata",        cat:"Pasta",     price:2390, tags:["vegan","spicy"]},
    {id:"pesto",      n:"Linguine al Pesto",       cat:"Pasta",     price:2695, tags:["veg"],         role:"profit"},
    {id:"bolognese",  n:"Tagliatelle Bolognese",   cat:"Pasta",     price:2995, tags:[]},
    {id:"bruschetta", n:"Bruschetta Classica",     cat:"Antipasti", price:1590, tags:["vegan"]},
    {id:"garlic",     n:"Garlic Bread",            cat:"Antipasti", price:990,  tags:["veg"],         role:"profit"},
    {id:"burrata",    n:"Burrata con Pomodorini",  cat:"Antipasti", price:2195, tags:["veg","gf"]},
    {id:"arancini",   n:"Arancini (3 pcs)",        cat:"Antipasti", price:1790, tags:[]},
    {id:"caprese",    n:"Panino Caprese",          cat:"Panini",    price:1990, tags:["veg"]},
    {id:"milano",     n:"Panino Milano",           cat:"Panini",    price:2290, tags:[]},
    {id:"espresso",   n:"Espresso",                cat:"Drinks",    price:990,  tags:["vegan","gf"],  role:"profit"},
    {id:"limonata",   n:"Limonata Fresca",         cat:"Drinks",    price:1190, tags:["vegan","gf"]},
    {id:"aranciata",  n:"Aranciata S.Pellegrino",  cat:"Drinks",    price:990,  tags:["vegan","gf"]},
    {id:"water",      n:"Acqua Minerale",          cat:"Drinks",    price:590,  tags:["vegan","gf"]},
    {id:"limonata1l", n:"Limonata 1L",             cat:"Drinks",    price:1990, tags:["vegan","gf"]},
    {id:"tiramisu",   n:"Tiramisù",                cat:"Desserts",  price:1800, tags:["veg"]},
    {id:"cannoli",    n:"Cannoli Siciliani (2)",   cat:"Desserts",  price:1600, tags:["veg"]},
    {id:"pannacotta", n:"Panna Cotta",             cat:"Desserts",  price:1500, tags:["veg","gf"],    role:"profit"},
  ];
  const COMBOS = [
    {id:"lunch",  n:"Lunch Combo",    desc:"Any pizza + any drink",       off:300},
    {id:"trio",   n:"Pizzaiolo Trio", desc:"Pizza + espresso + tiramisù", off:400},
    {id:"family", n:"Family Pack",    desc:"2 pizzas + Limonata 1L",      off:800},
  ];
  // role badges: hero / profit / anchor (lto=limited). tags: veg/vegan/spicy/gf.

  /* ====================== State ====================== */
  let curLoc = LOC;
  let curChan = "takeout";
  let activeCat = "Pizza";
  let order = [];   // [{id, qty}]
  const byId = id => MENU.find(m=>m.id===id);
  const ROLE_LABEL = {hero:"✦ Hero", profit:"◆ Profit", anchor:"✦ Signature"};
  const CHAN_LABEL = {takeout:"Takeout",delivery:"Delivery",dinein:"Dine-in"};

  function newOrderId(){
    const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let s=""; for(let i=0;i<6;i++) s+=chars[Math.floor(Math.random()*chars.length)];
    return s;
  }
  let orderId = newOrderId();

  /* ====================== Header segmented controls ====================== */
  function buildSeg(elId, items, getActive, onPick){
    const el=document.getElementById(elId);
    el.innerHTML="";
    items.forEach(it=>{
      const b=document.createElement("button");
      b.type="button"; b.textContent=it.label;
      b.setAttribute("aria-pressed", String(getActive()===it.value));
      b.addEventListener("click", ()=>onPick(it.value));
      el.appendChild(b);
    });
  }
  function renderSegs(){
    buildSeg("locSeg",
      [{label:"Kraków",value:"Kraków"},{label:"Warszawa",value:"Warszawa"}],
      ()=>curLoc, v=>{ curLoc=v; renderSegs(); renderMeta(); });
    buildSeg("chanSeg",
      [{label:"Takeout",value:"takeout"},{label:"Delivery",value:"delivery"},{label:"Dine-in",value:"dinein"}],
      ()=>curChan, v=>{ curChan=v; renderSegs(); renderMeta(); });
  }

  /* ====================== Category pills ====================== */
  const catsEl=document.getElementById("cats");
  function buildCats(){
    catsEl.innerHTML="";
    CATS.forEach(c=>{
      const count=MENU.filter(m=>m.cat===c).length;
      const b=document.createElement("button");
      b.type="button"; b.className="catpill";
      b.setAttribute("aria-pressed", String(activeCat===c));
      b.innerHTML='<span class="emoji">'+CAT_EMOJI[c]+'</span>'+c+'<span class="cp-count tnum">'+count+'</span>';
      b.addEventListener("click", ()=>{ activeCat=c; buildCats(); renderTiles(); });
      catsEl.appendChild(b);
    });
  }

  /* ====================== Tile grid ====================== */
  const tilesEl=document.getElementById("tiles");
  function qtyInOrder(id){ const l=order.find(x=>x.id===id); return l?l.qty:0; }
  function renderTiles(){
    const list=MENU.filter(m=>m.cat===activeCat);
    tilesEl.innerHTML = list.map(m=>{
      const q=qtyInOrder(m.id);
      const role = m.role ? '<span class="rolebadge '+m.role+'">'+ROLE_LABEL[m.role]+'</span>' : "";
      const lto = m.lto ? '<span class="ltochip">LIMITED</span>' : "";
      const tags = m.tags.length ? '<div class="tags">'+m.tags.map(t=>'<span class="tag '+t+'">'+t+'</span>').join("")+'</div>' : "";
      return '<button class="tile'+(q>0?" has-qty":"")+'" data-id="'+m.id+'" style="--tcol:var(--c-'+m.cat+')">'+
        '<span class="qbadge tnum">'+q+'</span>'+
        role+lto+
        '<span class="band"></span>'+
        '<span class="glyph">'+CAT_EMOJI[m.cat]+'</span>'+
        '<span class="body">'+
          '<span class="t-name">'+m.n+'</span>'+
          '<span class="t-foot"><span class="t-price tnum">'+fmtPLN(m.price)+'</span><span class="add-dot">+</span></span>'+
          tags+
        '</span>'+
      '</button>';
    }).join("");
    tilesEl.querySelectorAll(".tile").forEach(t=>{
      t.addEventListener("click", ()=>{
        addItem(t.dataset.id);
        t.classList.remove("pop"); void t.offsetWidth; t.classList.add("pop");
      });
    });
  }

  /* ====================== Order / combos ====================== */
  function orderQty(){ return order.reduce((s,l)=>s+l.qty,0); }
  function subtotal(){ return order.reduce((s,l)=>s+byId(l.id).price*l.qty,0); }
  function activeCombos(){
    const has = pred => order.some(l=>pred(byId(l.id)));
    const qtyOf = pred => order.filter(l=>pred(byId(l.id))).reduce((s,l)=>s+l.qty,0);
    const out=[];
    const hasPizza = has(m=>m.cat==="Pizza");
    const hasDrink = has(m=>m.cat==="Drinks");
    const pizzaCount = qtyOf(m=>m.cat==="Pizza");
    if(hasPizza && hasDrink) out.push(COMBOS[0]);
    if(hasPizza && order.some(l=>l.id==="espresso") && order.some(l=>l.id==="tiramisu")) out.push(COMBOS[1]);
    if(pizzaCount>=2 && order.some(l=>l.id==="limonata1l")) out.push(COMBOS[2]);
    return out;
  }
  function comboDiscount(){ return activeCombos().reduce((s,c)=>s+c.off,0); }
  function grandTotal(){ return Math.max(0, subtotal()-comboDiscount()); }

  const dockBody=document.getElementById("dockBody");
  function renderOrder(){
    document.getElementById("dockId").textContent="#"+orderId;
    if(!order.length){
      dockBody.innerHTML='<div class="dock-empty"><span class="big">🧾</span>No items yet.<br>Tap a tile to start the order.</div>';
    } else {
      let html="";
      order.forEach(l=>{
        const m=byId(l.id);
        html+='<div class="oline" data-id="'+l.id+'">'+
          '<span class="ol-glyph">'+CAT_EMOJI[m.cat]+'</span>'+
          '<div class="ol-mid">'+
            '<div class="ol-nm">'+m.n+'</div>'+
            '<div class="ol-each tnum">'+fmtPLN(m.price)+' each</div>'+
          '</div>'+
          '<div class="ol-right">'+
            '<div class="ol-line tnum">'+fmtPLN(m.price*l.qty)+'</div>'+
            '<div class="stepper">'+
              '<button data-dec aria-label="Decrease">&minus;</button>'+
              '<span class="q tnum">'+l.qty+'</span>'+
              '<button data-inc aria-label="Increase">+</button>'+
            '</div>'+
          '</div>'+
        '</div>';
      });
      activeCombos().forEach(c=>{
        html+='<div class="ocombo"><span class="oc-ico">🎁</span>'+
          '<div class="oc-mid"><div class="oc-nm">'+c.n+'</div><div class="oc-desc">'+c.desc+'</div></div>'+
          '<span class="oc-off tnum">&minus;'+fmtPLN(c.off)+'</span></div>';
      });
      dockBody.innerHTML=html;
      dockBody.querySelectorAll(".oline").forEach(line=>{
        const id=line.dataset.id;
        line.querySelector("[data-inc]").addEventListener("click", ()=>changeQty(id,+1));
        line.querySelector("[data-dec]").addEventListener("click", ()=>changeQty(id,-1));
      });
    }
    renderTotals();
    renderMeta();
  }

  function renderTotals(){
    const sub=subtotal(), tot=grandTotal();
    let html='<div class="tline"><span>Subtotal</span><span class="tv">'+fmtPLN(sub)+'</span></div>';
    activeCombos().forEach(c=>{
      html+='<div class="tline disc"><span>'+c.n+'</span><span class="tv">&minus;'+fmtPLN(c.off)+'</span></div>';
    });
    html+='<div class="tline grand"><span class="tlab">Total</span><span class="tv tnum">'+fmtPLN(tot)+'</span></div>';
    document.getElementById("totals").innerHTML=html;
    document.getElementById("chargeAmt").textContent=fmtPLN(tot);
    document.getElementById("btnCharge").disabled = order.length===0;
  }
  function renderMeta(){
    document.getElementById("metaLoc").textContent=curLoc;
    document.getElementById("metaChan").textContent=CHAN_LABEL[curChan];
    const items=orderQty();
    document.getElementById("metaCount").textContent=items+" item"+(items===1?"":"s");
    document.getElementById("footMeta").textContent=curLoc+" · "+CHAN_LABEL[curChan]+" · #"+orderId;
  }

  /* ====================== Mutations ====================== */
  function addItem(id){
    if(!byId(id)) return;
    const ex=order.find(l=>l.id===id);
    if(ex) ex.qty++; else order.push({id,qty:1});
    renderOrder();
    refreshTileBadge(id);
    flashLine(id);
  }
  function changeQty(id, delta){
    const l=order.find(x=>x.id===id);
    if(!l) return;
    l.qty+=delta;
    if(l.qty<=0) order=order.filter(x=>x.id!==id);
    renderOrder();
    refreshTileBadge(id);
    if(delta>0) flashLine(id);
  }
  function refreshTileBadge(id){
    const tile=tilesEl.querySelector('.tile[data-id="'+id+'"]');
    if(!tile) return;
    const q=qtyInOrder(id);
    tile.classList.toggle("has-qty", q>0);
    const badge=tile.querySelector(".qbadge");
    if(badge) badge.textContent=q;
  }
  function flashLine(id){
    const line=dockBody.querySelector('.oline[data-id="'+id+'"]');
    if(line){ line.classList.remove("pop"); void line.offsetWidth; line.classList.add("pop"); line.scrollIntoView({block:"nearest"}); }
  }
  function clearOrder(){
    order=[];
    orderId=newOrderId();
    renderOrder();
    renderTiles();
  }

  /* ====================== Tender sheet ====================== */
  const overlay=document.getElementById("overlay");
  const sheet=document.getElementById("sheet");
  function openSheet(){
    if(!order.length) return;
    document.getElementById("sheetAmt").textContent=fmtPLN(grandTotal());
    sheet.classList.remove("is-paid");
    overlay.classList.add("open");
    overlay.setAttribute("aria-hidden","false");
  }
  function closeSheet(){
    overlay.classList.remove("open");
    overlay.setAttribute("aria-hidden","true");
    sheet.classList.remove("is-paid");
  }
  function pay(method){
    const total=grandTotal(), items=orderQty();
    const ml = method==="cash" ? "Cash" : "Card";
    document.getElementById("paidSub").innerHTML=
      'Order <b>#'+orderId+'</b> &middot; '+ml+'<br><b>'+fmtPLN(total)+'</b> &middot; '+items+' item'+(items===1?"":"s")+
      '<br>'+curLoc+' &middot; '+CHAN_LABEL[curChan];
    sheet.classList.add("is-paid");
  }
  function finishNewOrder(){
    closeSheet();
    clearOrder();
  }
  sheet.querySelectorAll(".pm").forEach(b=>b.addEventListener("click", ()=>pay(b.dataset.method)));
  document.getElementById("sheetClose").addEventListener("click", closeSheet);
  overlay.addEventListener("click", e=>{ if(e.target===overlay) closeSheet(); });
  document.getElementById("btnNew").addEventListener("click", finishNewOrder);
  document.getElementById("btnCharge").addEventListener("click", openSheet);
  document.getElementById("btnClear").addEventListener("click", clearOrder);

  document.addEventListener("keydown", e=>{
    if(e.key==="Escape" && overlay.classList.contains("open")){
      e.preventDefault();
      if(sheet.classList.contains("is-paid")) finishNewOrder(); else closeSheet();
    }
  });

  /* ====================== Fullscreen ====================== */
  const fsbtn=document.getElementById("fsbtn");
  function syncFs(){
    const on=!!document.fullscreenElement;
    document.documentElement.classList.toggle("is-fullscreen",on);
    fsbtn.setAttribute("aria-pressed",String(on));
  }
  function fallbackToggle(){
    const on=!document.documentElement.classList.contains("is-fullscreen");
    document.documentElement.classList.toggle("is-fullscreen",on);
    fsbtn.setAttribute("aria-pressed",String(on));
  }
  fsbtn.addEventListener("click", ()=>{
    if(document.fullscreenElement){
      if(document.exitFullscreen) document.exitFullscreen().catch(fallbackToggle);
      else fallbackToggle();
    } else {
      const req=document.documentElement.requestFullscreen;
      if(req) req.call(document.documentElement).catch(fallbackToggle);
      else fallbackToggle();
    }
  });
  document.addEventListener("fullscreenchange", syncFs);

  /* ====================== Clock ====================== */
  function pad(n){ return String(n).padStart(2,"0"); }
  function tickClock(){
    const d=new Date();
    document.getElementById("clock").textContent=pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());
  }

  /* ====================== Boot ====================== */
  renderSegs();
  buildCats();
  renderTiles();
  renderOrder();
  tickClock();
  setInterval(tickClock,1000);
</script>
</body>
</html>
