<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sud Italia POS — Loyalty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap">
<style>
  :root{
    --bg:#FAFAF8;
    --bg2:#F2F2EF;
    --panel:#FFFFFF;
    --ink:#15171A;
    --ink2:#4A4F57;
    --ink3:#8A9099;
    --hair:rgba(20,23,26,0.10);
    --hair-strong:rgba(20,23,26,0.18);
    --accent:#7C3AED;          /* violet — loyalty signature */
    --accent-soft:#F1EBFE;
    --accent-strong:rgba(124,58,237,0.30);
    --blue:#1F6FEB;
    --amber:#B5740B;
    --amber-soft:#FBF1DE;
    --red:#C9342B;
    --red-soft:#FBE7E5;
    --green:#0E8A5F;
    --green-soft:#E3F4ED;
    --gold:#B5740B;
    --silver:#6B7280;
    --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:24px;--space-6:32px;
    --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Monaco,"Cascadia Code",monospace;
    --sans:"Inter",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--sans);
    font-size:15px;line-height:1.4;-webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;overflow:hidden;
  }
  .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}

  /* ===== header chrome ===== */
  header{
    display:flex;align-items:center;gap:var(--space-5);
    padding:0 var(--space-6);height:60px;flex:0 0 auto;
    border-bottom:1px solid var(--hair);background:var(--panel);
  }
  .brand{display:flex;align-items:baseline;gap:var(--space-3)}
  .wordmark{font-weight:800;font-size:16px;letter-spacing:0.18em;color:var(--ink)}
  .kd-label{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink3)}
  .design-tag{
    font-family:var(--mono);font-size:11px;letter-spacing:0.08em;color:var(--accent);
    padding:3px 8px;border:1px solid var(--accent-strong);border-radius:4px;background:var(--accent-soft);
  }
  .head-spacer{flex:1}

  /* segmented switchers */
  .seg-group{display:flex;align-items:center;gap:8px}
  .seg-lbl{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink3)}
  .stages{display:flex;gap:2px;padding:3px;border:1px solid var(--hair);border-radius:999px;background:var(--bg2)}
  .seg{
    appearance:none;background:transparent;border:1px solid transparent;color:var(--ink2);
    font-family:var(--sans);font-size:12px;letter-spacing:0.02em;padding:5px 12px;
    border-radius:999px;cursor:pointer;transition:all .12s ease;white-space:nowrap;
  }
  .seg:hover{color:var(--ink)}
  .seg[aria-pressed="true"]{background:var(--accent);color:#fff;font-weight:600}

  .fsbtn{
    appearance:none;display:inline-flex;align-items:center;gap:6px;
    background:transparent;border:1px solid var(--hair);color:var(--ink2);
    font-family:var(--sans);font-size:12px;letter-spacing:0.02em;padding:5px 10px;
    border-radius:999px;cursor:pointer;transition:all .12s ease;white-space:nowrap;
  }
  .fsbtn:hover{border-color:var(--hair-strong);color:var(--ink)}
  .fsbtn svg{width:14px;height:14px}
  .clock{font-family:var(--mono);font-size:16px;letter-spacing:0.04em;min-width:90px;text-align:right;color:var(--ink)}
  .gallery-link{
    font-size:12px;color:var(--ink3);text-decoration:none;border:1px solid var(--hair);
    padding:5px 9px;border-radius:999px;transition:all .12s ease;
  }
  .gallery-link:hover{color:var(--ink);border-color:var(--hair-strong)}

  html.is-fullscreen .design-tag,html.is-fullscreen .kd-label,html.is-fullscreen .gallery-link{display:none}

  /* ===== body grid ===== */
  .stage{flex:1 1 auto;display:grid;grid-template-columns:380px 1fr;gap:var(--space-5);padding:var(--space-5);overflow:hidden;min-height:0}

  .col{display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .col-kicker{
    display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-3);flex:0 0 auto;
  }
  .col-kicker .k{font-size:12px;letter-spacing:0.18em;text-transform:uppercase;font-weight:700}
  .col-kicker .k.member{color:var(--accent)}
  .col-kicker .k.order{color:var(--ink2)}
  .col-kicker .pill{
    font-size:11px;letter-spacing:0.06em;color:var(--ink2);
    border:1px solid var(--hair);border-radius:999px;padding:3px 10px;
  }
  .col-kicker .pill.member{background:var(--accent-soft);border-color:var(--accent-strong);color:var(--accent)}

  /* ===== LEFT — identity ===== */
  .id-scroll{flex:1 1 auto;overflow-y:auto;display:flex;flex-direction:column;gap:var(--space-4);padding-right:2px}
  .card{
    background:var(--panel);border:1px solid var(--hair);border-radius:18px;
    box-shadow:0 1px 0 rgba(20,23,26,0.04);
  }

  /* phone entry / keypad */
  .lookup{padding:var(--space-4)}
  .lookup .lk-lbl{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:var(--space-2)}
  .phone-disp{
    height:54px;border:1px solid var(--hair-strong);border-radius:12px;background:var(--bg2);
    display:flex;align-items:center;padding:0 14px;gap:10px;
  }
  .phone-disp .pre{font-size:14px;color:var(--ink3);font-family:var(--mono)}
  .phone-disp .num{
    flex:1;font-family:var(--mono);font-size:22px;font-weight:600;letter-spacing:0.06em;color:var(--ink);
    min-width:0;overflow:hidden;
  }
  .phone-disp .num.placeholder{color:var(--ink3);font-weight:400}
  .phone-disp .clr{
    appearance:none;border:none;background:transparent;color:var(--ink3);cursor:pointer;
    width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    transition:all .12s ease;
  }
  .phone-disp .clr:hover{background:var(--hair);color:var(--ink)}
  .phone-disp .clr svg{width:18px;height:18px}

  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:var(--space-3)}
  .key{
    appearance:none;border:1px solid var(--hair);background:var(--panel);color:var(--ink);
    border-radius:12px;height:52px;cursor:pointer;font-family:var(--mono);
    font-size:21px;font-weight:600;transition:all .1s ease;
  }
  .key:hover{background:var(--bg2);border-color:var(--hair-strong)}
  .key:active{transform:translateY(1px);background:var(--accent-soft)}
  .key.alt{font-family:var(--sans);font-size:13px;font-weight:600;color:var(--ink2)}
  .key.lookup-key{background:var(--accent);border-color:var(--accent);color:#fff}
  .key.lookup-key:hover{background:#6d28d9}
  .key.lookup-key:active{background:#6d28d9}

  .hint-known{
    font-size:11px;color:var(--ink3);margin-top:var(--space-3);line-height:1.6;
  }
  .hint-known code{
    font-family:var(--mono);background:var(--bg2);border:1px solid var(--hair);
    border-radius:5px;padding:1px 5px;cursor:pointer;color:var(--ink2);transition:all .12s ease;
  }
  .hint-known code:hover{border-color:var(--accent-strong);color:var(--accent)}

  /* member card */
  .member-card{
    background:linear-gradient(135deg,#5B21B6,#7C3AED 55%,#9061f0);
    border:none;border-radius:18px;padding:var(--space-4) var(--space-5);
    color:#fff;position:relative;overflow:hidden;
    box-shadow:0 16px 40px -18px rgba(124,58,237,0.7);
  }
  .member-card::after{
    content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;
    background:rgba(255,255,255,0.08);
  }
  .mc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;position:relative}
  .mc-name{font-size:20px;font-weight:700;letter-spacing:0.01em}
  .mc-phone{font-family:var(--mono);font-size:12px;opacity:.78;margin-top:2px;letter-spacing:0.04em}
  .tier{
    font-size:11px;letter-spacing:0.08em;text-transform:uppercase;font-weight:700;
    padding:4px 11px;border-radius:999px;white-space:nowrap;
    display:inline-flex;align-items:center;gap:6px;
  }
  .tier::before{content:"";width:7px;height:7px;border-radius:50%}
  .tier.Gold{background:rgba(255,225,150,0.22);color:#FFE39A}
  .tier.Gold::before{background:#FFD66B}
  .tier.Silver{background:rgba(255,255,255,0.2);color:#E8EAED}
  .tier.Silver::before{background:#D7DBE0}
  .mc-pts{margin-top:var(--space-4);position:relative}
  .mc-pts .big{font-family:var(--mono);font-size:46px;font-weight:700;line-height:1;letter-spacing:-0.01em}
  .mc-pts .lbl{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;opacity:.8;margin-top:3px}
  .mc-stats{display:flex;gap:var(--space-5);margin-top:var(--space-4);position:relative}
  .mc-stat .v{font-family:var(--mono);font-size:17px;font-weight:700}
  .mc-stat .l{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;opacity:.78;margin-top:2px}

  .enroll-card{
    background:var(--accent-soft);border:1px solid var(--accent-strong);border-radius:18px;
    padding:var(--space-4) var(--space-5);
  }
  .enroll-card .en-top{display:flex;align-items:center;gap:10px}
  .enroll-card .en-ico{
    width:38px;height:38px;border-radius:50%;background:var(--accent);color:#fff;flex:none;
    display:flex;align-items:center;justify-content:center;
  }
  .enroll-card .en-ico svg{width:20px;height:20px}
  .enroll-card .en-t{font-size:15px;font-weight:700;color:var(--accent)}
  .enroll-card .en-p{font-size:12.5px;color:var(--ink2);margin-top:1px}
  .enroll-card .en-num{font-family:var(--mono);font-weight:600;color:var(--ink)}
  .enroll-card .en-meta{
    display:flex;gap:var(--space-5);margin-top:var(--space-3);padding-top:var(--space-3);
    border-top:1px solid var(--accent-strong);
  }
  .enroll-card .en-meta .v{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--accent)}
  .enroll-card .en-meta .l{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);margin-top:1px}

  /* rewards */
  .rewards{padding:var(--space-4)}
  .rewards .rw-h{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:var(--space-3);display:flex;justify-content:space-between;align-items:baseline}
  .rewards .rw-h .bal{font-family:var(--mono);color:var(--accent);font-weight:700;text-transform:none;letter-spacing:0}
  .reward-row{
    display:flex;align-items:center;gap:var(--space-3);padding:11px 12px;border-radius:12px;
    border:1px solid var(--hair);margin-bottom:8px;transition:all .12s ease;
  }
  .reward-row:last-child{margin-bottom:0}
  .reward-row .rw-ico{
    width:34px;height:34px;border-radius:10px;background:var(--accent-soft);color:var(--accent);flex:none;
    display:flex;align-items:center;justify-content:center;font-size:17px;
  }
  .reward-row .rw-info{flex:1;min-width:0}
  .reward-row .rw-n{font-size:13.5px;font-weight:600;color:var(--ink)}
  .reward-row .rw-c{font-family:var(--mono);font-size:11.5px;color:var(--ink3);margin-top:1px}
  .reward-row .rw-c .val{color:var(--accent);font-weight:700}
  .apply-btn{
    appearance:none;border:1px solid var(--accent);background:var(--accent);color:#fff;
    border-radius:9px;padding:8px 14px;cursor:pointer;font-family:var(--sans);
    font-size:12.5px;font-weight:600;letter-spacing:0.01em;transition:all .12s ease;white-space:nowrap;
  }
  .apply-btn:hover{background:#6d28d9}
  .apply-btn:active{transform:translateY(1px)}
  .apply-btn:disabled{background:var(--bg2);border-color:var(--hair);color:var(--ink3);cursor:not-allowed}
  .apply-btn.applied{background:var(--green);border-color:var(--green)}
  .reward-row.is-disabled{opacity:.6}
  .reward-row.is-applied{border-color:var(--green);background:var(--green-soft)}

  .id-empty{
    color:var(--ink3);font-size:13px;text-align:center;padding:var(--space-5);
    border:1px dashed var(--hair);border-radius:14px;
  }

  /* ===== RIGHT — order ===== */
  .order-wrap{display:grid;grid-template-rows:auto 1fr;gap:var(--space-4);min-height:0}
  .order-body{display:grid;grid-template-columns:1fr 320px;gap:var(--space-4);min-height:0;overflow:hidden}

  /* product grid */
  .prod-col{display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:var(--space-3);flex:0 0 auto}
  .cat-tab{
    appearance:none;border:1px solid var(--hair);background:var(--panel);color:var(--ink2);
    font-family:var(--sans);font-size:12px;letter-spacing:0.01em;padding:6px 12px;
    border-radius:999px;cursor:pointer;transition:all .12s ease;display:flex;align-items:center;gap:6px;
  }
  .cat-tab:hover{border-color:var(--hair-strong);color:var(--ink)}
  .cat-tab[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:#fff;font-weight:600}
  .grid{
    flex:1 1 auto;overflow-y:auto;display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:10px;align-content:start;padding-right:2px;padding-bottom:4px;
  }
  .ptile{
    appearance:none;text-align:left;background:var(--panel);border:1px solid var(--hair);
    border-radius:14px;padding:12px;cursor:pointer;transition:all .12s ease;
    display:flex;flex-direction:column;gap:6px;min-height:96px;position:relative;
    box-shadow:0 1px 0 rgba(20,23,26,0.03);
  }
  .ptile:hover{border-color:var(--accent-strong);box-shadow:0 8px 20px -14px rgba(124,58,237,0.5);transform:translateY(-1px)}
  .ptile:active{transform:translateY(0)}
  .ptile .pt-em{font-size:18px;line-height:1}
  .ptile .pt-n{font-size:13px;font-weight:600;color:var(--ink);line-height:1.25;flex:1}
  .ptile .pt-foot{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:auto}
  .ptile .pt-price{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--ink2)}
  .ptile .pt-q{
    font-family:var(--mono);font-size:11px;font-weight:700;min-width:20px;height:20px;
    border-radius:999px;background:var(--accent);color:#fff;
    display:none;align-items:center;justify-content:center;padding:0 5px;
  }
  .ptile.in-order .pt-q{display:flex}
  .ptile.in-order{border-color:var(--accent-strong);background:var(--accent-soft)}
  .pt-badge{
    position:absolute;top:8px;right:8px;font-size:8.5px;letter-spacing:0.04em;text-transform:uppercase;
    font-weight:700;padding:2px 5px;border-radius:5px;
  }
  .pt-badge.hero{color:var(--blue);background:rgba(31,111,235,0.1)}
  .pt-badge.profit{color:var(--green);background:var(--green-soft)}
  .pt-badge.anchor{color:var(--accent);background:var(--accent-soft)}
  .pt-badge.lto{color:var(--amber);background:var(--amber-soft)}

  /* ticket */
  .ticket{
    display:flex;flex-direction:column;min-height:0;
    background:var(--panel);border:1px solid var(--hair);border-radius:18px;overflow:hidden;
    box-shadow:0 1px 0 rgba(20,23,26,0.04),0 18px 44px -28px rgba(20,23,26,0.28);
  }
  .tk-head{
    padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--hair);
    display:flex;align-items:center;justify-content:space-between;gap:8px;flex:0 0 auto;
  }
  .tk-head .tk-t{font-size:12px;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;color:var(--ink2)}
  .tk-head .tk-for{font-size:11px;color:var(--ink3)}
  .tk-head .tk-for b{color:var(--accent);font-weight:600}
  .tk-lines{flex:1 1 auto;overflow-y:auto;padding:var(--space-3) var(--space-4);display:flex;flex-direction:column;gap:2px}
  .tk-empty{color:var(--ink3);font-size:12.5px;text-align:center;padding:var(--space-5) 0;line-height:1.6}
  .line{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--hair)}
  .line:last-child{border-bottom:none}
  .line .l-q{
    display:flex;align-items:center;gap:6px;flex:0 0 auto;
  }
  .qbtn{
    appearance:none;width:24px;height:24px;border-radius:7px;border:1px solid var(--hair);
    background:var(--bg2);color:var(--ink2);cursor:pointer;font-family:var(--mono);font-size:14px;
    line-height:1;display:flex;align-items:center;justify-content:center;transition:all .1s ease;
  }
  .qbtn:hover{border-color:var(--accent-strong);color:var(--accent)}
  .qbtn:active{transform:translateY(1px)}
  .qbtn.minus:hover{color:var(--red);border-color:rgba(201,52,43,0.4)}
  .l-qv{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:13px;font-weight:700;min-width:18px;text-align:center;color:var(--ink)}
  .line .l-n{flex:1;min-width:0;font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .line .l-p{font-family:var(--mono);font-size:13px;color:var(--ink2);flex:0 0 auto}

  .tk-totals{flex:0 0 auto;padding:var(--space-3) var(--space-4);border-top:1px solid var(--hair);background:var(--bg2)}
  .tot-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px;font-size:13px;color:var(--ink2);padding:3px 0}
  .tot-row .v{font-family:var(--mono);font-variant-numeric:tabular-nums;color:var(--ink)}
  .tot-row.disc{color:var(--accent)}
  .tot-row.disc .v{color:var(--accent);font-weight:600}
  .tot-row.grand{font-size:16px;font-weight:700;color:var(--ink);padding-top:8px;margin-top:4px;border-top:1px solid var(--hair)}
  .tot-row.grand .v{font-size:20px;font-weight:700}
  .earn-preview{
    display:flex;align-items:center;gap:8px;margin-top:var(--space-3);padding:9px 12px;
    background:var(--accent-soft);border:1px solid var(--accent-strong);border-radius:11px;
    font-size:12.5px;color:var(--accent);font-weight:600;
  }
  .earn-preview .ep-ico{font-size:14px}
  .earn-preview .ep-pts{font-family:var(--mono);font-weight:700}
  .earn-preview.muted{background:var(--bg2);border-color:var(--hair);color:var(--ink3)}

  .charge-btn{
    appearance:none;width:100%;margin-top:var(--space-3);border:none;border-radius:13px;
    padding:15px;cursor:pointer;background:var(--accent);color:#fff;
    font-family:var(--sans);font-size:15px;font-weight:700;letter-spacing:0.02em;
    display:flex;align-items:center;justify-content:center;gap:8px;
    transition:filter .15s,transform .08s,opacity .15s;
  }
  .charge-btn svg{width:17px;height:17px}
  .charge-btn:hover{filter:brightness(1.06)}
  .charge-btn:active{transform:translateY(1px)}
  .charge-btn:disabled{opacity:.45;cursor:not-allowed;background:var(--ink3)}

  /* paid overlay */
  .paid-scrim{
    position:fixed;inset:0;z-index:90;background:rgba(20,23,26,0.45);backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;padding:24px;
    opacity:0;pointer-events:none;transition:opacity .25s ease;
  }
  .paid-scrim.open{opacity:1;pointer-events:auto}
  .paid-modal{
    background:var(--panel);border-radius:22px;padding:var(--space-6);width:min(420px,100%);
    text-align:center;box-shadow:0 30px 70px -24px rgba(20,23,26,0.5);
    transform:scale(.92);transition:transform .25s cubic-bezier(.2,1.2,.35,1);
  }
  .paid-scrim.open .paid-modal{transform:scale(1)}
  .paid-check{
    width:80px;height:80px;border-radius:50%;background:var(--green);color:#fff;margin:0 auto var(--space-4);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 10px var(--green-soft);
  }
  .paid-check svg{width:42px;height:42px}
  .paid-t{font-size:22px;font-weight:700;color:var(--ink)}
  .paid-amt{font-family:var(--mono);font-size:15px;color:var(--ink2);margin-top:4px}
  .paid-loyalty{
    margin-top:var(--space-4);padding:var(--space-4);border-radius:14px;
    background:var(--accent-soft);border:1px solid var(--accent-strong);text-align:left;
  }
  .paid-loyalty .pl-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:3px 0;font-size:13px;color:var(--ink2)}
  .paid-loyalty .pl-row .v{font-family:var(--mono);font-weight:700;color:var(--accent)}
  .paid-loyalty .pl-row.bal{border-top:1px solid var(--accent-strong);margin-top:6px;padding-top:8px;font-weight:600;color:var(--ink)}
  .paid-loyalty .pl-row.bal .v{font-size:16px}
  .paid-loyalty .pl-name{font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:4px}
  .new-order{
    appearance:none;width:100%;margin-top:var(--space-5);border:none;border-radius:13px;padding:15px;
    cursor:pointer;background:var(--ink);color:#fff;font-family:var(--sans);
    font-size:15px;font-weight:700;letter-spacing:0.02em;transition:filter .15s,transform .08s;
  }
  .new-order:hover{filter:brightness(1.2)}
  .new-order:active{transform:translateY(1px)}

  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:var(--hair-strong);border-radius:4px}
  ::-webkit-scrollbar-track{background:transparent}

  html.is-fullscreen .stage{padding:var(--space-6)}
</style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="wordmark">SUD ITALIA</span>
      <span class="kd-label">Point of Sale</span>
    </div>
    <span class="design-tag">10 · Loyalty</span>
    <div class="head-spacer"></div>

    <div class="seg-group">
      <span class="seg-lbl">Loc</span>
      <div class="stages" id="locSeg" role="group" aria-label="Location">
        <button class="seg" data-loc="Kraków" aria-pressed="true" type="button">Kraków</button>
        <button class="seg" data-loc="Warszawa" aria-pressed="false" type="button">Warszawa</button>
      </div>
    </div>
    <div class="seg-group">
      <span class="seg-lbl">Order</span>
      <div class="stages" id="chanSeg" role="group" aria-label="Channel">
        <button class="seg" data-chan="Takeout" aria-pressed="true" type="button">Takeout</button>
        <button class="seg" data-chan="Delivery" aria-pressed="false" type="button">Delivery</button>
        <button class="seg" data-chan="Dine-in" aria-pressed="false" type="button">Dine-in</button>
      </div>
    </div>

    <button class="fsbtn" id="fsBtn" type="button" aria-pressed="false"></button>
    <a class="gallery-link" href="index.html">← Gallery</a>
    <div class="clock tnum" id="clock">--:--:--</div>
  </header>

  <div class="stage">
    <!-- LEFT — customer identity first -->
    <div class="col">
      <div class="col-kicker">
        <span class="k member">Member</span>
        <span class="pill member" id="memberPill">Identify customer</span>
      </div>
      <div class="id-scroll" id="idScroll"></div>
    </div>

    <!-- RIGHT — the order -->
    <div class="col order-wrap">
      <div class="col-kicker">
        <span class="k order">Order</span>
        <span class="pill" id="orderPill">Kraków · Takeout</span>
      </div>
      <div class="order-body">
        <div class="prod-col">
          <div class="cat-tabs" id="catTabs"></div>
          <div class="grid" id="grid"></div>
        </div>

        <div class="ticket">
          <div class="tk-head">
            <span class="tk-t">Ticket</span>
            <span class="tk-for" id="tkFor">Walk-in</span>
          </div>
          <div class="tk-lines" id="tkLines"></div>
          <div class="tk-totals" id="tkTotals"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- paid overlay -->
  <div class="paid-scrim" id="paidScrim">
    <div class="paid-modal">
      <div class="paid-check"><svg viewBox="0 0 24 24"><path d="M5 13l4 4 10-11" stroke="currentColor" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="paid-t">Paid ✓</div>
      <div class="paid-amt tnum" id="paidAmt">0,00 zł</div>
      <div class="paid-loyalty" id="paidLoyalty"></div>
      <button class="new-order" id="newOrder" type="button">New order</button>
    </div>
  </div>

<script>
"use strict";

/* ===== SHARED SAMPLE DATA ===== */
const LOC = "Kraków";
const fmtPLN = g => (g/100).toFixed(2).replace(".",",")+" zł";
const CATS = ["Pizza","Pasta","Antipasti","Panini","Drinks","Desserts"];
const CAT_EMOJI = {Pizza:"🍕",Pasta:"🍝",Antipasti:"🥖",Panini:"🥪",Drinks:"☕",Desserts:"🍰"};
const MENU = [
  {id:"margherita", n:"Margherita",              cat:"Pizza",     price:2790, tags:["veg"],         role:"hero"},
  {id:"quattro",    n:"Quattro Formaggi",        cat:"Pizza",     price:3390, tags:["veg"],         role:"profit"},
  {id:"diavola",    n:"Diavola",                 cat:"Pizza",     price:3290, tags:["spicy"]},
  {id:"prosciutto", n:"Prosciutto e Rucola",     cat:"Pizza",     price:3590, tags:[]},
  {id:"ortolana",   n:"Ortolana",                cat:"Pizza",     price:3090, tags:["veg"]},
  {id:"pizzaiolo",  n:"Pizza del Pizzaiolo",     cat:"Pizza",     price:4990, tags:["veg"],         role:"anchor", lto:true},
  {id:"tartufata",  n:"Tartufata Reale",         cat:"Pizza",     price:7990, tags:[],              role:"anchor", lto:true},
  {id:"personale",  n:'Margherita Personale 8"', cat:"Pizza",     price:1890, tags:["veg"]},
  {id:"slice",      n:"Slice (Margherita)",      cat:"Pizza",     price:1190, tags:["veg"]},
  {id:"carbonara",  n:"Spaghetti Carbonara",     cat:"Pasta",     price:2895, tags:[]},
  {id:"arrabbiata", n:"Penne Arrabbiata",        cat:"Pasta",     price:2390, tags:["vegan","spicy"]},
  {id:"pesto",      n:"Linguine al Pesto",       cat:"Pasta",     price:2695, tags:["veg"],         role:"profit"},
  {id:"bolognese",  n:"Tagliatelle Bolognese",   cat:"Pasta",     price:2995, tags:[]},
  {id:"bruschetta", n:"Bruschetta Classica",     cat:"Antipasti", price:1590, tags:["vegan"]},
  {id:"garlic",     n:"Garlic Bread",            cat:"Antipasti", price:990,  tags:["veg"],         role:"profit"},
  {id:"burrata",    n:"Burrata con Pomodorini",  cat:"Antipasti", price:2195, tags:["veg","gf"]},
  {id:"arancini",   n:"Arancini (3 pcs)",        cat:"Antipasti", price:1790, tags:[]},
  {id:"caprese",    n:"Panino Caprese",          cat:"Panini",    price:1990, tags:["veg"]},
  {id:"milano",     n:"Panino Milano",           cat:"Panini",    price:2290, tags:[]},
  {id:"espresso",   n:"Espresso",                cat:"Drinks",    price:990,  tags:["vegan","gf"],  role:"profit"},
  {id:"limonata",   n:"Limonata Fresca",         cat:"Drinks",    price:1190, tags:["vegan","gf"]},
  {id:"aranciata",  n:"Aranciata S.Pellegrino",  cat:"Drinks",    price:990,  tags:["vegan","gf"]},
  {id:"water",      n:"Acqua Minerale",          cat:"Drinks",    price:590,  tags:["vegan","gf"]},
  {id:"limonata1l", n:"Limonata 1L",             cat:"Drinks",    price:1990, tags:["vegan","gf"]},
  {id:"tiramisu",   n:"Tiramisù",                cat:"Desserts",  price:1800, tags:["veg"]},
  {id:"cannoli",    n:"Cannoli Siciliani (2)",   cat:"Desserts",  price:1600, tags:["veg"]},
  {id:"pannacotta", n:"Panna Cotta",             cat:"Desserts",  price:1500, tags:["veg","gf"],    role:"profit"},
];
const COMBOS = [
  {id:"lunch",  n:"Lunch Combo",    desc:"Any pizza + any drink",       off:300},
  {id:"trio",   n:"Pizzaiolo Trio", desc:"Pizza + espresso + tiramisù", off:400},
  {id:"family", n:"Family Pack",    desc:"2 pizzas + Limonata 1L",      off:800},
];
const CUSTOMERS = [
  {phone:"600123456", name:"Marco R.",  pts:340,  tier:"Gold",   lifetime:128},
  {phone:"512987654", name:"Giulia M.", pts:90,   tier:"Silver", lifetime:14},
  {phone:"698222111", name:"Paweł K.",  pts:1280, tier:"Gold",   lifetime:402},
];
const REWARDS = [
  {id:"r-espresso", n:"Free Espresso",   cost:100, off:990},
  {id:"r-10pct",    n:"10% off order",   cost:150, pct:0.10},
  {id:"r-marg",     n:"Free Margherita", cost:250, off:2790},
];
// role badges: hero/profit/anchor(lto=limited). tags: veg/vegan/spicy/gf. Loyalty earn: 1pt per 1zł = floor(totalGrosze/100).

/* ===== State ===== */
const MENU_BY_ID = Object.fromEntries(MENU.map(m=>[m.id,m]));
let activeCat = "Pizza";
let location = "Kraków";
let channel = "Takeout";
const order = new Map();        // id -> qty
let customer = null;            // matched / enrolled customer object
let phoneBuf = "";              // dialed digits
let appliedReward = null;       // reward applied to this order

const REWARD_EMOJI = {"r-espresso":"☕","r-10pct":"％","r-marg":"🍕"};

/* ===== Totals ===== */
function subtotal(){
  let s=0; for(const [id,q] of order){ s += MENU_BY_ID[id].price * q; } return s;
}
function rewardDiscount(){
  if(!appliedReward) return 0;
  const r = appliedReward;
  if(r.pct) return Math.round(subtotal() * r.pct);
  return Math.min(r.off, subtotal());
}
function grandTotal(){ return Math.max(0, subtotal() - rewardDiscount()); }
function totalQty(){ let n=0; for(const q of order.values()) n+=q; return n; }
function earnPts(){ return Math.floor(grandTotal()/100); }

/* ===== LEFT: identity ===== */
function renderIdentity(){
  const wrap = document.getElementById("idScroll");
  const pill = document.getElementById("memberPill");

  if(!customer){
    pill.textContent = "Identify customer";
    pill.classList.add("member");
    wrap.innerHTML = lookupCardHtml();
    wireKeypad();
    return;
  }

  // matched or new
  pill.textContent = customer.isNew ? "New member ✓" : (customer.tier + " member");
  wrap.innerHTML = (customer.isNew ? enrollCardHtml() : memberCardHtml()) + rewardsCardHtml() + changeCustomerHtml();
  wireRewards();
  document.getElementById("changeCust").onclick = resetCustomer;
}

function lookupCardHtml(){
  const shown = phoneBuf.length ? phoneBuf : "";
  const keys = ["1","2","3","4","5","6","7","8","9","clear","0","lookup"];
  const keyHtml = keys.map(k=>{
    if(k==="clear") return `<button class="key alt" data-k="back" type="button">⌫</button>`;
    if(k==="lookup") return `<button class="key lookup-key" data-k="lookup" type="button">Look up</button>`;
    return `<button class="key" data-k="${k}" type="button">${k}</button>`;
  }).join("");
  return `
    <div class="card lookup">
      <div class="lk-lbl">Phone number — loyalty lookup</div>
      <div class="phone-disp">
        <span class="pre">+48</span>
        <span class="num ${shown?"":"placeholder"}" id="phoneNum">${shown || "000 000 000"}</span>
        <button class="clr" id="phoneClr" type="button" aria-label="clear">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Z"/><path d="m18 9-6 6M12 9l6 6"/></svg>
        </button>
      </div>
      <div class="keypad">${keyHtml}</div>
      <div class="hint-known">
        Zero-friction — no password. Unknown numbers auto-enroll.<br>
        Try a member: <code data-fill="600123456">600 123 456</code> <code data-fill="512987654">512 987 654</code> <code data-fill="698222111">698 222 111</code>
      </div>
    </div>`;
}

function memberCardHtml(){
  const c = customer;
  return `
    <div class="member-card">
      <div class="mc-top">
        <div>
          <div class="mc-name">${c.name}</div>
          <div class="mc-phone">+48 ${c.phone.replace(/(\d{3})(\d{3})(\d{3})/,"$1 $2 $3")}</div>
        </div>
        <span class="tier ${c.tier}">${c.tier}</span>
      </div>
      <div class="mc-pts">
        <div class="big tnum" id="ptsBig">${c.pts}</div>
        <div class="lbl">Points balance</div>
      </div>
      <div class="mc-stats">
        <div class="mc-stat"><div class="v tnum">${c.lifetime}</div><div class="l">Lifetime orders</div></div>
        <div class="mc-stat"><div class="v tnum">${c.tier==="Gold"?"2×":"1×"}</div><div class="l">Earn rate</div></div>
      </div>
    </div>`;
}

function enrollCardHtml(){
  const c = customer;
  return `
    <div class="enroll-card">
      <div class="en-top">
        <div class="en-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg></div>
        <div>
          <div class="en-t">New customer — auto-enrolled ✓</div>
          <div class="en-p">+48 <span class="en-num">${c.phone.replace(/(\d{3})(\d{3})(\d{3})/,"$1 $2 $3")}</span> · no password, zero-friction</div>
        </div>
      </div>
      <div class="en-meta">
        <div><div class="v tnum">0</div><div class="l">Points balance</div></div>
        <div><div class="v tnum">0</div><div class="l">Lifetime orders</div></div>
        <div><div class="v">Member</div><div class="l">Tier</div></div>
      </div>
    </div>`;
}

function rewardsCardHtml(){
  const bal = customer.pts;
  const rows = REWARDS.map(r=>{
    const affordable = bal >= r.cost;
    const isApplied = appliedReward && appliedReward.id === r.id;
    const offTxt = r.pct ? `${Math.round(r.pct*100)}% off subtotal` : `${fmtPLN(r.off)} off`;
    const rowCls = "reward-row" + (isApplied?" is-applied":(!affordable?" is-disabled":""));
    let btn;
    if(isApplied){
      btn = `<button class="apply-btn applied" data-reward="${r.id}" type="button">Applied ✓</button>`;
    } else {
      btn = `<button class="apply-btn" data-reward="${r.id}" type="button" ${affordable?"":"disabled"}>${affordable?"Apply":"Need "+(r.cost-bal)}</button>`;
    }
    return `
      <div class="${rowCls}">
        <div class="rw-ico">${REWARD_EMOJI[r.id]||"★"}</div>
        <div class="rw-info">
          <div class="rw-n">${r.n}</div>
          <div class="rw-c"><span class="val">${r.cost} pts</span> · ${offTxt}</div>
        </div>
        ${btn}
      </div>`;
  }).join("");
  return `
    <div class="card rewards">
      <div class="rw-h"><span>Redeemable rewards</span><span class="bal tnum">${bal} pts</span></div>
      ${rows}
    </div>`;
}

function changeCustomerHtml(){
  return `<div class="id-empty" style="cursor:pointer" id="changeCust">Tap to identify a different customer →</div>`;
}

function wireKeypad(){
  document.querySelectorAll(".key").forEach(k=>{
    k.onclick = ()=>{
      const v = k.dataset.k;
      if(v==="back"){ phoneBuf = phoneBuf.slice(0,-1); refreshPhoneDisp(); }
      else if(v==="lookup"){ doLookup(); }
      else { if(phoneBuf.length<9){ phoneBuf += v; refreshPhoneDisp(); } }
    };
  });
  const clr = document.getElementById("phoneClr");
  if(clr) clr.onclick = ()=>{ phoneBuf=""; refreshPhoneDisp(); };
  document.querySelectorAll("[data-fill]").forEach(c=>{
    c.onclick = ()=>{ phoneBuf = c.dataset.fill; refreshPhoneDisp(); doLookup(); };
  });
}
function refreshPhoneDisp(){
  const el = document.getElementById("phoneNum");
  if(!el) return;
  const grouped = phoneBuf.replace(/(\d{3})(?=\d)/g,"$1 ").trim();
  el.textContent = phoneBuf.length ? grouped : "000 000 000";
  el.classList.toggle("placeholder", phoneBuf.length===0);
}
function doLookup(){
  if(phoneBuf.length < 9){
    // brief nudge — flash placeholder
    const el = document.getElementById("phoneNum");
    if(el){ el.textContent = "Enter 9 digits"; el.classList.add("placeholder"); }
    return;
  }
  const match = CUSTOMERS.find(c=>c.phone===phoneBuf);
  if(match){
    customer = {...match, isNew:false};
  } else {
    customer = {phone:phoneBuf, name:"New customer", pts:0, tier:"Member", lifetime:0, isNew:true};
  }
  appliedReward = null;
  renderIdentity();
  renderTicketTotals();
}
function resetCustomer(){
  customer = null;
  phoneBuf = "";
  appliedReward = null;
  renderIdentity();
  renderTicketTotals();
}

function wireRewards(){
  document.querySelectorAll(".apply-btn").forEach(b=>{
    if(b.disabled) return;
    b.onclick = ()=>{
      const r = REWARDS.find(x=>x.id===b.dataset.reward);
      if(!r) return;
      if(appliedReward && appliedReward.id===r.id){
        appliedReward = null;          // toggle off
      } else {
        appliedReward = r;
      }
      renderIdentity();
      renderTicketTotals();
    };
  });
}

/* ===== RIGHT: products + ticket ===== */
function renderCatTabs(){
  const wrap = document.getElementById("catTabs");
  wrap.innerHTML = "";
  CATS.forEach(cat=>{
    const b = document.createElement("button");
    b.type = "button";
    b.className = "cat-tab";
    b.setAttribute("aria-pressed", String(cat===activeCat));
    b.innerHTML = `<span>${CAT_EMOJI[cat]}</span>${cat}`;
    b.onclick = ()=>{ activeCat = cat; renderCatTabs(); renderGrid(); };
    wrap.appendChild(b);
  });
}
function renderGrid(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  MENU.filter(m=>m.cat===activeCat).forEach(m=>{
    const q = order.get(m.id) || 0;
    const tile = document.createElement("button");
    tile.type = "button";
    tile.className = "ptile" + (q>0?" in-order":"");
    let badge = "";
    if(m.role==="hero")   badge = `<span class="pt-badge hero">Hero</span>`;
    else if(m.role==="profit") badge = `<span class="pt-badge profit">Profit</span>`;
    else if(m.role==="anchor") badge = `<span class="pt-badge anchor">${m.lto?"LTO":"Anchor"}</span>`;
    tile.innerHTML = `
      ${badge}
      <span class="pt-em">${CAT_EMOJI[m.cat]}</span>
      <span class="pt-n">${m.n}</span>
      <span class="pt-foot">
        <span class="pt-price tnum">${fmtPLN(m.price)}</span>
        <span class="pt-q tnum">${q}</span>
      </span>`;
    tile.onclick = ()=>changeQty(m.id, +1);
    grid.appendChild(tile);
  });
}

function changeQty(id, delta){
  const cur = order.get(id) || 0;
  const next = cur + delta;
  if(next<=0) order.delete(id);
  else order.set(id, next);
  renderGrid();
  renderTicketTotals();
}

function renderTicketTotals(){
  // ticket "for"
  document.getElementById("tkFor").innerHTML = customer
    ? `for <b>${customer.name}${customer.isNew?" (new)":""}</b>`
    : "Walk-in";

  // lines
  const lines = document.getElementById("tkLines");
  if(order.size===0){
    lines.innerHTML = `<div class="tk-empty">No items yet.<br>Tap a product to start the order.</div>`;
  } else {
    lines.innerHTML = "";
    for(const [id,q] of order){
      const m = MENU_BY_ID[id];
      const row = document.createElement("div");
      row.className = "line";
      row.innerHTML = `
        <div class="l-q">
          <button class="qbtn minus" type="button" aria-label="decrease">−</button>
          <span class="l-qv tnum">${q}</span>
          <button class="qbtn plus" type="button" aria-label="increase">+</button>
        </div>
        <span class="l-n">${m.n}</span>
        <span class="l-p tnum">${fmtPLN(m.price*q)}</span>`;
      row.querySelector(".minus").onclick = ()=>changeQty(id,-1);
      row.querySelector(".plus").onclick  = ()=>changeQty(id,+1);
      lines.appendChild(row);
    }
  }

  // totals
  const sub = subtotal();
  const disc = rewardDiscount();
  const tot = grandTotal();
  const pts = earnPts();
  const totals = document.getElementById("tkTotals");
  const discLine = (appliedReward && disc>0)
    ? `<div class="tot-row disc"><span>${appliedReward.n}</span><span class="v">−${fmtPLN(disc)}</span></div>`
    : "";
  const earnCls = (customer && tot>0) ? "earn-preview" : "earn-preview muted";
  const earnTxt = customer
    ? (tot>0 ? `<span class="ep-ico">✦</span>Earns <span class="ep-pts">+${pts} pts</span> on this order` : `<span class="ep-ico">✦</span>Member identified — add items to earn`)
    : `<span class="ep-ico">✦</span>Identify a member to earn & redeem points`;

  totals.innerHTML = `
    <div class="tot-row"><span>Subtotal</span><span class="v tnum">${fmtPLN(sub)}</span></div>
    ${discLine}
    <div class="tot-row grand"><span>Total</span><span class="v tnum">${fmtPLN(tot)}</span></div>
    <div class="${earnCls}">${earnTxt}</div>
    <button class="charge-btn" id="chargeBtn" type="button" ${totalQty()===0?"disabled":""}>
      <svg viewBox="0 0 24 24"><path d="M2 8h20M2 8v9a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1V8M2 8l1.2-3.2A1 1 0 0 1 4.1 4h15.8a1 1 0 0 1 .9.8L22 8" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Charge ${fmtPLN(tot)}
    </button>`;
  document.getElementById("chargeBtn").onclick = charge;
}

/* ===== Charge / paid ===== */
function charge(){
  if(totalQty()===0) return;
  const amount = grandTotal();
  const earned = earnPts();
  document.getElementById("paidAmt").textContent = fmtPLN(amount) + " · " + channel + " · " + location;

  const loyalty = document.getElementById("paidLoyalty");
  if(customer){
    const redeemed = appliedReward ? appliedReward.cost : 0;
    const newBal = Math.max(0, customer.pts - redeemed + earned);
    loyalty.style.display = "block";
    loyalty.innerHTML = `
      <div class="pl-name">${customer.name}${customer.isNew?" · enrolled ✓":""}</div>
      ${appliedReward ? `<div class="pl-row"><span>Reward redeemed (${appliedReward.n})</span><span class="v">−${appliedReward.cost} pts</span></div>` : ""}
      <div class="pl-row"><span>Points earned</span><span class="v">+${earned} pts</span></div>
      <div class="pl-row bal"><span>New balance</span><span class="v tnum">${newBal} pts</span></div>`;
    // commit to the in-memory customer record so a repeat lookup reflects it
    const rec = CUSTOMERS.find(c=>c.phone===customer.phone);
    if(rec){ rec.pts = newBal; rec.lifetime += 1; }
    customer.pts = newBal;
    customer.isNew = false;
  } else {
    loyalty.style.display = "none";
    loyalty.innerHTML = "";
  }
  document.getElementById("paidScrim").classList.add("open");
}
function newOrder(){
  order.clear();
  appliedReward = null;
  customer = null;
  phoneBuf = "";
  activeCat = "Pizza";
  document.getElementById("paidScrim").classList.remove("open");
  renderCatTabs();
  renderGrid();
  renderIdentity();
  renderTicketTotals();
}
document.getElementById("newOrder").onclick = newOrder;
document.getElementById("paidScrim").onclick = (e)=>{ if(e.target.id==="paidScrim"){} };

/* ===== switchers ===== */
function syncOrderPill(){
  document.getElementById("orderPill").textContent = location + " · " + channel;
}
document.querySelectorAll("#locSeg .seg").forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll("#locSeg .seg").forEach(x=>x.setAttribute("aria-pressed","false"));
    b.setAttribute("aria-pressed","true");
    location = b.dataset.loc;
    syncOrderPill();
  };
});
document.querySelectorAll("#chanSeg .seg").forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll("#chanSeg .seg").forEach(x=>x.setAttribute("aria-pressed","false"));
    b.setAttribute("aria-pressed","true");
    channel = b.dataset.chan;
    syncOrderPill();
  };
});

/* ===== fullscreen ===== */
const FS_ICON = {
  expand:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H3v5"/><path d="M21 8V3h-5"/><path d="M16 21h5v-5"/><path d="M3 16v5h5"/></svg>',
  exit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h5V4"/><path d="M20 9h-5V4"/><path d="M4 15h5v5"/><path d="M20 15h-5v5"/></svg>',
};
function isFs(){ return document.fullscreenElement!=null; }
function syncFsBtn(){
  const btn = document.getElementById("fsBtn");
  const on = document.documentElement.classList.contains("is-fullscreen");
  btn.innerHTML = (on?FS_ICON.exit:FS_ICON.expand) + `<span>${on?"Exit":"Fullscreen"}</span>`;
  btn.setAttribute("aria-pressed", String(on));
}
function toggleFs(){
  const root = document.documentElement;
  if(!isFs() && !root.classList.contains("is-fullscreen")){
    if(root.requestFullscreen){
      root.requestFullscreen().catch(()=>{root.classList.add("is-fullscreen");syncFsBtn();});
    } else { root.classList.add("is-fullscreen"); }
  } else {
    if(document.exitFullscreen && isFs()){ document.exitFullscreen().catch(()=>{}); }
    root.classList.remove("is-fullscreen");
  }
  syncFsBtn();
}
document.addEventListener("fullscreenchange",()=>{
  document.documentElement.classList.toggle("is-fullscreen", isFs());
  syncFsBtn();
});
document.getElementById("fsBtn").addEventListener("click", toggleFs);

/* ===== clock ===== */
function pad(n){ return String(n).padStart(2,"0"); }
function clockTick(){
  const d = new Date();
  document.getElementById("clock").textContent = pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());
}

/* ===== init ===== */
syncFsBtn();
syncOrderPill();
renderCatTabs();
renderGrid();
renderIdentity();
renderTicketTotals();
clockTick();
setInterval(clockTick, 1000);
</script>
