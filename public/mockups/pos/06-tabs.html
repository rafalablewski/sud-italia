<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sud Italia POS — Tabs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap">
<style>
  :root{
    /* surfaces — Atlas dark */
    --canvas:#0A0C10;
    --panel:#11151B;
    --raised:#1A2129;
    --hair:rgba(255,255,255,0.08);
    --hair-strong:rgba(255,255,255,0.14);
    /* text */
    --text:#E9EDF2;
    --dim:#9098A3;
    --faint:#5C6571;
    /* tone palette */
    --accent:#3DD68C;   /* green — fleet/multi feel */
    --firing:#3B82F6;
    --warn:#F5A623;
    --risk:#8B5CF6;
    --late:#E5484D;
    /* soft tints */
    --accent-soft:rgba(61,214,140,0.13);
    --firing-soft:rgba(59,130,246,0.14);
    --warn-soft:rgba(245,166,35,0.13);
    --late-soft:rgba(229,72,77,0.14);
    /* 8px grid */
    --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px; --s7:48px;
    --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Monaco,"Cascadia Code",monospace;
    --sans:"Inter",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--canvas);color:var(--text);font-family:var(--sans);
    font-size:13px;line-height:1.4;-webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;display:flex;flex-direction:column;overflow:hidden;
  }
  .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}

  /* ====================== Header ====================== */
  header{
    flex:0 0 auto;display:flex;align-items:center;gap:var(--s4);
    height:56px;padding:0 var(--s5);background:var(--panel);border-bottom:1px solid var(--hair);
  }
  .brand{display:flex;align-items:baseline;gap:var(--s3);min-width:max-content}
  .wordmark{font-weight:700;font-size:14px;letter-spacing:0.22em;color:var(--text)}
  .kd-label{
    font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--faint);
    border-left:1px solid var(--hair);padding-left:var(--s3);
  }
  .design-tag{
    font-family:var(--mono);font-size:11px;letter-spacing:0.06em;color:var(--dim);
    padding:3px 8px;border:1px solid var(--hair);border-radius:5px;white-space:nowrap;
  }

  .ctl{display:flex;align-items:center;gap:var(--s2)}
  .ctl-lbl{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--faint)}
  /* segmented controls */
  .seg-group{display:flex;align-items:stretch;border:1px solid var(--hair);border-radius:7px;overflow:hidden;background:var(--canvas)}
  .seg{
    appearance:none;border:0;background:transparent;cursor:pointer;
    font-family:var(--sans);font-size:11.5px;letter-spacing:0.01em;color:var(--dim);
    padding:6px 11px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
    border-right:1px solid var(--hair);transition:color .16s ease,background .16s ease;
  }
  .seg:last-child{border-right:0}
  .seg:hover{color:var(--text)}
  .seg[aria-pressed="true"]{background:var(--raised);color:var(--accent);font-weight:600}
  .seg svg{width:13px;height:13px}

  .spacer{margin-left:auto}
  .fsbtn{
    appearance:none;cursor:pointer;border:1px solid var(--hair);background:transparent;
    color:var(--dim);font-family:var(--sans);font-size:11px;letter-spacing:0.02em;
    padding:6px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:6px;
    transition:color .16s ease,border-color .16s ease;white-space:nowrap;
  }
  .fsbtn:hover{color:var(--text);border-color:var(--hair-strong)}
  .fsbtn svg{width:13px;height:13px;display:block}
  .fsbtn .fs-on{display:none}
  .is-fullscreen .fsbtn .fs-on{display:inline-flex}
  .is-fullscreen .fsbtn .fs-off{display:none}
  .gallery-link{
    font-size:11px;color:var(--faint);text-decoration:none;border:1px solid var(--hair);
    padding:5px 9px;border-radius:6px;transition:color .16s ease,border-color .16s ease;white-space:nowrap;
  }
  .gallery-link:hover{color:var(--text);border-color:var(--hair-strong)}
  .clock{font-family:var(--mono);font-size:14px;letter-spacing:0.04em;color:var(--text);min-width:78px;text-align:right}

  .is-fullscreen header{height:50px}
  .is-fullscreen .kd-label,.is-fullscreen .gallery-link,.is-fullscreen .design-tag{display:none}
  .is-fullscreen footer{display:none}

  /* ====================== Tab rail ====================== */
  .tabrail{
    flex:0 0 auto;background:var(--panel);border-bottom:1px solid var(--hair);
    padding:var(--s3) var(--s5);display:flex;flex-direction:column;gap:var(--s3);
  }
  .tr-eyebrow{display:flex;align-items:center;gap:var(--s3)}
  .tr-brandline{display:flex;align-items:center;gap:7px;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--dim);font-weight:700;white-space:nowrap}
  .tr-brandline svg{width:13px;height:13px;opacity:.7;flex:0 0 auto}
  .tr-sep{flex:1 1 auto;height:1px;background:var(--hair)}
  .tr-summary{font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--faint);white-space:nowrap}
  .tr-summary b{color:var(--text);font-weight:700}
  .tr-summary .pipe{color:var(--hair-strong);margin:0 6px}

  .tabs{display:flex;gap:var(--s3);overflow-x:auto;padding-bottom:2px;scrollbar-width:thin}
  .tabs::-webkit-scrollbar{height:6px}
  .tabs::-webkit-scrollbar-thumb{background:var(--hair-strong);border-radius:3px}
  .tab{
    flex:0 0 auto;width:208px;min-height:78px;cursor:pointer;text-align:left;
    background:var(--raised);border:1px solid var(--hair);border-radius:11px;
    padding:var(--s3) var(--s3) var(--s3) calc(var(--s3) + 4px);position:relative;overflow:hidden;
    transition:border-color .16s ease,background .16s ease,transform .1s ease;
    display:flex;flex-direction:column;gap:6px;
  }
  .tab::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--firing);transition:background .16s ease}
  .tab.open::before{background:var(--firing)}
  .tab.parked::before{background:var(--faint)}
  .tab.pay::before{background:var(--accent)}
  .tab:hover{border-color:var(--hair-strong)}
  .tab.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 12px 28px -16px rgba(61,214,140,0.5)}
  .tab.parked{opacity:.55}
  .tab.parked.active{opacity:1}
  .tab-top{display:flex;align-items:center;gap:7px}
  .tab-dot{width:8px;height:8px;border-radius:50%;background:var(--firing);flex:0 0 auto}
  .tab.parked .tab-dot{background:var(--faint)}
  .tab.pay .tab-dot{background:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .tab-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1 1 auto}
  .tab-chan{display:inline-flex;color:var(--faint)}
  .tab-chan svg{width:12px;height:12px}
  .tab-id{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:0.03em}
  .tab-foot{display:flex;align-items:baseline;justify-content:space-between;margin-top:auto}
  .tab-items{font-size:10.5px;color:var(--dim);letter-spacing:0.02em}
  .tab-total{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text)}
  .tab.pay .tab-total{color:var(--accent)}
  .tab-status{
    position:absolute;top:8px;right:9px;font-size:8px;font-weight:700;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--faint);
  }
  .tab.pay .tab-status{color:var(--accent)}
  .tab.parked .tab-status{color:var(--faint)}

  .tab-new{
    flex:0 0 auto;width:120px;min-height:78px;cursor:pointer;
    background:transparent;border:1px dashed var(--hair-strong);border-radius:11px;
    color:var(--dim);font-family:var(--sans);font-size:12px;font-weight:600;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    transition:color .16s ease,border-color .16s ease,background .16s ease;
  }
  .tab-new:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
  .tab-new svg{width:22px;height:22px}

  /* ====================== Editor region ====================== */
  .editor{flex:1 1 auto;min-height:0;display:grid;grid-template-columns:1fr 400px;gap:1px;background:var(--hair)}

  /* LEFT — product grid */
  .products{background:var(--canvas);display:flex;flex-direction:column;min-height:0;min-width:0}
  .cats{
    flex:0 0 auto;display:flex;gap:var(--s1);flex-wrap:wrap;padding:var(--s4) var(--s5);
    background:var(--panel);border-bottom:1px solid var(--hair);
  }
  .chip{
    appearance:none;background:transparent;border:1px solid var(--hair);color:var(--dim);
    font-family:var(--sans);font-size:12px;letter-spacing:0.01em;padding:7px 12px;border-radius:7px;
    cursor:pointer;transition:color .16s ease,border-color .16s ease,background .16s ease;white-space:nowrap;
    display:inline-flex;align-items:center;gap:6px;
  }
  .chip:hover{border-color:var(--hair-strong);color:var(--text)}
  .chip[aria-pressed="true"]{background:var(--raised);border-color:var(--hair-strong);color:var(--text);font-weight:600}
  .chip .cemoji{font-size:13px}

  .grid-scroll{flex:1 1 auto;overflow-y:auto;padding:var(--s4) var(--s5);min-height:0}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:var(--s3);align-content:start}
  .card{
    appearance:none;cursor:pointer;text-align:left;font-family:var(--sans);
    background:var(--raised);border:1px solid var(--hair);border-radius:11px;
    padding:var(--s3) var(--s4);display:flex;flex-direction:column;gap:5px;position:relative;
    transition:transform .1s ease,border-color .16s ease,background .16s ease;min-height:100px;
  }
  .card:hover{transform:translateY(-2px);border-color:var(--hair-strong);background:#202832}
  .card:active{transform:translateY(0) scale(.98)}
  .card.added .flash{animation:flash .4s ease}
  .card .flash{position:absolute;inset:0;border-radius:11px;background:var(--accent);opacity:0;pointer-events:none}
  @keyframes flash{0%{opacity:.22}100%{opacity:0}}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
  .card-emoji{font-size:18px;line-height:1}
  .card-name{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.25}
  .card-price{font-family:var(--mono);font-size:13px;color:var(--dim);margin-top:auto}
  .card-tags{display:flex;gap:4px;flex-wrap:wrap}
  .tag{font-size:9px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;padding:1px 5px;border-radius:4px;line-height:1.5}
  .tag.veg,.tag.vegan{background:var(--accent-soft);color:var(--accent)}
  .tag.spicy{background:var(--late-soft);color:var(--late)}
  .tag.gf{background:var(--warn-soft);color:var(--warn)}
  .role-badge{font-size:9px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:1px 6px;border-radius:5px;flex:0 0 auto}
  .role-hero{background:var(--firing);color:#fff}
  .role-profit{background:var(--accent);color:#06140d}
  .role-anchor{background:var(--risk);color:#fff}
  .lto-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--warn);margin-left:4px;vertical-align:middle}

  /* combo strip above grid */
  .combo-strip{
    flex:0 0 auto;display:flex;gap:var(--s2);padding:var(--s3) var(--s5);
    background:var(--panel);border-bottom:1px solid var(--hair);overflow-x:auto;align-items:center;
  }
  .combo-strip .cs-lbl{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--faint);font-weight:700;white-space:nowrap;flex:0 0 auto}
  .combo-pill{
    appearance:none;cursor:pointer;font-family:var(--sans);flex:0 0 auto;white-space:nowrap;
    background:var(--accent-soft);border:1px solid rgba(61,214,140,0.3);border-radius:8px;
    color:var(--accent);font-size:12px;font-weight:600;padding:6px 11px;
    display:inline-flex;align-items:center;gap:8px;transition:background .16s ease;
  }
  .combo-pill:hover{background:rgba(61,214,140,0.2)}
  .combo-pill .cp-off{font-family:var(--mono);font-size:11px;font-weight:700}

  /* RIGHT — active order ticket */
  .ticket{background:var(--panel);display:flex;flex-direction:column;min-height:0}
  .ticket-head{
    flex:0 0 auto;padding:var(--s4) var(--s5);border-bottom:1px solid var(--hair);
    display:flex;flex-direction:column;gap:var(--s3);
  }
  .th-row1{display:flex;align-items:center;gap:var(--s2)}
  .th-dot{width:9px;height:9px;border-radius:50%;background:var(--firing);flex:0 0 auto}
  .th-dot.parked{background:var(--faint)}
  .th-dot.pay{background:var(--accent)}
  .th-name{font-size:16px;font-weight:650;color:var(--text);letter-spacing:-0.01em;flex:1 1 auto;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .th-id{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:0.03em}
  .th-chan{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;color:var(--faint);letter-spacing:0.04em;text-transform:uppercase}
  .th-chan svg{width:12px;height:12px;opacity:.7}
  .th-actions{display:flex;gap:var(--s2)}
  .mini-btn{
    appearance:none;cursor:pointer;font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:0.02em;
    border:1px solid var(--hair-strong);background:var(--raised);color:var(--dim);
    border-radius:7px;padding:7px 12px;display:inline-flex;align-items:center;gap:6px;
    transition:color .16s ease,border-color .16s ease,background .16s ease;
  }
  .mini-btn:hover{color:var(--text);border-color:var(--text)}
  .mini-btn svg{width:13px;height:13px}
  .mini-btn.park.is-parked{color:var(--faint);border-color:var(--faint)}
  .mini-btn.kds:hover{color:var(--firing);border-color:var(--firing)}
  .mini-btn.kds.sent{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}

  .lines{flex:1 1 auto;overflow-y:auto;padding:var(--s3) var(--s5);min-height:0;display:flex;flex-direction:column;gap:var(--s2)}
  .lines::-webkit-scrollbar{width:7px}
  .lines::-webkit-scrollbar-thumb{background:var(--hair-strong);border-radius:4px}
  .empty-ticket{
    flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--faint);text-align:center;gap:8px;padding:var(--s6);
  }
  .empty-ticket .e-emoji{font-size:30px;opacity:.5}
  .empty-ticket .e-text{font-size:14px;color:var(--dim)}
  .empty-ticket .e-sub{font-size:12px}

  .line{display:flex;align-items:center;gap:var(--s3);padding:var(--s2) 0;border-bottom:1px solid var(--hair)}
  .line:last-child{border-bottom:0}
  .line-body{flex:1 1 auto;min-width:0}
  .line-name{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.2}
  .line-each{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:2px}
  .stepper{display:flex;align-items:center;gap:2px;flex:0 0 auto}
  .step-btn{
    appearance:none;cursor:pointer;width:27px;height:27px;border-radius:7px;
    border:1px solid var(--hair);background:var(--raised);color:var(--text);
    font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;transition:all .1s ease;
  }
  .step-btn:hover{background:#202832;border-color:var(--hair-strong)}
  .step-btn:active{transform:scale(.92)}
  .step-q{font-family:var(--mono);font-size:13px;font-weight:700;min-width:24px;text-align:center;color:var(--text)}
  .line-total{font-family:var(--mono);font-size:13.5px;font-weight:700;color:var(--text);min-width:62px;text-align:right;flex:0 0 auto}

  .combo-applied{
    display:flex;align-items:center;gap:8px;padding:var(--s2) var(--s3);
    background:var(--accent-soft);border:1px solid rgba(61,214,140,0.28);border-radius:9px;margin-top:var(--s2);
  }
  .combo-applied .ca-name{font-size:12px;font-weight:600;color:var(--accent);flex:1 1 auto}
  .combo-applied .ca-off{font-family:var(--mono);font-size:12.5px;font-weight:700;color:var(--accent)}
  .combo-applied .ca-x{appearance:none;cursor:pointer;border:0;background:transparent;color:var(--accent);font-size:15px;line-height:1;padding:0 2px;opacity:.7}
  .combo-applied .ca-x:hover{opacity:1}

  .totals{flex:0 0 auto;padding:var(--s4) var(--s5);border-top:1px solid var(--hair);background:var(--canvas)}
  .trow{display:flex;align-items:baseline;justify-content:space-between;font-size:12.5px;color:var(--dim);padding:3px 0}
  .trow.discount{color:var(--accent);font-weight:600}
  .trow .tv{font-family:var(--mono)}
  .trow.grand{font-size:16px;color:var(--text);font-weight:700;padding-top:var(--s2);margin-top:var(--s2);border-top:1px solid var(--hair)}
  .trow.grand .tv{font-size:20px;font-weight:700}

  .charge-area{flex:0 0 auto;padding:0 var(--s5) var(--s5)}
  .btn{
    appearance:none;font-family:var(--sans);font-weight:700;letter-spacing:0.01em;
    border-radius:11px;cursor:pointer;transition:all .14s ease;white-space:nowrap;width:100%;
    border:1px solid var(--accent);background:var(--accent);color:#06140d;
    font-size:16px;padding:15px 22px;display:flex;align-items:center;justify-content:center;gap:9px;
  }
  .btn:hover{filter:brightness(1.08)}
  .btn:active{transform:scale(.99)}
  .btn:disabled{background:var(--raised);border-color:var(--hair);color:var(--faint);cursor:not-allowed;filter:none}
  .btn svg{width:17px;height:17px}

  /* tender + paid overlay (within ticket column) */
  .ticket-inner{position:relative;flex:1 1 auto;display:flex;flex-direction:column;overflow:hidden;min-height:0}
  .overlay{position:absolute;inset:0;background:rgba(10,12,16,0.7);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;z-index:5}
  .overlay.open{display:flex}
  .tender-sheet{
    width:100%;background:var(--panel);border-top:1px solid var(--hair-strong);
    border-radius:14px 14px 0 0;padding:var(--s5);box-shadow:0 -20px 50px -22px rgba(0,0,0,0.7);
    animation:slideUp .22s ease;
  }
  @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
  .tender-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:var(--s4)}
  .tender-head .te-title{font-size:13px;letter-spacing:0.04em;font-weight:700;color:var(--text)}
  .tender-head .te-amt{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent)}
  .tender-opts{display:grid;grid-template-columns:1fr 1fr;gap:var(--s3);margin-bottom:var(--s3)}
  .tender-opt{
    appearance:none;cursor:pointer;font-family:var(--sans);font-size:14px;font-weight:600;
    border:1px solid var(--hair-strong);background:var(--raised);color:var(--text);
    border-radius:12px;padding:17px;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .14s ease;
  }
  .tender-opt:hover{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  .tender-opt:active{transform:scale(.97)}
  .tender-opt svg{width:25px;height:25px}
  .tender-cancel{appearance:none;cursor:pointer;width:100%;border:1px solid var(--hair);background:transparent;color:var(--dim);font-family:var(--sans);font-size:12.5px;padding:11px;border-radius:10px}
  .tender-cancel:hover{background:var(--raised)}

  .toast{
    position:absolute;left:50%;bottom:90px;transform:translateX(-50%) translateY(10px);
    background:var(--raised);border:1px solid var(--accent);color:var(--accent);
    font-size:12.5px;font-weight:600;padding:10px 18px;border-radius:10px;
    box-shadow:0 16px 40px -18px rgba(0,0,0,0.8);opacity:0;pointer-events:none;
    transition:opacity .2s ease,transform .2s ease;display:inline-flex;align-items:center;gap:8px;z-index:6;
  }
  .toast svg{width:15px;height:15px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .empty-editor{
    grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:var(--s3);color:var(--faint);background:var(--canvas);text-align:center;padding:var(--s7);
  }
  .empty-editor .ee-emoji{font-size:40px;opacity:.5}
  .empty-editor .ee-text{font-size:15px;color:var(--dim)}
  .empty-editor .ee-btn{
    appearance:none;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:600;

    display:flex;align-items:center;gap:var(--s5);padding:0 var(--s5);font-size:11px;color:var(--faint);
  }
  .legend{display:flex;gap:var(--s4);flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:6px;letter-spacing:0.02em}
  .legend i{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .kbd-hint{margin-left:auto;font-family:var(--mono);letter-spacing:0.04em}
  .kbd{display:inline-block;padding:1px 5px;border:1px solid var(--hair);border-radius:3px;color:var(--dim);margin:0 1px}

  ::-webkit-scrollbar{height:8px;width:8px}
  ::-webkit-scrollbar-thumb{background:var(--hair-strong);border-radius:4px}
  ::-webkit-scrollbar-track{background:transparent}

  @media (max-width:1100px){
    .editor{grid-template-columns:1fr 340px}
  }

        Open checks

  </footer>

<script>
"use strict";

/* ====================== Sample data ====================== */
let LOC = "Kraków";
const fmtPLN = g => (g/100).toFixed(2).replace(".",",")+" zł";
const CATS = ["Pizza","Pasta","Antipasti","Panini","Drinks","Desserts"];
const CAT_EMOJI = {Pizza:"🍕",Pasta:"🍝",Antipasti:"🥖",Panini:"🥪",Drinks:"☕",Desserts:"🍰"};
const MENU = [
  {id:"margherita", n:"Margherita",              cat:"Pizza",     price:2790, tags:["veg"],         role:"hero"},
  {id:"quattro",    n:"Quattro Formaggi",        cat:"Pizza",     price:3390, tags:["veg"],         role:"profit"},
  {id:"diavola",    n:"Diavola",                 cat:"Pizza",     price:3290, tags:["spicy"]},
  {id:"prosciutto", n:"Prosciutto e Rucola",     cat:"Pizza",     price:3590, tags:[]},
  {id:"ortolana",   n:"Ortolana",                cat:"Pizza",     price:3090, tags:["veg"]},
  {id:"pizzaiolo",  n:"Pizza del Pizzaiolo",     cat:"Pizza",     price:4990, tags:["veg"],         role:"anchor", lto:true},
  {id:"tartufata",  n:"Tartufata Reale",         cat:"Pizza",     price:7990, tags:[],              role:"anchor", lto:true},
  {id:"personale",  n:'Margherita Personale 8"', cat:"Pizza",     price:1890, tags:["veg"]},
  {id:"slice",      n:"Slice (Margherita)",      cat:"Pizza",     price:1190, tags:["veg"]},
  {id:"carbonara",  n:"Spaghetti Carbonara",     cat:"Pasta",     price:2895, tags:[]},
  {id:"arrabbiata", n:"Penne Arrabbiata",        cat:"Pasta",     price:2390, tags:["vegan","spicy"]},
  {id:"pesto",      n:"Linguine al Pesto",       cat:"Pasta",     price:2695, tags:["veg"],         role:"profit"},
  {id:"bolognese",  n:"Tagliatelle Bolognese",   cat:"Pasta",     price:2995, tags:[]},
  {id:"bruschetta", n:"Bruschetta Classica",     cat:"Antipasti", price:1590, tags:["vegan"]},
  {id:"garlic",     n:"Garlic Bread",            cat:"Antipasti", price:990,  tags:["veg"],         role:"profit"},
  {id:"burrata",    n:"Burrata con Pomodorini",  cat:"Antipasti", price:2195, tags:["veg","gf"]},
  {id:"arancini",   n:"Arancini (3 pcs)",        cat:"Antipasti", price:1790, tags:[]},
  {id:"caprese",    n:"Panino Caprese",          cat:"Panini",    price:1990, tags:["veg"]},
  {id:"milano",     n:"Panino Milano",           cat:"Panini",    price:2290, tags:[]},
  {id:"espresso",   n:"Espresso",                cat:"Drinks",    price:990,  tags:["vegan","gf"],  role:"profit"},
  {id:"limonata",   n:"Limonata Fresca",         cat:"Drinks",    price:1190, tags:["vegan","gf"]},
  {id:"aranciata",  n:"Aranciata S.Pellegrino",  cat:"Drinks",    price:990,  tags:["vegan","gf"]},
  {id:"water",      n:"Acqua Minerale",          cat:"Drinks",    price:590,  tags:["vegan","gf"]},
  {id:"limonata1l", n:"Limonata 1L",             cat:"Drinks",    price:1990, tags:["vegan","gf"]},
  {id:"tiramisu",   n:"Tiramisù",                cat:"Desserts",  price:1800, tags:["veg"]},
  {id:"cannoli",    n:"Cannoli Siciliani (2)",   cat:"Desserts",  price:1600, tags:["veg"]},
  {id:"pannacotta", n:"Panna Cotta",             cat:"Desserts",  price:1500, tags:["veg","gf"],    role:"profit"},
];
const COMBOS = [
  {id:"lunch",  n:"Lunch Combo",    desc:"Any pizza + any drink",       off:300, items:["margherita","limonata"]},
  {id:"trio",   n:"Pizzaiolo Trio", desc:"Pizza + espresso + tiramisù", off:400, items:["pizzaiolo","espresso","tiramisu"]},
  {id:"family", n:"Family Pack",    desc:"2 pizzas + Limonata 1L",      off:800, items:["margherita","diavola","limonata1l"]},
];

const byId = id => MENU.find(m=>m.id===id);

/* ====================== Tab / order state ====================== */
// Each tab owns its own items + combos + channel. status: open | parked | pay
let tabSeq = 4;
let tabs = [
  { id:"A4F9C2", name:"Marco",          chan:"Takeout",  status:"open", sentKds:false,
    items:[{id:"margherita",q:2},{id:"diavola",q:1},{id:"espresso",q:1}], combos:[] },
  { id:"W1B7K2", name:"Walk-up",        chan:"Takeout",  status:"pay",  sentKds:true,
    items:[{id:"slice",q:2},{id:"limonata",q:1}], combos:["lunch"] },
  { id:"D9P3Q7", name:"Delivery · Giulia", chan:"Delivery", status:"open", sentKds:false,
    items:[{id:"quattro",q:1},{id:"carbonara",q:1},{id:"tiramisu",q:1}], combos:["trio"] },
];
let activeTabId = "A4F9C2";
let activeCat = "Pizza";

const CHARS="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
function newTabId(){
  let s="";for(let i=0;i<6;i++) s+=CHARS[Math.floor(Math.random()*CHARS.length)];return s;
}
function getActive(){ return tabs.find(t=>t.id===activeTabId)||null; }

/* ====================== Totals (per tab) ====================== */
function subtotalG(t){ return t.items.reduce((s,l)=>s+byId(l.id).price*l.q,0); }
function discountG(t){ return t.combos.reduce((s,id)=>s+(COMBOS.find(c=>c.id===id)?.off||0),0); }
function grandG(t){ return Math.max(0, subtotalG(t)-discountG(t)); }
function itemCount(t){ return t.items.reduce((s,l)=>s+l.q,0); }

/* ====================== Cart ops on active tab ====================== */
function addItem(id){
  const t=getActive();if(!t) return;
  const line=t.items.find(l=>l.id===id);
  if(line) line.q++; else t.items.push({id,q:1});
  if(t.status==="parked") t.status="open";
  t.sentKds=false;
  render();
}
function changeQty(id,delta){
  const t=getActive();if(!t) return;
  const line=t.items.find(l=>l.id===id);if(!line) return;
  line.q+=delta;
  if(line.q<=0) t.items=t.items.filter(l=>l.id!==id);
  t.sentKds=false;
  render();
}
function addCombo(c){
  const t=getActive();if(!t) return;
  c.items.forEach(id=>{
    const line=t.items.find(l=>l.id===id);
    if(line) line.q++; else t.items.push({id,q:1});
  });
  if(!t.combos.includes(c.id)) t.combos.push(c.id);
  if(t.status==="parked") t.status="open";
  t.sentKds=false;
  render();
}
function removeCombo(id){
  const t=getActive();if(!t) return;
  t.combos=t.combos.filter(c=>c!==id);
  render();
}

/* ====================== Tab ops ====================== */
function newTab(){
  tabSeq++;
  const t={ id:newTabId(), name:"Tab "+tabSeq, chan:channel, status:"open", sentKds:false, items:[], combos:[] };
  tabs.push(t);
  activeTabId=t.id;
  render();
}
function togglePark(){
  const t=getActive();if(!t) return;
  t.status = t.status==="parked" ? "open" : "parked";
  render();
}
function sendKds(){
  const t=getActive();if(!t || t.items.length===0) return;
  t.sentKds=true;
  if(t.status==="open") t.status="pay";
  toast("Sent to KDS — #"+t.id);
  render();
}
function setActive(id){ activeTabId=id; render(); }

/* ====================== Format ====================== */
function pad(n){return String(n).padStart(2,"0");}
function fmtClock(d){return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());}

const STATUS_LABEL={open:"Open",parked:"Parked",pay:"Ready · Pay"};

const CHAN_ICON={
  Takeout:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2h12l-1 4H7L6 2Z"/><path d="M5 6h14l-1.2 14.5a1.5 1.5 0 0 1-1.5 1.5H7.7a1.5 1.5 0 0 1-1.5-1.5L5 6Z"/></svg>',
  Delivery:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3h13v11H1z"/><path d="M14 7h4l3 3v4h-7"/><circle cx="6" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg>',
  "Dine-in":'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v7a3 3 0 0 0 6 0V3"/><path d="M6 3v18"/><path d="M17 3c-1.5 0-3 2-3 5s1.5 4 3 4v9"/></svg>',
};

/* ====================== Render: tab rail ====================== */
function renderTabs(){
  const wrap=document.getElementById("tabs");
  let html="";
  tabs.forEach(t=>{
    const cnt=itemCount(t);
    html+=`<button class="tab ${t.status}${t.id===activeTabId?" active":""}" data-tab="${t.id}" type="button">
      <span class="tab-status">${STATUS_LABEL[t.status]}</span>
      <div class="tab-top">
        <span class="tab-dot"></span>
        <span class="tab-name">${t.name}</span>
        <span class="tab-chan">${CHAN_ICON[t.chan]}</span>
      </div>
      <span class="tab-id tnum">#${t.id}</span>
      <div class="tab-foot">
        <span class="tab-items tnum">${cnt} item${cnt!==1?"s":""}</span>
        <span class="tab-total tnum">${fmtPLN(grandG(t))}</span>
      </div>
    </button>`;
  });
  html+=`<button class="tab-new" id="newTabBtn" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
    New tab
  </button>`;
  wrap.innerHTML=html;
  wrap.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>setActive(b.dataset.tab));
  document.getElementById("newTabBtn").onclick=newTab;

  // rail summary
  const open=tabs.filter(t=>t.status!=="parked").length;
  const parked=tabs.filter(t=>t.status==="parked").length;
  const pay=tabs.filter(t=>t.status==="pay").length;
  const openTotal=tabs.reduce((s,t)=>s+grandG(t),0);
  document.getElementById("railSummary").innerHTML=
    `<b>${tabs.length}</b> tabs<span class="pipe">·</span><b>${pay}</b> ready to pay<span class="pipe">·</span><b>${parked}</b> parked<span class="pipe">·</span>open value <b>${fmtPLN(openTotal)}</b>`;
}

/* ====================== Render: products ====================== */
function renderCats(){
  const wrap=document.getElementById("cats");
  // combos live in the strip; this is just category chips
  wrap.innerHTML="";
  CATS.forEach(cat=>{
    const b=document.createElement("button");
    b.className="chip";b.type="button";
    b.setAttribute("aria-pressed",String(cat===activeCat));
    b.innerHTML=`<span class="cemoji">${CAT_EMOJI[cat]}</span><span>${cat}</span>`;
    b.onclick=()=>{activeCat=cat;renderCats();renderGrid();};
    wrap.appendChild(b);
  });
}
function tagHtml(tags){ return tags.map(t=>`<span class="tag ${t}">${t}</span>`).join(""); }
function roleHtml(m){
  if(!m.role) return "";
  const lbl={hero:"Hero",profit:"Profit",anchor:"Anchor"}[m.role];
  return `<span class="role-badge role-${m.role}">${lbl}${m.lto?'<span class="lto-dot"></span>':""}</span>`;
}
function renderGrid(){
  const grid=document.getElementById("grid");
  if(!grid) return;
  const items=MENU.filter(m=>m.cat===activeCat);
  grid.innerHTML=items.map(m=>`
    <button class="card" data-add="${m.id}" type="button">
      <span class="flash"></span>
      <div class="card-top"><span class="card-emoji">${CAT_EMOJI[m.cat]}</span>${roleHtml(m)}</div>
      <span class="card-name">${m.n}</span>
      ${m.tags.length?`<div class="card-tags">${tagHtml(m.tags)}</div>`:""}
      <span class="card-price tnum">${fmtPLN(m.price)}</span>
    </button>`).join("");
  grid.querySelectorAll("[data-add]").forEach(b=>{
    b.onclick=()=>{ addItem(b.dataset.add); flash(b); };
  });
}
function renderComboStrip(){
  const strip=document.getElementById("comboStrip");
  if(!strip) return;
  let html=`<span class="cs-lbl">Combos</span>`;
  COMBOS.forEach(c=>{
    html+=`<button class="combo-pill" data-combo="${c.id}" type="button">
      <span>${c.n}</span><span class="cp-off tnum">−${fmtPLN(c.off)}</span>
    </button>`;
  });
  strip.innerHTML=html;
  strip.querySelectorAll("[data-combo]").forEach(b=>{
    b.onclick=()=>addCombo(COMBOS.find(c=>c.id===b.dataset.combo));
  });
}
function flash(el){ el.classList.remove("added"); void el.offsetWidth; el.classList.add("added"); }

/* ====================== Render: active ticket ====================== */
function renderTicket(){
  const t=getActive();
  const lines=document.getElementById("lines");
  if(!lines) return;

  if(!t || t.items.length===0){
    lines.innerHTML=`<div class="empty-ticket">
      <span class="e-emoji">🧾</span>
      <span class="e-text">${t?("Tab "+t.name+" is empty"):"No tab selected"}</span>
      <span class="e-sub">Tap a product or combo to add it to this check.</span>
    </div>`;
  } else {
    let html="";
    t.items.forEach(l=>{
      const m=byId(l.id);
      html+=`<div class="line" data-id="${m.id}">
        <div class="line-body">
          <div class="line-name">${m.n}</div>
          <div class="line-each tnum">${fmtPLN(m.price)} each</div>
        </div>
        <div class="stepper">
          <button class="step-btn" data-dec="${m.id}" type="button" aria-label="Decrease">−</button>
          <span class="step-q tnum">${l.q}</span>
          <button class="step-btn" data-inc="${m.id}" type="button" aria-label="Increase">+</button>
        </div>
        <span class="line-total tnum">${fmtPLN(m.price*l.q)}</span>
      </div>`;
    });
    t.combos.forEach(id=>{
      const c=COMBOS.find(x=>x.id===id);
      html+=`<div class="combo-applied">
        <span class="ca-name">✓ ${c.n}</span>
        <span class="ca-off tnum">−${fmtPLN(c.off)}</span>
        <button class="ca-x" data-rmcombo="${c.id}" type="button" aria-label="Remove combo">×</button>
      </div>`;
    });
    lines.innerHTML=html;
    lines.querySelectorAll("[data-inc]").forEach(b=>b.onclick=()=>changeQty(b.dataset.inc,1));
    lines.querySelectorAll("[data-dec]").forEach(b=>b.onclick=()=>changeQty(b.dataset.dec,-1));
    lines.querySelectorAll("[data-rmcombo]").forEach(b=>b.onclick=()=>removeCombo(b.dataset.rmcombo));
  }

  // header
  const dot=document.getElementById("thDot");
  const sub=t?subtotalG(t):0, disc=t?discountG(t):0, grand=t?grandG(t):0;
  if(dot){
    dot.className="th-dot "+(t?t.status:"");
    document.getElementById("thName").textContent=t?t.name:"—";
    document.getElementById("thId").textContent=t?("#"+t.id):"";
    document.getElementById("thChanLbl").textContent=t?t.chan:"";
    document.getElementById("thChanIcon").innerHTML=t?CHAN_ICON[t.chan]:"";
    document.getElementById("thStatus").textContent=t?STATUS_LABEL[t.status]:"";
  }

  // totals
  document.getElementById("subtotal").textContent=fmtPLN(sub);
  const dRow=document.getElementById("discountRow");
  if(disc>0){
    dRow.style.display="flex";
    document.getElementById("discount").textContent="−"+fmtPLN(disc);
    const names=t.combos.map(id=>COMBOS.find(c=>c.id===id).n).join(" · ");
    document.getElementById("discountLbl").textContent="Combo discount · "+names;
  } else { dRow.style.display="none"; }
  document.getElementById("grand").textContent=fmtPLN(grand);

  // charge button
  const charge=document.getElementById("chargeBtn");
  charge.disabled=!t||t.items.length===0;
  document.getElementById("chargeLbl").textContent="Charge "+fmtPLN(grand);

  // park + kds button states
  const parkBtn=document.getElementById("parkBtn");
  parkBtn.classList.toggle("is-parked", !!t && t.status==="parked");
  document.getElementById("parkLbl").textContent=(t&&t.status==="parked")?"Resume":"Park";
  const kdsBtn=document.getElementById("kdsBtn");
  kdsBtn.classList.toggle("sent", !!t && t.sentKds);
  document.getElementById("kdsLbl").textContent=(t&&t.sentKds)?"Sent ✓":"Send to KDS";
}

/* ====================== Build editor shell once ====================== */
function buildEditorShell(){
  const ed=document.getElementById("editor");
  ed.innerHTML=`
    <div class="products">
      <div class="combo-strip" id="comboStrip"></div>
      <div class="cats" id="cats" role="group" aria-label="Category filter"></div>
      <div class="grid-scroll"><div class="grid" id="grid"></div></div>
    </div>
    <div class="ticket">
      <div class="ticket-head">
        <div class="th-row1">
          <span class="th-dot" id="thDot"></span>
          <span class="th-name" id="thName">—</span>
          <span class="th-id tnum" id="thId"></span>
          <span class="th-chan"><span id="thChanIcon"></span><span id="thChanLbl"></span> · <span id="thStatus"></span></span>
        </div>
        <div class="th-actions">
          <button class="mini-btn park" id="parkBtn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 16V9h3.5a2.5 2.5 0 0 1 0 5H9"/></svg>
            <span id="parkLbl">Park</span>
          </button>
          <button class="mini-btn kds" id="kdsBtn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7Z"/></svg>
            <span id="kdsLbl">Send to KDS</span>
          </button>
        </div>
      </div>
      <div class="ticket-inner">
        <div class="lines" id="lines"></div>
        <div class="totals">
          <div class="trow"><span>Subtotal</span><span class="tv tnum" id="subtotal">0,00 zł</span></div>
          <div class="trow discount" id="discountRow" style="display:none"><span id="discountLbl">Combo discount</span><span class="tv tnum" id="discount">−0,00 zł</span></div>
          <div class="trow grand"><span>Total</span><span class="tv tnum" id="grand">0,00 zł</span></div>
        </div>
        <div class="charge-area">
          <button class="btn" id="chargeBtn" type="button" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
            <span id="chargeLbl">Charge 0,00 zł</span>
          </button>
        </div>

        <div class="overlay" id="tender">
          <div class="tender-sheet">
            <div class="tender-head">
              <span class="te-title">Take payment</span>
              <span class="te-amt tnum" id="tenderAmt">0,00 zł</span>
            </div>
            <div class="tender-opts">
              <button class="tender-opt" data-method="Cash" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/></svg>
                Cash
              </button>
              <button class="tender-opt" data-method="Card" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
                Card
              </button>
            </div>
            <button class="tender-cancel" id="tenderCancel" type="button">Cancel</button>
          </div>
        </div>

        <div class="toast" id="toast"></div>
      </div>
    </div>`;

  // wire static controls
  document.getElementById("parkBtn").onclick=togglePark;
  document.getElementById("kdsBtn").onclick=sendKds;
  document.getElementById("chargeBtn").onclick=openTender;
  document.getElementById("tenderCancel").onclick=closeTender;
  document.querySelectorAll(".tender-opt").forEach(b=>b.onclick=()=>pay(b.dataset.method));
}

function renderEmptyEditor(){
  const ed=document.getElementById("editor");
  ed.innerHTML=`<div class="empty-editor">
    <span class="ee-emoji">🍕</span>
    <span class="ee-text">No open checks — the window is clear.</span>
    <button class="ee-btn" id="emptyNewBtn" type="button">+ Start a new tab</button>
  </div>`;
  document.getElementById("emptyNewBtn").onclick=newTab;
}

/* ====================== Charge / tender / pay ====================== */
function openTender(){
  const t=getActive();if(!t||t.items.length===0) return;
  document.getElementById("tenderAmt").textContent=fmtPLN(grandG(t));
  document.getElementById("tender").classList.add("open");
}
function closeTender(){ const e=document.getElementById("tender"); if(e) e.classList.remove("open"); }
function pay(method){
  const t=getActive();if(!t) return;
  const paidId=t.id, amt=grandG(t);
  closeTender();
  // remove the paid tab, switch to another
  tabs=tabs.filter(x=>x.id!==t.id);
  activeTabId = tabs.length ? tabs[0].id : null;
  toast("Paid ✓ #"+paidId+" · "+method+" · "+fmtPLN(amt));
  render();
}

/* ====================== Toast ====================== */
let toastTimer=null;
function toast(msg){
  const el=document.getElementById("toast");
  if(!el) return;
  el.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>${msg}`;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove("show"),2200);
}

/* ====================== Master render ====================== */
let shellBuilt=false;
function render(){
  renderTabs();
  if(tabs.length===0){
    shellBuilt=false;
    renderEmptyEditor();
    return;
  }
  if(!shellBuilt){
    buildEditorShell();
    shellBuilt=true;
  }
  renderComboStrip();
  renderCats();
  renderGrid();
  renderTicket();
}

/* ====================== Location / channel switchers ====================== */
const LOCS=["Kraków","Warszawa"];
let channel="Takeout";
const CHANS=["Takeout","Delivery","Dine-in"];
function buildLocSwitcher(){
  const g=document.getElementById("locGroup");g.innerHTML="";
  LOCS.forEach(l=>{
    const b=document.createElement("button");
    b.className="seg";b.type="button";b.textContent=l;
    b.setAttribute("aria-pressed",String(l===LOC));
    b.onclick=()=>{LOC=l;buildLocSwitcher();};
    g.appendChild(b);
  });
}
function buildChanSwitcher(){
  const g=document.getElementById("chanGroup");g.innerHTML="";
  CHANS.forEach(c=>{
    const b=document.createElement("button");
    b.className="seg";b.type="button";
    b.innerHTML=CHAN_ICON[c]+`<span>${c}</span>`;
    b.setAttribute("aria-pressed",String(c===channel));
    b.onclick=()=>{
      channel=c; buildChanSwitcher();
      // new tabs inherit the chosen channel; also update active tab's channel
      const t=getActive(); if(t){ t.chan=c; render(); }
    };
    g.appendChild(b);
  });
}

/* ====================== Fullscreen ====================== */
const fsbtn=document.getElementById("fsbtn");
function syncFs(){
  const on=!!document.fullscreenElement;
  document.documentElement.classList.toggle("is-fullscreen",on);
  fsbtn.setAttribute("aria-pressed",String(on));
}
function fallbackToggle(){
  const on=!document.documentElement.classList.contains("is-fullscreen");
  document.documentElement.classList.toggle("is-fullscreen",on);
  fsbtn.setAttribute("aria-pressed",String(on));
}
function toggleFs(){
  if(document.fullscreenElement){
    if(document.exitFullscreen) document.exitFullscreen().catch(fallbackToggle); else fallbackToggle();
  } else {
    const req=document.documentElement.requestFullscreen;
    if(req) req.call(document.documentElement).catch(fallbackToggle); else fallbackToggle();
  }
}
fsbtn.addEventListener("click",toggleFs);
document.addEventListener("fullscreenchange",syncFs);

/* ====================== Keyboard ====================== */
document.addEventListener("keydown",(e)=>{
  if(e.key.toLowerCase()==="n"){ newTab(); return; }
  if(e.key.toLowerCase()==="f"){ toggleFs(); return; }
  if(e.key==="Escape"){ closeTender(); return; }
  if(/^[1-9]$/.test(e.key)){
    const idx=parseInt(e.key,10)-1;
    if(tabs[idx]) setActive(tabs[idx].id);
  }
});

/* ====================== Clock ====================== */
function tick(){ document.getElementById("clock").textContent=fmtClock(new Date()); }

/* ====================== Boot ====================== */
buildLocSwitcher();
buildChanSwitcher();
syncFs();
render();
tick();
setInterval(tick,1000);
</script>
