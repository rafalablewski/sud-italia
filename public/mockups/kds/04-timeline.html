<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sud Italia KDS — Timeline</title>
<style>
  :root{
    --bg:#0c1119;
    --bg2:#0f1622;
    --panel:#131c2a;
    --lane:#101824;
    --lane-alt:#0e1521;
    --hair:rgba(255,255,255,0.07);
    --hair-strong:rgba(255,255,255,0.13);
    --text:#E8EDF3;
    --text-dim:#9AA8B8;
    --text-faint:#62728a;
    --accent:#5B9DFF;
    --neutral:#5a7088;
    --neutral-bg:rgba(90,112,136,0.20);
    --amber:#E6A23C;
    --amber-bg:rgba(230,162,60,0.20);
    --red:#E5484D;
    --red-bg:rgba(229,72,77,0.22);
    --green:#3DD68C;
    --green-bg:rgba(61,214,140,0.16);
    --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:24px;--space-6:32px;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --lane-label-w:120px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(1200px 600px at 70% -10%,#13203033,transparent),var(--bg);
    color:var(--text);
    font-family:var(--sans);
    font-size:14px;line-height:1.4;
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;overflow:hidden;
  }
  .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}

  header{
    display:flex;align-items:center;gap:var(--space-5);
    padding:0 var(--space-5);height:56px;
    border-bottom:1px solid var(--hair);
    background:var(--panel);flex:0 0 auto;
  }
  .brand{display:flex;align-items:baseline;gap:var(--space-3)}
  .wordmark{font-weight:700;font-size:15px;letter-spacing:0.18em}
  .kd-label{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-faint)}
  .design-tag{
    font-family:var(--mono);font-size:11px;letter-spacing:0.08em;color:var(--text-dim);
    padding:3px 8px;border:1px solid var(--hair);border-radius:4px;
  }
  .filters{display:flex;gap:var(--space-1);margin-left:auto}
  .chip{
    appearance:none;background:transparent;border:1px solid var(--hair);color:var(--text-dim);
    font-family:var(--sans);font-size:12px;letter-spacing:0.02em;padding:6px 11px;
    border-radius:6px;cursor:pointer;transition:all .12s ease;white-space:nowrap;
  }
  .chip:hover{border-color:var(--hair-strong);color:var(--text)}
  .chip[aria-pressed="true"]{background:var(--text);color:var(--bg);border-color:var(--text);font-weight:600}

  /* stage switcher — segmented control */
  .stages{
    display:flex;gap:2px;padding:3px;border:1px solid var(--hair);border-radius:8px;
    background:var(--lane);
  }
  .seg{
    appearance:none;background:transparent;border:1px solid transparent;color:var(--text-dim);
    font-family:var(--sans);font-size:12px;letter-spacing:0.02em;padding:5px 10px;
    border-radius:6px;cursor:pointer;transition:all .12s ease;white-space:nowrap;
    display:inline-flex;align-items:center;gap:6px;
  }
  .seg:hover{color:var(--text)}
  .seg[aria-pressed="true"]{background:var(--accent);color:#04101f;font-weight:600}
  .seg .seg-n{
    font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:0.02em;
    padding:1px 6px;border-radius:999px;background:var(--neutral-bg);color:var(--text-dim);min-width:18px;text-align:center;
  }
  .seg[aria-pressed="true"] .seg-n{background:rgba(4,16,31,0.22);color:#04101f}

  /* fullscreen button */
  .fsbtn{
    appearance:none;display:inline-flex;align-items:center;gap:6px;
    background:transparent;border:1px solid var(--hair);color:var(--text-dim);
    font-family:var(--sans);font-size:12px;letter-spacing:0.02em;padding:5px 10px;
    border-radius:6px;cursor:pointer;transition:all .12s ease;white-space:nowrap;
  }
  .fsbtn:hover{border-color:var(--hair-strong);color:var(--text)}
  .fsbtn svg{width:14px;height:14px}
  .clock{font-family:var(--mono);font-size:15px;letter-spacing:0.04em;min-width:74px;text-align:right}
  .gallery-link{
    font-size:12px;color:var(--text-faint);text-decoration:none;border:1px solid var(--hair);
    padding:5px 9px;border-radius:6px;transition:all .12s ease;
  }
  .gallery-link:hover{color:var(--text);border-color:var(--hair-strong)}

  /* fullscreen / immersive mode */
  html.is-fullscreen .design-tag,
  html.is-fullscreen .kd-label{display:none}
  html.is-fullscreen header{height:62px}
  html.is-fullscreen .board{padding:var(--space-5) var(--space-6) 0}
  html.is-fullscreen footer{display:none}
  html.is-fullscreen .lane{min-height:92px}
  html.is-fullscreen .bar .bid{font-size:13px}
  html.is-fullscreen .bar .btimer{font-size:16px}
  html.is-fullscreen .bar .bsub{font-size:11px}
  html.is-fullscreen .ready-chip .rc-id{font-size:13px}

  /* timeline canvas */
  .board{flex:1 1 auto;display:flex;flex-direction:column;overflow:hidden;padding:var(--space-4) var(--space-5) 0}
  .axis-row{
    display:flex;align-items:flex-end;height:34px;flex:0 0 auto;
    padding-left:var(--lane-label-w);position:relative;
  }
  .axis-label{
    position:absolute;left:0;bottom:6px;width:var(--lane-label-w);
    font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-faint);
  }
  .axis{position:relative;flex:1 1 auto;height:100%}
  .tick{position:absolute;bottom:0;transform:translateX(-50%);text-align:center}
  .tick .mark{width:1px;height:8px;background:var(--hair-strong);margin:0 auto}
  .tick .lab{font-family:var(--mono);font-size:10px;color:var(--text-faint);margin-bottom:3px;letter-spacing:0.02em}
  .tick.major .lab{color:var(--text-dim)}
  .tick.major .mark{height:11px;background:var(--text-faint)}

  .lanes{flex:1 1 auto;overflow-y:auto;position:relative}
  .lane{
    display:flex;align-items:stretch;min-height:78px;border-top:1px solid var(--hair);position:relative;
  }
  .lane:last-child{border-bottom:1px solid var(--hair)}
  .lane:nth-child(even){background:var(--lane-alt)}
  .lane:nth-child(odd){background:var(--lane)}
  .lane-head{
    width:var(--lane-label-w);flex:0 0 auto;padding:var(--space-3) var(--space-3) var(--space-3) 0;
    display:flex;flex-direction:column;justify-content:center;gap:3px;
    border-right:1px solid var(--hair);
  }
  .lane-name{font-size:13px;font-weight:600;letter-spacing:0.01em}
  .lane-count{font-family:var(--mono);font-size:10px;color:var(--text-faint);letter-spacing:0.06em}
  .track{position:relative;flex:1 1 auto;overflow:hidden}

  /* grid lines inside track */
  .gridline{position:absolute;top:0;bottom:0;width:1px;background:var(--hair)}
  .gridline.major{background:var(--hair-strong)}

  /* NOW guide */
  .now-line{
    position:absolute;top:0;bottom:0;width:2px;background:var(--accent);z-index:6;pointer-events:none;
    box-shadow:0 0 12px rgba(91,157,255,0.5);
  }
  .now-cap{
    position:absolute;top:6px;left:0;transform:translateX(-50%);z-index:7;pointer-events:none;
    background:var(--accent);color:#04101f;font-family:var(--mono);font-size:9px;font-weight:700;
    letter-spacing:0.14em;padding:2px 6px;border-radius:3px;
  }

  /* ticket bars */
  .bar{
    position:absolute;top:50%;transform:translateY(-50%);height:50px;border-radius:8px;
    cursor:pointer;overflow:hidden;border:1px solid var(--hair-strong);
    display:flex;flex-direction:column;justify-content:center;padding:0 10px;min-width:64px;
    transition:transform .12s ease,box-shadow .12s ease,filter .12s ease;
    background:var(--neutral-bg);
  }
  .bar:hover{transform:translateY(-50%) scale(1.015);box-shadow:0 8px 24px rgba(0,0,0,.45);z-index:8}
  .bar .fill{
    position:absolute;left:0;top:0;bottom:0;background:var(--neutral);opacity:.30;z-index:0;
    border-right:2px solid var(--neutral);transition:width .5s linear,background .3s ease,border-color .3s ease;
  }
  .bar > *:not(.fill){position:relative;z-index:1}
  .bar .bar-top{display:flex;align-items:baseline;gap:6px;justify-content:space-between}
  .bar .bid{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:0.02em;white-space:nowrap}
  .bar .btimer{font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:0.02em;white-space:nowrap}
  .bar .bsub{font-size:10px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

  .bar.t-neutral{border-color:rgba(90,112,136,0.55)}
  .bar.t-neutral .fill{background:var(--neutral);border-color:var(--neutral)}
  .bar.t-warning{background:var(--amber-bg);border-color:rgba(230,162,60,0.6)}
  .bar.t-warning .fill{background:var(--amber);border-color:var(--amber)}
  .bar.t-warning .btimer{color:var(--amber)}
  .bar.t-danger{background:var(--red-bg);border-color:rgba(229,72,77,0.7);animation:pulse 1.8s ease-in-out infinite}
  .bar.t-danger .fill{background:var(--red);border-color:var(--red);opacity:.40}
  .bar.t-danger .btimer{color:#ff8a8d}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(229,72,77,0)}50%{box-shadow:0 0 0 3px rgba(229,72,77,0.18)}}

  /* ready chips parked at NOW */
  .ready-rail{
    flex:0 0 auto;border-top:1px solid var(--hair-strong);background:var(--bg2);
    padding:var(--space-3) var(--space-5);display:flex;align-items:center;gap:var(--space-3);min-height:64px;
  }
  .ready-rail .rr-label{
    font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-faint);
    display:flex;flex-direction:column;gap:2px;width:var(--lane-label-w);margin-left:-2px;
  }
  .ready-rail .rr-label b{font-size:12px;color:var(--green);letter-spacing:0.06em;font-weight:600}
  .ready-chips{display:flex;gap:var(--space-2);flex-wrap:wrap;flex:1 1 auto}
  .ready-chip{
    background:var(--green-bg);border:1px solid rgba(61,214,140,0.45);border-radius:8px;
    padding:8px 11px;display:flex;flex-direction:column;gap:2px;cursor:pointer;
    transition:transform .12s ease,box-shadow .12s ease;min-width:120px;
  }
  .ready-chip:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.4)}
  .ready-chip .rc-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .ready-chip .rc-id{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--green)}
  .ready-chip .rc-wait{font-family:var(--mono);font-size:11px;color:var(--text-dim)}
  .ready-chip .rc-name{font-size:11px;color:var(--text)}
  .ready-chip .rc-act{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-faint);margin-top:1px}

  footer{
    flex:0 0 auto;height:40px;border-top:1px solid var(--hair);background:var(--panel);
    display:flex;align-items:center;gap:var(--space-5);padding:0 var(--space-5);
    font-size:11px;color:var(--text-faint);
  }
  .legend{display:flex;gap:var(--space-4)}
  .legend span{display:inline-flex;align-items:center;gap:6px;letter-spacing:0.02em}
  .swatch{width:9px;height:9px;border-radius:2px}
  .kbd-hint{margin-left:auto;font-family:var(--mono);letter-spacing:0.04em}
  .kbd{display:inline-block;padding:1px 5px;border:1px solid var(--hair);border-radius:3px;color:var(--text-dim);margin:0 1px}

  ::-webkit-scrollbar{height:8px;width:8px}
  ::-webkit-scrollbar-thumb{background:var(--hair-strong);border-radius:4px}
  ::-webkit-scrollbar-track{background:transparent}

  /* detail popover */
  .pop{
    position:fixed;z-index:50;background:var(--panel);border:1px solid var(--hair-strong);
    border-radius:10px;padding:var(--space-3) var(--space-4);min-width:200px;max-width:280px;
    box-shadow:0 18px 48px rgba(0,0,0,.6);font-size:12px;pointer-events:none;
  }
  .pop .pop-id{font-family:var(--mono);font-weight:600;font-size:13px;margin-bottom:4px}
  .pop .pop-meta{color:var(--text-dim);font-size:11px;margin-bottom:8px}
  .pop .pop-item{display:flex;gap:8px;padding:2px 0}
  .pop .pop-item .q{font-family:var(--mono);color:var(--text-faint);min-width:22px}
  .pop .pop-note{color:var(--amber);font-size:11px;margin-top:6px}
</style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="wordmark">SUD ITALIA</span>
      <span class="kd-label">Kitchen Display</span>
    </div>
    <span class="design-tag">04 · Timeline</span>
    <div class="stages" id="stages" role="group" aria-label="Stage filter"></div>
    <div class="filters" id="filters" role="group" aria-label="Station filter"></div>
    <button class="fsbtn" id="fsBtn" type="button" aria-pressed="false"></button>
    <a class="gallery-link" href="index.html">← Gallery</a>
    <div class="clock tnum" id="clock">--:--:--</div>
  </header>

  <div class="board">
    <div class="axis-row">
      <span class="axis-label">Station</span>
      <div class="axis" id="axis"></div>
    </div>
    <div class="lanes" id="lanes"></div>
  </div>

  <div class="ready-rail">
    <div class="rr-label">Ready · Expo<b id="readyCount">0 waiting</b></div>
    <div class="ready-chips" id="readyChips"></div>
  </div>

  <footer>
    <div class="legend">
      <span><i class="swatch" style="background:var(--neutral)"></i>On track</span>
      <span><i class="swatch" style="background:var(--amber)"></i>Due soon</span>
      <span><i class="swatch" style="background:var(--red)"></i>Late</span>
      <span><i class="swatch" style="background:var(--green)"></i>Ready · Expo</span>
      <span><i class="swatch" style="background:var(--accent)"></i>Now</span>
    </div>
    <div class="kbd-hint"><span class="kbd">1</span>–<span class="kbd">9</span> advance · <span class="kbd">R</span> recall · click bar to advance</div>
  </footer>

<script>
const ORDERS = [
  { id:"A4F9C2", name:"Marco R.",  channel:"takeout",  loc:"Kraków",   slot:"15:20", elapsed:192, sla:288, status:"prep",
    items:[{q:2,n:"Margherita",c:"Pizza"},{q:1,n:"Diavola",c:"Pizza"},{q:1,n:"Espresso",c:"Drinks"}] },
  { id:"B7K2D1", name:"Giulia M.", channel:"delivery", loc:"Kraków",   slot:"15:15", elapsed:540, sla:-65, status:"prep",
    items:[{q:1,n:"Quattro Formaggi",c:"Pizza"},{q:1,n:"Spaghetti Carbonara",c:"Pasta",note:"no garlic"},{q:1,n:"Tiramisù",c:"Desserts"}], note:"Leave at reception" },
  { id:"C1M8X4", name:"Paweł K.",  channel:"takeout",  loc:"Warszawa", slot:"15:30", elapsed:48,  sla:612, status:"new",
    items:[{q:1,n:"Diavola",c:"Pizza"},{q:2,n:"Aranciata",c:"Drinks"}] },
  { id:"D9P3Q7", name:"Anna W.",   channel:"delivery", loc:"Warszawa", slot:"15:28", elapsed:95,  sla:505, status:"new",
    items:[{q:3,n:"Margherita",c:"Pizza"},{q:1,n:"Penne Arrabbiata",c:"Pasta"},{q:2,n:"Limonata Fresca",c:"Drinks"}] },
  { id:"E5R6T2", name:"Luca B.",   channel:"takeout",  loc:"Kraków",   slot:"15:22", elapsed:300, sla:120, status:"prep",
    items:[{q:1,n:"Tartufata Reale",c:"Pizza",note:"extra truffle"},{q:1,n:"Burrata con Pomodorini",c:"Antipasti"}] },
  { id:"F2H4J8", name:"Sofia L.",  channel:"takeout",  loc:"Kraków",   slot:"15:10", elapsed:720, sla:0,   status:"ready",
    items:[{q:1,n:"Panino Caprese",c:"Panini"},{q:1,n:"Garlic Bread",c:"Antipasti"},{q:1,n:"Espresso",c:"Drinks"}] },
  { id:"G8L1N5", name:"Tomek Z.",  channel:"delivery", loc:"Warszawa", slot:"15:32", elapsed:150, sla:450, status:"new",
    items:[{q:2,n:"Penne Arrabbiata",c:"Pasta"},{q:1,n:"Linguine al Pesto",c:"Pasta"}] },
  { id:"H3W7Y9", name:"Elena P.",  channel:"takeout",  loc:"Kraków",   slot:"15:08", elapsed:660, sla:0,   status:"ready",
    items:[{q:1,n:"Prosciutto e Rucola",c:"Pizza"},{q:1,n:"Arancini (3 pcs)",c:"Antipasti"}] },
];

const STATIONS = ["All","Pizza","Pasta","Antipasti","Panini","Drinks","Desserts"];
const LANES = ["Pizza","Pasta","Antipasti","Panini","Drinks","Desserts"];
const STAGE_DEFS = [
  {key:"all",   label:"All"},
  {key:"new",   label:"New"},
  {key:"prep",  label:"In progress"},
  {key:"ready", label:"Ready · Expo"},
];
let activeStage = "all";

const FS_ICON = {
  expand:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H3v5"/><path d="M21 8V3h-5"/><path d="M16 21h5v-5"/><path d="M3 16v5h5"/></svg>',
  exit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h5V4"/><path d="M20 9h-5V4"/><path d="M4 15h5v5"/><path d="M20 15h-5v5"/></svg>',
};

// timeline window: NOW-LEFT_PAD .. NOW + WINDOW seconds
const WINDOW = 15*60;       // 15 minutes to the right of NOW
const LEFT_PAD = 60;        // seconds shown to the left of NOW (for slightly-late context)
const TOTAL = WINDOW + LEFT_PAD;
const MIN_BAR = 66;         // px
let activeFilter = "All";
let lastBumped = null;

function pad(n){return String(n).padStart(2,"0");}
function fmtClock(d){return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());}
function fmtSla(s){
  if(s<0){const a=Math.abs(s);return "Late "+Math.floor(a/60)+":"+pad(a%60);}
  return pad(Math.floor(s/60))+":"+pad(s%60);
}
function fmtElapsed(s){const m=Math.floor(s/60);return pad(m)+":"+pad(s%60);}
function tone(o){
  if(o.status==="ready") return "ready";
  if(o.sla<0) return "danger";
  if(o.sla<180) return "warning";
  return "neutral";
}
// the lane a ticket belongs to
function laneOf(o){
  if(activeFilter!=="All"){
    const it=o.items.find(x=>x.c===activeFilter);
    if(it) return it.c;
  }
  for(const L of LANES){ if(o.items.some(x=>x.c===L)) return L; }
  return o.items[0].c;
}
function summaryFor(o){ return o.items.map(it=>it.q+"× "+it.n).join(" · "); }

function buildFilters(){
  const wrap=document.getElementById("filters");
  wrap.innerHTML="";
  STATIONS.forEach(s=>{
    const b=document.createElement("button");
    b.className="chip";b.textContent=s;
    b.setAttribute("aria-pressed",String(s===activeFilter));
    b.onclick=()=>{activeFilter=s;buildFilters();render();};
    wrap.appendChild(b);
  });
}

// station-match independent of stage, so stage counts compose with the station filter
function matchesStation(o){
  return activeFilter==="All" || o.items.some(it=>it.c===activeFilter);
}
function stageCount(key){
  return ORDERS.filter(o=>matchesStation(o) && (key==="all" || o.status===key)).length;
}
function buildStages(){
  const wrap=document.getElementById("stages");
  wrap.innerHTML="";
  STAGE_DEFS.forEach(s=>{
    const b=document.createElement("button");
    b.className="seg";b.type="button";
    b.setAttribute("aria-pressed",String(s.key===activeStage));
    b.innerHTML=`<span>${s.label}</span><span class="seg-n tnum">${stageCount(s.key)}</span>`;
    b.onclick=()=>{activeStage=s.key;buildStages();render();};
    wrap.appendChild(b);
  });
}
function refreshStageCounts(){
  const segs=document.querySelectorAll("#stages .seg");
  STAGE_DEFS.forEach((s,i)=>{
    const n=segs[i]&&segs[i].querySelector(".seg-n");
    if(n) n.textContent=stageCount(s.key);
  });
}

function isFs(){return document.fullscreenElement!=null;}
function syncFsBtn(){
  const btn=document.getElementById("fsBtn");
  const on=document.documentElement.classList.contains("is-fullscreen");
  btn.innerHTML=(on?FS_ICON.exit:FS_ICON.expand)+`<span>${on?"Exit":"Fullscreen"}</span>`;
  btn.setAttribute("aria-pressed",String(on));
}
function toggleFs(){
  const root=document.documentElement;
  if(!isFs() && !root.classList.contains("is-fullscreen")){
    if(root.requestFullscreen){
      root.requestFullscreen().catch(()=>{root.classList.add("is-fullscreen");syncFsBtn();});
    } else { root.classList.add("is-fullscreen"); }
  } else {
    if(document.exitFullscreen && isFs()){ document.exitFullscreen().catch(()=>{}); }
    root.classList.remove("is-fullscreen");
  }
  syncFsBtn();
}
document.addEventListener("fullscreenchange",()=>{
  document.documentElement.classList.toggle("is-fullscreen",isFs());
  syncFsBtn();
});

function buildAxis(){
  const axis=document.getElementById("axis");
  axis.innerHTML="";
  const now=Date.now();
  for(let m=-1;m<=15;m++){
    const sec=m*60;
    const pct=((sec+LEFT_PAD)/TOTAL)*100;
    if(pct<0||pct>100) continue;
    const t=document.createElement("div");
    t.className="tick"+(m%5===0?" major":"");
    const labd=new Date(now+sec*1000);
    t.style.left=pct+"%";
    const showLab = m%5===0 || m===-1;
    t.innerHTML=`<div class="lab tnum">${showLab?pad(labd.getHours())+":"+pad(labd.getMinutes()):""}</div><div class="mark"></div>`;
    axis.appendChild(t);
  }
}

function laneGridHtml(){
  let g="";
  for(let m=-1;m<=15;m++){
    const sec=m*60;
    const pct=((sec+LEFT_PAD)/TOTAL)*100;
    if(pct<0||pct>100) continue;
    g+=`<div class="gridline${m%5===0?" major":""}" style="left:${pct}%"></div>`;
  }
  return g;
}

function showPop(o,el){
  hidePop();
  const p=document.createElement("div");
  p.className="pop";p.id="pop";
  const items=o.items.map(it=>`<div class="pop-item"><span class="q tnum">${it.q}×</span><span>${it.n}${it.note?` <span style="color:var(--amber)">— ${it.note}</span>`:""}</span></div>`).join("");
  p.innerHTML=`<div class="pop-id">#${o.id}</div>
    <div class="pop-meta">${o.name} · ${o.channel==="takeout"?"Takeout":"Delivery"} · ${o.loc} · Slot ${o.slot}</div>
    ${items}${o.note?`<div class="pop-note">! ${o.note}</div>`:""}`;
  document.body.appendChild(p);
  const r=el.getBoundingClientRect();
  let top=r.bottom+8, left=r.left;
  if(left+280>window.innerWidth) left=window.innerWidth-288;
  if(top+220>window.innerHeight) top=r.top-220;
  p.style.left=left+"px";p.style.top=top+"px";
}
function hidePop(){const p=document.getElementById("pop");if(p)p.remove();}

function advance(o){
  hidePop();
  if(o.status==="new"){o.status="prep";}
  else if(o.status==="prep"){o.status="ready";o.sla=0;o.readyWait=0;}
  else if(o.status==="ready"){
    const idx=ORDERS.indexOf(o);lastBumped={order:o,index:idx};ORDERS.splice(idx,1);
  }
  render();
}
function recall(){
  if(lastBumped){
    ORDERS.splice(Math.min(lastBumped.index,ORDERS.length),0,lastBumped.order);
    lastBumped.order.status="ready";lastBumped=null;render();
  }
}

function visibleActive(){
  let list=ORDERS.filter(o=>o.status!=="ready");
  if(activeFilter!=="All") list=list.filter(o=>o.items.some(it=>it.c===activeFilter));
  // stage filter: "all" keeps every non-ready bar; a specific stage narrows to it
  if(activeStage!=="all") list=list.filter(o=>o.status===activeStage);
  return list;
}
function visibleReady(){
  let list=ORDERS.filter(o=>o.status==="ready");
  if(activeFilter!=="All") list=list.filter(o=>o.items.some(it=>it.c===activeFilter));
  // ready rail only shows when stage is "all" or "ready"
  if(activeStage!=="all"&&activeStage!=="ready") return [];
  return list;
}

function fillWidth(o){
  // proportion of the SLA window consumed → grows toward 100% as deadline nears
  if(tone(o)==="danger") return 100;
  return Math.max(8, Math.min(100, 100-(o.sla/WINDOW*100)));
}

function barFor(o){
  const t=tone(o);
  const dl=o.sla;
  let startSec, endSec;
  if(dl>=0){ startSec=0; endSec=Math.min(dl,WINDOW); }
  else { startSec=Math.max(dl,-LEFT_PAD); endSec=0; } // late: bar sits left of NOW
  const leftPct=((startSec+LEFT_PAD)/TOTAL)*100;
  const widthPct=((endSec-startSec)/TOTAL)*100;
  const summary=summaryFor(o);
  const matchedQty=o.items.filter(it=>activeFilter==="All"||it.c===activeFilter).reduce((s,it)=>s+it.q,0);
  return `<div class="bar t-${t}" data-id="${o.id}" role="button" tabindex="0"
      style="left:${leftPct.toFixed(3)}%;width:max(${MIN_BAR}px, ${widthPct.toFixed(3)}%)">
      <div class="fill" style="width:${fillWidth(o)}%"></div>
      <div class="bar-top">
        <span class="bid">#${o.id}</span>
        <span class="btimer tnum" data-sla>${fmtSla(o.sla)}</span>
      </div>
      <div class="bsub">${matchedQty}× · ${summary}</div>
    </div>`;
}

function render(){
  buildAxis();
  const lanesEl=document.getElementById("lanes");
  const active=visibleActive();
  const grid=laneGridHtml();
  const byLane={};LANES.forEach(L=>byLane[L]=[]);
  active.forEach(o=>{const L=laneOf(o);(byLane[L]=byLane[L]||[]).push(o);});

  const lanesToShow = activeFilter==="All"?LANES:LANES.filter(L=>L===activeFilter);

  lanesEl.innerHTML=lanesToShow.map(L=>{
    const bars=(byLane[L]||[]).map(barFor).join("");
    return `<div class="lane">
      <div class="lane-head"><span class="lane-name">${L}</span><span class="lane-count tnum">${(byLane[L]||[]).length} active</span></div>
      <div class="track">${grid}<div class="now-line"></div><div class="now-cap">NOW</div>${bars}</div>
    </div>`;
  }).join("");

  // ready rail
  const ready=visibleReady();
  document.getElementById("readyCount").textContent=ready.length+" waiting";
  document.getElementById("readyChips").innerHTML = ready.length
    ? ready.map(o=>`<div class="ready-chip" data-id="${o.id}" role="button" tabindex="0">
        <div class="rc-top"><span class="rc-id">#${o.id}</span><span class="rc-wait tnum" data-wait>+${fmtElapsed(o.readyWait||0)}</span></div>
        <div class="rc-name">${o.name} · ${o.loc}</div>
        <div class="rc-act">Bump · Done</div>
      </div>`).join("")
    : `<span style="color:var(--text-faint);font-size:12px">No tickets awaiting handoff.</span>`;

  lanesEl.querySelectorAll(".bar").forEach(b=>{
    const o=ORDERS.find(x=>x.id===b.dataset.id);
    b.onclick=()=>advance(o);
    b.onkeydown=(e)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();advance(o);}};
    b.onmouseenter=()=>showPop(o,b);
    b.onmouseleave=hidePop;
  });
  document.querySelectorAll(".ready-chip").forEach(c=>{
    const o=ORDERS.find(x=>x.id===c.dataset.id);
    c.onclick=()=>advance(o);
    c.onkeydown=(e)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();advance(o);}};
  });

  refreshStageCounts();
}

function tick(){
  document.getElementById("clock").textContent=fmtClock(new Date());
  refreshStageCounts();
  let needsRender=false;
  ORDERS.forEach(o=>{
    o.elapsed++;
    if(o.status==="ready"){ o.readyWait=(o.readyWait||0)+1; }
    else {
      const prev=tone(o);
      o.sla--;
      if(tone(o)!==prev) needsRender=true; // threshold crossed → recolor + reposition
    }
  });
  // light per-second updates (timer text + fill) between full re-renders
  document.querySelectorAll(".bar").forEach(b=>{
    const o=ORDERS.find(x=>x.id===b.dataset.id);if(!o)return;
    const sl=b.querySelector("[data-sla]");if(sl)sl.textContent=fmtSla(o.sla);
    const fill=b.querySelector(".fill");if(fill)fill.style.width=fillWidth(o)+"%";
  });
  document.querySelectorAll(".ready-chip [data-wait]").forEach(w=>{
    const o=ORDERS.find(x=>x.id===w.closest(".ready-chip").dataset.id);if(!o)return;
    w.textContent="+"+fmtElapsed(o.readyWait||0);
  });
  if(needsRender) render();
}

document.addEventListener("keydown",(e)=>{
  if(e.key.toLowerCase()==="r"){recall();return;}
  if(/^[1-9]$/.test(e.key)){
    const list=visibleActive().slice().sort((a,b)=>a.sla-b.sla);
    const o=list[parseInt(e.key,10)-1];if(o)advance(o);
  } else if(e.key==="0"){
    const list=visibleActive().slice().sort((a,b)=>a.sla-b.sla);
    const o=list[9];if(o)advance(o);
  }
});
window.addEventListener("resize",()=>render());

document.getElementById("fsBtn").addEventListener("click",toggleFs);

buildFilters();
buildStages();
syncFsBtn();
render();
tick();
setInterval(tick,1000);
</script>
</body>
