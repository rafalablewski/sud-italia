<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sud Italia KDS — Control Tower</title>
<style>
  :root{
    /* status palette */
    --queued:#5B6573;
    --firing:#3B82F6;
    --warn:#F5A623;
    --risk:#8B5CF6;   /* violet — predictive at-risk tier */
    --late:#E5484D;
    --ready:#3DD68C;
    /* surfaces */
    --canvas:#0A0C10;
    --panel:#11151B;
    --raised:#1A2129;
    --hair:rgba(255,255,255,.08);
    --hair-strong:rgba(255,255,255,.16);
    /* text */
    --fg:#E9EDF2;
    --dim:#9098A3;
    --faint:#5C6571;
    /* type */
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    /* grid */
    --u:8px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--canvas);
    color:var(--fg);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    font-size:14px;
    line-height:1.45;
    overflow:hidden;
  }
  /* tabular mono numerals everywhere they appear */
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;letter-spacing:-.01em;}

  .app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

  /* ───────────── HEADER ───────────── */
  header.bar{
    flex:0 0 auto;
    display:flex;align-items:center;gap:calc(var(--u)*2);
    padding:calc(var(--u)*1.5) calc(var(--u)*3);
    border-bottom:1px solid var(--hair);
    background:linear-gradient(180deg,#0E1218,#0A0C10);
  }
  .brand{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .brand .word{
    font-weight:700;font-size:15px;letter-spacing:.18em;line-height:1;
    display:flex;align-items:center;gap:8px;
  }
  .brand .word .mark{color:var(--ready);}
  .brand .sub{
    font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint);font-weight:600;
  }
  .tag{
    font-family:var(--mono);font-size:11px;letter-spacing:.04em;
    color:var(--risk);background:rgba(139,92,246,.12);
    border:1px solid rgba(139,92,246,.35);
    padding:4px 9px;border-radius:6px;white-space:nowrap;font-weight:600;
  }
  .clock{
    font-family:var(--mono);font-variant-numeric:tabular-nums;
    font-size:18px;font-weight:600;letter-spacing:.02em;color:var(--fg);
    padding:0 calc(var(--u)*1);
  }
  .clock .ampm{font-size:10px;color:var(--faint);margin-left:4px;letter-spacing:.1em;}
  .spacer{flex:1 1 auto;}

  /* segmented controls (station + lines) */
  .seg{
    display:inline-flex;align-items:center;
    background:var(--panel);border:1px solid var(--hair);
    border-radius:9px;padding:3px;gap:2px;
  }
  .seg button{
    appearance:none;border:0;background:transparent;color:var(--dim);
    font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:.01em;
    padding:6px 11px;border-radius:6px;cursor:pointer;white-space:nowrap;
    transition:background .16s ease,color .16s ease;
    display:inline-flex;align-items:center;gap:6px;
  }
  .seg button:hover{color:var(--fg);}
  .seg button.on{background:var(--raised);color:var(--fg);box-shadow:inset 0 0 0 1px var(--hair-strong);}
  .seg button .ct{
    font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:11px;
    min-width:16px;text-align:center;color:var(--faint);
    background:rgba(255,255,255,.05);border-radius:5px;padding:1px 5px;
  }
  .seg button.on .ct{color:var(--fg);}
  /* lines stage accents */
  .seg.lines button[data-line="new"].on .ct{color:var(--queued);}
  .seg.lines button[data-line="prog"].on .ct{color:var(--firing);}
  .seg.lines button[data-line="ready"].on .ct{color:var(--ready);}
  .seg.lines button[data-line="expo"].on .ct{color:var(--ready);}

  .seg-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-right:2px;}

  .iconbtn{
    appearance:none;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;
    background:var(--panel);border:1px solid var(--hair);color:var(--dim);
    border-radius:8px;padding:8px 11px;font-size:12px;font-weight:600;font-family:var(--sans);
    transition:border-color .16s ease,color .16s ease,background .16s ease;
  }
  .iconbtn:hover{color:var(--fg);border-color:var(--hair-strong);}
  .iconbtn svg{width:15px;height:15px;display:block;}
  .gallery{color:var(--faint);text-decoration:none;font-size:12px;font-weight:600;
    display:inline-flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;
    transition:color .16s ease;}
  .gallery:hover{color:var(--dim);}

  /* sub-bar holds station + lines + filters */
  .controls{
    flex:0 0 auto;
    display:flex;align-items:center;gap:calc(var(--u)*2);flex-wrap:wrap;
    padding:calc(var(--u)*1.25) calc(var(--u)*3);
    border-bottom:1px solid var(--hair);
    background:var(--canvas);
  }

  /* ───────────── HORIZON (signature) ───────────── */
  .horizon-wrap{
    flex:0 0 auto;
    padding:calc(var(--u)*2) calc(var(--u)*3) calc(var(--u)*1.5);
    border-bottom:1px solid var(--hair);
    background:radial-gradient(120% 140% at 0% 0%,#0E141C 0%,#0A0C10 60%);
  }
  .horizon-head{
    display:flex;align-items:baseline;justify-content:space-between;
    margin-bottom:calc(var(--u)*1.5);gap:16px;
  }
  .horizon-head .t{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);font-weight:600;
    display:flex;align-items:center;gap:9px;}
  .horizon-head .t .blip{width:7px;height:7px;border-radius:50%;background:var(--ready);
    box-shadow:0 0 0 0 rgba(61,214,140,.5);animation:radar 2s infinite;}
  @keyframes radar{0%{box-shadow:0 0 0 0 rgba(61,214,140,.45);}70%{box-shadow:0 0 0 7px rgba(61,214,140,0);}100%{box-shadow:0 0 0 0 rgba(61,214,140,0);}}
  .horizon-head .legend{display:flex;gap:14px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--dim);}
  .horizon-head .legend .lg{display:inline-flex;align-items:center;gap:6px;}
  .horizon-head .legend .lg i{width:9px;height:9px;border-radius:2px;display:inline-block;}

  .horizon{
    position:relative;
    height:128px;
    border-radius:12px;
    background:linear-gradient(180deg,#0C1016,#0A0C10);
    border:1px solid var(--hair);
    overflow:hidden;
  }
  /* risk zone shading: tickets whose pred lands beyond promise live in the predictive band — visualised as a soft violet wash on the right portion of upcoming horizon */
  .risk-zone{position:absolute;top:0;bottom:0;
    background:linear-gradient(90deg,rgba(139,92,246,0) 0%,rgba(139,92,246,.05) 60%,rgba(139,92,246,.11) 100%);
    pointer-events:none;}
  .gridlines{position:absolute;inset:0;pointer-events:none;}
  .gridline{position:absolute;top:0;bottom:22px;width:1px;background:var(--hair);}
  .gridline.major{background:var(--hair-strong);}
  .ticklabel{position:absolute;bottom:4px;transform:translateX(-50%);
    font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:10px;color:var(--faint);}
  .nowline{position:absolute;top:0;bottom:22px;width:2px;background:var(--ready);
    box-shadow:0 0 12px rgba(61,214,140,.5);z-index:3;}
  .nowline::after{content:"NOW";position:absolute;top:4px;left:5px;
    font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--ready);font-weight:700;}

  .track{position:absolute;left:0;right:0;top:14px;bottom:26px;}
  /* one row per ticket marker */
  .marker{
    position:absolute;height:18px;transform:translate(-50%,-50%);
    z-index:2;cursor:pointer;
  }
  .marker .whisker{
    position:absolute;top:50%;height:3px;border-radius:2px;transform:translateY(-50%);
    background:repeating-linear-gradient(90deg,currentColor 0 5px,transparent 5px 9px);
    opacity:.55;
  }
  .marker .dot{
    position:absolute;left:0;top:50%;transform:translate(-50%,-50%);
    width:11px;height:11px;border-radius:50%;border:2px solid var(--canvas);
    background:currentColor;box-shadow:0 0 0 1px rgba(0,0,0,.4);
  }
  .marker .lab{
    position:absolute;left:0;top:50%;transform:translate(-50%,-150%);
    font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:9.5px;
    color:var(--dim);white-space:nowrap;letter-spacing:.02em;font-weight:600;
  }
  .marker.is-risk .dot{box-shadow:0 0 10px rgba(139,92,246,.8),0 0 0 1px rgba(0,0,0,.4);}
  .marker.is-late .dot{box-shadow:0 0 10px rgba(229,72,77,.8),0 0 0 1px rgba(0,0,0,.4);}
  .marker.focus .lab{color:var(--fg);}
  .marker.focus .dot{transform:translate(-50%,-50%) scale(1.25);}

  /* ───────────── BOARD ───────────── */
  .board{
    flex:1 1 auto;display:flex;min-height:0;
  }
  .lane-area{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;min-height:0;}
  .lane-head{
    flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
    padding:calc(var(--u)*1.5) calc(var(--u)*3) calc(var(--u)*1);
  }
  .lane-head .ttl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);font-weight:600;}
  .lane-head .sortnote{font-size:10px;color:var(--faint);letter-spacing:.05em;}

  .lane{
    flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;
    padding:0 calc(var(--u)*3) calc(var(--u)*3);
    display:grid;gap:calc(var(--u)*1.5);
    grid-template-columns:repeat(auto-fill,minmax(264px,1fr));
    align-content:start;
  }
  .lane::-webkit-scrollbar{width:8px;}
  .lane::-webkit-scrollbar-thumb{background:var(--raised);border-radius:8px;}

  /* ───────────── TICKET ───────────── */
  .ticket{
    position:relative;
    background:var(--panel);
    border:1px solid var(--hair);
    border-radius:12px;
    padding:calc(var(--u)*1.75);
    display:flex;flex-direction:column;gap:calc(var(--u)*1.25);
    transition:border-color .18s ease,box-shadow .18s ease,transform .18s ease,background .18s ease;
    cursor:default;
  }
  .ticket::before{
    content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;
    background:var(--tone,var(--queued));transition:background .18s ease;
  }
  .ticket.focus{box-shadow:0 0 0 1px var(--hair-strong),0 18px 40px -24px rgba(0,0,0,.9);transform:translateY(-1px);}
  .ticket.tone-risk{background:linear-gradient(180deg,rgba(139,92,246,.12),var(--panel) 70%);border-color:rgba(139,92,246,.4);}
  .ticket.tone-late{background:linear-gradient(180deg,rgba(229,72,77,.14),var(--panel) 70%);border-color:rgba(229,72,77,.45);}
  .ticket.tone-late::before,.ticket.tone-risk::before{box-shadow:0 0 12px var(--tone);}

  .tk-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .tk-id{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .tk-id .id{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--fg);}
  .tk-id .nm{font-size:12px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
  .tk-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
  .chip{
    font-size:10px;font-weight:600;letter-spacing:.04em;padding:2px 6px;border-radius:5px;
    background:var(--raised);color:var(--dim);border:1px solid var(--hair);
    display:inline-flex;align-items:center;gap:4px;white-space:nowrap;
  }
  .chip svg{width:11px;height:11px;}
  .chip.ch-delivery{color:#7FC2FF;}
  .chip.ch-takeout{color:#9FE6BE;}

  /* dual timer */
  .timers{display:flex;align-items:center;gap:calc(var(--u)*1.5);}
  .elapsed{display:flex;flex-direction:column;gap:1px;min-width:62px;}
  .elapsed .v{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:24px;font-weight:600;line-height:1;color:var(--tone,var(--fg));letter-spacing:-.02em;}
  .elapsed .k{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-weight:600;}
  .sla{flex:1 1 auto;display:flex;align-items:center;gap:10px;}
  .ring{position:relative;width:46px;height:46px;flex:0 0 auto;}
  .ring svg{transform:rotate(-90deg);display:block;}
  .ring .rtxt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:11px;font-weight:600;color:var(--fg);}
  .sla-meta{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .sla-meta .due{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:13px;font-weight:600;color:var(--fg);letter-spacing:.01em;}
  .sla-meta .due.late{color:var(--late);}
  .sla-meta .due.risk{color:var(--risk);}
  .sla-meta .pl{font-size:10px;color:var(--faint);letter-spacing:.04em;display:flex;align-items:center;gap:5px;}
  .sla-meta .pl b{font-family:var(--mono);font-variant-numeric:tabular-nums;color:var(--dim);font-weight:600;}
  .sla-meta .pl.risk b{color:var(--risk);}

  .items{display:flex;flex-direction:column;gap:5px;border-top:1px solid var(--hair);padding-top:calc(var(--u)*1.25);}
  .item{display:flex;gap:8px;align-items:baseline;font-size:13px;}
  .item .q{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:600;color:var(--fg);min-width:20px;}
  .item .n{color:var(--fg);flex:1 1 auto;}
  .item .cat{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:600;}
  .item .inote{font-size:11px;color:var(--warn);margin-left:28px;display:block;width:100%;}
  .item .inote::before{content:"↳ ";}
  .tknote{font-size:11px;color:var(--dim);background:var(--raised);border:1px solid var(--hair);
    border-radius:7px;padding:6px 9px;display:flex;gap:7px;align-items:flex-start;}
  .tknote svg{width:13px;height:13px;flex:0 0 auto;margin-top:1px;color:var(--warn);}

  .act{
    appearance:none;cursor:pointer;width:100%;border:0;border-radius:9px;
    padding:9px;font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:.04em;
    color:#06120C;background:var(--tone,var(--firing));
    transition:filter .16s ease,transform .1s ease;
    display:flex;align-items:center;justify-content:center;gap:7px;
    text-transform:uppercase;
  }
  .act:hover{filter:brightness(1.08);}
  .act:active{transform:translateY(1px);}
  .act svg{width:14px;height:14px;}
  .tone-queued .act,.tone-firing .act{color:#fff;}
  .tone-warn .act{color:#1A1206;}
  .tone-risk .act{color:#fff;}
  .tone-late .act{color:#fff;}
  .tone-ready .act{color:#06120C;}

  /* ───────────── RIGHT RAIL (Ready/Expo + Insights) ───────────── */
  .rail{
    flex:0 0 318px;display:flex;flex-direction:column;min-height:0;
    border-left:1px solid var(--hair);background:var(--panel);
  }
  .rail-sec{display:flex;flex-direction:column;min-height:0;}
  .rail-sec + .rail-sec{border-top:1px solid var(--hair);}
  .rail-head{
    flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
    padding:calc(var(--u)*1.5) calc(var(--u)*2);
  }
  .rail-head .ttl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);font-weight:600;
    display:flex;align-items:center;gap:8px;}
  .rail-head .ct{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:11px;color:var(--ready);
    background:rgba(61,214,140,.1);border-radius:5px;padding:1px 7px;font-weight:600;}

  .expo-list{flex:1 1 auto;overflow-y:auto;padding:0 calc(var(--u)*2) calc(var(--u)*2);
    display:flex;flex-direction:column;gap:calc(var(--u)*1);min-height:0;}
  .expo-list::-webkit-scrollbar{width:8px;}
  .expo-list::-webkit-scrollbar-thumb{background:var(--raised);border-radius:8px;}
  .expo-card{
    background:var(--raised);border:1px solid var(--hair);border-radius:10px;
    padding:calc(var(--u)*1.25);display:flex;flex-direction:column;gap:8px;
    border-left:3px solid var(--ready);
  }
  .expo-card .row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .expo-card .id{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:13px;font-weight:600;color:var(--fg);letter-spacing:.04em;}
  .expo-card .nm{font-size:12px;color:var(--dim);}
  .expo-card .wait{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:11px;color:var(--ready);}
  .expo-card .summ{font-size:11px;color:var(--dim);line-height:1.4;}
  .expo-card .handoff{
    appearance:none;cursor:pointer;border:0;border-radius:8px;padding:7px;
    background:var(--ready);color:#06120C;font-family:var(--sans);font-size:11px;font-weight:700;
    letter-spacing:.05em;text-transform:uppercase;transition:filter .16s ease;
  }
  .expo-card .handoff:hover{filter:brightness(1.08);}

  .insights{flex:0 0 auto;padding:0 calc(var(--u)*2) calc(var(--u)*2);
    display:flex;flex-direction:column;gap:calc(var(--u)*1);max-height:42vh;overflow-y:auto;}
  .insight{
    background:var(--raised);border:1px solid var(--hair);border-radius:10px;
    padding:calc(var(--u)*1.25);display:flex;gap:10px;align-items:flex-start;
    border-left:3px solid var(--ins,var(--queued));cursor:pointer;
    transition:border-color .16s ease,background .16s ease;
  }
  .insight:hover{background:#1E262F;}
  .insight .ic{flex:0 0 auto;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;
    background:color-mix(in srgb,var(--ins) 18%,transparent);color:var(--ins);}
  .insight .ic svg{width:15px;height:15px;}
  .insight .txt{flex:1 1 auto;min-width:0;}
  .insight .kind{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--ins);font-weight:700;margin-bottom:3px;}
  .insight .body{font-size:12px;color:var(--fg);line-height:1.42;}
  .insight .body b{font-weight:600;}

  .empty{grid-column:1/-1;text-align:center;color:var(--faint);font-size:13px;padding:48px 0;}

  /* fullscreen tweaks: edge-to-edge, enlarged tickets */
  html.is-fullscreen body{font-size:15px;}
  html.is-fullscreen .lane{grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:calc(var(--u)*2);}
  html.is-fullscreen .ticket{padding:calc(var(--u)*2);}
  html.is-fullscreen .elapsed .v{font-size:28px;}
  html.is-fullscreen .horizon{height:148px;}
  html.is-fullscreen .gallery{display:none;}

  @media (max-width:1180px){
    .rail{flex-basis:280px;}
  }
  @media (max-width:980px){
    .board{flex-direction:column;}
    .rail{flex:0 0 auto;border-left:0;border-top:1px solid var(--hair);max-height:46vh;flex-direction:row;}
    .rail-sec{flex:1 1 0;}
    .rail-sec + .rail-sec{border-top:0;border-left:1px solid var(--hair);}
    .insights{max-height:none;}
  }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="bar">
    <div class="brand">
      <span class="word"><span class="mark">SUD&nbsp;ITALIA</span></span>
      <span class="sub">Kitchen Display</span>
    </div>
    <span class="tag">11 · Control Tower</span>
    <div class="clock mono" id="clock">--:--:--</div>
    <span class="spacer"></span>

    <div class="seg stations" id="stations" role="group" aria-label="Station filter">
      <span class="seg-label">Station</span>
      <button class="on" data-station="all">All</button>
      <button data-station="Pizza">Pizza</button>
      <button data-station="Pasta">Pasta</button>
      <button data-station="Antipasti">Antipasti</button>
      <button data-station="Panini">Panini</button>
      <button data-station="Drinks">Drinks</button>
      <button data-station="Desserts">Desserts</button>
    </div>

    <button class="iconbtn" id="fsBtn" aria-label="Toggle fullscreen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
      <span id="fsLabel">Fullscreen</span>
    </button>
    <a class="gallery" href="index.html">← Gallery</a>
  </header>

  <!-- CONTROLS: lines switcher -->
  <div class="controls">
    <div class="seg lines" id="lines" role="group" aria-label="Lines switcher">
      <span class="seg-label">Lines</span>
      <button class="on" data-line="all">All <span class="ct" id="ct-all">0</span></button>

<script>
"use strict";

/* ───────────── DATASET (verbatim) ───────────── */
const ORDERS = [
  { id:"A4F9C2", name:"Marco R.",  channel:"takeout",  loc:"Kraków",   slot:"15:20", elapsed:192, sla:150, pred:130, status:"prep",
    items:[{q:2,n:"Margherita",c:"Pizza"},{q:1,n:"Diavola",c:"Pizza"},{q:1,n:"Espresso",c:"Drinks"}] },
  { id:"B7K2D1", name:"Giulia M.", channel:"delivery", loc:"Kraków",   slot:"15:15", elapsed:540, sla:-65, pred:80,  status:"prep",
    items:[{q:1,n:"Quattro Formaggi",c:"Pizza"},{q:1,n:"Spaghetti Carbonara",c:"Pasta",note:"no garlic"},{q:1,n:"Tiramisù",c:"Desserts"}], note:"Leave at reception" },
  { id:"C1M8X4", name:"Paweł K.",  channel:"takeout",  loc:"Warszawa", slot:"15:30", elapsed:48,  sla:612, pred:300, status:"new",
    items:[{q:1,n:"Diavola",c:"Pizza"},{q:2,n:"Aranciata",c:"Drinks"}] },
  { id:"D9P3Q7", name:"Anna W.",   channel:"delivery", loc:"Warszawa", slot:"15:28", elapsed:95,  sla:505, pred:560, status:"new",
    items:[{q:3,n:"Margherita",c:"Pizza"},{q:1,n:"Penne Arrabbiata",c:"Pasta"},{q:2,n:"Limonata Fresca",c:"Drinks"}] },
  { id:"E5R6T2", name:"Luca B.",   channel:"takeout",  loc:"Kraków",   slot:"15:22", elapsed:300, sla:120, pred:150, status:"prep",
    items:[{q:1,n:"Tartufata Reale",c:"Pizza",note:"extra truffle"},{q:1,n:"Burrata con Pomodorini",c:"Antipasti"}] },
  { id:"F2H4J8", name:"Sofia L.",  channel:"takeout",  loc:"Kraków",   slot:"15:10", elapsed:720, sla:0,   pred:0,   status:"ready",
    items:[{q:1,n:"Panino Caprese",c:"Panini"},{q:1,n:"Garlic Bread",c:"Antipasti"},{q:1,n:"Espresso",c:"Drinks"}] },
  { id:"G8L1N5", name:"Tomek Z.",  channel:"delivery", loc:"Warszawa", slot:"15:32", elapsed:150, sla:450, pred:360, status:"new",
    items:[{q:2,n:"Penne Arrabbiata",c:"Pasta"},{q:1,n:"Linguine al Pesto",c:"Pasta"}] },
  { id:"H3W7Y9", name:"Elena P.",  channel:"takeout",  loc:"Kraków",   slot:"15:08", elapsed:660, sla:0,   pred:0,   status:"ready",

];
const INSIGHTS = [
  { kind:"risk",     text:"2 tickets predicted to breach within 2 min — Anna W., Luca B.", tone:"risk" },
  { kind:"route",    text:"Reroute 1× Diavola to Oven 2 — saves ~2:10 on the pizza queue", tone:"firing" },
  { kind:"anomaly",  text:"Pasta station 34% slower than its 4-week baseline", tone:"warn" },
  { kind:"forecast", text:"Pizza: +4 tickets forecast in the next 15 min", tone:"queued" },
];

/* ───────────── STATUS LOGIC (verbatim spec) ───────────── */
function tone(o){
  if(o.status==='ready')   return 'ready';
  if(o.sla < 0)            return 'late';
  if((o.pred||0) > o.sla)  return 'risk';   // model predicts the promise WILL be missed — BEFORE it actually is
  if(o.sla < 180)          return 'warn';
  return o.status==='new' ? 'queued' : 'firing';
}

const TONE_COLOR = {
  queued:"#5B6573", firing:"#3B82F6", warn:"#F5A623",
  risk:"#8B5CF6", late:"#E5484D", ready:"#3DD68C",
};

/* horizon window: NOW (0s) → +10 min (600s) */
const HORIZON_SEC = 600;

/* ───────────── STATE ───────────── */
let state = ORDERS.map(o => ({...o, items: o.items.map(i => ({...i}))}));
let stationFilter = "all";
let lineFilter = "all";
let focusId = null;

/* ───────────── HELPERS ───────────── */
function fmt(sec){
  const neg = sec < 0;
  let s = Math.abs(Math.round(sec));
  const m = Math.floor(s/60);
  s = s % 60;
  return (neg?"-":"") + m + ":" + String(s).padStart(2,"0");
}
function isActive(o){ return o.status !== "ready"; }
function lineOf(o){
  if(o.status === "ready") return "ready";       // also surfaced as expo
  if(o.status === "new")   return "new";
  return "prog";                                   // prep / firing
}
function matchStation(o){
  if(stationFilter === "all") return true;
  return o.items.some(i => i.c === stationFilter);
}
/* time-to-breach used for ordering the active line (most urgent first) */
function ttb(o){
  // a risk ticket is urgent even with clock left → fold prediction overrun in
  const t = tone(o);
  if(t === "late") return o.sla;                 // most negative first
  if(t === "risk") return o.sla - ((o.pred||0) - o.sla); // penalise predicted overrun
  return o.sla;
}

/* ───────────── HORIZON RENDER ───────────── */
function renderHorizon(){
  const horizon = document.getElementById("horizon");
  const W = horizon.clientWidth || 1000;
  const px = (sec) => Math.max(0, Math.min(1, sec / HORIZON_SEC)) * (W - 4) + 2;

  // gridlines + labels (every minute)
  const gl = document.getElementById("gridlines");
  gl.innerHTML = "";
  for(let m=0; m<=10; m++){
    const sec = m*60;
    const x = px(sec);
    const line = document.createElement("div");
    line.className = "gridline" + (m % 5 === 0 ? " major" : "");
    line.style.left = x + "px";
    gl.appendChild(line);
    if(m % 1 === 0){
      const lab = document.createElement("div");
      lab.className = "ticklabel";
      lab.style.left = x + "px";
      lab.textContent = m === 0 ? "0" : "+" + m;
      gl.appendChild(lab);
    }
  }
  // risk zone: shade the latter half of the horizon as the predictive watch band
  const rz = document.getElementById("riskZone");
  rz.style.left = px(180) + "px";          // beyond +3:00 is the watch band
  rz.style.right = "0px";

  // markers — every active (non-ready) ticket
  const track = document.getElementById("track");
  track.innerHTML = "";
  const active = state.filter(o => isActive(o) && matchStation(o));
  // distribute vertically to reduce overlap, ordered by urgency
  const ordered = active.slice().sort((a,b)=> ttb(a)-ttb(b));
  const rows = Math.max(1, ordered.length);
  ordered.forEach((o, idx) => {
    const t = tone(o);
    const col = TONE_COLOR[t];
    // promise position: breached parked at NOW; else at sla
    const slaX = o.sla < 0 ? px(0) : px(o.sla);
    const predX = px(Math.max(0, o.pred||0));
    const m = document.createElement("div");
    m.className = "marker" + (t==="risk"?" is-risk":"") + (t==="late"?" is-late":"") + (o.id===focusId?" focus":"");
    m.style.color = col;
    const trackH = (document.getElementById("track").clientHeight || 80);
    const top = ((idx + 0.5) / rows) * 100;
    m.style.top = top + "%";
    m.style.left = slaX + "px";

    // whisker from promise → predicted-ready (shows predictive overrun/under)
    const wsk = document.createElement("div");
    const a = slaX, b = predX;
    const left = Math.min(a,b), width = Math.abs(b-a);
    wsk.className = "whisker";
    wsk.style.left = (left - slaX) + "px";
    wsk.style.width = width + "px";
    m.appendChild(wsk);

    const dot = document.createElement("div");
    dot.className = "dot";
    m.appendChild(dot);

    const lab = document.createElement("div");
    lab.className = "lab";
    lab.textContent = o.id;
    m.appendChild(lab);

    m.title = o.id + " · " + o.name + " · " + (o.sla<0?("Late "+fmt(o.sla)):("Due "+fmt(o.sla))) + " · pred " + fmt(o.pred||0);
    m.addEventListener("click", ()=>{ focusId = (focusId===o.id?null:o.id); render(); scrollToTicket(o.id); });
    track.appendChild(m);
  });
}

function scrollToTicket(id){
  const el = document.querySelector('.ticket[data-id="'+id+'"]');
  if(el && el.scrollIntoView) el.scrollIntoView({behavior:"smooth", block:"nearest"});
}

/* ───────────── RING (depleting SLA indicator) ───────────── */
function ringSVG(o, t){
  const col = TONE_COLOR[t];
  const R = 19, C = 2*Math.PI*R;
  // fraction of promise remaining; breached → empty
  let frac;
  if(o.status === "ready") frac = 1;
  else if(o.sla <= 0) frac = 0;
  else frac = Math.max(0, Math.min(1, o.sla / Math.max(o.sla, o.elapsed + o.sla))); // remaining vs total promised window
  const dash = C * frac;
  const center = o.status==="ready" ? "✓" : (o.sla<0 ? "!" : fmt(o.sla));
  return `<div class="ring">
    <svg width="46" height="46" viewBox="0 0 46 46">
      <circle cx="23" cy="23" r="${R}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="4"/>
      <circle cx="23" cy="23" r="${R}" fill="none" stroke="${col}" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="${dash.toFixed(1)} ${(C-dash).toFixed(1)}"/>
    </svg>
    <div class="rtxt" style="color:${o.sla<0?'var(--late)':'var(--fg)'}">${center}</div>
  </div>`;
}

const CH_ICON = {
  delivery:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 18a2 2 0 1 0 4 0M15 18a2 2 0 1 0 4 0"/><path d="M3 6h11v9H3zM14 9h4l3 3v3h-2"/></svg>',
  takeout:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8h12l-1 12H7zM9 8V6a3 3 0 0 1 6 0v2"/></svg>',
};

/* ───────────── TICKET RENDER ───────────── */
function ticketEl(o){
  const t = tone(o);
  const el = document.createElement("div");
  el.className = "ticket tone-"+t + (o.id===focusId?" focus":"");
  el.style.setProperty("--tone", TONE_COLOR[t]);
  el.dataset.id = o.id;

  const dueLabel = o.sla < 0 ? ("Late " + fmt(o.sla)) : ("Due " + fmt(o.sla));
  const dueCls = o.sla < 0 ? "late" : (t==="risk" ? "risk" : "");
  const predCls = t==="risk" ? "risk" : "";
  const actLabel = o.status==="new" ? "Start cooking" : (o.status==="prep" ? "Mark ready" : "Hand off");
  const actIcon = o.status==="new"
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 4 12 8-12 8z"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';

  const itemsHTML = o.items.map(i =>
    `<div class="item"><span class="q mono">${i.q}×</span><span class="n">${i.n}</span><span class="cat">${i.c}</span>${i.note?`<span class="inote">${i.note}</span>`:""}</div>`
  ).join("");

  el.innerHTML = `
    <div class="tk-top">
      <div class="tk-id">
        <span class="id mono">${o.id}</span>
        <span class="nm">${o.name} · ${o.loc}</span>
      </div>
      <div class="tk-meta">
        <span class="chip ch-${o.channel}">${CH_ICON[o.channel]||""}${o.channel}</span>
        <span class="chip">slot ${o.slot}</span>
      </div>
    </div>

    <div class="timers">
      <div class="elapsed">
        <span class="v mono" style="color:${TONE_COLOR[t]}">${fmt(o.elapsed)}</span>
        <span class="k">Elapsed</span>
      </div>
      <div class="sla">
        ${ringSVG(o,t)}
        <div class="sla-meta">
          <span class="due ${dueCls} mono">${dueLabel}</span>
          <span class="pl ${predCls}">pred ready <b class="mono">${fmt(o.pred||0)}</b></span>
        </div>
      </div>
    </div>

    <div class="items">${itemsHTML}</div>
    ${o.note?`<div class="tknote"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg><span>${o.note}</span></div>`:""}

    <button class="act">${actIcon}${actLabel}</button>
  `;

  el.querySelector(".act").addEventListener("click",(e)=>{ e.stopPropagation(); advance(o.id); });
  el.addEventListener("click",()=>{ focusId = (focusId===o.id?null:o.id); render(); });
  return el;
}

/* expo card */
function expoEl(o){
  const el = document.createElement("div");
  el.className = "expo-card";
  const summ = o.items.map(i=>`${i.q}× ${i.n}`).join(" · ");
  el.innerHTML = `
    <div class="row">
      <span class="id mono">${o.id}</span>
      <span class="wait mono">+${fmt(o.elapsed)}</span>
    </div>
    <div class="nm">${o.name} · ${o.loc} · ${o.channel}</div>
    <div class="summ">${summ}</div>
    <button class="handoff">Hand off</button>
  `;
  el.querySelector(".handoff").addEventListener("click",()=>advance(o.id));
  return el;
}

const INS_ICON = {
  risk:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>',
  route:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v12M6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM18 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM18 9v3a3 3 0 0 1-3 3H9"/></svg>',
  anomaly:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg>',
  forecast:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8M21 7v6h-6"/></svg>',
};

/* ───────────── COUNTS ───────────── */
function counts(){
  // counts reflect active station filter so the switcher composes with stations
  const pool = state.filter(matchStation);
  const c = { all:0, new:0, prog:0, ready:0, expo:0 };
  pool.forEach(o=>{
    const l = lineOf(o);
    if(l==="ready"){ c.ready++; c.expo++; }
    else { c[l]++; c.all++; }
  });
  // "All" line = full active board (new + prog); ready handled in rail
  c.all = c.new + c.prog;
  return c;
}

/* ───────────── MAIN RENDER ───────────── */
function render(){
  // counts
  const c = counts();
  document.getElementById("ct-all").textContent = c.all;
  document.getElementById("ct-new").textContent = c.new;
  document.getElementById("ct-prog").textContent = c.prog;
  document.getElementById("ct-ready").textContent = c.ready;
  document.getElementById("ct-expo").textContent = c.expo;

  // lane: active tickets filtered by line + station, sorted by ttb
  const lane = document.getElementById("lane");
  lane.innerHTML = "";
  let pool = state.filter(o => isActive(o) && matchStation(o));
  if(lineFilter === "new")  pool = pool.filter(o => lineOf(o)==="new");
  if(lineFilter === "prog") pool = pool.filter(o => lineOf(o)==="prog");
  if(lineFilter === "ready" || lineFilter === "expo") pool = []; // those live in the rail

  pool.sort((a,b)=> ttb(a)-ttb(b));

  const title = ({all:"Active line",new:"New orders",prog:"In progress",ready:"Ready · Expo",expo:"Ready · Expo"})[lineFilter];
  document.getElementById("laneTitle").textContent = title + (stationFilter!=="all" ? " · "+stationFilter : "");

  if(pool.length === 0){
    const e = document.createElement("div");
    e.className = "empty";
    e.textContent = (lineFilter==="ready"||lineFilter==="expo")
      ? "Ready & expo tickets are on the right rail →"
      : "No tickets in this line.";
    lane.appendChild(e);
  } else {
    pool.forEach(o => lane.appendChild(ticketEl(o)));
  }

  // expo rail
  const ready = state.filter(o => o.status==="ready" && matchStation(o));
  document.getElementById("expoCount").textContent = ready.length;
  const expoList = document.getElementById("expoList");
  expoList.innerHTML = "";
  if(ready.length === 0){
    const e = document.createElement("div");
    e.className = "summ"; e.style.color = "var(--faint)"; e.style.padding="12px 2px";
    e.textContent = "Nothing waiting at the pass.";
    expoList.appendChild(e);
  } else {
    ready.forEach(o => expoList.appendChild(expoEl(o)));
  }

  // horizon
  renderHorizon();
}

/* insights render once */
function renderInsights(){
  const box = document.getElementById("insights");
  box.innerHTML = "";
  INSIGHTS.forEach(ins=>{
    const el = document.createElement("div");
    el.className = "insight";
    el.style.setProperty("--ins", TONE_COLOR[ins.tone] || "#5B6573");
    el.innerHTML = `
      <div class="ic">${INS_ICON[ins.kind]||""}</div>
      <div class="txt">
        <div class="kind">${ins.kind}</div>
        <div class="body">${ins.text}</div>
      </div>`;
    box.appendChild(el);
  });
}

/* ───────────── ACTIONS ───────────── */
// advance new → prep → ready → removed
function advance(id){
  const o = state.find(x=>x.id===id);
  if(!o) return;
  if(o.status === "new"){ o.status = "prep"; }
  else if(o.status === "prep"){ o.status = "ready"; o.sla = 0; o.pred = 0; }
  else if(o.status === "ready"){ state = state.filter(x=>x.id!==id); }
  if(focusId === id && !state.find(x=>x.id===id)) focusId = null;
  render();
}

/* ───────────── CONTROLS WIRING ───────────── */
document.getElementById("stations").addEventListener("click",(e)=>{
  const b = e.target.closest("button"); if(!b) return;
  stationFilter = b.dataset.station;
  [...e.currentTarget.querySelectorAll("button")].forEach(x=>x.classList.toggle("on", x===b));
  render();
});
document.getElementById("lines").addEventListener("click",(e)=>{
  const b = e.target.closest("button"); if(!b) return;
  lineFilter = b.dataset.line;
  [...e.currentTarget.querySelectorAll("button")].forEach(x=>x.classList.toggle("on", x===b));
  render();
});

/* fullscreen control */
const fsBtn = document.getElementById("fsBtn");
const fsLabel = document.getElementById("fsLabel");
fsBtn.addEventListener("click", ()=>{
  const root = document.documentElement;
  if(!document.fullscreenElement){
    const p = root.requestFullscreen ? root.requestFullscreen() : null;
    if(p && p.catch) p.catch(()=> root.classList.add("is-fullscreen"));
    else root.classList.add("is-fullscreen"); // fallback when unavailable
  } else {
    if(document.exitFullscreen) document.exitFullscreen().catch(()=>{});
    root.classList.remove("is-fullscreen");
  }
  syncFs();
});
function syncFs(){
  const fs = !!document.fullscreenElement || document.documentElement.classList.contains("is-fullscreen");
  // when native fullscreen reports off, ensure class matches (Esc-safe)
  if(!document.fullscreenElement && document.fullscreenEnabled !== undefined && document.fullscreenElement === null){
    // only strip the class if it was driven by native FS (not the fallback toggle)
  }
  document.documentElement.classList.toggle("is-fullscreen", fs);
  fsLabel.textContent = fs ? "Exit" : "Fullscreen";
  // re-measure horizon after layout change
  requestAnimationFrame(renderHorizon);
}
document.addEventListener("fullscreenchange", ()=>{
  // sync class to native state (covers Esc key exit)
  document.documentElement.classList.toggle("is-fullscreen", !!document.fullscreenElement);
  fsLabel.textContent = document.fullscreenElement ? "Exit" : "Fullscreen";
  requestAnimationFrame(renderHorizon);
});

/* clock */
function tickClock(){
  const d = new Date();
  let h = d.getHours();
  const ampm = h >= 12 ? "PM" : "AM";
  const hh = String(h).padStart(2,"0");
  const mm = String(d.getMinutes()).padStart(2,"0");
  const ss = String(d.getSeconds()).padStart(2,"0");
  document.getElementById("clock").innerHTML = `${hh}:${mm}:${ss}<span class="ampm">${ampm}</span>`;
}

/* ───────────── LIVE LOOP ───────────── */
function liveTick(){
  state.forEach(o=>{
    if(o.status === "ready") return;
    o.elapsed += 1;
    o.sla     -= 1;
    o.pred     = Math.max(0, (o.pred||0) - 1);
  });
  render();
}

/* ───────────── BOOT ───────────── */
renderInsights();
render();
tickClock();
setInterval(tickClock, 1000);
setInterval(liveTick, 1000);
window.addEventListener("resize", ()=>requestAnimationFrame(renderHorizon));
</script>
</body>
