<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sud Italia KDS — Dual Expo</title>
<style>
  :root{
    --bg:#0e1218;
    --bg-2:#131922;
    --panel:#161d28;
    --panel-2:#1a222f;
    --rail:#0b0f15;
    --line:#222c3a;
    --line-soft:#1c2531;
    --ink:#eef3f9;
    --ink-2:#aebacc;
    --muted:#828fa6;
    --faint:#5d6a80;
    --accent:#5b9dff;
    --accent-dim:#2b4566;
    --neutral:#243044;
    --warn:#f2b53b;
    --warn-bg:#2c2410;
    --danger:#ff5d5d;
    --danger-bg:#311318;
    --calm:#3fd08a;
    --calm-bg:#10231b;
    --calm-line:#1f4d3a;
    --radius:12px;
    --space:16px;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,"DejaVu Sans Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans);
    background:var(--bg);
    color:var(--ink);
    font-size:14px;
    line-height:1.4;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;font-family:var(--mono)}

  /* ===== App shell ===== */
  .app{
    display:grid;
    grid-template-columns:84px 1fr;
    grid-template-rows:64px 1fr;
    height:100vh;
  }

  /* ===== Header ===== */
  header{
    grid-column:1 / -1;
    display:flex;
    align-items:center;
    gap:24px;
    padding:0 24px;
    background:var(--bg-2);
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:baseline;gap:12px;min-width:max-content}
  .wordmark{
    font-weight:700;
    letter-spacing:.16em;
    font-size:15px;
    color:var(--ink);
  }
  .kd-label{
    font-size:11px;
    letter-spacing:.08em;
    color:var(--faint);
    text-transform:uppercase;
    border-left:1px solid var(--line);
    padding-left:12px;
  }
  .tag{
    font-size:11px;
    letter-spacing:.05em;
    color:var(--accent);
    background:rgba(91,157,255,.1);
    border:1px solid rgba(91,157,255,.22);
    border-radius:999px;
    padding:3px 10px;
    font-family:var(--mono);
  }
  .head-spacer{flex:1}
  .clock{
    font-family:var(--mono);
    font-variant-numeric:tabular-nums;
    font-size:18px;
    letter-spacing:.03em;
    color:var(--ink);
  }
  .clock .date{display:block;font-size:10px;color:var(--faint);letter-spacing:.06em;text-align:right;font-family:var(--sans)}
  .gallery-link{
    font-size:11.5px;
    color:var(--faint);
    text-decoration:none;
    letter-spacing:.03em;
    padding:5px 10px;
    border:1px solid var(--line);
    border-radius:8px;
    transition:color .15s,border-color .15s;
  }
  .gallery-link:hover{color:var(--ink-2);border-color:var(--accent-dim)}

  /* ===== Stage switcher (header segmented control) ===== */
  .stages{
    display:flex;
    align-items:stretch;
    gap:4px;
    background:var(--rail);
    border:1px solid var(--line);
    border-radius:10px;
    padding:4px;
  }
  .stage-btn{
    appearance:none;
    border:none;
    background:transparent;
    color:var(--muted);
    border-radius:7px;
    padding:6px 12px;
    cursor:pointer;
    font-family:var(--sans);
    font-size:12px;
    letter-spacing:.02em;
    display:flex;
    align-items:center;
    gap:7px;
    transition:background .15s,color .15s;
  }
  .stage-btn .sc{
    font-family:var(--mono);
    font-variant-numeric:tabular-nums;
    font-size:11px;
    min-width:18px;
    text-align:center;
    color:var(--faint);
    background:var(--panel);
    border-radius:6px;
    padding:1px 6px;
    transition:background .15s,color .15s;
  }
  .stage-btn:hover{color:var(--ink-2);background:var(--panel)}
  .stage-btn.active{background:var(--accent);color:#06101f}
  .stage-btn.active .sc{background:rgba(6,16,31,.18);color:#06101f}
  .stage-btn.active.stage-ready{background:var(--calm);color:#04130c}
  .stage-btn.active.stage-ready .sc{background:rgba(4,19,12,.2);color:#04130c}

  /* ===== Fullscreen toggle button ===== */
  .fs-btn{
    appearance:none;
    display:inline-flex;
    align-items:center;
    gap:7px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--ink-2);
    border-radius:8px;
    padding:6px 11px;
    font-family:var(--sans);
    font-size:11.5px;
    letter-spacing:.03em;
    cursor:pointer;
    transition:color .15s,border-color .15s,background .15s;
  }
  .fs-btn svg{width:15px;height:15px;display:block}
  .fs-btn:hover{color:var(--ink);border-color:var(--accent-dim);background:var(--panel)}
  .fs-btn .fs-exit{display:none}
  html.is-fullscreen .fs-btn .fs-enter{display:none}
  html.is-fullscreen .fs-btn .fs-exit{display:inline-flex;align-items:center;gap:7px}

  /* ===== Station rail ===== */
  .rail{
    background:var(--rail);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    align-items:stretch;
    padding:14px 8px;
    gap:4px;
    overflow-y:auto;
  }
  .rail-btn{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    padding:11px 4px;
    border:none;
    background:transparent;
    color:var(--muted);
    border-radius:10px;
    cursor:pointer;
    font-family:var(--sans);
    transition:background .15s,color .15s;
    position:relative;
  }
  .rail-btn svg{width:22px;height:22px;display:block}
  .rail-btn .rl{font-size:10px;letter-spacing:.02em}
  .rail-btn .ct{
    font-family:var(--mono);
    font-variant-numeric:tabular-nums;
    font-size:10px;
    position:absolute;
    top:6px;right:10px;
    color:var(--faint);
  }
  .rail-btn:hover{background:var(--panel);color:var(--ink-2)}
  .rail-btn.active{background:var(--accent);color:#06101f}
  .rail-btn.active .ct{color:#06101f;opacity:.7}

  /* ===== Panes ===== */
  .panes{
    display:grid;
    grid-template-columns:1fr 1px minmax(300px,30%);
    min-height:0;
  }
  .pane{display:flex;flex-direction:column;min-height:0}
  .pane-cook{background:var(--bg)}
  .pane-expo{background:linear-gradient(180deg,var(--calm-bg),var(--bg))}
  .divider{background:var(--line);width:1px}

  .pane-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 20px 12px;
    border-bottom:1px solid var(--line-soft);
  }
  .pane-title{display:flex;align-items:center;gap:10px}
  .pane-title h2{
    font-size:12.5px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--ink-2);
    font-weight:600;
  }
  .dot{width:7px;height:7px;border-radius:50%}
  .dot.cook{background:var(--accent)}
  .dot.expo{background:var(--calm)}
  .pane-count{
    font-family:var(--mono);
    font-variant-numeric:tabular-nums;
    font-size:12px;
    color:var(--faint);
    background:var(--panel);
    border:1px solid var(--line-soft);
    border-radius:8px;
    padding:2px 9px;
  }
  .pane-body{
    flex:1;
    overflow-y:auto;
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:12px;
    align-content:start;
  }
  .pane-cook .pane-body{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:14px;
  }

  /* ===== Ticket card ===== */
  .ticket{
    background:var(--panel);
    border:1px solid var(--line);
    border-left:3px solid var(--neutral);
    border-radius:var(--radius);
    padding:13px 14px 12px;
    display:flex;
    flex-direction:column;
    gap:10px;
    transition:border-color .25s,box-shadow .25s,transform .12s;
  }
  .ticket.tone-warn{border-left-color:var(--warn);box-shadow:inset 3px 0 0 -2px var(--warn)}
  .ticket.tone-danger{border-left-color:var(--danger);box-shadow:0 0 0 1px rgba(255,93,93,.18)}
  .ticket.tone-calm{
    border-color:var(--calm-line);
    border-left-color:var(--calm);
    background:linear-gradient(180deg,rgba(63,208,138,.06),var(--panel));
  }
  .ticket.bumping{transform:scale(.97);opacity:0;transition:transform .28s,opacity .28s}

  .t-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .t-id{display:flex;flex-direction:column;gap:3px}
  .t-id .oid{font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:.02em;color:var(--ink)}
  .t-id .who{font-size:12px;color:var(--ink-2)}
  .t-meta{display:flex;flex-wrap:wrap;gap:5px;justify-content:flex-end}
  .chip{
    font-size:10px;
    letter-spacing:.04em;
    padding:2px 7px;
    border-radius:6px;
    border:1px solid var(--line);
    color:var(--muted);
    background:var(--bg-2);
    text-transform:uppercase;
    white-space:nowrap;
  }
  .chip.del{color:#c89bff;border-color:rgba(200,155,255,.25);background:rgba(200,155,255,.07)}
  .chip.tak{color:#7fd1ff;border-color:rgba(127,209,255,.22);background:rgba(127,209,255,.06)}

  .t-timers{
    display:flex;
    gap:8px;
    align-items:stretch;
  }
  .timer{
    flex:1;
    background:var(--bg-2);
    border:1px solid var(--line-soft);
    border-radius:8px;
    padding:6px 9px;
    display:flex;
    flex-direction:column;
    gap:1px;
  }
  .timer .lab{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
  .timer .val{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:17px;letter-spacing:.02em;color:var(--ink)}
  .timer.due .val.warn{color:var(--warn)}
  .timer.due .val.danger{color:var(--danger)}
  .timer.due .val.calm{color:var(--calm)}

  .t-items{display:flex;flex-direction:column;gap:5px;padding:2px 0}
  .item{display:flex;gap:8px;align-items:baseline;font-size:13px}
  .item .q{font-family:var(--mono);font-variant-numeric:tabular-nums;color:var(--accent);min-width:24px;font-weight:600}
  .ticket.tone-calm .item .q{color:var(--calm)}
  .item .nm{color:var(--ink);flex:1}
  .item .cat{font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);align-self:center}
  .item .nt{display:block;font-size:11px;color:var(--warn);margin-top:1px}
  .item .nt::before{content:"› "}

  .t-note{
    font-size:11.5px;
    color:var(--ink-2);
    background:var(--warn-bg);
    border:1px solid rgba(242,181,59,.2);
    border-radius:7px;
    padding:6px 9px;
  }
  .t-note .k{color:var(--warn);text-transform:uppercase;font-size:9px;letter-spacing:.08em;display:block;margin-bottom:2px}

  .t-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:2px}
  .t-sub{display:flex;gap:10px;font-size:11px;color:var(--faint)}
  .t-sub b{color:var(--ink-2);font-weight:500;font-family:var(--mono);font-variant-numeric:tabular-nums}

  .t-actions{display:flex;gap:6px;align-items:center}
  .btn-86{
    border:1px solid var(--line);
    background:transparent;
    color:var(--muted);
    border-radius:7px;
    width:30px;height:30px;
    font-family:var(--mono);
    font-size:11px;
    cursor:pointer;
    transition:color .15s,border-color .15s;
  }
  .btn-86:hover{color:var(--danger);border-color:rgba(255,93,93,.35)}
  .btn-primary{
    border:none;
    border-radius:8px;
    padding:9px 14px;
    font-size:12.5px;
    font-weight:600;
    letter-spacing:.02em;
    cursor:pointer;
    background:var(--accent);
    color:#06101f;
    transition:filter .15s,transform .08s;
    display:flex;align-items:center;gap:6px;
  }
  .btn-primary:hover{filter:brightness(1.08)}
  .btn-primary:active{transform:translateY(1px)}
  .btn-primary.calm{background:var(--calm);color:#04130c}
  .btn-primary svg{width:14px;height:14px}

  .key-hint{
    font-family:var(--mono);
    font-size:10px;
    color:var(--faint);
    border:1px solid var(--line);
    border-radius:5px;
    padding:1px 5px;
    margin-right:auto;
  }

  /* Expo extras */
  .recall{
    border:1px solid var(--line);
    background:transparent;
    color:var(--muted);
    border-radius:7px;
    padding:8px 12px;
    font-size:11.5px;
    cursor:pointer;
    transition:color .15s,border-color .15s;
  }
  .recall:hover{color:var(--ink-2);border-color:var(--accent-dim)}

  .empty{
    text-align:center;
    color:var(--faint);
    font-size:13px;
    padding:48px 16px;
    border:1px dashed var(--line);
    border-radius:var(--radius);
  }
  .empty.full{grid-column:1/-1}

  /* ===== Single-pane focus (a stage other than "All" selected) ===== */
  .panes.focus-cook{grid-template-columns:1fr 0 0}
  .panes.focus-expo{grid-template-columns:0 0 1fr}
  .panes.focus-cook .pane-expo,.panes.focus-cook .divider,
  .panes.focus-expo .pane-cook,.panes.focus-expo .divider{display:none}
  .panes.focus-expo .pane-expo .pane-body{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:14px;
  }

  /* ===== Fullscreen / immersive mode ===== */
  html.is-fullscreen .gallery-link,
  html.is-fullscreen .tag{display:none}
  html.is-fullscreen .app{grid-template-rows:56px 1fr}
  html.is-fullscreen header{padding:0 16px;gap:16px}
  html.is-fullscreen .ticket{padding:15px 16px 14px}
  html.is-fullscreen .t-id .oid{font-size:17px}
  html.is-fullscreen .t-id .who{font-size:13px}
  html.is-fullscreen .timer .val{font-size:20px}
  html.is-fullscreen .item{font-size:14.5px}
  html.is-fullscreen .pane-title h2{font-size:13.5px}

  /* scrollbars */
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <span class="wordmark">SUD ITALIA</span>
      <span class="kd-label">Kitchen Display</span>
    </div>
    <span class="tag">07 · Dual Expo</span>
    <div class="stages" id="stages"></div>
    <div class="head-spacer"></div>
    <button class="fs-btn" id="fsBtn" type="button" aria-label="Toggle fullscreen">
      <span class="fs-enter"><svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>Fullscreen</span>
      <span class="fs-exit"><svg viewBox="0 0 24 24"><path d="M9 4v5H4M15 4v5h5M9 20v-5H4M15 20v-5h5" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>Exit</span>
    </button>
    <a class="gallery-link" href="index.html">← Gallery</a>
    <div class="clock">
      <span id="clock">--:--:--</span>
      <span class="date" id="date"></span>
    </div>
  </header>

  <nav class="rail" id="rail"></nav>

  <div class="panes" id="panes">
    <section class="pane pane-cook">
      <div class="pane-head">
        <div class="pane-title"><span class="dot cook"></span><h2>Line · Cooking</h2></div>
        <span class="pane-count" id="cookCount">0</span>
      </div>
      <div class="pane-body" id="cookBody"></div>
    </section>

    <div class="divider"></div>

    <section class="pane pane-expo">
      <div class="pane-head">
        <div class="pane-title"><span class="dot expo"></span><h2>Expo · Ready</h2></div>
        <span class="pane-count" id="expoCount">0</span>
      </div>
      <div class="pane-body" id="expoBody"></div>
    </section>
  </div>
</div>

<script>
"use strict";

const ORDERS = [
  { id:"A4F9C2", name:"Marco R.",  channel:"takeout",  loc:"Kraków",   slot:"15:20", elapsed:192, sla:288, status:"prep",
    items:[{q:2,n:"Margherita",c:"Pizza"},{q:1,n:"Diavola",c:"Pizza"},{q:1,n:"Espresso",c:"Drinks"}] },
  { id:"B7K2D1", name:"Giulia M.", channel:"delivery", loc:"Kraków",   slot:"15:15", elapsed:540, sla:-65, status:"prep",
    items:[{q:1,n:"Quattro Formaggi",c:"Pizza"},{q:1,n:"Spaghetti Carbonara",c:"Pasta",note:"no garlic"},{q:1,n:"Tiramisù",c:"Desserts"}], note:"Leave at reception" },
  { id:"C1M8X4", name:"Paweł K.",  channel:"takeout",  loc:"Warszawa", slot:"15:30", elapsed:48,  sla:612, status:"new",
    items:[{q:1,n:"Diavola",c:"Pizza"},{q:2,n:"Aranciata",c:"Drinks"}] },
  { id:"D9P3Q7", name:"Anna W.",   channel:"delivery", loc:"Warszawa", slot:"15:28", elapsed:95,  sla:505, status:"new",
    items:[{q:3,n:"Margherita",c:"Pizza"},{q:1,n:"Penne Arrabbiata",c:"Pasta"},{q:2,n:"Limonata Fresca",c:"Drinks"}] },
  { id:"E5R6T2", name:"Luca B.",   channel:"takeout",  loc:"Kraków",   slot:"15:22", elapsed:300, sla:120, status:"prep",
    items:[{q:1,n:"Tartufata Reale",c:"Pizza",note:"extra truffle"},{q:1,n:"Burrata con Pomodorini",c:"Antipasti"}] },
  { id:"F2H4J8", name:"Sofia L.",  channel:"takeout",  loc:"Kraków",   slot:"15:10", elapsed:720, sla:0,   status:"ready",
    items:[{q:1,n:"Panino Caprese",c:"Panini"},{q:1,n:"Garlic Bread",c:"Antipasti"},{q:1,n:"Espresso",c:"Drinks"}] },
  { id:"G8L1N5", name:"Tomek Z.",  channel:"delivery", loc:"Warszawa", slot:"15:32", elapsed:150, sla:450, status:"new",
    items:[{q:2,n:"Penne Arrabbiata",c:"Pasta"},{q:1,n:"Linguine al Pesto",c:"Pasta"}] },
  { id:"H3W7Y9", name:"Elena P.",  channel:"takeout",  loc:"Kraków",   slot:"15:08", elapsed:660, sla:0,   status:"ready",
    items:[{q:1,n:"Prosciutto e Rucola",c:"Pizza"},{q:1,n:"Arancini (3 pcs)",c:"Antipasti"}] },
];

// ---- Station definitions with inline SVG icons ----
const STATIONS = [
  { key:"All",       label:"All" },
  { key:"Pizza",     label:"Pizza" },
  { key:"Pasta",     label:"Pasta" },
  { key:"Antipasti", label:"Antipasti" },
  { key:"Panini",    label:"Panini" },
  { key:"Drinks",    label:"Drinks" },
  { key:"Desserts",  label:"Desserts" },
];
function icon(key){
  const s='stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"';
  switch(key){
    case "All":       return `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5" ${s}/><rect x="14" y="3" width="7" height="7" rx="1.5" ${s}/><rect x="3" y="14" width="7" height="7" rx="1.5" ${s}/><rect x="14" y="14" width="7" height="7" rx="1.5" ${s}/></svg>`;
    case "Pizza":     return `<svg viewBox="0 0 24 24"><path d="M12 3 4 19a1 1 0 0 0 1.2 1.4L20 16Z" ${s}/><circle cx="11" cy="11" r="1.1" fill="currentColor" stroke="none"/><circle cx="9" cy="15" r="1.1" fill="currentColor" stroke="none"/><circle cx="14" cy="13" r="1.1" fill="currentColor" stroke="none"/></svg>`;
    case "Pasta":     return `<svg viewBox="0 0 24 24"><path d="M5 21V11a7 7 0 0 1 14 0v10" ${s}/><path d="M9 11V5M12 11V4.5M15 11V5" ${s}/></svg>`;
    case "Antipasti": return `<svg viewBox="0 0 24 24"><path d="M4 19h16" ${s}/><path d="M5 19a7 7 0 0 1 14 0" ${s}/><path d="M12 12V5M10 5h4" ${s}/></svg>`;
    case "Panini":    return `<svg viewBox="0 0 24 24"><path d="M4 9a8 4 0 0 1 16 0" ${s}/><path d="M4 9v3a8 4 0 0 0 16 0V9" ${s}/><path d="M7 11h.01M11 11.4h.01M15 11h.01" ${s}/></svg>`;
    case "Drinks":    return `<svg viewBox="0 0 24 24"><path d="M6 4h12l-1.4 15.2a1 1 0 0 1-1 .8H8.4a1 1 0 0 1-1-.8Z" ${s}/><path d="M6.7 9h10.6" ${s}/></svg>`;
    case "Desserts":  return `<svg viewBox="0 0 24 24"><path d="M5 21V12h14v9Z" ${s}/><path d="M5 12a7 7 0 0 1 14 0" ${s}/><path d="M12 5V2.5M12 5l-1.6-1.4M12 5l1.6-1.4" ${s}/></svg>`;
    default:          return "";
  }
}

let activeStation = "All";
let activeStage = "All";
let bumping = new Set();

// ---- Stage switcher definitions ----
const STAGES = [
  { key:"All",   label:"All" },
  { key:"new",   label:"New" },
  { key:"prep",  label:"In progress" },
  { key:"ready", label:"Ready · Expo" },
];
function stageCount(key){
  const live = ORDERS.filter(o=>!bumping.has(o.id) && matchesStation(o));
  if(key === "All") return live.length;
  return live.filter(o=>o.status===key).length;
}

// ---- Time helpers ----
function fmt(sec){
  const neg = sec < 0;
  const a = Math.abs(sec);
  const m = Math.floor(a/60);
  const s = a % 60;
  const str = m + ":" + String(s).padStart(2,"0");
  return neg ? "Late " + str : str;
}
function tone(o){
  if(o.status === "ready") return "calm";
  if(o.sla < 0) return "danger";
  if(o.sla < 180) return "warn";
  return "neutral";
}
function itemCount(o){ return o.items.reduce((a,i)=>a+i.q,0); }
function matchesStation(o){
  if(activeStation === "All") return true;
  return o.items.some(i=>i.c === activeStation);
}

// ---- Stage switcher render ----
function renderStages(){
  const wrap = document.getElementById("stages");
  wrap.innerHTML = "";
  STAGES.forEach(st=>{
    const ct = stageCount(st.key);
    const b = document.createElement("button");
    b.type = "button";
    b.className = "stage-btn"
      + (activeStage===st.key ? " active":"")
      + (st.key==="ready" ? " stage-ready":"");
    b.innerHTML = `<span class="sl">${st.label}</span><span class="sc num">${ct}</span>`;
    b.onclick = ()=>{ activeStage = st.key; render(); };
    wrap.appendChild(b);
  });
}

// ---- Rail render ----
function renderRail(){
  const rail = document.getElementById("rail");
  rail.innerHTML = "";
  STATIONS.forEach(st=>{
    const live = ORDERS.filter(o=>!bumping.has(o.id));
    const ct = st.key === "All"
      ? live.length
      : live.filter(o=>o.items.some(i=>i.c===st.key)).length;
    const b = document.createElement("button");
    b.className = "rail-btn" + (activeStation===st.key ? " active":"");
    b.innerHTML = icon(st.key) + `<span class="rl">${st.label}</span>` +
      (ct>0 ? `<span class="ct">${ct}</span>` : "");
    b.onclick = ()=>{ activeStation = st.key; render(); };
    rail.appendChild(b);
  });
}

// ---- Ticket markup ----
function chipChannel(ch){
  return ch === "delivery"
    ? `<span class="chip del">Delivery</span>`
    : `<span class="chip tak">Takeout</span>`;
}
function ticketEl(o, hotkey){
  const tn = tone(o);
  const el = document.createElement("article");
  el.className = "ticket tone-" + tn + (bumping.has(o.id) ? " bumping" : "");
  el.dataset.id = o.id;

  const dueClass = tn === "neutral" ? "" : tn;
  const itemsHtml = o.items.map(i=>`
    <div class="item">
      <span class="q num">${i.q}×</span>
      <span class="nm">${i.n}${i.note?`<span class="nt">${i.note}</span>`:""}</span>
      <span class="cat">${i.c}</span>
    </div>`).join("");

  const actionLabel = o.status==="new" ? "Start prep"
    : o.status==="prep" ? "Mark ready" : "Bump · Done";
  const arrowSvg = `<svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const checkSvg = `<svg viewBox="0 0 24 24"><path d="M5 13l4 4 10-11" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  el.innerHTML = `
    <div class="t-top">
      <div class="t-id">
        <span class="oid">#${o.id}</span>
        <span class="who">${o.name}</span>
      </div>
      <div class="t-meta">
        ${chipChannel(o.channel)}
        <span class="chip">${o.loc}</span>
      </div>
    </div>

    <div class="t-timers">
      <div class="timer">
        <span class="lab">Elapsed</span>
        <span class="val num" data-elapsed>${fmt(o.elapsed)}</span>
      </div>
      <div class="timer due">
        <span class="lab">Due</span>
        <span class="val num ${dueClass}" data-sla>${o.status==="ready" ? "Ready" : fmt(o.sla)}</span>
      </div>
    </div>

    <div class="t-items">${itemsHtml}</div>
    ${o.note?`<div class="t-note"><span class="k">Special instruction</span>${o.note}</div>`:""}

    <div class="t-foot">
      <div class="t-sub">
        <span>Slot <b>${o.slot}</b></span>
        <span><b>${itemCount(o)}</b> items</span>
      </div>
    </div>

    <div class="t-foot">
      ${hotkey!=null?`<span class="key-hint">Key ${hotkey}</span>`:""}
      <div class="t-actions">
        ${o.status==="ready"
          ? `<button class="recall" data-recall>Recall</button>`
          : `<button class="btn-86" data-86 title="86 an item — mark out of stock">86</button>`}
        <button class="btn-primary ${o.status==="ready"?"calm":""}" data-advance>
          ${o.status==="ready"?checkSvg:arrowSvg}${actionLabel}
        </button>
      </div>
    </div>
  `;

  el.querySelector("[data-advance]").onclick = ()=>advance(o.id);
  const recall = el.querySelector("[data-recall]");
  if(recall) recall.onclick = ()=>recallTicket(o.id);
  const eightysix = el.querySelector("[data-86]");
  if(eightysix) eightysix.onclick = ()=>eightySix(el, eightysix);

  return el;
}

// ---- Actions ----
function advance(id){
  const o = ORDERS.find(x=>x.id===id);
  if(!o || bumping.has(id)) return;
  if(o.status==="new"){ o.status="prep"; render(); }
  else if(o.status==="prep"){ o.status="ready"; o.sla=0; render(); }
  else if(o.status==="ready"){
    bumping.add(id);
    render();
    setTimeout(()=>{
      const i = ORDERS.findIndex(x=>x.id===id);
      if(i>-1) ORDERS.splice(i,1);
      bumping.delete(id);
      render();
    }, 300);
  }
}
function recallTicket(id){
  const o = ORDERS.find(x=>x.id===id);
  if(!o) return;
  o.status = "prep";
  o.sla = 90; // back on the line, tight window
  render();
}
function eightySix(card, btn){
  const item = btn.closest(".ticket").querySelector(".item");
  // visually strike the first item as a demonstration of 86'ing
  if(item && !item.dataset.eod){
    item.dataset.eod = "1";
    item.style.textDecoration = "line-through";
    item.style.opacity = ".4";
    btn.style.color = "var(--danger)";
    btn.style.borderColor = "rgba(255,93,93,.5)";
  }
}

// ---- Render ----
function urgencyRank(o){
  if(o.sla < 0) return 0;
  if(o.sla < 180) return 1;
  return 2;
}
// which cook statuses are shown given the active stage
function cookStatuses(){
  if(activeStage === "new") return ["new"];
  if(activeStage === "prep") return ["prep"];
  return ["new","prep"]; // "All" (expo stage hides the cook pane)
}
function render(){
  renderStages();
  renderRail();

  // Apply single-pane focus when a specific stage is selected.
  const panes = document.getElementById("panes");
  panes.classList.remove("focus-cook","focus-expo");
  if(activeStage === "new" || activeStage === "prep") panes.classList.add("focus-cook");
  else if(activeStage === "ready") panes.classList.add("focus-expo");

  const cookSet = cookStatuses();
  const cook = ORDERS
    .filter(o=>cookSet.includes(o.status) && matchesStation(o))
    .slice()
    .sort((a,b)=>{
      const r = urgencyRank(a)-urgencyRank(b);
      if(r!==0) return r;
      return a.sla - b.sla;
    });
  const expo = ORDERS.filter(o=>o.status==="ready" && matchesStation(o));

  const cookBody = document.getElementById("cookBody");
  const expoBody = document.getElementById("expoBody");
  cookBody.innerHTML = "";
  expoBody.innerHTML = "";

  if(cook.length===0){
    cookBody.innerHTML = `<div class="empty full">No active tickets on the line.</div>`;
  } else {
    cook.forEach((o,idx)=>cookBody.appendChild(ticketEl(o, idx<10 ? (idx+1)%10 : null)));
  }
  if(expo.length===0){
    expoBody.innerHTML = `<div class="empty">Nothing waiting at the pass.</div>`;
  } else {
    expo.forEach(o=>expoBody.appendChild(ticketEl(o, null)));
  }

  document.getElementById("cookCount").textContent = cook.length;
  document.getElementById("expoCount").textContent = expo.length;
}

// ---- Tick loop ----
function tick(){
  ORDERS.forEach(o=>{
    if(bumping.has(o.id)) return;
    o.elapsed += 1;
    if(o.status!=="ready") o.sla -= 1;
  });
  // update timer text + tone in place (cheap)
  document.querySelectorAll(".ticket").forEach(card=>{
    const o = ORDERS.find(x=>x.id===card.dataset.id);
    if(!o) return;
    const eEl = card.querySelector("[data-elapsed]");
    const sEl = card.querySelector("[data-sla]");
    if(eEl) eEl.textContent = fmt(o.elapsed);
    if(sEl && o.status!=="ready") sEl.textContent = fmt(o.sla);
    // re-apply tone
    const tn = tone(o);
    card.classList.remove("tone-neutral","tone-warn","tone-danger","tone-calm");
    card.classList.add("tone-"+tn);
    if(sEl){
      sEl.classList.remove("warn","danger","calm");
      if(o.status!=="ready" && tn!=="neutral") sEl.classList.add(tn);
    }
  });
  // re-sort cook pane if urgency order may have shifted
  reorderCook();
}
let lastSig = "";
function reorderCook(){
  const cookSet = cookStatuses();
  const cook = ORDERS
    .filter(o=>cookSet.includes(o.status) && matchesStation(o))
    .slice()
    .sort((a,b)=>{
      const r = urgencyRank(a)-urgencyRank(b);
      if(r!==0) return r;
      return a.sla - b.sla;
    });
  const sig = cook.map(o=>o.id).join(",");
  if(sig !== lastSig){
    lastSig = sig;
    render();
  }
}

// ---- Clock ----
function clockTick(){
  const d = new Date();
  const p = n=>String(n).padStart(2,"0");
  document.getElementById("clock").textContent =
    p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds());
  document.getElementById("date").textContent =
    d.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"});
}

// ---- Hotkeys 1–9/0 ----
window.addEventListener("keydown",e=>{
  if(!/^[0-9]$/.test(e.key)) return;
  // On the Ready · Expo focus the keys target the expo list; otherwise the cook list.
  let list;
  if(activeStage === "ready"){
    list = ORDERS.filter(o=>o.status==="ready" && matchesStation(o));
  } else {
    const cookSet = cookStatuses();
    list = ORDERS
      .filter(o=>cookSet.includes(o.status) && matchesStation(o))
      .slice()
      .sort((a,b)=>{
        const r = urgencyRank(a)-urgencyRank(b);
        if(r!==0) return r;
        return a.sla - b.sla;
      });
  }
  const idx = e.key === "0" ? 9 : parseInt(e.key,10)-1;
  if(list[idx]) advance(list[idx].id);
});

// ---- Fullscreen mode ----
function syncFullscreen(){
  const on = !!document.fullscreenElement;
  document.documentElement.classList.toggle("is-fullscreen", on);
}
function toggleFullscreen(){
  const root = document.documentElement;
  if(!document.fullscreenElement){
    const req = root.requestFullscreen && root.requestFullscreen();
    if(req && req.catch){
      req.catch(()=>{ root.classList.add("is-fullscreen"); });
    } else if(!req){
      // API unavailable — fall back to immersive styling only
      root.classList.toggle("is-fullscreen");
    }
  } else {
    const exit = document.exitFullscreen && document.exitFullscreen();
    if(exit && exit.catch){ exit.catch(()=>{}); }
    root.classList.remove("is-fullscreen");
  }
}
document.getElementById("fsBtn").addEventListener("click", toggleFullscreen);
document.addEventListener("fullscreenchange", syncFullscreen);

// ---- Init ----
render();
clockTick();
setInterval(()=>{ tick(); clockTick(); }, 1000);
</script>
</body>
</html>
