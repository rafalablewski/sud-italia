<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sud Italia KDS — Console</title>
<style>
  :root{
    --bg:#080A0B;
    --grid:rgba(120,200,170,0.05);
    --panel:#0C0F10;
    --card:#0E1213;
    --card-edge:rgba(120,255,200,0.10);
    --hair:rgba(160,180,175,0.12);
    --text:#C7D2CE;
    --text-dim:#7E908A;
    --text-faint:#566059;
    --phos:#36E0A0;
    --phos-dim:#1E8C64;
    --amber:#E8B43C;
    --red:#FF5B57;
    --green:#36E0A0;
    --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Liberation Mono","Roboto Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--text); font-family:var(--mono);
    font-size:13px; line-height:1.4; -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
    font-variant-numeric:tabular-nums;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:28px 28px;
  }

  /* Top status/command bar */
  .statusbar{
    flex:0 0 auto; display:flex; align-items:center; gap:var(--s4);
    height:46px; padding:0 var(--s4); background:var(--panel);
    border-bottom:1px solid var(--hair);
  }
  .wordmark{font-weight:700; letter-spacing:.22em; font-size:12px; color:var(--text)}
  .wordmark .b{color:var(--phos)}
  .kd{color:var(--text-faint); font-size:10px; letter-spacing:.16em; text-transform:uppercase; border-left:1px solid var(--hair); padding-left:var(--s3)}
  .tag{color:var(--text-dim); font-size:10px; letter-spacing:.08em}
  .readout{
    flex:1; color:var(--text-dim); font-size:12px; letter-spacing:.04em;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .readout b{color:var(--phos); font-weight:600}
  .readout .late{color:var(--red); font-weight:600}
  .readout .soon{color:var(--amber); font-weight:600}
  .readout .sep{color:var(--text-faint); margin:0 8px}
  .clock{color:var(--text); font-size:14px; letter-spacing:.04em; min-width:78px; text-align:right}
  .gallery{color:var(--text-faint); font-size:10px; text-decoration:none; letter-spacing:.1em; text-transform:uppercase; transition:color .12s}
  .gallery:hover{color:var(--phos)}

  /* Filter line */
  .filterline{
    flex:0 0 auto; display:flex; align-items:center; gap:var(--s2);
    height:34px; padding:0 var(--s4); background:rgba(12,15,16,0.6);
    border-bottom:1px solid var(--hair); font-size:11px;
  }
  .filterline .lbl{color:var(--text-faint); letter-spacing:.1em; text-transform:uppercase}
  .chip{
    appearance:none; background:transparent; border:1px solid transparent; color:var(--text-dim);
    font-family:var(--mono); font-size:11px; padding:3px 9px; border-radius:4px; cursor:pointer;
    letter-spacing:.03em; transition:color .12s, border-color .12s, background .12s;
  }
  .chip:hover{color:var(--text)}
  .chip[aria-pressed="true"]{color:var(--phos); border-color:var(--phos-dim); background:rgba(54,224,160,0.07)}

  /* Board */
  main{
    flex:1 1 auto; display:grid; grid-template-columns:repeat(3,1fr);
    gap:1px; background:var(--hair); min-height:0;
  }
  .col{background:var(--bg); display:flex; flex-direction:column; min-height:0}
  .col-head{
    flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
    padding:var(--s3) var(--s4); border-bottom:1px solid var(--hair); background:var(--panel);
  }
  .col-title{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-dim)}
  .col-count{color:var(--phos); font-size:11px}
  .col-body{flex:1 1 auto; overflow-y:auto; padding:var(--s3); display:flex; flex-direction:column; gap:var(--s3)}
  .col-body::-webkit-scrollbar{width:7px}
  .col-body::-webkit-scrollbar-thumb{background:#1B2220; border-radius:6px}

  .tk{
    background:var(--card); border:1px solid var(--hair); border-radius:6px;
    position:relative; overflow:hidden; transition:border-color .12s;
  }
  .tk:hover{border-color:var(--card-edge)}
  .tk[data-tone="warning"]{border-color:rgba(232,180,60,0.35)}
  .tk[data-tone="danger"]{border-color:rgba(255,91,87,0.45)}
  .tk[data-tone="ready"]{border-color:rgba(54,224,160,0.30)}

  .tk-head{display:flex; align-items:stretch; border-bottom:1px solid var(--hair)}
  .hk{
    flex:0 0 auto; display:flex; align-items:center; justify-content:center;
    min-width:46px; font-size:20px; font-weight:700; color:var(--phos);
    background:rgba(54,224,160,0.06); border-right:1px solid var(--hair); letter-spacing:.02em;
  }
  .tk[data-tone="warning"] .hk{color:var(--amber); background:rgba(232,180,60,0.08)}
  .tk[data-tone="danger"]  .hk{color:var(--red);   background:rgba(255,91,87,0.08)}
  .hk-empty{color:var(--text-faint); background:transparent}
  .head-main{flex:1; padding:var(--s2) var(--s3); display:flex; flex-direction:column; gap:2px; min-width:0}
  .row1{display:flex; align-items:baseline; justify-content:space-between; gap:8px}
  .oid{font-size:14px; font-weight:600; color:var(--text); letter-spacing:.04em}
  .cust{color:var(--text-dim); font-size:11px}
  .row2{display:flex; align-items:center; gap:8px; font-size:10px; color:var(--text-faint); letter-spacing:.04em}
  .row2 .ch{text-transform:uppercase}

  .timers{
    display:flex; gap:var(--s4); padding:var(--s2) var(--s3);
    border-bottom:1px solid var(--hair); font-size:11px;
  }
  .tm{display:flex; align-items:baseline; gap:6px}
  .tm .k{color:var(--text-faint); letter-spacing:.08em; text-transform:uppercase; font-size:9px}
  .tm .v{font-size:15px; font-weight:600; color:var(--text); letter-spacing:.02em}
  .sla.warning{color:var(--amber)} .sla.danger{color:var(--red)} .sla.ready{color:var(--text-dim)}

  .items{padding:var(--s2) var(--s3)}
  .it{display:flex; gap:8px; align-items:baseline; padding:1px 0}
  .it .q{color:var(--phos-dim); min-width:24px}
  .it .nm{color:var(--text)}
  .it .cat{color:var(--text-faint); font-size:10px; margin-left:auto}
  .it .note{color:var(--amber); font-size:10px; display:block; padding-left:32px}
  .specials{
    margin:6px var(--s3) 0; padding:5px 9px; border:1px dashed rgba(232,180,60,0.4);
    color:var(--amber); font-size:10.5px; border-radius:4px; letter-spacing:.02em;
  }
  .specials .k{color:var(--text-faint); text-transform:uppercase; letter-spacing:.1em; font-size:9px; margin-right:6px}

  .tk-foot{display:flex; gap:1px; background:var(--hair); border-top:1px solid var(--hair); margin-top:6px}
  .actbtn{
    flex:1; appearance:none; cursor:pointer; font-family:var(--mono); font-size:11.5px;
    font-weight:600; letter-spacing:.06em; text-transform:uppercase; padding:9px 8px;
    background:var(--card); color:var(--phos); border:none; transition:background .12s, color .12s;
  }
  .actbtn:hover{background:rgba(54,224,160,0.10)}
  .tk[data-tone="danger"] .actbtn{color:var(--red)} .tk[data-tone="danger"] .actbtn:hover{background:rgba(255,91,87,0.10)}
  .tk[data-tone="warning"] .actbtn{color:var(--amber)} .tk[data-tone="warning"] .actbtn:hover{background:rgba(232,180,60,0.10)}
  .miscbtn{
    flex:0 0 auto; appearance:none; cursor:pointer; font-family:var(--mono); font-size:11px;
    color:var(--text-faint); background:var(--card); border:none; padding:9px 12px; letter-spacing:.04em;
    transition:color .12s, background .12s;
  }
  .miscbtn:hover{color:var(--text); background:rgba(160,180,175,0.06)}

  .empty{color:var(--text-faint); font-size:11px; text-align:center; padding:var(--s5) 0; letter-spacing:.04em}

  /* Command line */
  .cmdline{
    flex:0 0 auto; height:40px; display:flex; align-items:center; gap:var(--s4);
    padding:0 var(--s4); background:var(--panel); border-top:1px solid var(--hair);
    font-size:11px; color:var(--text-dim);
  }
  .prompt{color:var(--phos); letter-spacing:.04em}
  .cmdhint{letter-spacing:.04em}
  .cmdhint b{color:var(--text); font-weight:600}
  .cmdhint .sep{color:var(--text-faint); margin:0 8px}
  .blink{display:inline-block; width:7px; height:13px; background:var(--phos); margin-left:4px; vertical-align:middle; animation:bl 1.1s steps(1) infinite}
  @keyframes bl{50%{opacity:0}}
  .toast{
    position:fixed; bottom:50px; left:50%; transform:translateX(-50%) translateY(8px);
    background:#0E1213; border:1px solid var(--phos-dim); color:var(--phos);
    font-size:11px; padding:7px 16px; border-radius:5px; letter-spacing:.04em;
    opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; z-index:50;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <div class="statusbar">
    <span class="wordmark">SUD <span class="b">ITALIA</span></span>
    <span class="kd">Kitchen Display</span>
    <span class="tag">03 · Console</span>
    <div class="readout" id="readout">—</div>
    <span class="clock" id="clock">--:--:--</span>
    <a class="gallery" href="index.html">← Gallery</a>
  </div>

  <div class="filterline">
    <span class="lbl">Station</span>
    <div id="filters" style="display:flex;gap:6px"></div>
  </div>

  <main id="board"></main>

  <div class="cmdline">
    <span class="prompt">sud-kds&gt;<span class="blink"></span></span>
    <span class="cmdhint"><b>1–9</b> advance<span class="sep">·</span><b>R</b> recall<span class="sep">·</span><b>/</b> filter<span class="sep">·</span><b>F</b> fullscreen</span>
  </div>
  <div class="toast" id="toast"></div>

<script>
const ORDERS = [
  { id:"A4F9C2", name:"Marco R.",  channel:"takeout",  loc:"Kraków",   slot:"15:20", elapsed:192, sla:288, status:"prep",
    items:[{q:2,n:"Margherita",c:"Pizza"},{q:1,n:"Diavola",c:"Pizza"},{q:1,n:"Espresso",c:"Drinks"}] },
  { id:"B7K2D1", name:"Giulia M.", channel:"delivery", loc:"Kraków",   slot:"15:15", elapsed:540, sla:-65, status:"prep",
    items:[{q:1,n:"Quattro Formaggi",c:"Pizza"},{q:1,n:"Spaghetti Carbonara",c:"Pasta",note:"no garlic"},{q:1,n:"Tiramisù",c:"Desserts"}], note:"Leave at reception" },
  { id:"C1M8X4", name:"Paweł K.",  channel:"takeout",  loc:"Warszawa", slot:"15:30", elapsed:48,  sla:612, status:"new",
    items:[{q:1,n:"Diavola",c:"Pizza"},{q:2,n:"Aranciata",c:"Drinks"}] },
  { id:"D9P3Q7", name:"Anna W.",   channel:"delivery", loc:"Warszawa", slot:"15:28", elapsed:95,  sla:505, status:"new",
    items:[{q:3,n:"Margherita",c:"Pizza"},{q:1,n:"Penne Arrabbiata",c:"Pasta"},{q:2,n:"Limonata Fresca",c:"Drinks"}] },
  { id:"E5R6T2", name:"Luca B.",   channel:"takeout",  loc:"Kraków",   slot:"15:22", elapsed:300, sla:120, status:"prep",
    items:[{q:1,n:"Tartufata Reale",c:"Pizza",note:"extra truffle"},{q:1,n:"Burrata con Pomodorini",c:"Antipasti"}] },
  { id:"F2H4J8", name:"Sofia L.",  channel:"takeout",  loc:"Kraków",   slot:"15:10", elapsed:720, sla:0,   status:"ready",
    items:[{q:1,n:"Panino Caprese",c:"Panini"},{q:1,n:"Garlic Bread",c:"Antipasti"},{q:1,n:"Espresso",c:"Drinks"}] },
  { id:"G8L1N5", name:"Tomek Z.",  channel:"delivery", loc:"Warszawa", slot:"15:32", elapsed:150, sla:450, status:"new",
    items:[{q:2,n:"Penne Arrabbiata",c:"Pasta"},{q:1,n:"Linguine al Pesto",c:"Pasta"}] },
  { id:"H3W7Y9", name:"Elena P.",  channel:"takeout",  loc:"Kraków",   slot:"15:08", elapsed:660, sla:0,   status:"ready",
    items:[{q:1,n:"Prosciutto e Rucola",c:"Pizza"},{q:1,n:"Arancini (3 pcs)",c:"Antipasti"}] },
];

const STATIONS = ["All","Pizza","Pasta","Antipasti","Panini","Drinks","Desserts"];
const COLUMNS = [
  { key:"new",   title:"New" },
  { key:"prep",  title:"In progress" },
  { key:"ready", title:"Ready · Expo" },
];
const NEXT_LABEL = { new:"Start prep", prep:"Mark ready", ready:"Bump · Done" };
const NEXT_STAGE = { new:"prep", prep:"ready", ready:null };

let tickets = ORDERS.map(o=>({...o, items:o.items.map(i=>({...i}))}));
let activeFilter = "All";
let lastBumped = null;
let doneCount = 0;

function fmt(sec){
  const neg=sec<0; let s=Math.abs(sec);
  return (neg?"-":"")+Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
}
function tone(t){
  if(t.status==="ready") return "ready";
  if(t.sla<0) return "danger";
  if(t.sla<180) return "warning";
  return "neutral";
}
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function passesFilter(t){ return activeFilter==="All" || t.items.some(i=>i.c===activeFilter); }

/* Hotkey assignment: stable scan order across columns, left→right, top→bottom, filtered */
function hotkeyMap(){
  const map = {};
  let n = 1;
  COLUMNS.forEach(col=>{
    tickets.filter(t=>t.status===col.key && passesFilter(t)).sort((a,b)=>a.sla-b.sla)
      .forEach(t=>{ if(n<=10){ map[t.id] = n===10?0:n; n++; } });
  });
  return map;
}

function render(){
  const board = document.getElementById("board");
  const hk = hotkeyMap();
  board.innerHTML = "";
  COLUMNS.forEach(col=>{
    const list = tickets.filter(t=>t.status===col.key && passesFilter(t)).sort((a,b)=>a.sla-b.sla);
    const colEl = document.createElement("section");
    colEl.className = "col";
    colEl.innerHTML =
      '<div class="col-head"><span class="col-title">'+col.title+'</span>'+
      '<span class="col-count">['+list.length+']</span></div><div class="col-body"></div>';
    const body = colEl.querySelector(".col-body");
    if(list.length===0){ body.innerHTML = '<div class="empty">— empty —</div>'; }
    else list.forEach(t=>body.appendChild(buildTk(t, hk[t.id])));
    board.appendChild(colEl);
  });
  updateReadout();
}

function buildTk(t, key){
  const tn = tone(t);
  const tk = document.createElement("div");
  tk.className = "tk"; tk.dataset.tone = tn; tk.dataset.id = t.id;

  let itemsHtml = "";
  t.items.forEach(i=>{
    itemsHtml += '<div class="it"><span class="q">'+i.q+'×</span><span class="nm">'+esc(i.n)+'</span>'+
      '<span class="cat">'+esc(i.c)+'</span>'+
      (i.note?'<span class="note">↳ '+esc(i.note)+'</span>':'')+'</div>';
  });
  const special = t.note ? '<div class="specials"><span class="k">NOTE</span>'+esc(t.note)+'</div>' : '';
  const slaCls = tn==="ready" ? "ready" : (t.sla<0?"danger":(t.sla<180?"warning":""));
  const slaText = tn==="ready" ? "—" : (t.sla<0 ? "LATE "+fmt(t.sla).replace("-","") : fmt(t.sla));
  const hkHtml = key!==undefined ? '<div class="hk">['+key+']</div>' : '<div class="hk hk-empty">[·]</div>';

  tk.innerHTML =
    '<div class="tk-head">'+ hkHtml +
      '<div class="head-main">'+
        '<div class="row1"><span class="oid">#'+esc(t.id)+'</span><span class="cust">'+esc(t.name)+'</span></div>'+
        '<div class="row2"><span class="ch">'+esc(t.channel)+'</span>·<span>'+esc(t.loc)+'</span>·<span>slot '+esc(t.slot)+'</span></div>'+
      '</div>'+
    '</div>'+
    '<div class="timers">'+
      '<div class="tm"><span class="k">elapsed</span><span class="v elapsed">'+fmt(t.elapsed)+'</span></div>'+
      '<div class="tm"><span class="k">due</span><span class="v sla '+slaCls+'">'+slaText+'</span></div>'+
    '</div>'+
    '<div class="items">'+itemsHtml+'</div>'+ special +
    '<div class="tk-foot">'+
      '<button class="actbtn">'+NEXT_LABEL[t.status]+'</button>'+
      '<button class="miscbtn" data-86="1" title="86 an item (out of stock)">86</button>'+
    '</div>';

  tk.querySelector(".actbtn").addEventListener("click", ()=>advance(t.id));
  tk.querySelector("[data-86]").addEventListener("click", ()=>toast("86 — flag item out of stock on #"+t.id));
  return tk;
}

function advance(id){
  const t = tickets.find(x=>x.id===id);
  if(!t) return;
  const nx = NEXT_STAGE[t.status];
  if(nx===null){
    lastBumped = {...t, items:t.items.map(i=>({...i}))};
    tickets = tickets.filter(x=>x.id!==id);
    doneCount++;
    toast("BUMP #"+id+" — complete");
  } else {
    t.status = nx;
    if(nx==="ready") t.sla = 0;
    toast("#"+id+" -> "+COLUMNS.find(c=>c.key===nx).title);
  }
  render();
}

function recall(){
  if(!lastBumped){ toast("recall: nothing to recall"); return; }
  if(tickets.some(x=>x.id===lastBumped.id)){ toast("#"+lastBumped.id+" already active"); return; }
  lastBumped.status="prep"; lastBumped.sla=60;
  tickets.push(lastBumped);
  if(doneCount>0) doneCount--;
  toast("RECALL #"+lastBumped.id);
  lastBumped = null;
  render();
}

function updateReadout(){
  const active = tickets.length;
  const late = tickets.filter(t=>t.status!=="ready" && t.sla<0).length;
  const soon = tickets.filter(t=>t.status!=="ready" && t.sla>=0 && t.sla<180).length;
  const proc = tickets.filter(t=>t.status!=="ready");
  const avg = proc.length ? Math.round(proc.reduce((s,t)=>s+t.elapsed,0)/proc.length) : 0;
  const oldest = tickets.length ? Math.max(...tickets.map(t=>t.elapsed)) : 0;
  document.getElementById("readout").innerHTML =
    'ACTIVE <b>'+active+'</b><span class="sep">·</span>'+
    'LATE <span class="late">'+late+'</span><span class="sep">·</span>'+
    'DUE-SOON <span class="soon">'+soon+'</span><span class="sep">·</span>'+
    'AVG <b>'+fmt(avg)+'</b><span class="sep">·</span>'+
    'OLDEST <b>'+fmt(oldest)+'</b><span class="sep">·</span>'+
    'DONE <b>'+doneCount+'</b>';
}

let toastTimer;
function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>el.classList.remove("show"),2200);
}

/* Filters */
const fc = document.getElementById("filters");
STATIONS.forEach(s=>{
  const b = document.createElement("button");
  b.className="chip"; b.textContent=s;
  b.setAttribute("aria-pressed", s===activeFilter?"true":"false");
  b.addEventListener("click", ()=>{
    activeFilter=s;
    [...fc.children].forEach(c=>c.setAttribute("aria-pressed", c.textContent===s?"true":"false"));
    render();
  });
  fc.appendChild(b);
});

/* Hotkeys */
document.addEventListener("keydown", e=>{
  if(/^[0-9]$/.test(e.key)){
    const key = parseInt(e.key,10);
    const map = hotkeyMap();
    const id = Object.keys(map).find(k=>map[k]===key);
    if(id) advance(id);
  } else if(e.key==="r"||e.key==="R"){
    recall();
  } else if(e.key==="f"||e.key==="F"){
    if(!document.fullscreenElement) document.documentElement.requestFullscreen && document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen && document.exitFullscreen();
  } else if(e.key==="/"){
    e.preventDefault();
    const chips=[...fc.children];
    const cur=chips.findIndex(c=>c.getAttribute("aria-pressed")==="true");
    const next=chips[(cur+1)%chips.length];
    next.click();
  }
});

function clock(){
  const d=new Date();
  document.getElementById("clock").textContent =
    String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")+":"+String(d.getSeconds()).padStart(2,"0");
}

function tick(){
  tickets.forEach(t=>{ t.elapsed+=1; if(t.status!=="ready") t.sla-=1; });
  let needRender=false;
  document.querySelectorAll(".tk").forEach(tk=>{
    const t=tickets.find(x=>x.id===tk.dataset.id);
    if(!t) return;
    const tn=tone(t);
    if(tk.dataset.tone!==tn) needRender=true;
    const el=tk.querySelector(".elapsed"); if(el) el.textContent=fmt(t.elapsed);
    const slaEl=tk.querySelector(".sla");
    if(t.status==="ready"){ slaEl.textContent="—"; slaEl.className="v sla ready"; }
    else{
      slaEl.textContent = t.sla<0 ? "LATE "+fmt(t.sla).replace("-","") : fmt(t.sla);
      slaEl.className="v sla "+(t.sla<0?"danger":(t.sla<180?"warning":""));
    }
    tk.dataset.tone=tn;
  });
  if(needRender) render(); else updateReadout();
}

clock(); render();
setInterval(()=>{ clock(); tick(); }, 1000);
</script>
</body>
</html>
