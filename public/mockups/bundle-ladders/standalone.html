<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bundle ladders — all 10 redesign sketches (standalone preview)</title>
<style>
  :root {
    --bg: #0a0d14; --surface-1: #11151f; --surface-2: #161b27; --surface-3: #1d2330;
    --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.16);
    --fg: #f5f7fa; --fg-muted: #b6bfcd; --fg-subtle: #7d8696;
    --brand: #c8102e; --indigo: #6366f1;
    font-family: -apple-system, "SF Pro Text", "Inter", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg); color: var(--fg); display: flex; flex-direction: column; overflow: hidden; }
  header { background: var(--surface-1); border-bottom: 1px solid var(--border); padding: 14px 20px 0; flex-shrink: 0; }
  .title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 18px; flex-wrap: wrap; margin-bottom: 14px; }
  h1 { font-size: 18px; font-weight: 700; margin: 0; }
  h1 small { font-size: 11px; color: var(--fg-subtle); font-weight: 500; letter-spacing: .06em; text-transform: uppercase; background: var(--surface-2); padding: 2px 8px; border-radius: 6px; margin-left: 6px; }
  .meta { font-size: 12px; color: var(--fg-muted); margin: 4px 0 0; }
  .meta strong { color: var(--fg); }
  .controls { display: flex; gap: 8px; align-items: center; }
  .control-btn { background: var(--surface-2); border: 1px solid var(--border); color: var(--fg-muted); padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
  .control-btn.on { background: var(--surface-3); color: var(--fg); border-color: var(--border-strong); }
  .control-btn:hover { color: var(--fg); }

  .tabs { display: flex; gap: 2px; overflow-x: auto; margin: 0 -20px; padding: 0 20px; }
  .tabs::-webkit-scrollbar { height: 6px; }
  .tabs::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }
  .tab { background: transparent; border: 0; padding: 12px 14px; color: var(--fg-subtle); font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: color .12s, border-color .12s; display: inline-flex; align-items: center; gap: 6px; }
  .tab:hover { color: var(--fg-muted); }
  .tab.on { color: var(--fg); border-color: var(--brand); }
  .tab .num { background: var(--surface-3); color: var(--fg-muted); font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; font-family: ui-monospace, monospace; }
  .tab.on .num { background: var(--brand); color: white; }

  .frame-wrap { flex: 1; display: flex; min-height: 0; }
  .preview-frame { flex: 1; border: 0; background: var(--bg); display: block; width: 100%; }
  body.compare .preview-frame { width: 50%; }
  body.compare .preview-frame.right { border-left: 1px solid var(--border); }

  .footer { background: var(--surface-1); border-top: 1px solid var(--border); padding: 8px 20px; font-size: 11px; color: var(--fg-subtle); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
</style>
</head>
<body>
  <header>
    <div class="title-row">

        <h1>Bundle ladders <small>10 redesign sketches</small></h1>
        <p class="meta" id="current-meta">Click any tab to preview · use <strong>← →</strong> arrow keys, <strong>1–9 / 0</strong> to jump, <strong>C</strong> to compare two side-by-side</p>
      </div>
      <div class="controls">
        <button class="control-btn" id="toggle-compare">Compare two side-by-side (C)</button>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
  </header>

  <div class="frame-wrap">
    <iframe class="preview-frame" id="frame"></iframe>
    <iframe class="preview-frame right" id="frame-right" hidden></iframe>
  </div>

  <div class="footer">
    <span>Sud Italia · admin/upsell → Bundle ladders redesign drafts</span>
    <span id="filename"></span>
  </div>

 color: white; font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 999px; letter-spacing: .08em; }\n  .card.is-anchor::before { content: \"BEST VALUE\"; position: absolute; top: -8px; left: 14px; background: var(--gold); color: #1a1a1a; font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 999px; letter-spacing: .08em; }\n  .card.is-decoy { opacity: .82; }\n  .card.is-inactive { opacity: .55; }\n  .card-h { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }\n  .tier { font-size: 11px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }\n  .name { font-size: 15px; font-weight: 700; margin: 2px 0 6px; }\n  .desc { font-size: 12px; color: var(--fg-muted); line-height: 1.4; min-height: 32px; }\n  .mode-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }\n  .mode-fixed { background: rgba(99,102,241,0.15); color: #a5b4fc; }\n  .mode-dynamic { background: rgba(16,185,129,0.15); color: #6ee7b7; }\n  .price-row { display: flex; align-items: baseline; gap: 8px; margin-top: 12px; }\n  .price-big { font-size: 22px; font-weight: 700; color: var(--brand); }\n  .price-ref { font-size: 11px; color: var(--fg-subtle); text-decoration: line-through; }\n  .price-disc { background: rgba(16,185,129,0.15); color: #6ee7b7; font-size: 11px; padding: 2px 7px; border-radius: 6px; font-weight: 700; }\n  .meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }\n  .chip { font-size: 10px; color: var(--fg-subtle); background: var(--surface-2); padding: 3px 8px; border-radius: 6px; }\n  .chip strong { color: var(--fg-muted); font-weight: 600; }\n  .margin { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; }\n  .margin.good { color: var(--green); }\n  .margin.warn { color: var(--amber); }\n  .add-card { display: flex; align-items: center; justify-content: center; min-height: 200px; background: transparent; border: 2px dashed var(--border); cursor: pointer; color: var(--fg-subtle); font-size: 13px; border-radius: 14px; }\n  .add-card:hover { border-color: var(--border-strong); color: var(--fg-muted); background: var(--surface-1); }\n  .section-h { margin: 24px 0 8px; font-size: 11px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: .12em; font-weight: 700; }\n  .help { margin-top: 24px; padding: 14px 16px; background: var(--surface-2); border-radius: 10px; font-size: 12px; color: var(--fg-muted); }\n</style>\n</head>\n<body>\n  <div class=\"page-h\">\n    <div>\n      <h1>Bundle ladders <span style=\"font-size:11px;color:var(--fg-subtle);font-weight:500;letter-spacing:.06em;text-transform:uppercase;background:var(--surface-2);padding:2px 8px;border-radius:6px;margin-left:6px;\">SKETCH 01 \u00b7 CARD GRID</span></h1>\n      <p class=\"sub\">Click a card to expand into the full editor. Compact summary at rest \u2014 full power when you need it.</p>\n    </div>\n    <div style=\"display:flex;gap:8px;\">\n      <button class=\"pill\">Save changes</button>\n      <button class=\"pill active\">+ Add tier</button>\n    </div>\n  </div>\n\n  <div class=\"filter-row\">\n    <button class=\"pill active\">All (5)</button>\n    <button class=\"pill\">Family (3)</button>\n    <button class=\"pill\">Lunch (1)</button>\n    <button class=\"pill\">Late-night (1)</button>\n    <button class=\"pill\">Inactive (0)</button>\n  </div>\n\n  <p class=\"section-h\">Family ladder</p>\n  <div class=\"grid\">\n    <div class=\"card\">\n      <div class=\"card-h\">\n        <div>\n          <div class=\"tier\">Family \u00b7 entry</div>\n          <div class=\"name\">Your pizzas + sides</div>\n        </div>\n        <span class=\"mode-badge mode-dynamic\">DYNAMIC</span>\n      </div>\n      <p class=\"desc\">Your mains + bruschetta + 2 drinks. Min 2 / max 6 mains.</p>\n      <div class=\"price-row\">\n        <span class=\"price-big\">~88 z\u0142</span>\n        <span class=\"price-ref\">119 z\u0142</span>\n        <span class=\"price-disc\">\u221220%</span>\n      </div>\n      <div class=\"meta\">\n        <span class=\"chip\"><strong>10/30</strong> split</span>\n        <span class=\"chip\"><strong>min 2</strong> mains</span>\n        <span class=\"margin good\">\u25cf 56% margin</span>\n      </div>\n    </div>\n\n    <div class=\"card is-default is-anchor\">\n      <div class=\"card-h\">\n        <div>\n          <div class=\"tier\">Family Feast \u00b7 anchor</div>\n          <div class=\"name\">Whole-table dinner</div>\n        </div>\n        <span class=\"mode-badge mode-dynamic\">DYNAMIC</span>\n      </div>\n      <p class=\"desc\">Your mains + 2 antipasti + 4 drinks + tiramis\u00f9.</p>\n      <div class=\"price-row\">\n        <span class=\"price-big\">~135 z\u0142</span>\n        <span class=\"price-ref\">187 z\u0142</span>\n        <span class=\"price-disc\">\u221228%</span>\n      </div>\n      <div class=\"meta\">\n        <span class=\"chip\"><strong>15/40</strong> split</span>\n        <span class=\"chip\"><strong>min 2 / max 8</strong></span>\n        <span class=\"margin good\">\u25cf 49% margin</span>\n      </div>\n    </div>\n\n    <div class=\"card is-decoy\">\n      <div class=\"card-h\">\n        <div>\n          <div class=\"tier\">Feast Deluxe \u00b7 decoy</div>\n          <div class=\"name\">Big group, no leftovers</div>\n        </div>\n        <span class=\"mode-badge mode-dynamic\">DYNAMIC</span>\n      </div>\n      <p class=\"desc\">Your mains + 2 antipasti + 6 drinks + 2 desserts.</p>\n      <div class=\"price-row\">\n        <span class=\"price-big\">~172 z\u0142</span>\n        <span class=\"price-ref\">227 z\u0142</span>\n        <span class=\"price-disc\">\u221220%</span>\n      </div>\n      <div class=\"meta\">\n        <span class=\"chip\"><strong>12/32</strong> split</span>\n        <span class=\"chip\"><strong>min 3 / max 12</strong></span>\n        <span class=\"margin good\">\u25cf 51% margin</span>\n      </div>\n    </div>\n  </div>\n\n  <p class=\"section-h\">Lunch ladder</p>\n  <div class=\"grid\">\n    <div class=\"card is-anchor\">\n      <div class=\"card-h\">\n        <div>\n          <div class=\"tier\">Lunch+ \u00b7 anchor</div>\n          <div class=\"name\">Pasta + drink + tiramis\u00f9</div>\n        </div>\n        <span class=\"mode-badge mode-fixed\">FIXED</span>\n      </div>\n      <p class=\"desc\">A meal you'll remember. Hour-gated 11:00\u201314:00.</p>\n      <div class=\"price-row\">\n        <span class=\"price-big\">46 z\u0142</span>\n        <span class=\"price-ref\">56 z\u0142</span>\n        <span class=\"price-disc\">\u221218%</span>\n      </div>\n      <div class=\"meta\">\n        <span class=\"chip\">3 slots</span>\n        <span class=\"margin good\">\u25cf 61% margin</span>\n      </div>\n    </div>\n  </div>\n\n  <p class=\"section-h\">Late-night ladder</p>\n  <div class=\"grid\">\n    <div class=\"card is-default\">\n      <div class=\"card-h\">\n        <div>\n          <div class=\"tier\">Late dinner</div>\n          <div class=\"name\">Pizza + drink + dessert</div>\n        </div>\n        <span class=\"mode-badge mode-dynamic\">DYNAMIC</span>\n      </div>\n      <p class=\"desc\">Your pizza + 1 drink + tiramis\u00f9. Hour-gated 21:00\u201324:00.</p>\n      <div class=\"price-row\">\n        <span class=\"price-big\">~38 z\u0142</span>\n        <span class=\"price-ref\">48 z\u0142</span>\n        <span class=\"price-disc\">\u221222%</span>\n      </div>\n      <div class=\"meta\">\n        <span class=\"chip\"><strong>12/35</strong> split</span>\n        <span class=\"chip\"><strong>min 1 / max 3</strong></span>\n        <span class=\"margin good\">\u25cf 58% margin</span>\n      </div>\n    </div>\n    <div class=\"add-card\">+ Add a tier</div>\n  </div>\n\n  <div class=\"help\">\n    <strong>Why card grid:</strong> 80% of operator visits are \"scan + don't change\". Compact card view shows\n    everything that matters at rest \u2014 name, mode, price, discount, margin, scheduling \u2014 and only opens the\n    full editor when you tap. The \"Most picked\" / \"Best value\" badges + decoy fade are visible at a glance so\n    you can see the ladder shape immediately.\n  </div>\n</body>\n</html>\n"}, {"n": "02", "file": "02-master-detail.html", "name": "Master / detail", "blurb": "Linear-style sidebar list + right-pane editor.", "html": "<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<title>Bundle ladders \u2014 Master/detail (sketch 02)</title>\n<style>\n  :root {\n    --bg: #0a0d14; --surface-1: #11151f; --surface-2: #161b27; --surface-3: #1d2330; --surface-hover: #20283a;\n    --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.16);\n    --fg: #f5f7fa; --fg-muted: #b6bfcd; --fg-subtle: #7d8696;\n    --brand: #c8102e; --gold: #c8a02e; --green: #10b981; --amber: #f59e0b; --indigo: #6366f1;\n    font-family: -apple-system, \"SF Pro Text\", \"Inter\", system-ui, sans-serif;\n  }\n  * { box-sizing: border-box; }\n  body { margin: 0; background: var(--bg); color: var(--fg); }\n  .h { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline; }\n  h1 { font-size: 18px; margin: 0; font-weight: 700; }\n  h1 small { font-size: 11px; color: var(--fg-subtle); font-weight: 500; letter-spacing: .06em; text-transform: uppercase; background: var(--surface-2); padding: 2px 8px; border-radius: 6px; margin-left: 6px; }\n  .save { background: var(--brand); color: white; border: 0; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }\n\n  .layout { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 60px); }\n  .sidebar { border-right: 1px solid var(--border); padding: 12px 8px; overflow-y: auto; }\n  .group-h { font-size: 10px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: .1em; font-weight: 700; padding: 12px 12px 6px; }\n  .item { padding: 10px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; }\n  .item:hover { background: var(--surface-2); }\n  .item.is-active { background: var(--surface-3); }\n  .item-l { flex: 1; min-width: 0; }\n  .item-tier { font-size: 11px; color: var(--fg-subtle); font-weight: 600; }\n  .item-name { font-size: 13px; font-weight: 600; color: var(--fg); }\n  .item-price { font-size: 11px; color: var(--fg-muted); white-space: nowrap; }\n  .item-flag { font-size: 9px; padding: 1px 5px; border-radius: 4px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }\n  .flag-default { background: var(--brand); color: white; }\n  .flag-anchor { background: var(--gold); color: #1a1a1a; }\n  .flag-decoy { background: var(--surface-3); color: var(--fg-subtle); }\n  .add-tier { display: flex; align-items: center; gap: 6px; color: var(--fg-subtle); padding: 8px 12px; cursor: pointer; font-size: 12px; }\n  .add-tier:hover { color: var(--fg-muted); }\n\n  .editor { padding: 28px 32px; max-width: 880px; }\n  .ed-h { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }\n  .ed-tier { font-size: 11px; color: var(--fg-subtle); font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }\n  .ed-name { font-size: 24px; font-weight: 700; margin: 2px 0 0; display: flex; align-items: center; gap: 10px; }\n  .ed-sub { color: var(--fg-muted); font-size: 13px; margin: 4px 0 24px; }\n\n  .panel { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }\n  .panel-h { font-size: 11px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; margin: 0 0 14px; display: flex; align-items: center; justify-content: space-between; }\n  .panel-h .help { font-weight: 500; text-transform: none; letter-spacing: 0; color: var(--fg-subtle); font-size: 11px; }\n  .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }\n  label.field { display: block; }\n  .field-l { font-size: 10px; color: var(--fg-subtle); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }\n  .input { width: 100%; background: var(--surface-2); color: var(--fg); border: 1px solid var(--border); padding: 7px 10px; border-radius: 6px; font-size: 13px; }\n  .input:focus { outline: 2px solid var(--indigo); outline-offset: -2px; border-color: var(--indigo); }\n  .seg { display: inline-flex; background: var(--surface-2); border-radius: 8px; padding: 2px; border: 1px solid var(--border); }\n  .seg button { background: transparent; color: var(--fg-subtle); border: 0; padding: 5px 10px; font-size: 11px; font-weight: 600; cursor: pointer; border-radius: 6px; }\n  .seg button.on { background: var(--surface-3); color: var(--fg); }\n  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }\n  .chip { font-size: 11px; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border); color: var(--fg-muted); background: var(--surface-2); cursor: pointer; }\n  .chip.on { border-color: var(--brand); color: var(--brand); background: rgba(200,16,46,0.1); }\n  .chip-day { padding: 3px 8px; font-size: 10px; text-transform: uppercase; letter-spacing: .06em; }\n  .chip-day.on { border-color: var(--gold); color: var(--gold); background: rgba(200,160,46,0.1); }\n\n  .preview { background: linear-gradient(180deg, rgba(16,185,129,0.07), transparent); border: 1px solid rgba(16,185,129,0.18); border-radius: 10px; padding: 14px 16px; margin-top: 12px; }\n  .pv-h { display: flex; justify-content: space-between; font-size: 11px; color: var(--green); font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }\n  .pv-line { display: flex; justify-content: space-between; font-size: 12px; color: var(--fg-muted); margin-top: 3px; }\n  .pv-line strong { color: var(--fg); }\n  .pv-margin { color: var(--green); font-weight: 700; }\n\n  .composition-row { display: grid; grid-template-columns: 110px 1fr 60px auto; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }\n  .composition-row:last-child { border-bottom: 0; }\n</style>\n</head>\n<body>\n  <div class=\"h\">\n    <h1>Bundle ladders <small>SKETCH 02 \u00b7 MASTER / DETAIL</small></h1>\n    <div style=\"display:flex;gap:8px;\">\n      <button class=\"save\" style=\"background:var(--surface-2);color:var(--fg-muted);border:1px solid var(--border);\">Discard</button>\n      <button class=\"save\">Save changes</button>\n    </div>\n  </div>\n\n  <div class=\"layout\">\n    <aside class=\"sidebar\">\n      <div class=\"group-h\">Family \u00b7 3 tiers</div>\n      <div class=\"item\">\n        <div class=\"item-l\">\n          <div class=\"item-tier\">Family</div>\n          <div class=\"item-name\">Your pizzas + sides</div>\n        </div>\n        <span class=\"item-price\">~88 z\u0142</span>\n      </div>\n      <div class=\"item is-active\">\n        <span class=\"item-flag flag-default\">DEF</span>\n        <div class=\"item-l\">\n          <div class=\"item-tier\">Family Feast \u00b7 anchor</div>\n          <div class=\"item-name\">Whole-table dinner</div>\n        </div>\n        <span class=\"item-price\">~135 z\u0142</span>\n      </div>\n      <div class=\"item\">\n        <span class=\"item-flag flag-decoy\">DEC</span>\n        <div class=\"item-l\">\n          <div class=\"item-tier\">Feast Deluxe</div>\n          <div class=\"item-name\">Big group, no leftovers</div>\n        </div>\n        <span class=\"item-price\">~172 z\u0142</span>\n      </div>\n\n      <div class=\"group-h\">Lunch \u00b7 1 tier</div>\n      <div class=\"item\">\n        <span class=\"item-flag flag-anchor\">ANC</span>\n        <div class=\"item-l\">\n          <div class=\"item-tier\">Lunch+</div>\n          <div class=\"item-name\">Pasta + drink + tiramis\u00f9</div>\n        </div>\n        <span class=\"item-price\">46 z\u0142</span>\n      </div>\n\n      <div class=\"group-h\">Late-night \u00b7 1 tier</div>\n      <div class=\"item\">\n        <span class=\"item-flag flag-default\">DEF</span>\n        <div class=\"item-l\">\n          <div class=\"item-tier\">Late dinner</div>\n          <div class=\"item-name\">Pizza + drink + dessert</div>\n        </div>\n        <span class=\"item-price\">~38 z\u0142</span>\n      </div>\n\n      <div class=\"add-tier\">+ Add tier</div>\n    </aside>\n\n    <main class=\"editor\">\n      <div class=\"ed-h\">\n        <span class=\"ed-tier\">Family Feast \u00b7 anchor + default-pushed</span>\n      </div>\n      <h2 class=\"ed-name\">Whole-table dinner <span class=\"item-flag flag-default\">MOST PICKED</span> <span class=\"item-flag flag-anchor\">BEST VALUE</span></h2>\n      <p class=\"ed-sub\">Editing the family-feast bundle. Changes save when you click <strong>Save changes</strong>.</p>\n\n      <div class=\"panel\">\n        <div class=\"panel-h\">Identity <span class=\"help\">Customer-facing</span></div>\n        <div class=\"row\">\n          <label class=\"field\"><div class=\"field-l\">Tier label</div><input class=\"input\" value=\"Family Feast\"></label>\n          <label class=\"field\"><div class=\"field-l\">Bundle name</div><input class=\"input\" value=\"Whole-table dinner\"></label>\n        </div>\n        <label class=\"field\" style=\"margin-top:10px;\"><div class=\"field-l\">Description</div><input class=\"input\" value=\"Your mains + 2 antipasti + 4 drinks + tiramis\u00f9\"></label>\n      </div>\n\n      <div class=\"panel\">\n        <div class=\"panel-h\">Pricing <span class=\"help\">Mode + discount</span></div>\n        <div style=\"display:flex;gap:18px;align-items:center;flex-wrap:wrap;\">\n          <div class=\"seg\" role=\"group\">\n            <button>Fixed</button>\n            <button class=\"on\">Dynami olor:var(--fg-subtle);cursor:pointer;\">\u00d7</button>\n        </div>\n        <div class=\"composition-row\">\n          <select class=\"input\"><option>Any \u00b7 category</option><option>Specific item</option></select>\n          <select class=\"input\"><option>drinks</option></select>\n          <input class=\"input\" type=\"number\" value=\"4\">\n          <button class=\"seg\" style=\"background:transparent;border:0;color:var(--fg-subtle);cursor:pointer;\">\u00d7</button>\n        </div>\n        <div class=\"composition-row\">\n          <select class=\"input\"><option>Specific item</option><option>Any \u00b7 category</option></select>\n          <select class=\"input\"><option>dessert-tiramisu</option></select>\n          <input class=\"input\" type=\"number\" value=\"1\">\n          <button class=\"seg\" style=\"background:transparent;border:0;color:var(--fg-subtle);cursor:pointer;\">\u00d7</button>\n        </div>\n        <button class=\"seg\" style=\"margin-top:10px;background:transparent;border:1px dashed var(--border);color:var(--fg-subtle);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;\">+ Add slot</button>\n      </div>\n\n      <div class=\"panel\">\n        <div class=\"panel-h\">Audience &amp; scheduling</div>\n        <div class=\"row\">\n          <label class=\"field\">\n            <div class=\"field-l\">Mains scale on</div>\n            <div class=\"chip-row\"><span class=\"chip on\">\u2713 pizza</span><span class=\"chip on\">\u2713 pasta</span></div>\n          </label>\n          <label class=\"field\">\n            <div class=\"field-l\">Loyalty gate</div>\n            <select class=\"input\"><option>All customers</option><option>Gold &amp; Platinum only</option><option>Platinum only</option></select>\n          </label>\n          <label class=\"field\">\n            <div class=\"field-l\">Limited until</div>\n            <input class=\"input\" type=\"date\">\n          </label>\n        </div>\n        <label class=\"field\" style=\"margin-top:10px;\">\n          <div class=\"field-l\">Active days \u00b7 empty = all week</div>\n          <div class=\"chip-row\">\n            <span class=\"chip chip-day\">mon</span><span class=\"chip chip-day\">tue</span><span class=\"chip chip-day\">wed</span><span class=\"chip chip-day\">thu</span><span class=\"chip chip-day on\">fri</span><span class=\"chip chip-day on\">sat</span><span class=\"chip chip-day on\">sun</span>\n          </div>\n        </label>\n        <div class=\"row\" style=\"margin-top:14px;\">\n          <label class=\"chip\" style=\"cursor:pointer;border-color:var(--brand);color:var(--brand);background:rgba(200,16,46,.1);\">\u2713 Default-pushed (red Most-picked)</label>\n          <label class=\"chip\" style=\"cursor:pointer;border-color:var(--gold);color:var(--gold);background:rgba(200,160,46,.1);\">\u2713 Anchor (gold Best-value)</label>\n          <label class=\"chip\" style=\"cursor:pointer;\">Decoy</label>\n          <label class=\"chip\" style=\"cursor:pointer;border-color:var(--green);color:var(--green);background:rgba(16,185,129,.1);\">\u2713 Active</label>\n        </div>\n      </div>\n    </main>\n  </div>\n</body>\n</html>\n"}, {"n": "03", "file": "03-spreadsheet.html", "name": "Spreadsheet", "blurb": "Every tier as a row. Edit cells in place.", "html": "<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<title>Bundle ladders \u2014 Spreadsheet (sketch 03)</title>\n<style>\n  :root {\n    --bg: #0a0d14; --surface-1: #11151f; --surface-2: #161b27; --surface-3: #1d2330;\n    --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.16);\n    --fg: #f5f7fa; --fg-muted: #b6bfcd; --fg-subtle: #7d8696;\n    --brand: #c8102e; --gold: #c8a02e; --green: #10b981; --amber: #f59e0b; --red: #ef4444; --indigo: #6366f1;\n    font-family: -apple-system, \"SF Pro Text\", \"Inter\", system-ui, sans-serif;\n  }\n  * { box-sizing: border-box; }\n  body { margin: 0; padding: 24px; background: var(--bg); color: var(--fg); }\n  h1 { font-size: 22px; margin: 0 0 4px; font-weight: 700; }\n  h1 small { font-size: 11px; color: var(--fg-subtle); font-weight: 500; letter-spacing: .06em; text-transform: uppercase; background: var(--surface-2); padding: 2px 8px; border-radius: 6px; margin-left: 6px; }\n  .sub { color: var(--fg-muted); font-size: 13px; margin: 0 0 18px; }\n\n  .controls { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }\n  .pill { background: var(--surface-2); border: 1px solid var(--border); color: var(--fg-muted); padding: 6px 12px; border-radius: 999px; font-size: 12px; cursor: pointer; }\n  .pill.active { background: var(--surface-3); color: var(--fg); border-color: var(--border-strong); }\n  .save { background: var(--brand); color: white; border: 0; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; margin-left: auto; }\n\n  .table-wrap { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }\n  table { width: 100%; border-collapse: collapse; font-size: 12px; }\n  thead { background: var(--surface-2); position: sticky; top: 0; }\n  th { font-size: 10px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--border); white-space: nowrap; }\n  th.r { text-align: right; }\n  td { padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }\n  td.r { text-align: right; }\n  tr:last-child td { border-bottom: 0; }\n  tr.section td { background: rgba(99,102,241,0.06); padding: 6px 12px; font-size: 10px; color: var(--indigo); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; border-bottom: 1px solid var(--border); }\n\n  .cell-input { background: transparent; border: 0; color: var(--fg); padding: 5px 6px; font-size: 12px; width: 100%; border-radius: 4px; }\n  .cell-input:focus { background: var(--surface-2); outline: 2px solid var(--indigo); outline-offset: -2px; }\n  .cell-num { width: 60px; text-align: right; font-variant-numeric: tabular-nums; }\n  td.editable:hover { background: rgba(99,102,241,0.04); cursor: text; }\n\n  .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; display: inline-block; }\n  .badge-dyn { background: rgba(16,185,129,0.18); color: #6ee7b7; }\n  .badge-fix { background: rgba(99,102,241,0.18); color: #a5b4fc; }\n  .badge-def { background: var(--brand); color: white; margin-right: 4px; }\n  .badge-anc { background: var(--gold); color: #1a1a1a; margin-right: 4px; }\n  .badge-dec { background: var(--surface-3); color: var(--fg-subtle); margin-right: 4px; }\n  .badge-on { background: rgba(16,185,129,0.15); color: var(--green); }\n  .badge-off { background: rgba(239,68,68,0.15); color: var(--red); }\n\n  .margin { font-weight: 700; }\n  .margin.good { color: var(--green); }\n  .margin.warn { color: var(--amber); }\n  .margin.bad { color: var(--red); }\n\n  .toggle { display: inline-flex; gap: 1px; background: var(--surface-3); border-radius: 6px; padding: 2px; }\n  .toggle button { background: transparent; border: 0; color: var(--fg-subtle); font-size: 10px; padding: 3px 7px; border-radius: 4px; cursor: pointer; font-weight: 600; }\n  .toggle button.on { background: var(--surface-1); color: var(--fg); }\n\n  .day-strip { display: inline-flex; gap: 1px; }\n  .day { width: 16px; height: 16px; border-radius: 3px; background: var(--surface-3); display: inline-flex; align-items: center; justify-content: center; font-size: 8px; color: var(--fg-subtle); font-weight: 700; cursor: pointer; }\n  .day.on { background: var(--gold); color: #1a1a1a; }\n\n  .actions-cell { white-space: nowrap; }\n  .icon-btn { background: transparent; border: 0; color: var(--fg-subtle); cursor: pointer; padding: 3px 5px; border-radius: 4px; font-size: 13px; }\n  .icon-btn:hover { background: var(--surface-3); color: var(--fg); }\n\n  .help { margin-top: 14px; padding: 12px 14px; background: var(--surface-2); border-radius: 10px; font-size: 12px; color: var(--fg-muted); }\n  kbd { background: var(--surface-3); padding: 1px 5px; border-radius: 4px; font-size: 10px; font-family: ui-monospace, monospace; border: 1px solid var(--border); }\n</style>\n</head>\n<body>\n  <h1>Bundle ladders <small>SKETCH 03 \u00b7 SPREADSHEET</small></h1>\n  <p class=\"sub\">Every tier on one screen. Click a cell to edit in place. <kbd>Tab</kbd> across, <kbd>Enter</kbd> to save row.</p>\n\n  <div class=\"controls\">\n    <button class=\"pill active\">All</button>\n    <button class=\"pill\">Active only</button>\n    <button class=\"pill\">Dynamic only</button>\n    <button class=\"pill\">Below 40% margin \u26a0</button>\n    <button class=\"save\">Save 0 changes</button>\n  </div>\n\n  <div class=\"table-wrap\">\n    <table>\n      <thead>\n        <tr>\n          <th></th>\n          <th>Tier \u00b7 Name</th>\n          <th>Mode</th>\n          <th class=\"r\">Price / Disc</th>\n          <th class=\"r\">Mains</th>\n          <th class=\"r\">Margin</th>\n          <th>Composition</th>\n          <th>Loyalty</th>\n          <th>Days</th>\n          <th>Limited</th>\n          <th>Flags</th>\n          <th></th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr class=\"section\"><td colspan=\"12\">Family ladder \u00b7 3 tiers</td></tr>\n        <tr>\n          <td><span class=\"badge badge-on\">\u25cf</span></td>\n          <td>\n            <input class=\"cell-input\" value=\"Family \u00b7 Your pizzas + sides\">\n            <div style=\"font-size:10px;color:var(--fg-subtle);margin-top:1px;\">Your mains + bruschetta + 2 drinks</div>\n          </td>\n          <td>\n            <div class=\"toggle\"><button>Fix</button><button class=\"on\">Dyn</button></div>\n          </td>\n          <td class=\"r\">\n            <input class=\"cell-input cell-num\" value= /span><span class=\"day on\">S</span><span class=\"day on\">S</span></div></td>\n          <td><span style=\"color:var(--fg-subtle);\">\u2014</span></td>\n          <td><span class=\"badge badge-def\">Default</span><span class=\"badge badge-anc\">Anchor</span></td>\n          <td class=\"actions-cell\"><button class=\"icon-btn\">\u22ef</button></td>\n        </tr>\n        <tr>\n          <td><span class=\"badge badge-on\">\u25cf</span></td>\n          <td style=\"opacity:.85;\">\n            <input class=\"cell-input\" value=\"Feast Deluxe \u00b7 Big group, no leftovers\">\n            <div style=\"font-size:10px;color:var(--fg-subtle);margin-top:1px;\">Your mains + 2 antipasti + 6 drinks + 2 desserts</div>\n          </td>\n          <td>\n            <div class=\"toggle\"><button>Fix</button><button class=\"on\">Dyn</button></div>\n          </td>\n          <td class=\"r\">\n            <input class=\"cell-input cell-num\" value=\"12/32\">\n            <div style=\"font-size:10px;color:var(--fg-subtle);\">~172 z\u0142</div>\n          </td>\n          <td class=\"r\"><input class=\"cell-input cell-num\" value=\"3 / 12\"></td>\n          <td class=\"r margin good\">51%</td>\n          <td><span class=\"badge badge-dyn\">2 antipasti \u00b7 6 drinks \u00b7 2 desserts</span></td>\n          <td><span class=\"badge\">All</span></td>\n          <td><div class=\"day-strip\"><span class=\"day on\">M</span><span class=\"day on\">T</span><span class=\"day on\">W</span><span class=\"day on\">T</span><span class=\"day on\">F</span><span class=\"day on\">S</span><span class=\"day on\">S</span></div></td>\n          <td><span style=\"color:var(--fg-subtle);\">\u2014</span></td>\n          <td><span class=\"badge badge-dec\">Decoy</span></td>\n          <td class=\"actions-cell\"><button class=\"icon-btn\">\u22ef</button></td>\n        </tr>\n\n        <tr class=\"section\"><td colspan=\"12\">Lunch ladder \u00b7 1 tier \u00b7 11:00\u201314:00</td></tr>\n        <tr>\n >\n          <td class=\"r\">\n            <input class=\"cell-input cell-num\" value=\"12/35\">\n            <div style=\"font-size:10px;color:var(--fg-subtle);\">~38 z\u0142</div>\n          </td>\n          <td class=\"r\"><input class=\"cell-input cell-num\" value=\"1 / 3\"></td>\n          <td class=\"r margin good\">58%</td>\n          <td><span class=\"badge badge-dyn\">1 drink \u00b7 tiramisu</span></td>\n          <td><span class=\"badge\">All</span></td>\n          <td><div class=\"day-strip\"><span class=\"day on\">M</span><span class=\"day on\">T</span><span class=\"day on\">W</span><span class=\"day on\">T</span><span class=\"day on\">F</span><span class=\"day on\">S</span><span class=\"day on\">S</span></div></td>\n          <td><span style=\"color:var(--fg-subtle);\">\u2014</span></td>\n          <td><span class=\"badge badge-def\">Default</span></td>\n          <td class=\"actions-cell\"><button class=\"icon-btn\">\u22ef</button></td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n\n  <div class=\"help\">\n    <strong>Why spreadsheet:</strong> for the operator who wants to see <em>everything</em> at once and bulk-tune\n    discounts. Single-cell editing keeps focus tight. Margin column is the safety rail \u2014 anything below 40%\n    turns amber/red. The expand button (\u22ef) opens a side-sheet for slot composition + ad-hoc fields.\n  </div>\n</body>\n</html>\n"}, {"n": "04", "file": "04-wizard-tabs.html", "name": "Wizard tabs", "blurb": "Vertical tabs per concern (Identity / Pricing / \u2026).", "html": "<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<title>Bundle ladders \u2014 Wizard tabs (sketch 04)</title>\n<style>\n  :root {\n    --bg: #0a0d14; --surface-1: #11151f; --surface-2: #161b27; --surface-3: #1d2330;\n    --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.16);\n    --fg: #f5f7fa; --fg-muted: #b6bfcd; --fg-subtle: #7d8696;\n    --brand: #c8102e; --gold: #c8a02e; --green: #10b981; --indigo: #6366f1;\n    font-family: -apple-system, \"SF Pro Text\", \"Inter\", system-ui, sans-serif;\n  }\n  * { box-sizing: border-box; }\n  body { margin: 0; padding: 24px; background: var(--bg); color: var(--fg); }\n  .h { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; }\n  h1 { font-size: 22px; margin: 0; font-weight: 700; }\n  h1 small { font-size: 11px; color: var(--fg-subtle); font-weight: 500; letter-spacing: .06em; text-transform: uppercase; background: var(--surface-2); padding: 2px 8px; border-radius: 6px; margin-left: 6px; }\n\n  .tier-list { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 14px; }\n  .tier-tab { background: var(--surface-1); border: 1px solid var(--border); padding: 10px 16px; border-radius: 10px; cursor: pointer; min-width: 180px; }\n  .tier-tab:hover { border-color: var(--border-strong); }\n  .tier-tab.on { border-color: var(--brand); background: linear-gradient(180deg, rgba(200,16,46,0.08), transparent); }\n  .tier-tab .lab { font-size: 10px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }\n  .tier-tab .nm { font-size: 13px; color: var(--fg); font-weight: 600; margin-top: 2px; }\n  .tier-tab .pr { font-size: 11px; color: var(--fg-muted); margin-top: 4px; }\n  .tier-tab .b { display: inline-block; font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 4px; letter-spacing: .04em; text-transform: uppercase; margin-right: 4px; }\n  .b-d { background: var(--brand); color: white; }\n  .b-a { background: var(--gold); color: #1a1a1a; }\n  .b-x { background: var(--surface-3); color: var(--fg-subtle); }\n\n  .editor { background: var(--surface-1); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }\n  .editor-h { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); }\n  .editor-name { font-size: 18px; font-weight: 700; flex: 1; }\n\n  .body { display: grid; grid-template-columns: 220px 1fr; min-height: 520px; }\n  .vtabs { border-right: 1px solid var(--border); padding: 14px 0; background: var(--surface-2); }\n  .vtab { padding: 12px 18px; cursor: pointer; display: flex; gap: 12px; align-items: center; }\n  .vtab:hover { background: var(--surface-3); }\n  .vtab.on { background: rgba(99,102,241,0.08); color: var(--fg); }\n  .vtab.on::before { content: \"\"; display: block; width: 3px; height: 22px; background: var(--indigo); margin-left: -18px; margin-right: 12px; border-radius: 0 3px 3px 0; }\n  .vtab-icon { width: 18px; height: 18px; background: var(--surface-3); border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; color: var(--fg-muted); }\n  .vtab-l { display: block; font-size: 13px; font-weight: 600; }\n  .vtab-c { display: block; font-size: 10px; color: var(--fg-subtle); margin-top: 1px; }\n  .vtab-c.warn { color: var(--gold); }\n\n  .panel { padding: 24px 28px; }\n  .panel h3 { font-size: 16px; margin: 0 0 4px; font-weight: 700; }\n  .panel p.help { font-size: 12px; color: var(--fg-muted); margin: 0 0 18px; }\n  .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; }\n  label.field { display: block; }\n  .field-l { font-size: 10px; color: var(--fg-subtle); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }\n  .input { width: 100%; background: var(--surface-2); color: var(--fg); border: 1px solid var(--border); padding: 9px 11px; border-radius: 7px; font-size: 13px; }\n  .input:focus { outline: 2px solid var(--indigo); outline-offset: -2px; border-color: var(--indigo); }\n\n  .preview { background: linear-gradient(180deg, rgba(16,185,129,0.07), transparent); border: 1px solid rgba(16,185,129,0.18); border-radius: 10px; padding: 14px 16px; margin-top: 18px; }\n  .pv-h { display: flex; justify-content: space-between; font-size: 11px; color: var(--green); font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }\n  .pv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }\n  .pv-item { font-size: 12px; color: var(--fg-muted); }\n  .pv-item strong { display: block; font-size: 16px; color: var(--fg); margin-top: 2px; }\n  .pv-margin { display: inline-block; padding: 2px 7px; border-radius: 4px; background: rgba(16,185,129,0.18); color: var(--green); font-size: 10px; font-weight: 700; margin-top: 4px; }\n\n  .footer { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-top: 1px solid var(--border); background: var(--surface-2); }\n  .next { background: var(--brand); color: white; border: 0; padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }\n  .ghost { background: transparent; color: var(--fg-muted); border: 1px solid var(--border); padding: 9px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; }\n</style>\n</head>\n<body>\n  <div class=\"h\">\n    <h1>Bundle ladders <small>SKETCH 04 \u00b7 WIZARD TABS</small></h1>\n  </div>\n\n  <div class=\"tier-list\">\n    <div class=\"tier-tab\">\n      <div class=\"lab\">Family</div>\n      <div class=\"nm\">Your pizzas + sides</div>\n      <div class=\"pr\">Dynamic \u00b7 ~88 z\u0142</div>\n    </div>\n    <div class=\"tier-tab on\">\n      <div class=\"lab\"><span class=\"b b-d\">Default</span><span class=\"b b-a\">Anchor</span> Family Feast</div>\n      <div class=\"nm\">Whole-table dinner</div>\n      <div class=\"pr\">Dynamic \u00b7 ~135 z\u0142</div>\n    </div>\n    <div class=\"tier-tab\">\n      <div class=\"lab\"><span class=\"b b-x\">Decoy</span> Feast Deluxe</div>\n      <div class=\"nm\">Big group, no leftovers</div>\n      <div class=\"pr\">Dynamic \u00b7 ~172 z\u0142</div>\n    </div>\n    <div class=\"tier-tab\">\n      <div class=\"lab\"><span class=\"b b-a\">Anchor</span> Lunch+</div>\n      <div class=\"nm\">Pasta + drink + tiramis\u00f9</div>\n      <div class=\"pr\">Fixed \u00b7 46 z\u0142</div>\n    </div>\n    <div class=\"tier-tab\">\n      <div class=\"lab\"><span class=\"b b-d\">Default</span> Late dinner</div>\n      <div class=\"nm\">Pizza + drink + dessert</div>\n      <div class=\"pr\">Dynamic \u00b7 ~38 z\u0142</div>\n    </div>\n    <div class=\"tier-tab\" style=\"border-style:dashed;color:var(--fg-subtle);display:flex;align-items:center;justify-content:center;\">+ Add tier</div>\n  </div>\n\n  <div class=\"editor\">\n    <div class=\"editor-h\">\n      <div class=\"editor-name\">Family Feast \u00b7 Whole-table dinner</div>\n      <span class=\"b b-d\" style=\"font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.04em;text-transform:uppercase;background:var(--brand);color:white;\">DEFAULT</span>\n      <span class=\"b b-a\" style=\"font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.04em;text-transform:uppercase;background:var(--gold);color:#1a1a1a;\">ANCHOR</span>\n      <span style=\"font-size:11px;color:var(--green);\">\u25cf Active</span>\n    </div>\n\n    <div class=\"body\">\n      <div class=\"vtabs\">\n        <div class=\"vtab\"><span class=\"vtab-icon\">\u2460</span><span><span class=\"vtab-l\">Identity</span><span class=\"vtab-c\">Tier \u00b7 name \u00b7 description</span></span></div>\n        <div class=\"vtab on\"><span class=\"vtab-icon\">\u2461</span><span><span class=\"vtab-l\">Pricing</span><span class=\"vtab-c\">15% mains / 40% add-ons</span></span></div>\n        <div class=\"vtab\"><span class=\"vtab-icon\">\u2462</span><span><span class=\"vtab-l\">Composition</span><span class=\"vtab-c\">3 slots \u00b7 7 units</span></span></div>\n        <div class=\"vtab\"><span class=\"vtab-icon\">\u2463</span><span><span class=\"vtab-l\">Schedule</span><span class=\"vtab-c\">Fri \u00b7 Sat \u00b7 Sun only</span></span></div>\n        <div class=\"vtab\"><span class=\"vtab-icon\">\u2464</span><span><span class=\"vtab-l\">Audience</span><span class=\"vtab-c\">All customers</span></span></div>\n        <div class=\"vtab\"><span class=\"vtab-icon\">\u2465</span><span><span class=\"vtab-l\">Margin preview</span><span class=\"vtab-c\">~49% (healthy)</span></span></div>\n      </div>\n\n      <div class=\"panel\">\n        <h3>Pricing</h3>\n        <p class=\"help\">Mains-discount % is applied to whatever pizzas/pastas are in the cart; add-ons-discount % is applied to the static composition allowance. Split protects pizza margin while making drinks feel free.</p>\n\n        <div class=\"row\">\n          <label class=\"field\"><div class=\"field-l\">Pricing mode</div>\n            <div style=\"display:flex;gap:6px;\"><button class=\"input\" style=\"background:var(--surface-3);\">Fixed</button><button class=\"input\" style=\"background:var(--indigo);color:white;border-color:var(--indigo);\">Dynamic</button></div>\n          </label>\n          <label class=\"field\"><div class=\"field-l\">Mains discount %</div><input class=\"input\" type=\"number\" value=\"15\"></label>\n          <label class=\"field\"><div class=\"field-l\">Add-ons discount %</div><input class=\"input\" type=\"number\" value=\"40\"></label>\n        </div>\n\n        <div class=\"row\" style=\"margin-top:14px;\">\n          <label class=\"field\"><div class=\"field-l\">Min mains</div><input class=\"input\" type=\"number\" value=\"2\"></label>\n          <label class=\"field\"><div class=\"field-l\">Max mains</div><input class=\"input\" type=\"number\" value=\"8\"></label>\n          <label class=\"field\"><div class=\"field-l\">Mains scale on</div>\n            <div style=\"display:flex;gap:6px;flex-wrap:wrap;\"><span style=\"background:rgba(200,16,46,.15);color:var(--brand);padding:6px 10px;border-radius:6px;font-size:11px;font-weight:600;\">\u2713 pizza</span><span style=\"background:rgba(200,16,46,.15);color:var(--brand);padding:6px 10px;border-radius:6px;font-size:11px;font-weight:600;\">\u2713 pasta</span></div>\n          </label>\n        </div>\n\n        <div class=\"preview\">\n          <div class=\"pv-h\">Live preview \u00b7 Krak\u00f3w menu</div>\n          <div class=\"pv-grid\">\n            <div class=\"pv-item\">@2 mains<strong>~101 z\u0142</strong><span class=\"pv-margin\">52% margin</span></div>\n            <div class=\"pv-item\">@3 mains<strong>~135 z\u0142</strong><span class=\"pv-margin\">49% margin</span></div>\n            <div class=\"pv-item\">@4 mains<strong>~169 z\u0142</strong><span class=\"pv-margin\">48% margin</span></div>\n          </div>\n        </div>\n      </div>\n    </div>\n\n    <div class=\"footer\">\n      <button class=\"ghost\">\u2190 Identity</button>\n      <span style=\"font-size:11px;color:var(--fg-subtle);\">Step 2 of 6</span>\n      <button class=\"next\">Composition \u2192</button>\n    </div>\n  </div>\n</body>\n</html>\n"}, {"n": "05", "file": "05-live-preview.html", "name": "Live preview", "blurb": "Form left, customer-facing chip preview right.", "html": "<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<title>Bundle ladders \u2014 Form + live preview (sketch 05)</title>\n<style>\n  :root {\n    --bg: #0a0d14; --surface-1: #11151f; --surface-2: #161b27; --surface-3: #1d2330;\n    --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.16);\n    --fg: #f5f7fa; --fg-muted: #b6bfcd; --fg-subtle: #7d8696;\n    --brand: #c8102e; --gold: #c8a02e; --green: #10b981; --indigo: #6366f1;\n    font-family: -apple-system, \"SF Pro Text\", \"Inter\", system-ui, sans-serif;\n  }\n  * { box-sizing: border-box; }\n  body { margin: 0; padding: 24px; background: var(--bg); color: var(--fg); }\n  h1 { font-size: 22px; margin: 0 0 4px; font-weight: 700; }\n  h1 small { font-size: 11px; color: var(--fg-subtle); font-weight: 500; letter-spacing: .06em; text-transform: uppercase; background: var(--surface-2); padding: 2px 8px; border-radius: 6px; margin-left: 6px; }\n  .sub { color: var(--fg-muted); font-size: 13px; margin: 0 0 18px; }\n\n  .layout { display: grid; grid-template-columns: 1fr 360px; gap: 18px; }\n\n  .ladder-list { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }\n  .lp { background: var(--surface-2); border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px; cursor: pointer; min-width: 130px; }\n  .lp.on { background: var(--surface-3); border-color: var(--brand); }\n  .lp .l { font-size: 10px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }\n  .lp .n { font-size: 13px; font-weight: 600; margin-top: 2px; }\n\n  .form { background: var(--surface-1); border: 1px solid var(--border); border-radius: 14px; padding: 22px; }\n  .form h2 { font-size: 18px; margin: 0 0 4px; font-weight: 700; }\n  .form .help { font-size: 12px; color: var(--fg-muted); margin: 0 0 18px; }\n\n  .section { padding: 14px 0; border-top: 1px solid var(--border); }\n  .section:first-of-type { border-top: 0; padding-top: 0; }\n  .section-h { font-size: 11px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; margin: 0 0 10px; }\n  .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }\n  label.field { display: block; }\n  .field-l { font-size: 10px; color: var(--fg-subtle); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }\n  .input { width: 100%; background: var(--surface-2); color: var(--fg); border: 1px solid var(--border); padding: 8px 10px; border-radius: 6px; font-size: 13px; }\n  .input:focus { outline: 2px solid var(--indigo); outline-offset: -2px; border-color: var(--indigo); }\n\n  .seg { display: inline-flex; background: var(--surface-2); border-radius: 7px; padding: 2px; border: 1px solid var(--border); }\n  .seg button { background: transparent; color: var(--fg-subtle); border: 0; padding: 5px 11px; font-size: 11px; font-weight: 600; cursor: pointer; border-radius: 5px; }\n  .seg button.on { background: var(--surface-3); color: var(--fg); }\n  .chip { font-size: 11px; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border); color: var(--fg-muted); background: var(--surface-2); cursor: pointer; }\n  .chip.on { border-color: var(--brand); color: var(--brand); background: rgba(200,16,46,0.1); }\n\n  /* Right column \u2014 live preview */\n  .preview-col { position: sticky; top: 24px; align-self: start; }\n  .device { background: #fffaf2; border: 1px solid var(--border); border-radius: 22px; padding: 22px 18px; box-shadow: 0 12px 32px rgba(0,0,0,0.45); color: #1a1a1a; font-family: -apple-system, \"SF Pro Text\", \"Inter\", sans-serif; }\n  .device-h { display: flex; justify-content: space-between; font-size: 11px; color: #8b9099; margin-bottom: 14px; }\n  .cart-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #efe6d8; font-size: 13px; }\n  .cart-item span:first-child { color: #1a1a1a; font-weight: 500; }\n  .cart-item span:last-child { color: #8b9099; font-variant-numeric: tabular-nums; }\n  .ladder-h { font-size: 10px; color: #8b9099; text-transform: uppercase; letter-spacing: .08em; font-weight: 700; margin-top: 16px; margin-bottom: 8px; }\n  .primary-cta { background: linear-gradient(135deg, rgba(200,16,46,0.08), rgba(200,160,46,0.08)); border: 1px solid rgba(200,16,46,.4); border-radius: 12px; padding: 12px 14px; cursor: pointer; }\n  .pcta-h { display: flex; align-items: center; gap: 6px; }\n  .pcta-most { background: var(--brand); color: white; font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 999px; letter-spacing: .08em; }\n  .pcta-name { font-size: 13px; font-weight: 700; color: #1a1a1a; }\n  .pcta-desc { font-size: 11px; color: #6b6b6b; margin-top: 4px; }\n  .pcta-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 8px; }\n  .pcta-price { font-size: 18px; font-weight: 700; color: var(--brand); }\n  .pcta-ref { font-size:  24px; background: var(--bg); color: var(--fg); }\n  h1 { font-size: 22px; margin: 0 0 4px; font-weight: 700; }\n  h1 small { font-size: 11px; color: var(--fg-subtle); font-weight: 500; letter-spacing: .06em; text-transform: uppercase; background: var(--surface-2); padding: 2px 8px; border-radius: 6px; margin-left: 6px; }\n  .sub { color: var(--fg-muted); font-size: 13px; margin: 0 0 18px; }\n\n  .ladder { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 14px; overflow: hidden; }\n  .ladder-h { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--surface-2); border-bottom: 1px solid var(--border); }\n  .ladder-l { font-size: 11px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; flex: 1; }\n  .ladder-add { background: transparent; border: 1px dashed var(--border); color: var(--fg-subtle); padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }\n\n  .row { display: grid; grid-template-columns: 28px 1.4fr 1fr 0.8fr 0.8fr 0.8fr auto; gap: 12px; align-items: center; padding: 12px 16px; border-top: 1px solid var(--border); cursor: pointer; transition: background .15s; }\n  .row:hover { background: var(--surface-2); }\n  .row.is-open { background: rgba(99,102,241,0.04); }\n  .row:first-of-type { border-top: 0; }\n  .chev { color: var(--fg-subtle); transition: transform .15s; font-size: 10px; }\n  .row.is-open .chev { transform: rotate(90deg); }\n\n  .ti { display: flex; align-items: center; gap: 8px; min-width: 0; }\n  .ti-name { font-size: 14px; font-weight: 600; }\n  .ti-tier { font-size: 10px; color: var(--fg-subtle); margin-top: 2px; text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }\n  .b { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; flex-shrink: 0; }\n  .b-d { background: var(--brand); color: white; }\n  .b-a { background: var(--gold); color: #1a1a1a; }\n  .b-x { background: var(--surface-3); color: var(--fg-subtle); }\n\n  .col-meta { font-size: 12px; color: var(--fg-muted); }\n  .col-meta small { display: block; font-size: 10px; color: var(--fg-subtle); margin-top: 2px; }\n  .col-price { font-size: 14px; color: var(--fg); font-weight: 700; font-variant-numeric: tabular-nums; text-align: right; }\n  .col-price small { display: block; font-size: 10px; color: var(--green); font-weight: 600; margin-top: 1px; }\n  .col-margin { font-size: 12px; font-weight: 700; text-align: right; }\n  .col-margin.good { color: var(--green); }\n\n  .toggle-pill { display: inline-flex; gap: 1px; background: var(--surface-3); border-radius: 5px; padding: 2px; }\n  .toggle-pill span { background: transparent; color: var(--fg-subtle); font-size: 9px; padding: 2px 5px; border-radius: 3px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }\n  .toggle-pill span.on { background: var(--surface-1); color: var(--fg); }\n\n  .actions { display: flex; gap: 4px; }\n  .icon { background: transparent; border: 0; color: var(--fg-subtle); cursor: pointer; padding: 4px 6px; border-radius: 4px; }\n  .icon:hover { background: var(--surface-3); color: var(--fg); }\n\n  .panel { padding: 18px 24px; background: rgba(99,102,241,0.04); border-top: 1px solid var(--border); display: none; }\n  .row.is-open + .panel { display: block; }\n\n  .panel-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }\n  .panel-h { font-size: 10px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; margin: 0 0 8px; }\n  .input { width: 100%; background: var(--surface-2); color: var(--fg); border: 1px solid var(--border); padding: 7px 9px; border-radius: 6px; font-size: 12px; }\n  .field-group { display: flex; gap: 8px; }\n  .field-group label { font-size: 10px; color: var(--fg-subtle); flex: 1; }\n  .field-group label input { display: block; width: 100%; margin-top: 3px; background: var(--surface-2); color: var(--fg); border: 1px solid var(--border); padding: 5px 8px; border-radius: 5px; font-size: 12px; }\n\n  .slot-row { display: flex; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; align-items: center; }\n  .slot-row:last-child { border-bottom: 0; }\n  .slot-q { background: var(--brand); color: white; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; min-width: 20px; text-align: center; }\n\n  .day-strip { display: inline-flex; gap: 2px; }\n  .day { width: 22px; height: 22px; border-radius: 4px; background: var(--surface-3); display: inline-flex; align-items: center; justify-content: center; font-size: 9px; color: var(--fg-subtle); font-weight: 700; cursor: pointer; }\n  .day.on { background: var(--gold); color: #1a1a1a; }\n</style>\n</head>\n<body>\n  <h1>Bundle ladders <small>SKETCH 06 \u00b7 COMPACT ACCORDION</small></h1>\n  <p class=\"sub\">Closest to today's UI but with everything collapsed by default. Most operators scan; only one row opens at a time.</p>\n\n  <div class=\"ladder\">\n    <div class=\"ladder-h\">\n      <span class=\"ladder-l\">Family ladder \u00b7 3 tiers \u00b7 \u22652 mains gate \u00b7 pizza+pasta scale</span>\n      <button class=\"ladder-add\">+ Add tier</button>\n    </div>\n\n    <div class=\"row\">\n      <span class=\"chev\">\u25b6</span>\n      <div class=\"ti\">\n        <div>\n          <div class=\"ti-tier\">Family</div>\n          <div class=\"ti-name\">Your pizzas + sides</div>\n        </div>\n      </div>\n      <div class=\"col-meta\"><div class=\"toggle-pill\"><span>Fixed</span><span class=\"on\">Dynamic</span></div><small>10/30 split</small></div>\n      <div class=\"col-price\">~88 z\u0142<small>\u221220%</small></div>\n      <div class=\"col-meta\">2 / 6 mains</div>\n      <div class=\"col-margin good\">56% margin</div>\n      <div class=\"actions\">\n        <button class=\"icon\">\u26a1</button>\n        <button class=\"icon\" title=\
