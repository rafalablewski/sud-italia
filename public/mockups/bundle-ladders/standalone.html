d; top: 56px; right: 64px; display: flex; gap: 8px; align-items: center; }\n  .save-bar .badge { font-size: 11px; color: var(--gold); }\n  .save-bar button { background: var(--brand); color: white; border: 0; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }\n\n  .pencil { opacity: 0; transition: opacity .15s; color: var(--fg-subtle); margin-left: 8px; font-size: 14px; }\n  .tier:hover .pencil { opacity: 1; }\n</style>\n</head>\n<body>\n  <div class=\"save-bar\">\n    <span class=\"badge\">3 unsaved</span>\n    <button>Save changes</button>\n  </div>\n\n  <div class=\"container\">\n    <h1>Bundle ladders <small>SKETCH 07 \u00b7 FLAT MINIMAL</small></h1>\n    <p class=\"sub\">Notion-style. Reading mode by default \u2014 click any tier to edit. Maximum signal, minimum chrome.</p>\n\n    <div class=\"toolbar\">\n      <a class=\"on\">All ladders</a>\n      <a>Family</a>\n      <a>Lunch</a>\n      <a>Late-night</a>\n    </div>\n\n    <h2>Family ladder \u00b7 \u2265 2 mains</h2>\n\n    <div class=\"tier\">\n      <div class=\"tier-row1\">\n        <div>\n          <div class=\"tier-tier\">Family \u00b7 entry</div>\n          <div class=\"tier-name\">Your pizzas + sides<span class=\"pencil\">\u270e</span></div>\n        </div>\n        <div class=\"tier-price\">~88 z\u0142 <small>119 z\u0142</small></div>\n      </div>\n      <p class=\"tier-desc\">Your mains + bruschetta + 2 drinks. Min 2 / max 6 mains.</p>\n      <div class=\"meta\">\n        <span><b>Dynamic</b> \u00b7 10/30 split</span>\n        <span><b>56%</b> margin</span>\n        <span class=\"dot\">\u25cf Active</span>\n      </div>\n    </div>\n\n    <div class=\"tier\">\n      <div class=\"tier-row1\">\n        <div>\n          <div class=\"tier-tier\">Family Feast <span class=\"b b-d\">DEFAULT</span> <span class=\"b b-a\">ANCHOR</span></div>\n          <div class=\"tier-name\">Whole-table dinner<span class=\"pencil\">\u270e</span></div>\n        </div>\n        <div class=\"tier-price\">~135 z\u0142 <small>187 z\u0142</small></div>\n      </div>\n      <p class=\"tier-desc\">Your mains + 2 antipasti + 4 drinks + tiramis\u00f9. Min 2 / max 8 mains.</p>\n      <div class=\"meta\">\n        <span><b>Dynamic</b> \u00b7 15/40 split</span>\n        <span><b>49%</b> margin</span>\n        <span><b>Fri \u00b7 Sat \u00b7 Sun</b> only</span>\n        <span class=\"dot\">\u25cf Active</span>\n      </div>\n    </div>\n\n    <div class=\"tier\" style=\"opacity:.85;\">\n      <div class=\"tier-row1\">\n        <div>\n          <div class=\"tier-tier\">Feast Deluxe <span class=\"b b-x\">DECOY</span></div>\n          <div class=\"tier-name\">Big group, no leftovers<span class=\"pencil\">\u270e</span></div>\n        </div>\n        <div class=\"tier-price\">~172 z\u0142 <small>227 z\u0142</small></div>\n      </div>\n      <p class=\"tier-desc\">Your mains + 2 antipasti + 6 drinks + 2 desserts. Min 3 / max 12 mains.</p>\n      <div class=\"meta\">\n        <span><b>Dynamic</b> \u00b7 12/32 split</span>\n        <span><b>51%</b> margin</span>\n        <span class=\"dot\">\u25cf Active</span>\n      </div>\n    </div>\n\n    <h2>Lunch ladder \u00b7 11:00\u201314:00</h2>\n\n    <div class=\"tier\">\n      <div class=\"tier-row1\">\n        <div>\n          <div class=\"tier-tier\">Lunch+ <span class=\"b b-a\">ANCHOR</span></div>\n          <div class=\"tier-name\">Pasta + drink + tiramis\u00f9<span class=\"pencil\">\u270e</span></div>\n        </div>\n        <div class=\"tier-price\">46 z\u0142 <small>56 z\u0142</small></div>\n      </div>\n      <p class=\"tier-desc\">A meal you'll remember.</p>\n      <div class=\"meta\">\n        <span><b>Fixed</b> price</span>\n        <span><b>61%</b> margin</span>\n        <span><b>Mon\u2013Fri</b></span>\n        <span class=\"dot\">\u25cf Active</span>\n      </div>\n    </div>\n\n    <h2>Late-night \u00b7 21:00\u201324:00</h2>\n\n    <div class=\"tier\">\n      <div class=\"tier-row1\">\n        <div>\n          <div class=\"tier-tier\">Late dinner <span class=\"b b-d\">DEFAULT</span></div>\n          <div class=\"tier-name\">Pizza + drink + dessert<span class=\"pencil\">\u270e</span></div>\n        </div>\n        <div class=\"tier-price\">~38 z\u0142 <small>48 z\u0142</small></div>\n      </div>\n      <p class=\"tier-desc\">Your pizza + 1 drink + tiramis\u00f9. Min 1 / max 3 mains.</p>\n      <div class=\"meta\">\n        <span><b>Dynamic</b> \u00b7 12/35 split</span>\n        <span><b>58%</b> margin</span>\n        <span class=\"dot\">\u25cf Active</span>\n      </div>\n    </div>\n  </div>\n\n  <button class=\"float-add\">+ Add a bundle</button>\n</body>\n</html>\n"}, {"n": "08", "file": "08-ladder-drag.html", "name": "Drag-to-reorder", "blurb": "Visual ladder. Drag handles. 3-column layout.", "html": "<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<title>Bundle ladders \u2014 Drag-and-drop ladder (sketch 08)</title>\n<style>\n  :root {\n    --bg: #0a0d14; --surface-1: #11151f; --surface-2: #161b27; --surface-3: #1d2330;\n    --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.16);\n    --fg: #f5f7fa; --fg-muted: #b6bfcd; --fg-subtle: #7d8696;\n    --brand: #c8102e; --gold: #c8a02e; --green: #10b981; --indigo: #6366f1;\n    font-family: -apple-system, \"SF Pro Text\", \"Inter\", system-ui, sans-serif;\n  }\n  * { box-sizing: border-box; }\n  body { margin: 0; padding: 24px; background: var(--bg); color: var(--fg); }\n  h1 { font-size: 22px; margin: 0 0 4px; font-weight: 700; }\n  h1 small { font-size: 11px; color: var(--fg-subtle); font-weight: 500; letter-spacing: .06em; text-transform: uppercase; background: var(--surface-2); padding: 2px 8px; border-radius: 6px; margin-left: 6px; }\n  .sub { color: var(--fg-muted); font-size: 13px; margin: 0 0 24px; }\n\n  .ladders { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }\n  .ladder { background: var(--surface-1); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }\n  .ladder-h { padding: 14px 18px 12px; border-bottom: 1px solid var(--border); }\n  .ladder-h h3 { margin: 0; font-size: 13px; font-weight: 700; }\n  .ladder-h p { margin: 4px 0 0; font-size: 11px; color: var(--fg-subtle); }\n  .ladder-stack { padding: 14px; display: flex; flex-direction: column; gap: 10px; min-height: 320px; }\n\n  .tier {\n    position: relative;\n    background: var(--surface-2);\n    border: 1px solid var(--border);\n    border-radius: 12px;\n    padding: 12px 14px 12px 36px;\n    cursor: grab;\n    transition: transform .15s, border-color .15s;\n  }\n  .tier:hover { border-color: var(--border-strong); transform: translateY(-1px); }\n  .tier::before {\n    content: \"\u283f\";\n    position: absolute;\n    left: 14px;\n    top: 50%;\n    transform: translateY(-50%);\n    color: var(--fg-subtle);\n    font-size: 14px;\n    line-height: 1;\n  }\n  .tier.is-default { border-color: rgba(200,16,46,0.4); background: linear-gradient(180deg, rgba(200,16,46,0.06), var(--surface-2)); }\n  .tier.is-anchor::after {\n    content: \"\u2605 BEST VALUE\";\n    position: absolute;\n    top: -7px;\n    right: 10px;\n    background: var(--gold);\n    color: #1a1a1a;\n    font-size: 8px;\n    font-weight: 800;\n    padding: 2px 6px;\n    border-radius: 999px;\n    letter-spacing: .08em;\n  }\n  .tier.is-default .badge-default {\n    position: absolute;\n    top: -7px;\n    left: 28px;\n    background: var(--brand);\n    color: white;\n    font-size: 8px;\n    font-weight: 800;\n    padding: 2px 6px;\n    border-radius: 999px;\n    letter-spacing: .08em;\n  }\n  .tier.is-decoy { opacity: .82; border-style: dashed; }\n\n  .tier-row1 { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }\n  .tier-name { font-size: 13px; font-weight: 700; color: var(--fg); flex: 1; }\n  .tier-price { font-size: 14px; color: var(--brand); font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }\n  .tier-tier { font-size: 9px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; margin-bottom: 2px; }\n  .tier-desc { font-size: 11px; color: var(--fg-muted); margin: 4px 0 8px; line-height: 1.4; }\n\n  .tier-meta { display: flex; gap: 6px; flex-wrap: wrap; }\n  .pill { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: var(--surface-3); color: var(--fg-subtle); font-weight: 600; }\n  .pill.good { color: var(--green); background: rgba(16,185,129,0.12); }\n  .pill.warn { color: var(--gold); background: rgba(200,160,46,0.12); }\n\n  .add-tier {\n    background: transparent;\n    border: 2px dashed var(--border);\n    color: var(--fg-subtle);\n    padding: 16px;\n    border-radius: 12px;\n    cursor: pointer;\n    text-align: center;\n    font-size: 12px;\n    font-weight: 600;\n  }\n  .add-tier:hover { border-color: var(--border-strong); color: var(--fg-muted); }\n\n  .price-axis {\n    position: absolute;\n    left: -28px;\n    top: 0;\n    bottom: 0;\n    width: 22px;\n    border-right: 1px solid var(--border);\n  }\n\n  .ladder-body { position: relative; }\n\n  .help { margin-top: 24px; padding: 14px 16px; background: var(--surface-2); border-radius: 10px; font-size: 12px; color: var(--fg-muted); }\n  kbd { background: var(--surface-3); padding: 1px 5px; border-radius: 4px; font-size: 10px; font-family: ui-monospace, monospace; border: 1px solid var(--border); }\n\n  .save-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }\n  .save-bar button { background: var(--brand); color: white; border: 0; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }\n</style>\n</head>\n<body>\n  <h1>Bundle ladders <small>SKETCH 08 \u00b7 DRAG TO REORDER</small></h1>\n  <p class=\"sub\">Each ladder is a vertical stack of tiers ordered by price. Drag a tier to reorder; drag across columns to change ladder. Visual matches what the customer sees.</p>\n\n  <div class=\"save-bar\">\n    <button>Save layout</button>\n    <span style=\"font-size:12px;color:var(--fg-subtle);\">Drag the \u283f handle. Or use <kbd>\u2191</kbd> <kbd>\u2193</kbd> when a tier is focused.</span>\n  </div>\n\n  <div class=\"ladders\">\n    <div class=\"ladder\">\n      <div class=\"ladder-h\">\n        <h3>Family ladder</h3>\n        <p>\u2265 2 mains \u00b7 pizza + pasta scale</p>\n      </div>\n      <div class=\"ladder-stack\">\n        <div class=\"tier\">\n          <div class=\"tier-tier\">Family \u00b7 entry</div>\n          <div class=\"tier-row1\"><div class=\"tier-name\">Your pizzas + sides</div><div class=\"tier-price\">~88 z\u0142</div></div>\n          <p class=\"tier-desc\">Your mains + bruschetta + 2 drinks</p>\n          <div class=\"tier-meta\">\n            <span class=\"pill\">Dyn 10/30</span>\n            <span class=\"pill\">2/6 mains</span>\n            <span class=\"pill good\">56% margin</span>\n          </div>\n        </div>\n\n        <div class=\"tier is-default is-anchor\">\n          <span class=\"badge-default\">\u2605 MOST PICKED</span>\n          <div class=\"tier-tier\">Family Feast</div>\n          <div class=\"tier-row1\"><div class=\"tier-name\">Whole-table dinner</div><div class=\"tier-price\">~135 z\u0142</div></div>\n          <p class=\"tier-desc\">Your mains + 2 antipasti + 4 drinks + tiramis\u00f9</p>\n          <div class=\"tier-meta\">\n            <span class=\"pill\">Dyn 15/40</span>\n            <span class=\"pill\">2/8 mains</span>\n            <span class=\"pill good\">49% margin</span>\n            <span class=\"pill warn\">Fri/Sat/Sun</span>\n          </div>\n        </div>\n\n        <div class=\"tier is-decoy\">\n          <div class=\"tier-tier\">Feast Deluxe \u00b7 decoy</div>\n          <div class=\"tier-row1\"><div class=\"tier-name\">Big group, no leftovers</div><div class=\"tier-price\">~172 z\u0142</div></div>\n          <p class=\"tier-desc\">Your mains + 2 antipasti + 6 drinks + 2 desserts</p>\n          <div class=\"tier-meta\">\n            <span class=\"pill\">Dyn 12/32</span>\n            <span class=\"pill\">3/12 mains</span>\n            <span class=\"pill good\">51% margin</span>\n          </div>\n        </div>\n\n        <button class=\"add-tier\">+ Add tier to Family</button>\n      </div>\n    </div>\n\n    <div class=\"ladder\">\n      <div class=\"ladder-h\">\n        <h3>Lunch ladder</h3>\n        <p>Hour-gated \u00b7 11:00\u201314:00</p>\n      </div>\n      <div class=\"ladder-stack\">\n        <div class=\"tier is-anchor\">\n          <div class=\"tier-tier\">Lunch+ \u00b7 anchor</div>\n          <div class=\"tier-row1\"><div class=\"tier-name\">Pasta + drink + tiramis\u00f9</div><div class=\"tier-price\">46 z\u0142</div></div>\n          <p class=\"tier-desc\">A meal you'll remember.</p>\n          <div class=\"tier-meta\">\n            <span class=\"pill\">Fixed</span>\n            <span class=\"pill good\">61% margin</span>\n            <span class=\"pill warn\">Mon\u2013Fri</span>\n          </div>\n        </div>\n\n        <button class=\"add-tier\">+ Add tier to Lunch</button>\n      </div>\n    </div>\n\n    <div class=\"ladder\">\n      <div class=\"ladder-h\">\n        <h3>Late-night ladder</h3>\n        <p>Hour-gated \u00b7 21:00\u201324:00</p>\n      </div>\n      <div class=\"ladder-stack\">\n        <div class=\"tier is-default\">\n          <span class=\"badge-default\">DEFAULT</span>\n          <div class=\"tier-tier\">Late dinner</div>\n          <div class=\"tier-row1\"><div class=\"tier-name\">Pizza + drink + dessert</div><div class=\"tier-price\">~38 z\u0142</div></div>\n          <p class=\"tier-desc\">Your pizza + 1 drink + tiramis\u00f9</p>\n          <div class=\"tier-meta\">\n            <span class=\"pill\">Dyn 12/35</span>\n            <span class=\"pill\">1/3 mains</span>\n            <span class=\"pill good\">58% margin</span>\n          </div>\n        </div>\n\n        <button class=\"add-tier\">+ Add tier to Late-night</button>\n      </div>\n    </div>\n  </div>\n\n  <div class=\"help\">\n    <strong>Why drag-to-reorder:</strong> bundle ladders are inherently visual \u2014 the customer sees them\n    stacked. Letting the operator drag tiers in the same shape they ship in cuts the cognitive distance\n    between \"what I configured\" and \"what they see\". Click the body of any tier to open a side-sheet for\n    deep editing; drag handle is just for ordering.\n  </div>\n</body>\n</html>\n"}, {"n": "09", "file": "09-margin-dashboard.html", "name": "Margin dashboard", "blurb": "Each tier as analytics tile with margin gauge.", "html": "<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<title>Bundle ladders \u2014 Margin dashboard (sketch 09)</title>\n<style>\n  :root {\n    --bg: #0a0d14; --surface-1: #11151f; --surface-2: #161b27; --surface-3: #1d2330;\n    --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.16);\n    --fg: #f5f7fa; --fg-muted: #b6bfcd; --fg-subtle: #7d8696;\n    --brand: #c8102e; --gold: #c8a02e; --green: #10b981; --amber: #f59e0b; --red: #ef4444; --indigo: #6366f1;\n    font-family: -apple-system, \"SF Pro Text\", \"Inter\", system-ui, sans-serif;\n  }\n  * { box-sizing: border-box; }\n  body { margin: 0; padding: 24px; background: var(--bg); color: var(--fg); }\n  h1 { font-size: 22px; margin: 0 0 4px; font-weight: 700; }\n  h1 small { font-size: 11px; color: var(--fg-subtle); font-weight: 500; letter-spacing: .06em; text-transform: uppercase; background: var(--surface-2); padding: 2px 8px; border-radius: 6px; margin-left: 6px; }\n  .sub { color: var(--fg-muted); font-size: 13px; margin: 0 0 18px; }\n\n  .topbar { display: flex; justify-content: space-between; align-items: center; gap: 18px; margin-bottom: 18px; flex-wrap: wrap; }\n  .filters { display: flex; gap: 8px; }\n  .pill { background: var(--surface-2); border: 1px solid var(--border); color: var(--fg-muted); padding: 6px 12px; border-radius: 999px; font-size: 12px; cursor: pointer; }\n  .pill.on { background: var(--surface-3); color: var(--fg); border-color: var(--border-strong); }\n  .save { background: var(--brand); color: white; border: 0; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }\n\n  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }\n  .kpi { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }\n  .kpi-l { font-size: 10px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }\n  .kpi-v { font-size: 24px; font-weight: 700; margin-top: 4px; font-variant-numeric: tabular-nums; }\n  .kpi-d { font-size: 11px; color: var(--green); margin-top: 4px; font-weight: 600; }\n\n  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 14px; }\n\n  .tile { background: var(--surface-1); border: 1px solid var(--border); border-radius: 14px; padding: 18px; position: relative; }\n  .tile.highlight { border-color: rgba(200,16,46,0.35); background: linear-gradient(180deg, rgba(200,16,46,0.04), var(--surface-1)); }\n  .tile.warn { border-color: rgba(245,158,11,0.35); }\n  .tile.danger { border-color: rgba(239,68,68,0.35); }\n\n  .tile-h { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 10px; }\n  .tile-h .lbl { font-size: 10px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }\n  .tile-h .nm { font-size: 14px; font-weight: 700; margin-top: 2px; }\n  .tile-h .b { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }\n  .b-d { background: var(--brand); color: white; }\n  .b-a { background: var(--gold); color: #1a1a1a; }\n  .b-x { background: var(--surface-3); color: var(--fg-subtle); }\n\n  .gauge {\n    position: relative;\n    height: 80px;\n    margin: 12px 0;\n    background: linear-gradient(90deg,\n      var(--red) 0%, var(--red) 25%,\n      var(--amber) 25%, var(--amber) 40%,\n      var(--green) 40%, var(--green) 100%);\n    border-radius: 6px;\n    overflow: hidden;\n  }\n  .gauge::after {\n    content: \"\";\n    position: absolute;\n    top: 0; left: 0; right: 0; bottom: 22px;\n    background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.55) 100%);\n  }\n  .gauge-needle {\n    position: absolute;\n    top: -4px;\n    width: 3px;\n    height: 70px;\n    background: var(--fg);\n    border-radius: 2px;\n    box-shadow: 0 0 0 2px var(--surface-1);\n  }\n  .gauge-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--fg-subtle); margin-top: 4px; padding: 0 2px; }\n\n  .price-stack { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 12px 0; }\n  .ps { background: var(--surface-2); border-radius: 8px; padding: 10px; }\n  .ps-l { font-size: 9px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }\n  .ps-v { font-size: 14px; color: var(--fg); font-weight: 700; margin-top: 4px; font-variant-numeric: tabular-nums; }\n  .ps-d { font-size: 9px; color: var(--green); margin-top: 2px; font-weight: 700; }\n\n  .meta-row { display: flex; gap: 10px; flex-wrap: wrap; font-size: 11px; color: var(--fg-muted); padding-top: 12px; border-top: 1px solid var(--border); }\n  .meta-row b { color: var(--fg); font-weight: 600; }\n\n  .tile-actions { display: flex; gap: 6px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }\n  .tile-actions button { background: var(--surface-2); border: 1px solid var(--border); color: var(--fg-muted); padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; flex: 1; font-weight: 600; }\n  .tile-actions button:hover { background: var(--surface-3); color: var(--fg); }\n  .tile-actions button.primary { background: var(--brand); color: white; border-color: var(--brand); }\n</style>\n</head>\n<body>\n  <h1>Bundle ladders <small>SKETCH 09 \u00b7 MARGIN DASHBOARD</small></h1>\n  <p class=\"sub\">Each tier is a margin-first analytics tile. Edit through inline popovers \u2014 never in a sidebar.</p>\n\n  <div class=\"topbar\">\n    <div class=\"filters\">\n      <button class=\"pill on\">All (5)</button>\n      <button class=\"pill\">Family</button>\n      <button class=\"pill\">Lunch</button>\n      <button class=\"pill\">Late-night</button>\n      <button class=\"pill\">\u26a0 Margin &lt; 40%</button>\n    </div>\n    <button class=\"save\">+ Add bundle</button>\n  </div>\n\n  <div class=\"summary\">\n    <div class=\"kpi\">\n      <div class=\"kpi-l\">Active bundles</div>\n      <div class=\"kpi-v\">5</div>\n      <div class=\"kpi-d\">all healthy</div>\n    </div>\n    <div class=\"kpi\">\n      <div class=\"kpi-l\">Avg margin \u00b7 last 30d</div>\n      <div class=\"kpi-v\">52%</div>\n      <div class=\"kpi-d\">+2.3% vs prev period</div>\n    </div>\n    <div class=\"kpi\">\n      <div class=\"kpi-l\">Bundle penetration</div>\n      <div class=\"kpi-v\">14%</div>\n      <div class=\"kpi-d\" style=\"color:var(--gold);\">below 18% target</div>\n    </div>\n    <div class=\"kpi\">\n      <div class=\"kpi-l\">Anchor conversion</div>\n      <div class=\"kpi-v\">58%</div>\n      <div class=\"kpi-d\">above 55% target</div>\n    </div>\n  </div>\n\n  <div class=\"grid\">\n    <div class=\"tile\">\n      <div class=\"tile-h\"><div><div class=\"lbl\">Family \u00b7 entry</div><div class=\"nm\">Your pizzas + sides</div></div></div>\n      <div class=\"gauge\"><div class=\"gauge-needle\" style=\"left:56%;\"></div></div>\n      <div class=\"gauge-labels\"><span>0%</span><span>25%</span><span>40%</span><span>100%</span></div>\n      <div class=\"price-stack\">\n        <div class=\"ps\"><div class=\"ps-l\">Price</div><div class=\"ps-v\">~88 z\u0142</div><div class=\"ps-d\">\u221220%</div></div>\n        <div class=\"ps\"><div class=\"ps-l\">Margin</div><div class=\"ps-v\">56%</div><div class=\"ps-d\">healthy</div></div>\n        <div class=\"ps\"><div class=\"ps-l\">Take rate</div><div class=\"ps-v\">3.2%</div><div class=\"ps-d\">last 30d</div></div>\n      </div>\n      <div class=\"meta-row\"><span><b>Dyn</b> 10/30 split</span><span><b>2/6</b> mains</span><span>All days</span></div>\n      <div class=\"tile-actions\"><button>Edit</button><button>Duplicate</button><button>Disable</button></div>\n    </div>\n\n    <div class=\"tile highlight\">\n      <div class=\"tile-h\">\n        <div><div class=\"lbl\">Family Feast \u00b7 anchor + default</div><div class=\"nm\">Whole-table dinner</div></div>\n        <div style=\"display:flex;gap:4px;\"><span class=\"b b-d\">DEF</span><span class=\"b b-a\">ANC</span></div>\n      </div>\n      <div class=\"gauge\"><div class=\"gauge-needle\" style=\"left:49%;\"></div></div>\n      <div class=\"gauge-labels\"><span>0%</span><span>25%</span><span>40%</span><span>100%</span></div>\n      <div class=\"price-stack\">\n        <div class=\"ps\"><div class=\"ps-l\">Price</div><div class=\"ps-v\">~135 z\u0142</div><div class=\"ps-d\">\u221228%</div></div>\n        <div class=\"ps\"><div class=\"ps-l\">Margin</div><div class=\"ps-v\">49%</div><div class=\"ps-d\">healthy</div></div>\n        <div class=\"ps\"><div class=\"ps-l\">Take rate</div><div class=\"ps-v\">8.1%</div><div class=\"ps-d\">last 30d</div></div>\n      </div>\n      <div class=\"meta-row\"><span><b>Dyn</b> 15/40 split</span><span><b>2/8</b> mains</span><span><b>Fri/Sat/Sun</b></span></div>\n      <div class=\"tile-actions\"><button class=\"primary\">Edit</button><button>Duplicate</button><button>Disable</button></div>\n    </div>\n\n    <div class=\"tile\">\n      <div class=\"tile-h\">\n        <div><div class=\"lbl\">Feast Deluxe \u00b7 decoy</div><div class=\"nm\">Big group, no leftovers</div></div>\n        <span class=\"b b-x\">DEC</span>\n      </div>\n      <div class=\"gauge\"><div class=\"gauge-needle\ background: var(--bg);\n    border-radius: 24px;\n    overflow: hidden;\n    box-shadow: 0 24px 64px rgba(0,0,0,0.5);\n    min-height: 800px;\n  }\n  .h {\n    position: sticky; top: 0; z-index: 10;\n    background: var(--surface-1);\n    padding: 14px 18px;\n    border-bottom: 1px solid var(--border);\n    display: flex; align-items: center; gap: 10px;\n  }\n  .h .back { color: var(--fg-subtle); font-size: 18px; }\n  .h h1 { font-size: 16px; font-weight: 700; margin: 0; flex: 1; }\n  .h h1 small { display: block; font-size: 9px; color: var(--fg-subtle); font-weight: 500; letter-spacing: .06em; text-transform: uppercase; margin-top: 1px; }\n  .h .save { background: var(--brand); color: white; border: 0; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; }\n\n  .filters { display: flex; gap: 6px; padding: 12px 16px; overflow-x: auto; background: var(--surface-1); border-bottom: 1px solid var(--border); }\n  .filters::-webkit-scrollbar { display: none; }\n  .pill { background: var(--surface-2); border: 1px solid var(--border); color: var(--fg-muted); padding: 5px 12px; border-radius: 999px; font-size: 11px; white-space: nowrap; }\n  .pill.on { background: var(--surface-3); color: var(--fg); border-color: var(--border-strong); }\n\n  .group { padding: 18px 16px 6px; }\n  .group h2 { font-size: 10px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: .12em; font-weight: 800; margin: 0; }\n  .group small { color: var(--fg-subtle); font-size: 10px; }\n\n  .card {\n    background: var(--surface-1);\n    margin: 10px 16px;\n    border: 1px solid var(--border);\n    border-radius: 14px;\n    padding: 16px;\n    position: relative;\n  }\n  .card.is-default { border-color: rgba(200,16,46,0.35); background: linear-gradient(180deg, rgba(200,16,46,0.05), var(--surface-1)); }\n  .card.is-anchor { border-color: rgba(200,160,46,0.35); }\n  .card.is-decoy { opacity: .85; }\n  .card.is-default::before {\n    content: \"MOST PICKED\";\n    position: absolute;\n    top: -7px;\n    left: 14px;\n    background: var(--brand);\n    color: white;\n    font-size: 8px;\n    font-weight: 800;\n    padding: 2px 7px;\n    border-radius: 999px;\n    letter-spacing: .08em;\n  }\n  .card.is-anchor:not(.is-default)::before {\n    content: \"BEST VALUE\";\n    position: absolute;\n    top: -7px;\n    left: 14px;\n    background: var(--gold);\n    color: #1a1a1a;\n    font-size: 8px;\n    font-weight: 800;\n    padding: 2px 7px;\n    border-radius: 999px;\n    letter-spacing: .08em;\n  }\n\n  .lbl { font-size: 9px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }\n  .nm { font-size: 16px; font-weight: 700; margin: 2px 0 4px; }\n  .desc { font-size: 12px; color: var(--fg-muted); line-height: 1.5; margin-bottom: 12px; }\n\n  .price { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }\n  .price-big { font-size: 22px; font-weight: 700; color: var(--brand); font-variant-numeric: tabular-nums; }\n  .price-ref { font-size: 11px; color: var(--fg-subtle); text-decoration: line-through; }\n  .price-disc { background: rgba(16,185,129,0.15); color: #6ee7b7; font-size: 10px; padding: 2px 7px; border-radius: 999px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }\n\n  .stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 12px; }\n  .stat { background: var(--surface-2); border-radius: 8px; padding: 8px 10px; }\n  .stat-l { font-size: 9px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: .06em; font-weight: 700; }\n  .stat-v { font-size: 13px; color: var(--fg); font-weight: 700; margin-top: 3px; font-variant-numeric: tabular-nums; }\n\n  .actions { display: flex; gap: 6px; padding-top: 12px; border-top: 1px solid var(--border); }\n  .actions button { flex: 1; background: transparent; border: 1px solid var(--border); color: var(--fg-muted); padding: 8px; border-radius: 8px; font-size: 12px; font-weight: 600; }\n  .actions button.primary { background: var(--brand); color: white; border-color: var(--brand); }\n\n  .quick-toggle { display: flex; gap: 6px; align-items: center; padding: 6px 0; font-size: 11px; color: var(--fg-muted); }\n  .switch { width: 32px; height: 18px; background: var(--surface-3); border-radius: 999px; padding: 2px; position: relative; }\n  .switch::after { content: \"\"; display: block; width: 14px; height: 14px; background: var(--fg-muted); border-radius: 999px; transition: transform .15s; }\n  .switch.on { background: rgba(16,185,129,0.4); }\n  .switch.on::after { transform: translateX(14px); background: var(--green); }\n\n  .float-add { position: sticky; bottom: 16px; margin: 16px 16px 0; display: block; width: calc(100% - 32px); background: var(--brand); color: white; border: 0; padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 600; box-shadow: 0 6px 20px rgba(200,16,46,0.4); }\n\n  .meta-mini { display: flex; gap: 8px; flex-wrap: wrap; font-size: 10px; color: var(--fg-subtle); margin-top: 2px; }\n</style>\n</head>\n<body>\n  <div class=\"frame\">\n    <div class=\"h\">\n      <span class=\"back\">\u2190</span>\n      <h1>Bundle ladders<small>SKETCH 10 \u00b7 MOBILE / TABLET</small></h1>\n      <button class=\"save\">Save</button>\n    </div>\n\n    <div class=\"filters\">\n      <span class=\"pill on\">All (5)</span>\n      <span class=\"pill\">Family</span>\n      <span class=\"pill\">Lunch</span>\n      <span class=\"pill\">Late-night</span>\n      <span class=\"pill\">\u26a0 Margin</span>\n    </div>\n\n    <div class=\"group\">\n      <h2>Family ladder</h2>\n      <small>\u2265 2 mains \u00b7 pizza + pasta scale</small>\n    </div>\n\n    <div class=\"card\">\n      <div class=\"lbl\">Family \u00b7 entry</div>\n      <div class=\"nm\">Your pizzas + sides</div>\n      <p class=\"desc\">Your mains + bruschetta + 2 drinks. Min 2 / max 6 mains.</p>\n      <div class=\"price\">\n        <span class=\"price-big\">~88 z\u0142</span>\n        <span class=\"price-ref\">119 z\u0142</span>\n        <span class=\"price-disc\">\u221220%</span>\n      </div>\n      <div class=\"stat-row\">\n        <div class=\"stat\"><div class=\"stat-l\">Mode</div><div class=\"stat-v\">Dynamic</div></div>\n        <div class=\"stat\"><div class=\"stat-l\">Margin</div><div class=\"stat-v\" style=\"color:var(--green);\">56%</div></div>\n        <div class=\"stat\"><div class=\"stat-l\">Take 30d</div><div class=\"stat-v\">3.2%</div></div>\n      </div>\n      <div class=\"quick-toggle\"><div class=\"switch on\"></div> Active</div>\n      <div class=\"actions\"><button>Edit</button><button>Duplicate</button></div>\n    </div>\n\n    <div class=\"card is-default is-anchor\">\n      <div class=\"lbl\">Family Feast</div>\n      <div class=\"nm\">Whole-table dinner</div>\n      <p class=\"desc\">Your mains + 2 antipasti + 4 drinks + tiramis\u00f9. Min 2 / max 8 mains.</p>\n      <div class=\"price\">\n        <span class=\"price-big\">~135 z\u0142</span>\n        <span class=\"price-ref\">187 z\u0142</span>\n        <span class=\"price-disc\">\u221228%</span>\n      </div>\n      <div class=\"stat-row\">\n        <div class=\"stat\"><div class=\"stat-l\">Mode</div><div class=\"stat-v\">Dynamic</div></div>\n        <div class=\"stat\"><div class=\"stat-l\">Margin</div><div class=\"stat-v\" style=\"color:var(--green);\">49%</div></div>\n        <div class=\"stat\"><div class=\"stat-l\">Take 30d</div><div class=\"stat-v\">8.1%</div></div>\n      </div>\n      <div class=\"meta-mini\">\ud83d\udcc5 Fri \u00b7 Sat \u00b7 Sun \u00b7 \ud83c\udfaf Anchor + Default</div>\n      <div class=\"quick-toggle\"><div class=\"switch on\"></div> Active</div>\n      <div class=\"actions\"><button class=\"primary\">Edit</button><button>Duplicate</button></div>\n    </div>\n\n    <div class=\"card is-decoy\">\n      <div class=\"lbl\">Feast Deluxe \u00b7 decoy</div>\n      <div class=\"nm\">Big group, no leftovers</div>\n      <p class=\"desc\">Your mains + 2 antipasti + 6 drinks + 2 desserts. Min 3 / max 12 mains.</p>\n      <div class=\"price\">\n        <span class=\"price-big\">~172 z\u0142</span>\n        <span class=\"price-ref\">227 z\u0142</span>\n        <span class=\"price-disc\">\u221220%</span>\n      </div>\n      <div class=\"stat-row\">\n        <div class=\"stat\"><div class=\"stat-l\">Mode</div><div class=\"stat-v\">Dynamic</div></div>\n        <div class=\"stat\"><div class=\"stat-l\">Margin</div><div class=\"stat-v\" style=\"color:var(--green);\">51%</div></div>\n        <div class=\"stat\"><div class=\"stat-l\">Take 30d</div><div class=\"stat-v\">1.4%</div></div>\n      </div>\n      <div class=\"quick-toggle\"><div class=\"switch on\"></div> Active</div>\n      <div class=\"actions\"><button>Edit</button><button>Duplicate</button></div>\n    </div>\n\n    <div class=\"group\">\n      <h2>Lunch ladder</h2>\n      <small>11:00\u201314:00 hour-gated</small>\n    </div>\n\n    <div class=\"card is-anchor\">\n      <div class=\"lbl\">Lunch+</div>\n      <div class=\"nm\">Pasta + drink + tiramis\u00f9</div>\n      <p class=\"desc\">A meal you'll remember.</p>\n      <div class=\"price\">\n        <span class=\"price-big\">46 z\u0142</span>\n        <span class=\"price-ref\">56 z\u0142</span>\n        <span class=\"price-disc\">\u221218%</span>\n      </div>\n      <div class=\"stat-row\">\n        <div class=\"stat\"><div class=\"stat-l\">Mode</div><div class=\"stat-v\">Fixed</div></div>\n        <div class=\"stat\"><div class=\"stat-l\">Margin</div><div class=\"stat-v\" style=\"color:var(--green);\">61%</div></div>\n        <div class=\"stat\"><div class=\"stat-l\">Take 30d</div><div class=\"stat-v\">22%</div></div>\n      </div>\n      <div class=\"meta-mini\">\ud83d\udcc5 Mon\u2013Fri</div>\n      <div class=\"quick-toggle\"><div class=\"switch on\"></div> Active</div>\n      <div class=\"actions\"><button>Edit</button><button>Duplicate</button></div>\n    </div>\n\n    <div class=\"group\">\n      <h2>Late-night ladder</h2>\n      <small>21:00\u201324:00 hour-gated</small>\n    </div>\n\n    <div class=\"card is-default\">\n      <div class=\"lbl\">Late dinner</div>\n      <div class=\"nm\">Pizza + drink + dessert</div>\n      <p class=\"desc\">Your pizza + 1 drink + tiramis\u00f9. Min 1 / max 3 mains.</p>\n      <div class=\"price\">\n        <span class=\"price-big\">~38 z\u0142</span>\n        <span class=\"price-ref\">48 z\u0142</span>\n        <span class=\"price-disc\">\u221222%</span>\n      </div>\n      <div class=\"stat-row\">\n        <div class=\"stat\"><div class=\"stat-l\">Mode</div><div class=\"stat-v\">Dynamic</div></div>\n        <div class=\"stat\"><div class=\"stat-l\">Margin</div><div class=\"stat-v\" style=\"color:var(--green);\">58%</div></div>\n        <div class=\"stat\"><div class=\"stat-l\">Take 30d</div><div class=\"stat-v\">11%</div></div>\n      </div>\n      <div class=\"quick-toggle\"><div class=\"switch on\"></div> Active</div>\n      <div class=\"actions\"><button>Edit</button><button>Duplicate</button></div>\n    </div>\n\n    <button class=\"float-add\">+ Add a bundle</button>\n  </div>\n</body>\n</html>\n"}];
  const tabsEl = document.getElementById("tabs");
  const frameEl = document.getElementById("frame");
  const frameRightEl = document.getElementById("frame-right");
  const filenameEl = document.getElementById("filename");
  const metaEl = document.getElementById("current-meta");
  const toggleEl = document.getElementById("toggle-compare");

  let activeIdx = 0;
  let rightIdx = 1;
  let compareMode = false;
  let activeSide = "left";

  function loadInto(frame, idx) {
    // srcdoc inlines the entire sketch HTML — no network, no relative paths.
    frame.srcdoc = SKETCHES[idx].html;
  }

  function renderTabs() {
    tabsEl.innerHTML = "";
    SKETCHES.forEach((s, i) => {
      const b = document.createElement("button");
      const isActive = i === activeIdx || (compareMode && i === rightIdx);
      b.className = "tab" + (isActive ? " on" : "");
      b.innerHTML = '<span class="num">' + s.n + '</span><span>' + s.name + '</span>';
      b.onclick = () => {
        if (compareMode) {
          if (activeSide === "left") activeIdx = i; else rightIdx = i;
          activeSide = activeSide === "left" ? "right" : "left";
        } else {
          activeIdx = i;
        }
        applyState();
      };
      tabsEl.appendChild(b);
    });
  }

  function applyState() {
    const cur = SKETCHES[activeIdx];
    loadInto(frameEl, activeIdx);
    filenameEl.textContent = cur.file;
    metaEl.innerHTML = "<strong>" + cur.name + "</strong> — " + cur.blurb;
    if (compareMode) {
      document.body.classList.add("compare");
      frameRightEl.hidden = false;
      loadInto(frameRightEl, rightIdx);
      metaEl.innerHTML += " · Right pane: <strong>" + SKETCHES[rightIdx].name + "</strong>";
    } else {
      document.body.classList.remove("compare");
      frameRightEl.hidden = true;
    }
    renderTabs();
  }

  toggleEl.onclick = () => {
    compareMode = !compareMode;
    toggleEl.classList.toggle("on", compareMode);
    toggleEl.textContent = compareMode ? "Single view (C)" : "Compare two side-by-side (C)";
    if (compareMode && rightIdx === activeIdx) rightIdx = (activeIdx + 1) % SKETCHES.length;
    applyState();
  };

  window.addEventListener("keydown", (e) => {
    if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
    if (e.key === "ArrowRight") { activeIdx = (activeIdx + 1) % SKETCHES.length; applyState(); }
    else if (e.key === "ArrowLeft") { activeIdx = (activeIdx - 1 + SKETCHES.length) % SKETCHES.length; applyState(); }
    else if (e.key === "c" || e.key === "C") { toggleEl.click(); }
    else if (e.key >= "1" && e.key <= "9") { activeIdx = parseInt(e.key, 10) - 1; applyState(); }
    else if (e.key === "0") { activeIdx = 9; applyState(); }
  });

  applyState();
</script>
</body>
</html>
