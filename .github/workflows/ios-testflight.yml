name: Mobile app — EAS build

# Builds (and optionally submits) the Expo app via EAS — the "GitHub Actions to
# deploy" path. Triggered manually, or by pushing a commit whose message contains
# [eas] so we can ship from a feature branch without merging. Pick the profile +
# platform in the dispatch inputs. App Store submission is gated on a real
# Apple credential set (EXPO_TOKEN + the EAS-managed App Store Connect key).
#
# Required repo secret: EXPO_TOKEN (an Expo access token with build rights).
# Apple signing + ASC submission are configured once in EAS (eas credentials);
# this workflow does not handle raw .p8 keys.
on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform
        type: choice
        options: [ios, android, all]
        default: ios
      profile:
        description: EAS build profile
        type: choice
        options: [preview, production]
        default: preview
      submit:
        description: Submit to the store after building
        type: boolean
        default: false
  push:
    branches: ["claude/**", "main"]

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[eas]') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native/ottaviano-rn
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS build
        run: |
          PLATFORM="${{ inputs.platform || 'ios' }}"
          PROFILE="${{ inputs.profile || 'preview' }}"
          SUBMIT_FLAG=""
          if [ "${{ inputs.submit }}" = "true" ]; then SUBMIT_FLAG="--auto-submit"; fi
          echo "Building $PLATFORM ($PROFILE) $SUBMIT_FLAG"
          eas build --non-interactive --no-wait --platform "$PLATFORM" --profile "$PROFILE" $SUBMIT_FLAG
