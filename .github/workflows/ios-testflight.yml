name: Mobile app — TestFlight

# Archives the bare React Native 0.79.5 CUSTOMER app (Ottaviano / pl.ottaviano)
# and uploads it to TestFlight via the App Store Connect API key (xcodebuild
# archive -> exportArchive -> altool against the CocoaPods WORKSPACE). No Expo.
#
# SCOPE: customer app ONLY. The OttavianoKDS operator app is now native SwiftUI
# (native/ottaviano-ios, workflow ios-swift-testflight.yml) and is the SOLE owner
# of the bundle id pl.ottaviano.kds. This RN pipeline used to be able to ship the
# RN OttavianoKDS scheme too — and because it numbered builds `60 + run_number`,
# a dispatch (run #143 = build 203) landed ABOVE the SwiftUI build in the shared
# pl.ottaviano.kds record and buried it, so testers never saw the SwiftUI update.
# To stop the leapfrogging for good this workflow is pinned to the Ottaviano
# (customer) scheme and can no longer archive/upload pl.ottaviano.kds.
#
# Triggered manually, or by pushing to a claude/** branch with a commit message
# containing [testflight]. Required repo secrets: ASC_KEY_ID, ASC_ISSUER_ID,
# ASC_KEY_P8.
on:
  workflow_dispatch:
  push:
    branches: ["claude/**"]

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  testflight:
    # Manual dispatch always runs; push only when the commit message opts in.
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[testflight]') }}
    name: Archive + upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60
    defaults:
      run:
        working-directory: native/ottaviano-rn
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve scheme
        id: scheme
        # Customer app only. OttavianoKDS (pl.ottaviano.kds) ships from the
        # SwiftUI pipeline (ios-swift-testflight.yml) — this workflow must never
        # upload that bundle id again, so the scheme is hard-pinned to Ottaviano.
        run: |
          SCHEME="Ottaviano"
          echo "Selected scheme: $SCHEME"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"

      - name: Select Xcode 26
        run: |
          XCODE_APP="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)"
          if [ -z "$XCODE_APP" ]; then
            echo "No Xcode 26 found in /Applications" >&2
            ls -d /Applications/Xcode*.app || true
            exit 1
          fi
          echo "Selecting $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS dependencies
        run: npm install

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: native/ottaviano-rn/ios
        run: xcodegen generate

      - name: Install CocoaPods (bundler)
        run: bundle install

      - name: pod install
        working-directory: native/ottaviano-rn/ios
        run: bundle exec pod install

      - name: Write App Store Connect API key
        # altool / xcodebuild read AuthKey_<id>.p8 from ~/.appstoreconnect/private_keys.
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "${{ secrets.ASC_KEY_P8 }}" > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Archive + export + upload to TestFlight
        # Build number = base 60 + run_number offset, kept strictly > 51 and
        # monotonic across runs so TestFlight always accepts the upload.
        run: |
          chmod +x Scripts/testflight.sh
          BUILD_NUMBER=$(( 60 + ${{ github.run_number }} ))
          ./Scripts/testflight.sh "${{ steps.scheme.outputs.scheme }}" "$BUILD_NUMBER"
