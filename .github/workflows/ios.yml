name: Mobile app CI

# Builds the bare React Native 0.79.5 iOS app for the simulator (no signing) as a
# compile-level smoke test on every change to the app subtree. The release/
# TestFlight binary is produced by the "Mobile app — TestFlight" workflow.
#
# Flow on the macOS runner: setup-node -> npm install -> xcodegen generate ->
# bundle install / pod install -> xcodebuild build (workspace, no signing).
on:
  push:
    paths:
      - "native/ottaviano-rn/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Simulator build (no signing)
    runs-on: macos-15
    timeout-minutes: 45
    defaults:
      run:
        working-directory: native/ottaviano-rn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        # Pick the newest installed Xcode 26.x toolchain.
        run: |
          XCODE_APP="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)"
          if [ -z "$XCODE_APP" ]; then
            echo "No Xcode 26 found in /Applications" >&2
            ls -d /Applications/Xcode*.app || true
            exit 1
          fi
          echo "Selecting $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS dependencies
        run: npm install

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: native/ottaviano-rn/ios
        run: xcodegen generate

      - name: Install CocoaPods (bundler)
        run: bundle install

      - name: pod install
        working-directory: native/ottaviano-rn/ios
        run: bundle exec pod install

      - name: Build OttavianoKDS for the simulator (no signing)
        run: |
          xcodebuild build \
            -workspace ios/Ottaviano.xcworkspace \
            -scheme OttavianoKDS \
            -destination 'generic/platform=iOS Simulator' \
            -quiet \
            CODE_SIGNING_ALLOWED=NO
