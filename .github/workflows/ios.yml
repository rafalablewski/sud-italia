name: iOS build

# Compiles the two native apps on Apple's macOS runners. Scoped to the iOS
# subtree + manual dispatch so normal web changes never spend macOS minutes.
on:
  push:
    branches: ["**"]
    paths:
      - "native/ottaviano-ios/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: native/ottaviano-ios
    steps:
      - uses: actions/checkout@v4

      # Pin Xcode 26 (iOS 26 SDK) so simulator builds match what TestFlight
      # requires — macos-latest otherwise varies between Xcode 16 and 26.
      - name: Select Xcode 26
        run: |
          XC="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          if [ -z "$XC" ]; then echo "No Xcode 26 found:"; ls -d /Applications/Xcode_*.app; exit 1; fi
          echo "Using $XC"
          sudo xcode-select -switch "$XC/Contents/Developer"

      - name: Toolchain
        run: |
          xcodebuild -version
          xcrun --sdk iphonesimulator --show-sdk-version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Ottaviano (customer)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Ottaviano.xcodeproj \
            -scheme Ottaviano \
            -destination 'generic/platform=iOS Simulator' \
            -quiet \
            CODE_SIGNING_ALLOWED=NO

      - name: Build OttavianoKDS (operator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Ottaviano.xcodeproj \
            -scheme OttavianoKDS \
            -destination 'generic/platform=iOS Simulator' \
            -quiet \
            CODE_SIGNING_ALLOWED=NO
