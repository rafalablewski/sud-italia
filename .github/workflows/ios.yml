name: Mobile app CI

# Typechecks + lints the React Native (Expo) app. Scoped to the app subtree +
# manual dispatch so normal web changes don't spend CI minutes here. The actual
# iOS binary is produced by the "Mobile app — EAS build" workflow (EAS / Xcode);
# this job just keeps the TypeScript honest on every push.
on:
  push:
    branches: ["**"]
    paths:
      - "native/ottaviano-rn/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: native/ottaviano-rn
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: TypeScript
        run: npm run typecheck

      - name: Expo Doctor
        run: npx --yes expo-doctor || true
