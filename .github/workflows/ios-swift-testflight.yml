name: iOS (SwiftUI) TestFlight

# Archives the OttavianoKDS SwiftUI operator app, signs it via the App Store
# Connect API key (cloud-managed cert + auto provisioning), and uploads to
# TestFlight. Requires repo secrets: ASC_KEY_ID, ASC_ISSUER_ID, ASC_KEY_P8.
# Triggered manually, or by pushing a claude/** commit whose message contains
# [testflight-swift]. OttavianoKDS is the only app — "we build only SwiftUI".
on:
  workflow_dispatch:
  push:
    branches: ["claude/**"]

jobs:
  testflight:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[testflight-swift]') }}
    runs-on: macos-latest
    defaults:
      run:
        working-directory: native/ottaviano-ios
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4

      # Apple requires apps be built with the iOS 26 SDK (Xcode 26+) to upload.
      - name: Select Xcode 26
        run: |
          XC="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          if [ -z "$XC" ]; then echo "No Xcode 26 found:"; ls -d /Applications/Xcode_*.app; exit 1; fi
          echo "Using $XC"
          sudo xcode-select -switch "$XC/Contents/Developer"
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_KEY_P8" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          head -1 ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 | grep -q "BEGIN PRIVATE KEY" \
            && echo "API key looks valid" || echo "WARNING: key does not start with BEGIN PRIVATE KEY"

      - name: Archive → export → upload
        run: |
          chmod +x Scripts/testflight.sh
          ./Scripts/testflight.sh OttavianoKDS "${{ github.run_number }}"
