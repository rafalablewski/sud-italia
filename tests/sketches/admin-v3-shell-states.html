<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin v3 — nav, kanban, empty & loading states</title>
<!--
  Standalone preview of the v3 admin shell/state polish:
  - sidebar nav active state (platinum fill + rail + icon, vs plain hover)
  - kanban lane (opaque sticky header) + order cards (shadow-lift, focus ring)
  - empty state (icon chip)
  - skeleton loaders (KPI rail + rows, shimmer)
  in both dark and light admin themes.

  Tokens + rules below mirror src/app/themes/admin-v3/index.css.
  Draft/verification artifact — not shipped. See /tests/README.md.
-->
<style>
  .av3-root{
    --av3-bg:#0a0a0c;--av3-s1:#141417;--av3-s2:#1b1b1f;--av3-s3:#24242a;--av3-hover:#2c2c33;
    --av3-line:rgba(255,255,255,.07);--av3-line-strong:rgba(255,255,255,.13);
    --av3-fg:#f4f3f1;--av3-muted:#a6a099;--av3-subtle:#6e6862;
    --av3-brand:#c2384f;--av3-platinum:#cbb48a;--av3-ok:#34b27b;--av3-warn:#e0a93f;--av3-bad:#e8554f;
    --av3-r-sm:5px;--av3-r-md:8px;--av3-r-lg:11px;--av3-r-pill:999px;
    --av3-gap-2:8px;--av3-gap-3:12px;--av3-gap-4:16px;
    --av3-sh-1:0 1px 2px rgba(0,0,0,.4);--av3-sh-2:0 8px 28px -8px rgba(0,0,0,.55);
    --av3-ease:cubic-bezier(.4,0,.2,1);--av3-t-fast:110ms;--av3-mono:"JetBrains Mono",ui-monospace,monospace;
    background:var(--av3-bg);color:var(--av3-fg);font-family:Inter,system-ui,sans-serif;padding:18px;border-radius:12px;
  }
  [data-admin-theme="light"] .av3-root{
    --av3-bg:#f7f5f1;--av3-s1:#fff;--av3-s2:#f6f3ee;--av3-s3:#efebe3;--av3-hover:#e9e4da;
    --av3-line:rgba(28,24,21,.09);--av3-line-strong:rgba(28,24,21,.16);
    --av3-fg:#1a1714;--av3-muted:#57504a;--av3-subtle:#857c73;--av3-brand:#a82940;--av3-platinum:#9c7e4e;
  }
  h2{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--av3-subtle);margin:0 0 9px;}
  .grp{margin-bottom:20px;}

  /* nav */
  .nav{width:210px;background:var(--av3-s1);border:1px solid var(--av3-line);border-radius:var(--av3-r-md);padding:8px;}
  .av3-nav-item{position:relative;display:flex;align-items:center;gap:10px;height:30px;padding:0 9px;border-radius:var(--av3-r-sm);
    color:var(--av3-muted);font-size:12.5px;font-weight:500;text-decoration:none;margin-left:8px;transition:background var(--av3-t-fast) var(--av3-ease),color var(--av3-t-fast) var(--av3-ease);}
  .av3-nav-item:hover{background:var(--av3-s3);color:var(--av3-fg);}
  .av3-nav-item.is-active{background:color-mix(in oklab,var(--av3-platinum) 9%,var(--av3-s3));color:var(--av3-fg);font-weight:600;}
  .av3-nav-item.is-active .ico{color:var(--av3-platinum);}
  .av3-nav-item.is-active::before{content:"";position:absolute;left:-8px;top:6px;bottom:6px;width:2.5px;border-radius:0 2px 2px 0;background:var(--av3-platinum);}
  .ico{width:16px;height:16px;flex-shrink:0;transition:color var(--av3-t-fast) var(--av3-ease);}

  /* kanban */
  .av3-kanban{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(200px,1fr);gap:var(--av3-gap-3);}
  .av3-kcol{display:flex;flex-direction:column;background:var(--av3-s2);border:1px solid var(--av3-line);border-radius:var(--av3-r-lg);}
  .av3-kcol-head{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--av3-line-strong);
    position:sticky;top:0;z-index:1;background:var(--av3-s2);border-radius:var(--av3-r-lg) var(--av3-r-lg) 0 0;box-shadow:0 2px 6px -4px rgba(0,0,0,.5);}
  .av3-kcol-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--av3-muted);}
  .av3-kcol-count{font-family:var(--av3-mono);font-size:11px;color:var(--av3-subtle);}
  .av3-kcol-body{display:flex;flex-direction:column;gap:8px;padding:8px;max-height:200px;overflow:auto;}
  .av3-ocard{text-align:left;width:100%;background:var(--av3-s1);border:1px solid var(--av3-line);border-radius:var(--av3-r-md);padding:10px 11px;cursor:pointer;
    box-shadow:var(--av3-sh-1);transition:border-color var(--av3-t-fast) var(--av3-ease),transform var(--av3-t-fast) var(--av3-ease),box-shadow var(--av3-t-fast) var(--av3-ease);}
  .av3-ocard:hover{border-color:var(--av3-line-strong);transform:translateY(-1px);box-shadow:var(--av3-sh-2);}
  .av3-ocard-top{display:flex;justify-content:space-between;gap:8px;}
  .av3-ocard-id{font-family:var(--av3-mono);font-size:11px;color:var(--av3-subtle);}
  .av3-ocard-amt{font-family:var(--av3-mono);font-size:13px;font-weight:500;}
  .av3-ocard-name{font-size:13px;font-weight:600;margin-top:4px;}
  .av3-ocard-meta{display:flex;align-items:center;gap:6px;margin-top:5px;font-size:11px;color:var(--av3-muted);}
  .dot{width:6px;height:6px;border-radius:50%;}

  /* empty */
  .av3-card{background:var(--av3-s1);border:1px solid var(--av3-line);border-radius:var(--av3-r-lg);box-shadow:var(--av3-sh-1);}
  .av3-empty{display:flex;flex-direction:column;align-items:center;gap:7px;padding:32px 16px;text-align:center;color:var(--av3-muted);}
  .av3-empty>svg{box-sizing:border-box;width:42px;height:42px;padding:10px;margin-bottom:2px;color:var(--av3-muted);background:var(--av3-s2);border:1px solid var(--av3-line);border-radius:50%;}
  .av3-empty-title{font-size:13px;font-weight:600;color:var(--av3-fg);}
  .av3-empty-text{font-size:12px;max-width:300px;line-height:1.45;}

  /* skeleton */
  .av3-kpi-rail{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:var(--av3-gap-3);margin-bottom:10px;}
  .av3-skeleton{position:relative;overflow:hidden;background:var(--av3-s2);border:1px solid var(--av3-line);border-radius:var(--av3-r-sm);}
  .av3-skeleton::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,color-mix(in oklab,var(--av3-fg) 8%,transparent),transparent);animation:av3-shimmer 1.3s var(--av3-ease) infinite;}
  @keyframes av3-shimmer{100%{transform:translateX(100%);}}
  .av3-skel-kpi{height:92px;border-radius:var(--av3-r-lg);}
  .av3-skel-row{height:38px;}
  .av3-skel-rows{display:flex;flex-direction:column;gap:8px;}

  body{margin:0;background:#3a3a40;padding:24px;font-family:Inter,system-ui,sans-serif;}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1180px;margin:0 auto;}
  h1{color:#fff;font-size:15px;font-weight:600;max-width:1180px;margin:0 auto 16px;}
</style>
</head>
<body>
<h1>Admin v3 — nav · kanban · empty · loading (dark ⟷ light)</h1>
<div class="cols">
  <div data-admin-theme="dark"><div class="av3-root"></div></div>
  <div data-admin-theme="light"><div class="av3-root"></div></div>
</div>

<script>
  const I = '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>';
  const big = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8h14M5 12h14M5 16h9"/></svg>';
  const card=(id,amt,name,clr)=>`<div class="av3-ocard"><div class="av3-ocard-top"><span class="av3-ocard-id">${id}</span><span class="av3-ocard-amt">${amt}</span></div><div class="av3-ocard-name">${name}</div><div class="av3-ocard-meta"><span class="dot" style="background:${clr}"></span>2 items · 4m</div></div>`;
  const panel = `
    <div class="grp"><h2>Sidebar nav — active vs hover</h2>
      <div class="nav">
        <a class="av3-nav-item">${I}Dashboard</a>
        <a class="av3-nav-item is-active">${I}Orders</a>
        <a class="av3-nav-item">${I}Menu</a>
        <a class="av3-nav-item">${I}Inventory</a>
      </div>
    </div>

    <div class="grp"><h2>Kanban / KDS</h2>
      <div class="av3-kanban">
        <div class="av3-kcol"><div class="av3-kcol-head"><span class="av3-kcol-title">New</span><span class="av3-kcol-count">2</span></div>
          <div class="av3-kcol-body">${card("#1042","zł84","Margherita ×2","var(--av3-brand)")}${card("#1041","zł57","Diavola","var(--av3-warn)")}</div></div>
        <div class="av3-kcol"><div class="av3-kcol-head"><span class="av3-kcol-title">In prep</span><span class="av3-kcol-count">1</span></div>
          <div class="av3-kcol-body">${card("#1039","zł45","Quattro Formaggi","var(--av3-ok)")}</div></div>
      </div>
    </div>

    <div class="grp"><h2>Empty state</h2>
      <div class="av3-card"><div class="av3-empty">${big}<div class="av3-empty-title">No orders yet</div><div class="av3-empty-text">New orders stream in here the moment they're placed.</div></div></div>
    </div>

    <div class="grp"><h2>Skeleton loaders</h2>
      <div class="av3-kpi-rail"><div class="av3-skeleton av3-skel-kpi"></div><div class="av3-skeleton av3-skel-kpi"></div><div class="av3-skeleton av3-skel-kpi"></div></div>
      <div class="av3-card" style="padding:12px"><div class="av3-skel-rows">${Array.from({length:5},()=>'<div class="av3-skeleton av3-skel-row"></div>').join("")}</div></div>
    </div>`;
  document.querySelectorAll(".av3-root").forEach(el=>el.innerHTML=panel);
</script>
</body>
</html>
