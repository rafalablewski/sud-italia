<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sud Italia — Core unified shell (mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
/* ---- Core suite tokens (1:1 from src/app/themes/core/suite.css) ---- */
:root{
  --bg:#0c0b0e; --surface-1:#17161c; --surface-2:#1d1b23; --surface-3:#262430;
  --surface-hover:#2f2c39; --border:rgba(255,255,255,.10); --border-strong:rgba(255,255,255,.16);
  --fg:#f5f3ee; --fg-muted:#c0b9b0; --fg-subtle:#978e85;
  --brand:#a62d49; --brand-bright:#c2415f; --brand-soft:rgba(166,45,73,.14);
  --platinum:#cbb48a; --platinum-soft:rgba(203,180,138,.14);
  --info:#6e92c0; --info-soft:rgba(110,146,192,.16); --success:#2fa875; --success-soft:rgba(47,168,117,.16);
  --warning:#d9a441; --warning-soft:rgba(217,164,65,.16); --danger:#e2504b; --danger-soft:rgba(226,80,75,.16);
  --r-sm:6px; --r-md:8px; --r-lg:12px; --r-pill:999px;
  --sh-xs:0 1px 2px rgba(0,0,0,.32); --sh-sm:0 1px 3px rgba(0,0,0,.38),0 1px 2px rgba(0,0,0,.22);
  --ui:"Inter",ui-sans-serif,system-ui,sans-serif;
  --display:"Fraunces",Georgia,serif;
  --mono:"JetBrains Mono",ui-monospace,monospace;
  --fast:120ms; --ease:cubic-bezier(.32,.72,0,1);
  /* KDS dark wall tokens */
  --canvas:#0a0a0c; --panel:#141318; --raised:#1f1d25;
  --hair:rgba(255,255,255,.09); --hair-2:rgba(255,255,255,.16);
  --t:#f4f2ee; --dim:#b6afa6; --faint:#8d847b; --queued:#6a655f; --firing:#4d90e8; --ready:#3dd68c;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--fg);font-family:var(--ui);font-size:14px;-webkit-font-smoothing:antialiased}
::selection{background:var(--brand-soft)}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-subtle)}
.muted{color:var(--fg-muted)} .subtle{color:var(--fg-subtle)} .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.disp{font-family:var(--display)}

/* ============ SHELL — unified header, no sidebar ============ */
.core-shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.brand{display:flex;align-items:center;gap:11px;text-decoration:none;color:inherit;flex:none}
.brand-mark{width:30px;height:30px;border-radius:9px;background:var(--brand);box-shadow:var(--sh-sm),inset 0 0 0 1px var(--platinum-soft);display:grid;place-items:center;color:#fff;font-weight:700;font-size:11px;letter-spacing:.04em}
.brand-name{font-family:var(--display);font-weight:600;font-size:16px;line-height:1}
.brand-sub{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-subtle);margin-top:3px}
.core-head{height:56px;flex:none;display:flex;align-items:center;gap:18px;padding:0 18px;border-bottom:1px solid var(--border);background:color-mix(in oklab,var(--bg) 86%,transparent);backdrop-filter:saturate(140%) blur(10px)}
.core-head-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.core-nav{display:flex;align-items:center;gap:4px}
.core-nav a{display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 13px;border-radius:var(--r-md);color:var(--fg-muted);font:500 13px var(--ui);text-decoration:none;cursor:pointer;transition:background var(--fast) var(--ease),color var(--fast)}
.core-nav a:hover{background:var(--surface-hover);color:var(--fg)}
.core-nav a.on{background:var(--surface-3);color:var(--fg);box-shadow:var(--sh-xs)}
.core-nav a svg{opacity:.85;flex:none}
.subbar{min-height:46px;flex:none;display:flex;align-items:center;gap:14px;padding:7px 18px;border-bottom:1px solid var(--border);background:var(--surface-1)}
.subbar-left{display:flex;align-items:center;gap:14px;min-width:0}
.subbar-left .eyebrow{flex:none}
.subbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.viewnav{display:flex;gap:4px;flex-wrap:wrap}
.viewnav button{display:inline-flex;align-items:center;gap:7px;height:30px;padding:0 11px;border:0;background:transparent;color:var(--fg-muted);font:500 12.5px var(--ui);border-radius:var(--r-md);cursor:pointer}
.viewnav button:hover{background:var(--surface-hover);color:var(--fg)}
.viewnav button.on{background:var(--surface-3);color:var(--fg)}
.viewnav .n{font:600 11px var(--mono);color:var(--fg-subtle)}
.core-body{flex:1;min-height:0;min-width:0;display:flex;flex-direction:column;overflow:auto;padding:18px 22px}

/* ---- shared primitives ---- */
.seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:3px;gap:2px}
.seg button{height:28px;padding:0 13px;border:0;background:transparent;color:var(--fg-muted);font:500 12.5px var(--ui);border-radius:6px;cursor:pointer}
.seg button.on{background:var(--surface-3);color:var(--fg);box-shadow:var(--sh-xs)}
.seg .n{font:600 11px var(--mono);color:var(--fg-subtle);margin-left:5px}
.btn{display:inline-flex;align-items:center;gap:8px;height:34px;padding:0 14px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--surface-2);color:var(--fg);font:600 12.5px var(--ui);cursor:pointer}
.btn:hover{border-color:var(--border-strong)} .btn.icon{width:34px;padding:0;justify-content:center;color:var(--fg-muted)}
.btn.primary{background:var(--brand);border-color:transparent;color:#fff} .btn.ghost{background:transparent}
.badge{display:inline-flex;align-items:center;gap:6px;height:26px;padding:0 11px;border-radius:var(--r-pill);font:600 11px var(--ui)}
.badge .d{width:6px;height:6px;border-radius:99px;background:currentColor}
.badge.platinum{background:var(--platinum-soft);color:var(--platinum)} .badge.warning{background:var(--warning-soft);color:var(--warning)}
.badge.success{background:var(--success-soft);color:var(--success)} .badge.info{background:var(--info-soft);color:var(--info)}
.card{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--r-lg)}
.core-clock{font:600 16px var(--mono);padding:5px 12px;border-radius:var(--r-md);background:var(--surface-2);border:1px solid var(--border);color:var(--fg);letter-spacing:.02em}
.datein{display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 12px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--surface-2);color:var(--fg-muted);font:500 12.5px var(--mono)}
svg{width:15px;height:15px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpis.k5{grid-template-columns:repeat(5,1fr)} .kpis.k7{grid-template-columns:repeat(7,1fr)}
.bk{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px}
.bk .l{font-size:11px;color:var(--fg-subtle)} .bk .v{font-family:var(--display);font-size:25px;font-weight:600;margin:4px 0} .bk .s{font-size:11px;color:var(--fg-subtle)}
.bk .v.warn{color:var(--warning)} .bk .v.late{color:var(--danger)} .bk .v.good{color:var(--success)}
.note{margin:0 0 4px;padding:10px 14px;border-radius:var(--r-md);background:var(--platinum-soft);border:1px solid var(--platinum-soft);color:var(--platinum);font-size:12.5px}

/* ---- surface panes ---- */
.pane{display:none;flex-direction:column;gap:16px;min-height:0}
.pane.on{display:flex}

/* POS · Order */
.pos-rail{display:flex;align-items:center;justify-content:space-between}
.pos-tabs{display:flex;gap:10px;flex-wrap:wrap}
.pos-tab{width:150px;text-align:left;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-lg);padding:11px 13px;cursor:pointer}
.pos-tab.on{border-color:var(--platinum-soft);box-shadow:inset 0 0 0 1px var(--platinum-soft)}
.pos-tab .r1{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pos-tab .nm{font-weight:600} .pos-tab .st{font:600 10px var(--ui);letter-spacing:.06em;text-transform:uppercase;color:var(--success)}
.pos-tab .r2{display:flex;justify-content:space-between;color:var(--fg-subtle);font-size:12px} .pos-tab .tot{color:var(--fg);font-weight:600}
.pos-tab.add{display:grid;place-items:center;color:var(--fg-subtle);font-size:22px;width:64px}
.pos-grid{display:grid;grid-template-columns:86px 1fr 340px;gap:14px;flex:1;min-height:0}
.catrail{display:flex;flex-direction:column;gap:8px}
.cat{padding:10px 6px;border-radius:var(--r-md);background:var(--surface-1);border:1px solid var(--border);text-align:center;font-size:11px;cursor:pointer}
.cat.on{background:var(--surface-3);color:var(--fg)} .cat .t{font-size:9px;color:var(--fg-subtle);margin-top:3px}
.menu{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;align-content:start}
.prod{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--r-lg);padding:13px}
.prod h4{font-family:var(--display);font-weight:600;font-size:15px;margin-bottom:4px}
.prod p{font-size:12px;color:var(--fg-subtle);line-height:1.4;min-height:32px}
.prod .pr{display:flex;justify-content:space-between;align-items:center;margin-top:9px} .prod .pr b{font-family:var(--mono)}
.prod .add{width:26px;height:26px;border-radius:7px;background:var(--brand);color:#fff;border:0;font-size:16px;cursor:pointer}
.ticket{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--r-lg);display:flex;flex-direction:column;overflow:hidden}
.ticket .h{padding:13px;border-bottom:1px solid var(--border);font-weight:600}
.ticket .empty{flex:1;display:grid;place-items:center;color:var(--fg-subtle);text-align:center;padding:24px;font-size:13px}

/* POS · Tender */
.tender{display:grid;grid-template-columns:1fr 380px;gap:16px;flex:1;min-height:0}
.trow{display:flex;justify-content:space-between;font-size:13.5px;padding:3px 0}
.trow.sub{color:var(--fg-subtle);font-size:12.5px}
.totbig{display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid var(--border);margin-top:10px;padding-top:14px;font-family:var(--display);font-size:24px;font-weight:600}
.paymethods{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.pm{height:42px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--surface-2);color:var(--fg-muted);font-weight:600;cursor:pointer}
.pm.on{border-color:var(--platinum);color:var(--platinum);background:var(--platinum-soft)}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;flex:1}
.keypad button{border-radius:var(--r-md);border:1px solid var(--border);background:var(--surface-2);color:var(--fg);font:600 18px var(--mono);cursor:pointer;min-height:44px}

/* KDS dark wall */
.kdsbody{background:var(--canvas);border:1px solid var(--hair);border-radius:var(--r-lg);padding:16px;display:flex;flex-direction:column;gap:14px;color:var(--t)}
.bench{background:#121116;border:1px solid var(--hair);border-radius:var(--r-lg);padding:14px}
.bench .hd{display:flex;justify-content:space-between;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:12px}
.benchrow{display:grid;grid-template-columns:160px 1fr 44px;align-items:center;gap:12px;margin:8px 0;font-size:12px}
.btrack{height:8px;border-radius:99px;background:var(--raised);overflow:hidden} .bfill{height:100%;background:var(--ready);border-radius:99px}
.trucks{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.truck{background:#121116;border:1px solid var(--hair);border-radius:var(--r-lg);padding:16px}
.truck .th{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.ring{width:46px;height:46px;border-radius:99px;border:3px solid var(--ready);display:grid;place-items:center;font:600 14px var(--mono);color:var(--ready)}
.truck .nm{font-family:var(--display);font-size:18px;font-weight:600} .truck .sub{font-size:11px;color:var(--faint)} .truck .sub b{color:var(--ready)}
.tstats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;border-top:1px solid var(--hair);padding-top:12px}
.tstats .c .l{font-size:10px;color:var(--faint)} .tstats .c .v{font-size:18px;font-weight:600}
.drill{margin-left:auto;display:flex;gap:8px}
/* KDS floor board */
.kcols{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.kcolhead{font:600 12px var(--ui);letter-spacing:.08em;text-transform:uppercase;color:var(--faint);display:flex;justify-content:space-between;margin-bottom:10px}
.tk{background:#161519;border:1px solid var(--hair);border-radius:var(--r-md);padding:12px 13px;margin-bottom:11px}
.tk.late{border-color:rgba(229,72,77,.5)} .tk.firing{border-left:3px solid var(--firing)} .tk.ready{border-left:3px solid var(--ready)}
.tk .tkh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.tk .id{font-weight:600} .tk .chip{font:600 9px var(--ui);letter-spacing:.06em;text-transform:uppercase;color:var(--dim);background:var(--raised);border-radius:5px;padding:2px 6px}
.tk .due{font:600 13px var(--mono)} .tk .due.warn{color:var(--warning)} .tk .due.late{color:var(--danger)} .tk .due.ready{color:var(--ready)}
.tk .it{font-size:13px;color:var(--t);margin:3px 0} .tk .it .q{color:var(--faint);margin-right:6px}
.tk .act{margin-top:9px;width:100%;height:34px;border:1px solid var(--hair-2);border-radius:7px;background:var(--raised);color:var(--t);font-weight:600;cursor:pointer}
/* KDS chef */
.stationrail{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.schip{height:30px;padding:0 13px;border-radius:99px;border:1px solid var(--hair);background:var(--raised);color:var(--dim);font:600 12px var(--ui);display:inline-flex;align-items:center;gap:7px;cursor:pointer}
.schip.on{color:var(--t);border-color:var(--hair-2)} .schip .n{font:600 11px var(--mono);color:var(--faint)}
.qdepth{margin-left:auto;color:var(--faint);font-size:12px}
.chefqueue{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.ct{background:#161519;border:1px solid var(--hair);border-radius:var(--r-md);padding:16px}
.ct .cth{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ct .nm{font-family:var(--display);font-size:21px;font-weight:600} .ct .q{font:600 22px var(--mono);color:var(--t)}
.ct .meta{font-size:11px;color:var(--faint);margin-bottom:12px}
.ct .bump{width:100%;height:46px;border:0;border-radius:8px;background:var(--ready);color:#06231a;font:700 15px var(--ui);cursor:pointer}

/* Guest · Inbox */
.inbox2{display:grid;grid-template-columns:300px 1fr;gap:14px;flex:1;min-height:0}
.convs{display:flex;flex-direction:column;gap:8px}
.conv{display:flex;gap:11px;padding:11px;border:1px solid var(--border);border-radius:var(--r-lg);background:var(--surface-1);cursor:pointer}
.conv.on{border-color:var(--platinum-soft);box-shadow:inset 0 0 0 1px var(--platinum-soft)}
.av{width:38px;height:38px;border-radius:99px;background:var(--surface-3);display:grid;place-items:center;font:600 13px var(--ui);color:var(--platinum);flex:none}
.conv .nm{font-weight:600} .conv .pv{font-size:12px;color:var(--fg-subtle);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.thread{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:var(--r-lg);background:var(--surface-1);overflow:hidden}
.thread .th{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.bubs{flex:1;padding:16px;display:flex;flex-direction:column;gap:10px;overflow:auto}
.bub{max-width:64%;padding:9px 13px;border-radius:14px;font-size:13.5px;line-height:1.4}
.bub.in{align-self:flex-start;background:var(--surface-3)} .bub.out{align-self:flex-end;background:var(--brand-soft);border:1px solid var(--brand-soft)}
.bub.bot{align-self:flex-end;background:var(--platinum-soft);color:var(--platinum)}

/* Guest · Guests / Loyalty tables */
.filters{display:flex;gap:8px;flex-wrap:wrap}
.fchip{height:28px;padding:0 11px;border-radius:99px;border:1px solid var(--border);background:var(--surface-1);color:var(--fg-muted);font:500 12px var(--ui);display:inline-flex;align-items:center;gap:6px;cursor:pointer}
.fchip.on{background:var(--brand-soft);border-color:var(--brand);color:var(--fg)} .fchip .n{font:600 11px var(--mono);color:var(--fg-subtle)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th,.tbl td{text-align:left;padding:10px 10px;border-bottom:1px solid var(--border)}
.tbl th{font-size:11px;color:var(--fg-subtle);font-weight:600;letter-spacing:.04em}
.tbl td.num{font-family:var(--mono);text-align:right} .tbl th.num{text-align:right}
.guestwrap{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;align-items:start}
.wallets{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.wallet{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px}
.wallet .w1{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.wallet .pts{font-family:var(--display);font-size:22px;font-weight:600;color:var(--platinum)}

/* Guest · Concierge */
.cap{display:flex;align-items:center;gap:12px;background:var(--surface-1);border:1px solid var(--border);border-radius:var(--r-lg);padding:13px 15px;margin-bottom:10px}
.cap .ic{width:34px;height:34px;border-radius:var(--r-md);background:var(--surface-3);color:var(--platinum);display:grid;place-items:center}
.cap .tx{flex:1} .cap .tx b{font-weight:600} .cap .tx .tag{font:600 9px var(--ui);letter-spacing:.06em;text-transform:uppercase;color:var(--info);margin-left:8px}
.cap .tx p{font-size:12px;color:var(--fg-subtle);margin-top:2px}
.sw{width:40px;height:23px;border-radius:99px;background:var(--brand);position:relative;flex:none}
.sw::after{content:"";position:absolute;top:3px;right:3px;width:17px;height:17px;border-radius:99px;background:#fff}
.matrix{width:100%;border-collapse:collapse;font-size:13px}
.matrix th,.matrix td{text-align:left;padding:9px 6px;border-bottom:1px solid var(--border)} .matrix th{font-size:11px;color:var(--fg-subtle);font-weight:600}
.matrix td.diet{color:var(--fg-subtle)}

/* Guest · Book + Service */
.bookgrid{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;align-items:start}
.block{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:14px}
.block .bh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.pk{height:34px;padding:0 14px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--surface-2);color:var(--fg-muted);font:500 12.5px var(--ui);cursor:pointer}
.pk.on{border-color:var(--platinum);color:var(--platinum);background:var(--platinum-soft)} .pk.off{opacity:.4}
.field{display:flex;flex-direction:column;gap:5px} .field label{font-size:11px;color:var(--fg-subtle)}
.field input{height:36px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--surface-2);color:var(--fg);padding:0 11px;font:500 13px var(--ui)}
.formrow{display:grid;grid-template-columns:90px 1fr 1fr;gap:12px}
.tables{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.tcard{aspect-ratio:1;border-radius:var(--r-lg);border:1px solid var(--border);background:var(--surface-1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.tcard.seated{border-color:var(--brand);background:var(--brand-soft)} .tcard.freeing{border-color:var(--warning);background:var(--warning-soft)}
.tcard .tn{font-family:var(--display);font-size:20px;font-weight:600} .tcard .ts{font-size:10px;color:var(--fg-subtle);text-transform:uppercase;letter-spacing:.06em}
.slotlist{display:flex;flex-direction:column;gap:10px}
.slot{display:grid;grid-template-columns:90px 1fr 120px 90px;align-items:center;gap:14px;background:var(--surface-1);border:1px solid var(--border);border-radius:var(--r-lg);padding:13px 16px}
.slot .tm{font:600 15px var(--mono)} .slot .cap{font-size:12px;color:var(--fg-subtle)}
.captrack{height:7px;border-radius:99px;background:var(--surface-3);overflow:hidden;margin-top:5px} .capfill{height:100%;background:var(--info);border-radius:99px}
</style>
</head>
<body>

/* ---------- render ---------- */
const navEl=document.getElementById("corenav"), eyebrowEl=document.getElementById("eyebrow"),
  viewnavEl=document.getElementById("viewnav"), subrightEl=document.getElementById("subright"),
  headrightEl=document.getElementById("headright"), bodyEl=document.getElementById("body");
let clockTimer;

function render(surface, view){
  navEl.querySelectorAll("a").forEach(a=>a.classList.toggle("on",a.dataset.s===surface));
  // viewnav
  viewnavEl.innerHTML = NAV[surface].views.map(v=>`<button data-v="${v.id}" class="${v.id===view?"on":""}">${v.label}${v.n?` <span class="n">${v.n}</span>`:""}</button>`).join("");
  viewnavEl.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>render(surface,b.dataset.v)));
  // header bits
  const h=HDR[surface];
  eyebrowEl.textContent=h.eyebrow(view);
  subrightEl.innerHTML=h.sub(view);
  headrightEl.innerHTML=h.right(view);
  // body
  bodyEl.innerHTML=`<section class="pane on">${BODY[surface+"."+view]||"<p class='subtle'>—</p>"}</section>`;
  // light interactivity: seg + chip + pill + cat + tabs toggle within their group
  bodyEl.querySelectorAll(".seg button, .schip, .fchip, .pk, .cat, .pos-tab:not(.add), .pm, .stationrail .schip").forEach(el=>{});
  document.querySelectorAll(".seg button").forEach(b=>b.addEventListener("click",e=>toggleGroup(e.currentTarget)));
  bodyEl.querySelectorAll(".cat,.pos-tab:not(.add),.pm,.fchip,.schip,.pk").forEach(b=>b.addEventListener("click",e=>toggleSiblings(e.currentTarget)));
  if(surface==="kds") startClock();
}
function toggleGroup(btn){ const g=btn.parentElement; g.querySelectorAll("button").forEach(x=>x.classList.remove("on")); btn.classList.add("on"); }
function toggleSiblings(btn){ const g=btn.parentElement; g.querySelectorAll(btn.className.split(" ")[0]?"."+btn.classList[0]:"*"); [...g.children].forEach(x=>x.classList&&x.classList.remove("on")); btn.classList.add("on"); }
navEl.querySelectorAll("a").forEach(a=>a.addEventListener("click",e=>{e.preventDefault(); render(a.dataset.s, NAV[a.dataset.s].views[0].id);}));

function startClock(){ clearInterval(clockTimer);
  const tick=()=>{const el=document.getElementById("clock"); if(!el)return; const d=new Date(); el.textContent=[d.getHours(),d.getMinutes(),d.getSeconds()].map(n=>String(n).padStart(2,"0")).join(":");};
  tick(); clockTimer=setInterval(tick,1000);
}
render("pos","order");
