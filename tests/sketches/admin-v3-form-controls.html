<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin v3 — form-control styling preview</title>
<!--
  Standalone preview of the v3 admin form controls after the styling pass:
  buttons, selects (now with a painted chevron), native checkboxes (now
  fully restyled — brand fill + white check), radios, inputs, switches and
  chips — rendered in BOTH the dark and light admin themes side by side.

  Tokens + control rules below are copied verbatim from
  src/app/themes/admin-v3/index.css so this file tracks the real theme.
  Draft/verification artifact — not shipped. See /tests/README.md.
-->
<style>
  /* ---- tokens (mirror of .av3-root + light override) ---- */
  .av3-root {
    --av3-bg:#0a0a0c; --av3-s1:#141417; --av3-s2:#1b1b1f; --av3-s3:#24242a; --av3-hover:#2c2c33;
    --av3-line:rgba(255,255,255,.07); --av3-line-strong:rgba(255,255,255,.13);
    --av3-fg:#f4f3f1; --av3-muted:#a6a099; --av3-subtle:#6e6862;
    --av3-brand:#c2384f; --av3-brand-soft:color-mix(in oklab,var(--av3-brand) 18%,var(--av3-s1));
    --av3-ok:#34b27b; --av3-ok-soft:color-mix(in oklab,var(--av3-ok) 16%,var(--av3-s1));
    --av3-bad:#e8554f; --av3-bad-soft:color-mix(in oklab,var(--av3-bad) 16%,var(--av3-s1));
    --av3-r-sm:5px; --av3-r-md:8px; --av3-r-pill:999px;
    --av3-ease:cubic-bezier(.4,0,.2,1); --av3-t-fast:110ms; --av3-t-base:170ms;
    --av3-mono:"JetBrains Mono",ui-monospace,monospace;
    background:var(--av3-bg); color:var(--av3-fg);
    font-family:Inter,system-ui,sans-serif; padding:24px; border-radius:12px;
  }
  [data-admin-theme="light"] .av3-root {
    --av3-bg:#f7f5f1; --av3-s1:#fff; --av3-s2:#f6f3ee; --av3-s3:#efebe3; --av3-hover:#e9e4da;
    --av3-line:rgba(28,24,21,.09); --av3-line-strong:rgba(28,24,21,.16);
    --av3-fg:#1a1714; --av3-muted:#57504a; --av3-subtle:#857c73; --av3-brand:#a82940;
    --av3-ok:#1f8a60; --av3-bad:#cc3a35;
  }

  /* ---- buttons ---- */
  .av3-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:30px;padding:0 12px;
    border:1px solid var(--av3-line-strong);border-radius:var(--av3-r-sm);background:var(--av3-s2);color:var(--av3-fg);
    font:inherit;font-size:12.5px;font-weight:500;cursor:pointer;white-space:nowrap;
    transition:background var(--av3-t-fast) var(--av3-ease),border-color var(--av3-t-fast) var(--av3-ease),transform var(--av3-t-fast) var(--av3-ease);}
  .av3-btn:hover{background:var(--av3-s3);}
  .av3-btn:active{transform:translateY(.5px);}
  .av3-btn:focus-visible{outline:2px solid var(--av3-brand);outline-offset:2px;}
  .av3-btn:disabled{opacity:.5;cursor:not-allowed;}
  .av3-btn-primary{background:var(--av3-brand);border-color:transparent;color:#fff;}
  .av3-btn-primary:hover{background:color-mix(in oklab,var(--av3-brand) 88%,#fff);}
  .av3-btn-ghost{background:transparent;border-color:transparent;color:var(--av3-muted);}
  .av3-btn-ghost:hover{background:var(--av3-s2);color:var(--av3-fg);}
  .av3-btn-danger{background:transparent;border-color:var(--av3-line-strong);color:var(--av3-bad);}
  .av3-btn-danger:hover{background:var(--av3-bad-soft);}

  /* ---- inputs + selects ---- */
  .av3-input,.av3-select{height:32px;padding:0 10px;border:1px solid var(--av3-line-strong);border-radius:var(--av3-r-sm);
    background:var(--av3-s1);color:var(--av3-fg);font:inherit;font-size:13px;
    transition:border-color var(--av3-t-fast) var(--av3-ease),box-shadow var(--av3-t-fast) var(--av3-ease);}
  .av3-input{font-family:var(--av3-mono);font-variant-numeric:tabular-nums;}
  .av3-input::placeholder{color:var(--av3-subtle);}
  .av3-input:hover:not(:disabled),.av3-select:hover:not(:disabled){border-color:var(--av3-muted);}
  .av3-input:focus,.av3-select:focus{outline:none;border-color:var(--av3-brand);box-shadow:0 0 0 3px var(--av3-brand-soft);}
  .av3-input:disabled,.av3-select:disabled{opacity:.55;cursor:not-allowed;}
  .av3-select{appearance:none;cursor:pointer;padding-right:30px;
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2012%2012'%20fill='none'%20stroke='%23a6a099'%20stroke-width='1.6'%20stroke-linecap='round'%20stroke-linejoin='round'%3E%3Cpath%20d='M2.5%204.5%206%208%209.5%204.5'/%3E%3C/svg%3E");
    background-repeat:no-repeat;background-position:right 10px center;background-size:12px;}
  [data-admin-theme="light"] .av3-select{
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2012%2012'%20fill='none'%20stroke='%2357504a'%20stroke-width='1.6'%20stroke-linecap='round'%20stroke-linejoin='round'%3E%3Cpath%20d='M2.5%204.5%206%208%209.5%204.5'/%3E%3C/svg%3E");}

  /* ---- checkbox + radio ---- */
  .av3-root input[type="checkbox"]{appearance:none;-webkit-appearance:none;flex-shrink:0;width:16px;height:16px;margin:0;
    border:1px solid var(--av3-line-strong);border-radius:var(--av3-r-sm);background:var(--av3-s1);cursor:pointer;
    transition:background var(--av3-t-fast) var(--av3-ease),border-color var(--av3-t-fast) var(--av3-ease),box-shadow var(--av3-t-fast) var(--av3-ease);}
  .av3-root input[type="checkbox"]:hover:not(:disabled){border-color:var(--av3-muted);}
  .av3-root input[type="checkbox"]:checked{background-color:var(--av3-brand);border-color:var(--av3-brand);
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2012%2012'%20fill='none'%20stroke='%23ffffff'%20stroke-width='2'%20stroke-linecap='round'%20stroke-linejoin='round'%3E%3Cpath%20d='M2.5%206.5%205%209%209.5%203.5'/%3E%3C/svg%3E");
    background-repeat:no-repeat;background-position:center;background-size:11px;}
  .av3-root input[type="checkbox"]:focus-visible{outline:2px solid var(--av3-brand);outline-offset:2px;}
  .av3-root input[type="checkbox"]:disabled{opacity:.5;cursor:not-allowed;}
  .av3-root input[type="radio"]{accent-color:var(--av3-brand);cursor:pointer;}

  /* ---- switch ---- */
  .av3-switch{display:inline-flex;align-items:center;gap:8px;padding:0;border:none;background:none;color:var(--av3-muted);font:inherit;font-size:12px;font-weight:500;cursor:pointer;}
  .av3-switch-track{position:relative;flex-shrink:0;width:38px;height:22px;border-radius:var(--av3-r-pill);background:var(--av3-s3);border:1px solid var(--av3-line-strong);transition:background var(--av3-t-fast) var(--av3-ease),border-color var(--av3-t-fast) var(--av3-ease);}
  .av3-switch-thumb{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--av3-subtle);transition:transform var(--av3-t-base) var(--av3-ease),background var(--av3-t-fast) var(--av3-ease);}
  .av3-switch[aria-checked="true"]{color:var(--av3-fg);}
  .av3-switch[aria-checked="true"] .av3-switch-track{background:var(--av3-ok-soft);border-color:color-mix(in oklab,var(--av3-ok) 45%,transparent);}
  .av3-switch[aria-checked="true"] .av3-switch-thumb{transform:translateX(16px);background:var(--av3-ok);}
  .av3-switch:focus-visible{outline:2px solid var(--av3-brand);outline-offset:2px;border-radius:var(--av3-r-sm);}

  /* ---- chip row ---- */
  .av3-chiprow{display:inline-flex;gap:2px;padding:2px;background:var(--av3-s2);border:1px solid var(--av3-line);border-radius:var(--av3-r-md);}
  .av3-chip{height:24px;padding:0 11px;border:none;background:transparent;border-radius:var(--av3-r-sm);color:var(--av3-muted);font:inherit;font-size:12px;font-weight:500;cursor:pointer;}
  .av3-chip:hover{color:var(--av3-fg);}
  .av3-chip.is-active{background:var(--av3-s3);color:var(--av3-fg);box-shadow:inset 0 0 0 1px var(--av3-line-strong);}

  /* ---- page chrome (not part of the theme) ---- */
  body{margin:0;background:#3a3a40;padding:28px;font-family:Inter,system-ui,sans-serif;}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:1100px;margin:0 auto;}
  h1{color:#fff;font-size:15px;font-weight:600;max-width:1100px;margin:0 auto 16px;}
  h2{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--av3-subtle);margin:0 0 10px;}
  .grp{margin-bottom:20px;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .lbl{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;cursor:pointer;}
  .field{display:flex;flex-direction:column;gap:4px;}
  .field>span{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--av3-subtle);}
</style>
</head>
<body>
<h1>Admin v3 — form controls (dark ⟷ light)</h1>
<div class="cols">
  <div data-admin-theme="dark"><div class="av3-root"></div></div>
  <div data-admin-theme="light"><div class="av3-root"></div></div>
</div>

<script>
  const panel = `
    <div class="grp"><h2>Buttons</h2><div class="row">
      <button class="av3-btn av3-btn-primary">Primary</button>
      <button class="av3-btn">Secondary</button>
      <button class="av3-btn av3-btn-ghost">Ghost</button>
      <button class="av3-btn av3-btn-danger">Danger</button>
      <button class="av3-btn" disabled>Disabled</button>
    </div></div>

    <div class="grp"><h2>Select (painted chevron) + input</h2><div class="row">
      <label class="field"><span>Location</span>
        <select class="av3-select"><option>Kraków</option><option>Warszawa</option></select></label>
      <label class="field"><span>Price (zł)</span>
        <input class="av3-input" type="number" value="42.00" /></label>
      <label class="field"><span>Notes</span>
        <input class="av3-input" placeholder="Optional…" /></label>
    </div></div>

    <div class="grp"><h2>Checkboxes (restyled) + radios</h2><div class="row">
      <label class="lbl"><input type="checkbox" checked> Anchor</label>
      <label class="lbl"><input type="checkbox"> Decoy</label>
      <label class="lbl"><input type="checkbox" checked> Active</label>
      <label class="lbl"><input type="checkbox" disabled> Disabled</label>
      <span style="width:14px"></span>
      <label class="lbl"><input type="radio" name="r" checked> Dine-in</label>
      <label class="lbl"><input type="radio" name="r"> Delivery</label>
    </div></div>

    <div class="grp"><h2>Switches</h2><div class="row">
      <button class="av3-switch" role="switch" aria-checked="true"><span class="av3-switch-track"><span class="av3-switch-thumb"></span></span></button>
      <button class="av3-switch" role="switch" aria-checked="false"><span class="av3-switch-track"><span class="av3-switch-thumb"></span></span></button>
      <button class="av3-switch" role="switch" aria-checked="true"><span class="av3-switch-track"><span class="av3-switch-thumb"></span></span><span>Tax-deductible</span></button>
    </div></div>

    <div class="grp"><h2>Chip row</h2><div class="row">
      <div class="av3-chiprow">
        <button class="av3-chip is-active">Today</button>
        <button class="av3-chip">7d</button>
        <button class="av3-chip">30d</button>
      </div>
    </div></div>`;
  document.querySelectorAll(".av3-root").forEach((el) => (el.innerHTML = panel));
</script>
</body>
</html>
