<!doctype html><html lang="en" data-admin-theme="dark"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/><title>Agent HQ — Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>/* ==========================================================================
   Admin v3 — "Operator Terminal"
   A ground-up, density-first rebuild of the admin back-office. Fully isolated
   from v2: single `.av3-*` class prefix, tokens scoped to `.av3-root`, no
   legacy aliases. Deleting v2 (themes/admin/index.css + components/admin/v2)
   leaves this file untouched. See docs/design-system/admin/v3/README.md.
   ========================================================================== */

/* --------------------------------------------------------------------------
   1. Tokens — dark canonical, scoped to .av3-root. Light overrides below.
   v3 reads the same [data-admin-theme] attribute the boot script sets on
   <html>, but defines its own --av3-* token namespace so it can't drift v2.
   -------------------------------------------------------------------------- */
.av3-root {
  /* canvas */
  --av3-bg: #0a0a0c;
  --av3-s1: #141417;
  --av3-s2: #1b1b1f;
  --av3-s3: #24242a;
  --av3-hover: #2c2c33;
  /* hairlines */
  --av3-line: rgba(255, 255, 255, 0.07);
  --av3-line-strong: rgba(255, 255, 255, 0.13);
  /* text */
  --av3-fg: #f4f3f1;
  --av3-muted: #a6a099;
  /* subtle: lightened to clear WCAG AA (4.5:1) for small text on s1/s2/bg */
  --av3-subtle: #8a837b;
  /* brand + accent */
  --av3-brand: #c2384f;
  --av3-brand-soft: color-mix(in oklab, var(--av3-brand) 18%, var(--av3-s1));
  --av3-brand-line: color-mix(in oklab, var(--av3-brand) 42%, transparent);
  --av3-platinum: #cbb48a;
  /* status */
  --av3-ok: #34b27b;
  --av3-warn: #e0a93f;
  --av3-bad: #e8554f;
  --av3-info: #5f9bd6;
  --av3-ok-soft: color-mix(in oklab, var(--av3-ok) 16%, var(--av3-s1));
  --av3-warn-soft: color-mix(in oklab, var(--av3-warn) 16%, var(--av3-s1));
  --av3-bad-soft: color-mix(in oklab, var(--av3-bad) 16%, var(--av3-s1));
  --av3-info-soft: color-mix(in oklab, var(--av3-info) 16%, var(--av3-s1));
  /* chart palette (mirror of theme.ts) */
  --av3-c1: #c2384f; --av3-c2: #cbb48a; --av3-c3: #5f9bd6; --av3-c4: #34b27b;
  --av3-c5: #d3884f; --av3-c6: #9b7ec0; --av3-c7: #e08aa2; --av3-c8: #80ac6e;
  --av3-grid: rgba(255, 255, 255, 0.06);
  /* geometry */
  --av3-r-sm: 5px;
  --av3-r-md: 8px;
  --av3-r-lg: 11px;
  --av3-r-pill: 999px;
  --av3-gap-1: 4px;
  --av3-gap-2: 8px;
  --av3-gap-3: 12px;
  --av3-gap-4: 16px;
  --av3-gap-5: 24px;
  /* elevation — restrained, neutral */
  --av3-sh-1: 0 1px 2px rgba(0, 0, 0, 0.4);
  --av3-sh-2: 0 8px 28px -8px rgba(0, 0, 0, 0.55);
  /* motion */
  --av3-ease: cubic-bezier(0.4, 0, 0.2, 1);
  --av3-t-fast: 110ms;
  --av3-t-base: 170ms;
  --av3-t-slow: 260ms;
  /* fonts — resolved from the layout's next/font vars */
  --av3-ui: var(--font-admin-body), "Inter", system-ui, sans-serif;
  --av3-display: var(--font-admin-display), "Fraunces", Georgia, serif;
  --av3-mono: var(--font-admin-mono), "JetBrains Mono", ui-monospace, monospace;

  background: var(--av3-bg);
  color: var(--av3-fg);
  font-family: var(--av3-ui);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

[data-admin-theme="light"] .av3-root {
  --av3-bg: #f7f5f1;
  --av3-s1: #ffffff;
  --av3-s2: #f6f3ee;
  --av3-s3: #efebe3;
  --av3-hover: #e9e4da;
  --av3-line: rgba(28, 24, 21, 0.09);
  --av3-line-strong: rgba(28, 24, 21, 0.16);
  --av3-fg: #1a1714;
  --av3-muted: #57504a;
  /* subtle: darkened to clear WCAG AA (4.5:1) for small text on s1/s2/bg */
  --av3-subtle: #756d65;
  --av3-brand: #a82940;
  --av3-platinum: #9c7e4e;
  /* ok/warn darkened to clear WCAG AA (4.5:1) as small text on s1/s2 + their
     soft badge bg; chart greens stay on the brighter --av3-c* tokens. */
  --av3-ok: #15744d;
  --av3-warn: #8a590c;
  --av3-bad: #cc3a35;
  --av3-info: #3d6694;
  --av3-c1: #a82940; --av3-c2: #9c7e4e; --av3-c3: #3d6694; --av3-c4: #1f8a60;
  --av3-c5: #b56a3b; --av3-c6: #74599a; --av3-c7: #bc6a82; --av3-c8: #5e8049;
  --av3-grid: rgba(28, 24, 21, 0.08);
  --av3-sh-1: 0 1px 2px rgba(28, 24, 21, 0.06);
  --av3-sh-2: 0 10px 30px -10px rgba(28, 24, 21, 0.18);
}

.av3-root *,
.av3-root *::before,
.av3-root *::after { box-sizing: border-box; }

/* --------------------------------------------------------------------------
   2. Shell — 232px sidebar (→ 60px rail) | content. 44px topbar.
   -------------------------------------------------------------------------- */
.av3-shell {
  display: grid;
  grid-template-columns: var(--av3-side-w, 232px) 1fr;
  min-height: 100vh;
  transition: grid-template-columns var(--av3-t-base) var(--av3-ease);
}
.av3-shell[data-collapsed="true"] { --av3-side-w: 60px; }

/* Sidebar ---------------------------------------------------------------- */
.av3-side {
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--av3-s1);
  border-right: 1px solid var(--av3-line);
  overflow: hidden;
}
.av3-brand {
  display: flex;
  align-items: center;
  gap: var(--av3-gap-3);
  height: 44px;
  padding: 0 12px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--av3-line);
  text-decoration: none;
  color: inherit;
}
.av3-brand-mark {
  display: grid;
  place-items: center;
  width: 26px;
  height: 26px;
  flex-shrink: 0;
  border-radius: var(--av3-r-sm);
  background: var(--av3-brand);
  box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--av3-platinum) 50%, transparent);
  color: #fff;
  font-family: var(--av3-display);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.av3-brand-text { display: flex; flex-direction: column; line-height: 1.1; overflow: hidden; }
.av3-brand-name { font-family: var(--av3-display); font-size: 14px; font-weight: 600; white-space: nowrap; }
.av3-brand-sub {
  font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.13em;
  color: var(--av3-subtle); white-space: nowrap;
}
.av3-shell[data-collapsed="true"] .av3-brand-text { display: none; }

.av3-side-scroll {
  flex: 1;
  overflow-y: auto;
  padding: var(--av3-gap-3) var(--av3-gap-2);
  scrollbar-width: thin;
}
.av3-group { margin-bottom: var(--av3-gap-3); }
.av3-eyebrow {
  padding: 6px 8px 3px;
  font-size: 9.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.13em;
  color: var(--av3-subtle);
}
.av3-shell[data-collapsed="true"] .av3-eyebrow {
  text-align: center; padding: 6px 0 3px; overflow: hidden;
}
.av3-nav-item {
  position: relative;
  display: flex;
  align-items: center;
  gap: 10px;
  height: 30px;
  padding: 0 9px;
  border-radius: var(--av3-r-sm);
  color: var(--av3-muted);
  font-size: 12.5px;
  font-weight: 500;
  text-decoration: none;
  white-space: nowrap;
  transition: background var(--av3-t-fast) var(--av3-ease), color var(--av3-t-fast) var(--av3-ease);
}
.av3-nav-item:hover { background: var(--av3-s3); color: var(--av3-fg); }
.av3-nav-item.is-active {
  background: color-mix(in oklab, var(--av3-platinum) 9%, var(--av3-s3));
  color: var(--av3-fg);
  font-weight: 600;
}
.av3-nav-item.is-active .av3-nav-ico { color: var(--av3-platinum); }
.av3-nav-item.is-active::before {
  content: "";
  position: absolute;
  left: -8px;
  top: 6px;
  bottom: 6px;
  width: 2.5px;
  border-radius: 0 2px 2px 0;
  background: var(--av3-platinum);
}
.av3-nav-ico { width: 16px; height: 16px; flex-shrink: 0; transition: color var(--av3-t-fast) var(--av3-ease); }
.av3-shell[data-collapsed="true"] .av3-nav-item { justify-content: center; padding: 0; }
.av3-shell[data-collapsed="true"] .av3-nav-label { display: none; }

.av3-side-foot {
  flex-shrink: 0;
  padding: var(--av3-gap-2);
  border-top: 1px solid var(--av3-line);
}
.av3-collapse-btn,
.av3-logout {
  display: flex;
  align-items: center;
  gap: 9px;
  width: 100%;
  height: 28px;
  padding: 0 9px;
  border: none;
  background: transparent;
  border-radius: var(--av3-r-sm);
  color: var(--av3-muted);
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  transition: background var(--av3-t-fast) var(--av3-ease);
}
.av3-collapse-btn:hover,
.av3-logout:hover { background: var(--av3-s3); color: var(--av3-fg); }
.av3-shell[data-collapsed="true"] .av3-collapse-btn,
.av3-shell[data-collapsed="true"] .av3-logout { justify-content: center; padding: 0; }
.av3-shell[data-collapsed="true"] .av3-foot-label { display: none; }

/* Main + topbar ----------------------------------------------------------- */
.av3-main { display: flex; flex-direction: column; min-width: 0; }
.av3-topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  gap: var(--av3-gap-3);
  height: 44px;
  padding: 0 14px;
  background: color-mix(in oklab, var(--av3-bg) 78%, transparent);
  backdrop-filter: saturate(150%) blur(10px);
  border-bottom: 1px solid var(--av3-line);
}
.av3-crumbs { display: flex; align-items: center; min-width: 0; }
.av3-crumbs ol { display: flex; align-items: center; gap: 6px; list-style: none; margin: 0; padding: 0; }
.av3-crumbs li { display: flex; align-items: center; gap: 6px; font-size: 12.5px; }
.av3-crumbs a { color: var(--av3-muted); text-decoration: none; }
.av3-crumbs a:hover { color: var(--av3-fg); }
.av3-crumbs span[aria-current] { color: var(--av3-fg); font-weight: 600; }
.av3-crumb-sep { color: var(--av3-subtle); }
.av3-topbar-spacer { flex: 1; }
.av3-topbar-right { display: flex; align-items: center; gap: var(--av3-gap-2); }

.av3-icon-btn {
  display: grid;
  place-items: center;
  width: 30px;
  height: 30px;
  border: 1px solid transparent;
  border-radius: var(--av3-r-sm);
  background: transparent;
  color: var(--av3-muted);
  cursor: pointer;
  position: relative;
  transition: background var(--av3-t-fast) var(--av3-ease), color var(--av3-t-fast) var(--av3-ease);
}
.av3-icon-btn:hover { background: var(--av3-s2); color: var(--av3-fg); }
.av3-icon-btn:focus-visible { outline: 2px solid var(--av3-brand); outline-offset: 1px; }
.av3-bell-badge {
  position: absolute;
  top: 1px;
  right: 1px;
  min-width: 14px;
  height: 14px;
  padding: 0 3px;
  border-radius: var(--av3-r-pill);
  background: var(--av3-brand);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  line-height: 14px;
  text-align: center;
}

/* Scope switcher (native select, dense) */
.av3-scope {
  position: relative;
  display: inline-flex;
  align-items: center;
}
.av3-scope-ico { position: absolute; left: 8px; width: 13px; height: 13px; color: var(--av3-subtle); pointer-events: none; }
.av3-scope select {
  appearance: none;
  height: 30px;
  padding: 0 26px 0 27px;
  border: 1px solid var(--av3-line);
  border-radius: var(--av3-r-sm);
  background: var(--av3-s1);
  color: var(--av3-fg);
  font: inherit;
  font-size: 12.5px;
  cursor: pointer;
}
.av3-scope select:hover { border-color: var(--av3-line-strong); }
.av3-scope select:focus-visible { outline: 2px solid var(--av3-brand); outline-offset: 1px; }
.av3-scope-chev { position: absolute; right: 8px; width: 13px; height: 13px; color: var(--av3-subtle); pointer-events: none; }

.av3-content {
  flex: 1;
  padding: var(--av3-gap-4);
  display: flex;
  flex-direction: column;
  gap: var(--av3-gap-4);
}

/* --------------------------------------------------------------------------
   3. Page header (identity bar)
   -------------------------------------------------------------------------- */
.av3-pagehead { display: flex; align-items: flex-end; justify-content: space-between; gap: var(--av3-gap-4); }
.av3-pagehead h1 { margin: 0; font-family: var(--av3-display); font-size: 21px; font-weight: 600; letter-spacing: -0.01em; }
.av3-pagehead-sub { margin-top: 2px; font-size: 12.5px; color: var(--av3-muted); }
.av3-pagehead-actions { display: flex; align-items: center; gap: var(--av3-gap-2); }

/* --------------------------------------------------------------------------
   4. Primitives
   -------------------------------------------------------------------------- */
/* Card */
.av3-card {
  background: var(--av3-s1);
  border: 1px solid var(--av3-line);
  border-radius: var(--av3-r-lg);
  box-shadow: var(--av3-sh-1);
}
.av3-card-p { padding: var(--av3-gap-4); }
.av3-card-pc { padding: var(--av3-gap-3); }
.av3-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--av3-gap-3);
  padding: var(--av3-gap-3) var(--av3-gap-4);
  border-bottom: 1px solid var(--av3-line);
}
.av3-card-title { font-size: 13px; font-weight: 600; }
.av3-card-desc { font-size: 11.5px; color: var(--av3-muted); margin-top: 1px; }
.av3-card-body { padding: var(--av3-gap-4); }

/* Buttons — two primaries, three secondaries (per theme/extend doctrine) */
.av3-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  /* One control height across the admin theme: button === input === select
     (32px). The dense `.av3-btn-sm` variant (and a few context-scoped 28/30px
     inputs) stay deliberately smaller for toolbars/rows. */
  height: 32px;
  padding: 0 12px;
  border: 1px solid var(--av3-line-strong);
  border-radius: var(--av3-r-sm);
  background: var(--av3-s2);
  color: var(--av3-fg);
  font: inherit;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: background var(--av3-t-fast) var(--av3-ease), border-color var(--av3-t-fast) var(--av3-ease), transform var(--av3-t-fast) var(--av3-ease);
}
.av3-btn:hover { background: var(--av3-s3); }
.av3-btn:active { transform: translateY(0.5px); }
.av3-btn:focus-visible { outline: 2px solid var(--av3-brand); outline-offset: 2px; }
.av3-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.av3-btn-sm { height: 26px; padding: 0 9px; font-size: 12px; }
.av3-btn-primary {
  background: var(--av3-brand);
  border-color: transparent;
  color: #fff;
}
.av3-btn-primary:hover { background: color-mix(in oklab, var(--av3-brand) 88%, #fff); }
.av3-btn-ghost { background: transparent; border-color: transparent; color: var(--av3-muted); }
.av3-btn-ghost:hover { background: var(--av3-s2); color: var(--av3-fg); }
.av3-btn-danger { background: transparent; border-color: var(--av3-line-strong); color: var(--av3-bad); }
.av3-btn-danger:hover { background: var(--av3-bad-soft); }
.av3-btn-ico { width: 14px; height: 14px; }

/* Badge */
.av3-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  height: 19px;
  padding: 0 7px;
  border-radius: var(--av3-r-pill);
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.01em;
  border: 1px solid transparent;
}
.av3-badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.av3-badge-neutral { background: var(--av3-s3); color: var(--av3-muted); }
.av3-badge-ok { background: var(--av3-ok-soft); color: var(--av3-ok); }
.av3-badge-warn { background: var(--av3-warn-soft); color: var(--av3-warn); }
/* bad mixed toward fg so the text clears AA on the soft bg (raw --av3-bad
   passes on s1 but not on bad-soft); matches the brand badge's fg-mix. */
.av3-badge-bad { background: var(--av3-bad-soft); color: color-mix(in oklab, var(--av3-bad) 80%, var(--av3-fg)); }
.av3-badge-info { background: var(--av3-info-soft); color: var(--av3-info); }
.av3-badge-brand { background: var(--av3-brand-soft); color: color-mix(in oklab, var(--av3-brand) 70%, var(--av3-fg)); }

/* Chip / segmented pill */
.av3-chiprow { display: inline-flex; gap: 2px; padding: 2px; background: var(--av3-s2); border: 1px solid var(--av3-line); border-radius: var(--av3-r-md); }
.av3-chip {
  height: 24px;
  padding: 0 11px;
  border: none;
  background: transparent;
  border-radius: var(--av3-r-sm);
  color: var(--av3-muted);
  font: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background var(--av3-t-fast) var(--av3-ease), color var(--av3-t-fast) var(--av3-ease);
}
.av3-chip:hover { color: var(--av3-fg); }
.av3-chip:focus-visible { outline: 2px solid var(--av3-brand); outline-offset: 1px; }
.av3-chip.is-active { background: var(--av3-s3); color: var(--av3-fg); box-shadow: inset 0 0 0 1px var(--av3-line-strong); }
/* Outline variant — for free-standing multi-select choice chips (not inside an
   .av3-chiprow segmented track). The hairline + surface give each option a
   visible border so the choices read as distinct pills instead of bare text;
   the active state fills + rings in brand. */
.av3-chip-outline { background: var(--av3-s1); border: 1px solid var(--av3-line); }
.av3-chip-outline:hover { border-color: var(--av3-line-strong); color: var(--av3-fg); }
.av3-chip-outline.is-active { background: var(--av3-s3); color: var(--av3-fg); border-color: var(--av3-brand); box-shadow: inset 0 0 0 1px var(--av3-brand); }

/* --------------------------------------------------------------------------
   5. KPI tile — the dense metric primitive
   -------------------------------------------------------------------------- */
.av3-kpi-rail {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(176px, 1fr));
  gap: var(--av3-gap-3);
}
.av3-kpi {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: var(--av3-gap-3) var(--av3-gap-4);
  background: var(--av3-s1);
  border: 1px solid var(--av3-line);
  border-radius: var(--av3-r-lg);
  box-shadow: var(--av3-sh-1);
  overflow: hidden;
  transition: border-color var(--av3-t-fast) var(--av3-ease), box-shadow var(--av3-t-fast) var(--av3-ease);
}
/* Hairline accent rail down the leading edge — gives each tile its identity
   (colour from --av3-kpi-accent, set per-tile by the Kpi component). */
.av3-kpi::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 3px;
  background: var(--av3-kpi-accent, var(--av3-brand));
  opacity: 0.55;
}
.av3-kpi:hover {
  border-color: color-mix(in oklab, var(--av3-kpi-accent, var(--av3-line-strong)) 32%, var(--av3-line-strong));
  box-shadow: var(--av3-sh-2);
}
.av3-kpi-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--av3-subtle);
}
.av3-kpi-label svg { width: 13px; height: 13px; color: var(--av3-kpi-accent, var(--av3-subtle)); }
.av3-kpi-value {
  font-family: var(--av3-mono);
  font-size: 23px;
  font-weight: 500;
  letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums;
  line-height: 1.05;
}
.av3-kpi-foot { display: flex; align-items: center; justify-content: space-between; gap: var(--av3-gap-2); }
.av3-delta { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; font-variant-numeric: tabular-nums; }
.av3-delta svg { width: 12px; height: 12px; }
.av3-delta-up { color: var(--av3-ok); }
.av3-delta-down { color: var(--av3-bad); }
.av3-delta-flat { color: var(--av3-subtle); }
.av3-kpi-spark { margin-left: auto; }

/* Charts — interactive bits (tooltip + hover focus + axis labels) */
.av3-chart { position: relative; }
.av3-chart-tip {
  position: absolute; z-index: 2; pointer-events: none; transform: translate(-50%, calc(-100% - 9px));
  background: var(--av3-s1); border: 1px solid var(--av3-line-strong); border-radius: var(--av3-r-sm);
  box-shadow: var(--av3-sh-2); padding: 4px 8px; white-space: nowrap; text-align: center;
}
.av3-chart-tip-v { font-family: var(--av3-mono); font-weight: 600; font-size: 12px; color: var(--av3-fg); }
.av3-chart-tip-l { font-size: 10px; color: var(--av3-subtle); margin-top: 1px; }
.av3-axis-label { fill: var(--av3-subtle); font-family: var(--av3-mono); }
/* dim sibling bars/segments so the hovered one reads as focused */
.av3-bar { transition: opacity var(--av3-t-fast) var(--av3-ease); }
.av3-barchart:hover .av3-bar { opacity: 0.45; }
.av3-barchart .av3-bar:hover { opacity: 1; }
.av3-donut-seg { transition: opacity var(--av3-t-fast) var(--av3-ease); cursor: pointer; }
.av3-donut:hover .av3-donut-seg { opacity: 0.4; }
.av3-donut .av3-donut-seg:hover { opacity: 1; }

/* Sparkline */
.av3-spark { display: block; overflow: visible; }
.av3-spark-line { fill: none; stroke-width: 1.5; }
.av3-spark-fill { stroke: none; opacity: 0.12; }

/* --------------------------------------------------------------------------
   6. Table — compact, sticky header, right-aligned numerics, hairline rows
   -------------------------------------------------------------------------- */
.av3-table-wrap { width: 100%; overflow-x: auto; }
.av3-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.av3-table thead th {
  position: sticky;
  top: 0;
  z-index: 1;
  text-align: left;
  padding: 8px 12px;
  background: var(--av3-s2);
  color: var(--av3-subtle);
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  /* hairline + a faint drop so body rows read as "under" the header on scroll */
  border-bottom: 1px solid var(--av3-line-strong);
  box-shadow: 0 2px 6px -4px rgba(0, 0, 0, 0.5);
  white-space: nowrap;
}
.av3-table tbody td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--av3-line);
  color: var(--av3-fg);
  transition: background var(--av3-t-fast) var(--av3-ease);
}
.av3-table tbody tr:last-child td { border-bottom: none; }
.av3-table tbody tr:hover td { background: var(--av3-s2); }
.av3-table tbody tr:has(+ tr:hover) td { border-bottom-color: var(--av3-line-strong); }
.av3-num { text-align: right; font-family: var(--av3-mono); font-variant-numeric: tabular-nums; }
.av3-th-num { text-align: right; }
.av3-cell-muted { color: var(--av3-muted); }

/* --------------------------------------------------------------------------
   7. Callout / alert row + empty state
   -------------------------------------------------------------------------- */
.av3-callout {
  display: flex;
  align-items: flex-start;
  gap: var(--av3-gap-3);
  padding: var(--av3-gap-3) var(--av3-gap-4);
  border-radius: var(--av3-r-md);
  border: 1px solid var(--av3-line);
  background: var(--av3-s2);
}
.av3-callout-warn { border-color: color-mix(in oklab, var(--av3-warn) 35%, transparent); background: var(--av3-warn-soft); }
.av3-callout-bad { border-color: color-mix(in oklab, var(--av3-bad) 35%, transparent); background: var(--av3-bad-soft); }
.av3-callout-ico { flex-shrink: 0; width: 16px; height: 16px; margin-top: 1px; }
.av3-callout-title { font-size: 12.5px; font-weight: 600; }
.av3-callout-text { font-size: 12px; color: var(--av3-muted); margin-top: 1px; }

.av3-alert-list { display: flex; flex-direction: column; }
.av3-alert-row {
  display: flex; align-items: center; gap: var(--av3-gap-3);
  padding: 9px 0; border-bottom: 1px solid var(--av3-line);
}
.av3-alert-row:last-child { border-bottom: none; }
.av3-alert-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.av3-alert-body { flex: 1; min-width: 0; }
.av3-alert-title { font-size: 12.5px; font-weight: 500; }
.av3-alert-sub { font-size: 11px; color: var(--av3-muted); }
.av3-alert-time { font-size: 10.5px; color: var(--av3-subtle); font-variant-numeric: tabular-nums; white-space: nowrap; }

.av3-empty { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 32px 16px; text-align: center; color: var(--av3-muted); }
/* lift a leading icon into a tinted chip so empty states feel intentional */
.av3-empty > svg { box-sizing: border-box; width: 42px; height: 42px; padding: 10px; margin-bottom: 2px; color: var(--av3-muted); background: var(--av3-s2); border: 1px solid var(--av3-line); border-radius: 50%; }
.av3-empty-title { font-size: 13px; font-weight: 600; color: var(--av3-fg); }
.av3-empty-text { font-size: 12px; max-width: 300px; line-height: 1.45; }

/* --------------------------------------------------------------------------
   8. Layout helpers
   -------------------------------------------------------------------------- */
.av3-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--av3-gap-4); }
.av3-grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: var(--av3-gap-4); }
.av3-section-label {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--av3-subtle); margin-bottom: -4px;
}

/* mini bar chart */
.av3-bars { display: flex; flex-direction: column; gap: 7px; }
.av3-bar-row { display: grid; grid-template-columns: 1fr 60px; align-items: center; gap: var(--av3-gap-3); }
.av3-bar-label { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.av3-bar-track { position: relative; height: 6px; border-radius: var(--av3-r-pill); background: var(--av3-s3); overflow: hidden; }
.av3-bar-fill { position: absolute; inset: 0 auto 0 0; border-radius: var(--av3-r-pill); background: var(--av3-brand); }
.av3-bar-val { text-align: right; font-family: var(--av3-mono); font-size: 11.5px; font-variant-numeric: tabular-nums; color: var(--av3-muted); }

/* spinner */
.av3-spin { width: 16px; height: 16px; border: 2px solid var(--av3-line-strong); border-top-color: var(--av3-brand); border-radius: 50%; animation: av3-spin 0.7s linear infinite; }
@keyframes av3-spin { to { transform: rotate(360deg); } }
.av3-loading { display: flex; align-items: center; justify-content: center; gap: 9px; padding: 40px; color: var(--av3-muted); font-size: 13px; }

/* skeleton — shimmer placeholders that mirror the real layout while data
   loads (KPI rails, table rows). Prefer over a bare spinner for content that
   has a known shape. Guarded by prefers-reduced-motion. */
.av3-skeleton { position: relative; overflow: hidden; background: var(--av3-s2); border: 1px solid var(--av3-line); border-radius: var(--av3-r-sm); }
.av3-skeleton::after { content: ""; position: absolute; inset: 0; transform: translateX(-100%); background: linear-gradient(90deg, transparent, color-mix(in oklab, var(--av3-fg) 8%, transparent), transparent); animation: av3-shimmer 1.3s var(--av3-ease) infinite; }
@keyframes av3-shimmer { 100% { transform: translateX(100%); } }
@media (prefers-reduced-motion: reduce) { .av3-skeleton::after { animation: none; } }
.av3-skel-line { height: 11px; border-radius: var(--av3-r-pill); }
.av3-skel-kpi { height: 92px; border-radius: var(--av3-r-lg); }
.av3-skel-row { height: 38px; }
.av3-skel-rows { display: flex; flex-direction: column; gap: 8px; }

/* --------------------------------------------------------------------------
   A11y — keyboard focus safety net + reduced-motion
   `:where()` keeps this at low specificity so the tuned per-control rings
   above still win; this only catches anything that would otherwise have no
   visible focus indicator (nav links, collapse/logout, breadcrumbs, toggles).
   -------------------------------------------------------------------------- */
.av3-root :where(a, button):focus-visible { outline: 2px solid var(--av3-brand); outline-offset: 2px; }
@media (prefers-reduced-motion: reduce) {
  .av3-root *, .av3-root *::before, .av3-root *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* theme toggle */
.av3-theme-track { width: 30px; height: 30px; }

/* --------------------------------------------------------------------------
   9. Responsive — desktop-dense, phone-usable. Four steps, narrowing in:
        ≤1180  two-column page splits collapse (see the surface that owns them)
        ≤900   sidebar → off-canvas drawer; topbar grows a hamburger
        ≤720   gutter tightens; multi-column form/KPI grids stack
        ≤560   phone: 44px touch targets, near-full-bleed dialogs
      Plus a coarse-pointer floor so a touchscreen at any width gets real
      hit areas. Add new responsive surfaces here, not as one-off media
      queries scattered through the file (design-system Rule #11).
   -------------------------------------------------------------------------- */

/* Responsive grid helpers — prefer these documented classes over an inline
   `grid-template-columns` so a layout can actually stack on a phone (an inline
   style beats the media-query override below and silently defeats it). */
.av3-cols-2 { display: grid; grid-template-columns: 1fr 1fr; }
.av3-cols-3 { display: grid; grid-template-columns: repeat(3, 1fr); }
.av3-cols-4 { display: grid; grid-template-columns: repeat(4, 1fr); }
/* Compound selector so the 4-up modifier wins over `.av3-formrow` (§14)
   regardless of source order. */
.av3-formrow.av3-formrow-4 { grid-template-columns: repeat(4, 1fr); }
.av3-scroll-x { overflow-x: auto; -webkit-overflow-scrolling: touch; }

/* Config / editor rows — an inline-grid row of `label + a few fixed controls`
   that lives on a *page* (not inside a dialog, so it can't lean on the dialog
   body's computed `overflow-x:auto`). Set the desktop `grid-template-columns`
   inline at the call site; on a phone (≤560) the row stacks to one column so
   the label keeps room instead of crushing to a few pixels. `-head` is the
   matching column-label strip — it hides on a phone where each stacked row is
   self-labelling. A trailing icon button stays compact, not stretched.
   (Dense editor rows *inside a dialog* use `.av3-locrow`/`.av3-reciperow`,
   which scroll horizontally instead — see §6/§18.) */
.av3-cfgrow { display: grid; align-items: center; gap: 10px; }
.av3-cfgrow-head {
  display: grid; gap: 10px; padding-bottom: 4px;
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--av3-subtle);
}

/* Grid/flex children default to `min-width:auto`, which refuses to shrink below
   their content's intrinsic min size. One wide descendant (a chart, a dense
   number row, an unbreakable string) then holds its whole column wider than a
   phone — and because iOS Safari *expands the layout viewport* to fit any
   horizontal overflow, that single column silently defeats every breakpoint
   below (the page shrinks, stacks fail, the edge clips). Letting the layout
   tracks shrink to 0 keeps the page at device width and hands overflow back to
   the inner scroll-wrappers (`.av3-table-wrap`, `.av3-heat-wrap`) that own it. */
.av3-col,
.av3-grid-2 > *, .av3-grid-2-1 > *,
.av3-cols-2 > *, .av3-cols-3 > *, .av3-cols-4 > *,
.av3-mini2 > *, .av3-bodysplit > * { min-width: 0; }

.av3-side-toggle-mobile { display: none; }
@media (max-width: 900px) {
  .av3-shell { grid-template-columns: 1fr; }
  .av3-side {
    position: fixed;
    inset: 0 auto 0 0;
    z-index: 60;
    width: min(264px, 84vw);
    height: 100%;
    transform: translateX(-100%);
    transition: transform var(--av3-t-base) var(--av3-ease);
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .av3-shell[data-mobile-open="true"] .av3-side { transform: translateX(0); box-shadow: var(--av3-sh-2); }
  .av3-scrim {
    position: fixed; inset: 0; z-index: 55;
    background: rgba(0, 0, 0, 0.5);
  }
  .av3-side-toggle-mobile { display: grid; }
  .av3-collapse-btn { display: none; }

  /* The off-canvas drawer must ignore the desktop rail-collapsed state — a
     phone user who left the sidebar collapsed still needs full labels. */
  .av3-shell[data-collapsed="true"] .av3-brand-text { display: flex; }
  .av3-shell[data-collapsed="true"] .av3-nav-label,
  .av3-shell[data-collapsed="true"] .av3-foot-label { display: inline; }
  .av3-shell[data-collapsed="true"] .av3-eyebrow { text-align: left; padding: 6px 8px 3px; }
  .av3-shell[data-collapsed="true"] .av3-nav-item { justify-content: flex-start; padding: 0 9px; }
  .av3-shell[data-collapsed="true"] .av3-logout { justify-content: flex-start; padding: 0 9px; }

  /* Topbar: drop the ancestor crumbs so the scope + actions stay reachable,
     and clear the notch / status bar (env() is 0 in-browser, non-zero only in
     a standalone / viewport-fit=cover install). */
  .av3-crumbs li:not(:last-child) { display: none; }
  .av3-crumbs span[aria-current] { font-size: 13px; }
  .av3-topbar {
    padding-top: env(safe-area-inset-top, 0px);
    height: calc(44px + env(safe-area-inset-top, 0px));
  }
}

@media (max-width: 720px) {
  .av3-content { padding: var(--av3-gap-3); gap: var(--av3-gap-3); }
  .av3-grid-2, .av3-grid-2-1 { grid-template-columns: 1fr; }
  .av3-cols-3, .av3-cols-4 { grid-template-columns: 1fr 1fr; }
  .av3-pagehead { flex-direction: column; align-items: stretch; }
  .av3-pagehead-actions { flex-wrap: wrap; }

  /* Multi-column form scaffolds stack one-per-row. `!important` is deliberate:
     many `.av3-formrow` call sites set an inline `grid-template-columns` (2-up,
     4-up, mixed-px shapes), and an inline style would otherwise beat this and
     keep a cramped multi-column form on a phone. Stacking is always right for a
     form at this width, so we force it. */
  .av3-formrow, .av3-formrow-4 { grid-template-columns: 1fr !important; }
  .av3-od-grid { grid-template-columns: 1fr; }

  /* Dense editor rows (per-location price, recipe lines) keep their column
     shape but get a min-width so header + rows scroll together inside the
     dialog body (which computes overflow-x:auto) rather than crushing. */
  .av3-locrow, .av3-locrow-head,
  .av3-reciperow, .av3-reciperow-head { min-width: 420px; }
}

@media (max-width: 560px) {
  /* Comfortable touch targets — Apple HIG 44px floor, applied to the chrome
     that's smaller than that at desktop density. */
  .av3-icon-btn { width: 38px; height: 38px; }
  .av3-nav-item { height: 40px; }
  .av3-fchip { height: 34px; }
  .av3-chip { height: 32px; }
  .av3-toggle { height: 36px; }
  .av3-switch { min-height: 36px; }
  .av3-iconbtn-sm { width: 36px; height: 36px; }
  .av3-scope select { height: 36px; max-width: 138px; }

  .av3-cols-2, .av3-cols-3, .av3-cols-4 { grid-template-columns: 1fr; }

  /* Config / editor rows stack one control per line (label keeps its room);
     the column-label strip is redundant once stacked, so it hides. */
  .av3-cfgrow { grid-template-columns: 1fr !important; gap: 8px; }
  /* `:not(button)` so a desktop right-aligned numeric/badge cell reads left
     once stacked, without un-centering the toggle button labels. */
  .av3-cfgrow > * { width: 100%; }
  .av3-cfgrow > *:not(button) { text-align: left !important; }
  .av3-cfgrow > .av3-iconbtn-sm { width: 36px; justify-self: start; }
  .av3-cfgrow-head { display: none; }

  /* Dialogs go near-full-bleed; the footer buttons stack full-width. */
  .av3-dialog-root { padding: 10px; }
  .av3-dialog { max-height: calc(100vh - 20px); }
  .av3-dialog-foot { flex-direction: column-reverse; align-items: stretch; }
  .av3-dialog-foot > * { width: 100%; }
}

@media (pointer: coarse) {
  /* A touchscreen at any width still earns real hit areas. */
  .av3-nav-item { min-height: 40px; }
  .av3-fchip { min-height: 34px; }
  .av3-switch { min-height: 36px; }
}

/* ==========================================================================
   10. Operator Terminal dashboard (the v3 home surface)
   ========================================================================== */
.av3-now { display: flex; align-items: center; gap: 10px; }
.av3-live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--av3-ok); display: inline-block; animation: av3-pulse 2s infinite; }
@keyframes av3-pulse {
  0% { box-shadow: 0 0 0 0 color-mix(in oklab, var(--av3-ok) 60%, transparent); }
  70% { box-shadow: 0 0 0 6px transparent; }
  100% { box-shadow: 0 0 0 0 transparent; }
}

/* revenue → daily goal banner */
.av3-goalbar {
  padding: 18px 20px;
  background: linear-gradient(160deg, color-mix(in oklab, var(--av3-brand) 14%, var(--av3-s1)), var(--av3-s1));
  border: 1px solid var(--av3-line);
  border-radius: var(--av3-r-lg);
  box-shadow: var(--av3-sh-1);
}
.av3-goalbar-head { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.09em; color: var(--av3-muted); }
.av3-goalbar-head svg { width: 15px; height: 15px; }
.av3-goalbar-head .av3-goal-edit { margin-left: auto; }
.av3-goalbar-value { font-family: var(--av3-mono); font-size: 40px; font-weight: 500; letter-spacing: -0.02em; margin-top: 6px; line-height: 1; }
.av3-goalbar-sub { font-size: 13px; color: var(--av3-muted); margin-top: 9px; }
.av3-goalbar-prog { height: 10px; border-radius: var(--av3-r-pill); background: var(--av3-s3); overflow: hidden; margin-top: 13px; }
.av3-goalbar-prog > i { display: block; height: 100%; border-radius: var(--av3-r-pill); background: linear-gradient(90deg, var(--av3-brand), var(--av3-platinum)); transition: width var(--av3-t-slow) var(--av3-ease); }
.av3-goal-editrow { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
.av3-goal-input { height: 30px; width: 140px; padding: 0 10px; border: 1px solid var(--av3-line-strong); border-radius: var(--av3-r-sm); background: var(--av3-s1); color: var(--av3-fg); font: inherit; font-size: 13px; font-family: var(--av3-mono); }

/* live tiles */
.av3-tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--av3-gap-3); }
.av3-tile { display: flex; flex-direction: column; gap: 5px; padding: 13px 15px; background: var(--av3-s1); border: 1px solid var(--av3-line); border-radius: var(--av3-r-lg); box-shadow: var(--av3-sh-1); }
.av3-tile-l { display: flex; align-items: center; gap: 6px; font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--av3-subtle); }
.av3-tile-l svg { width: 13px; height: 13px; }
.av3-tile-v { font-family: var(--av3-mono); font-size: 26px; font-weight: 500; line-height: 1; font-variant-numeric: tabular-nums; }
.av3-tile-s { font-size: 11px; color: var(--av3-muted); }

/* body split: work column | live feed */
.av3-bodysplit { display: grid; grid-template-columns: 1fr 340px; gap: var(--av3-gap-4); align-items: start; }
.av3-col { display: flex; flex-direction: column; gap: var(--av3-gap-4); }

/* levers */
.av3-levers { display: grid; grid-template-columns: 1fr 1fr; gap: var(--av3-gap-3); }
.av3-lever { padding: 12px 14px; background: var(--av3-s1); border: 1px solid var(--av3-line); border-radius: var(--av3-r-lg); box-shadow: var(--av3-sh-1); }
.av3-lever-lab { display: flex; align-items: center; justify-content: space-between; font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--av3-subtle); }
.av3-lever-v { font-family: var(--av3-mono); font-size: 21px; font-weight: 500; margin-top: 5px; font-variant-numeric: tabular-nums; }
.av3-lever-meter { height: 5px; border-radius: var(--av3-r-pill); background: var(--av3-s3); overflow: hidden; margin-top: 8px; }
.av3-lever-meter > i { display: block; height: 100%; border-radius: var(--av3-r-pill); }
.av3-lever-tgt { font-size: 10.5px; color: var(--av3-subtle); margin-top: 5px; }

/* what moves it most */
.av3-move { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--av3-line); }
.av3-move:last-child { border-bottom: none; }
.av3-move-ic { display: grid; place-items: center; width: 28px; height: 28px; border-radius: 7px; background: color-mix(in oklab, var(--av3-platinum) 18%, var(--av3-s1)); color: var(--av3-platinum); flex-shrink: 0; }
.av3-move-ic svg { width: 15px; height: 15px; }
.av3-move-txt { flex: 1; font-size: 12.5px; }
.av3-move-imp { font-family: var(--av3-mono); font-size: 12.5px; color: var(--av3-ok); font-weight: 600; white-space: nowrap; }

/* kitchen pace + trucks mini cards */
.av3-mini2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--av3-gap-4); }
.av3-station { display: grid; grid-template-columns: 74px 1fr 36px; align-items: center; gap: 9px; padding: 7px 0; border-bottom: 1px solid var(--av3-line); }
.av3-station:last-child { border-bottom: none; }
.av3-station-nm { font-size: 12px; font-weight: 500; }
.av3-gbar { height: 6px; border-radius: var(--av3-r-pill); background: var(--av3-s3); overflow: hidden; }
.av3-gbar > i { display: block; height: 100%; border-radius: var(--av3-r-pill); }
.av3-truck { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--av3-line); }
.av3-truck:last-child { border-bottom: none; }
.av3-truck-city { font-size: 13px; font-weight: 600; }
.av3-truck-meta { font-size: 11px; color: var(--av3-muted); }

/* order flow */
.av3-flow { display: flex; align-items: flex-end; gap: 3px; height: 44px; }
.av3-flow > i { flex: 1; background: var(--av3-c3); border-radius: 2px 2px 0 0; opacity: 0.85; min-height: 2px; }

/* live feed column */
.av3-feedcard { position: sticky; top: 60px; display: flex; flex-direction: column; max-height: calc(100vh - 76px); }
.av3-attn { padding: 12px 16px; border-bottom: 1px solid var(--av3-line); background: color-mix(in oklab, var(--av3-warn) 7%, var(--av3-s1)); border-radius: var(--av3-r-lg) var(--av3-r-lg) 0 0; }

.av3-fitem-h { font-size: 12px; font-weight: 500; }

}

     source order wins; see §9 for why the global tile rule can't). */

}

/* ==========================================================================
   11. Toolbar + filter chips with counts (Orders & list pages)
   ========================================================================== */
.av3-toolbar { display: flex; align-items: center; gap: var(--av3-gap-3); flex-wrap: wrap; }

.av3-toolbar .av3-input, .av3-toolbar .av3-select { max-width: 100%; }
.av3-filterchips { display: inline-flex; gap: 2px; padding: 2px; background: var(--av3-s2); border: 1px solid var(--av3-line); border-radius: var(--av3-r-md); flex-wrap: wrap; }
.av3-fchip {
  display: inline-flex; align-items: center; gap: 6px; height: 26px; padding: 0 10px;
  border: none; background: transparent; border-radius: var(--av3-r-sm);
  color: var(--av3-muted); font: inherit; font-size: 12px; font-weight: 500; cursor: pointer;
  transition: background var(--av3-t-fast) var(--av3-ease), color var(--av3-t-fast) var(--av3-ease);
}
.av3-fchip:hover { color: var(--av3-fg); }
.av3-fchip:focus-visible { outline: 2px solid var(--av3-brand); outline-offset: 1px; }
.av3-fchip.is-active { background: var(--av3-s3); color: var(--av3-fg); box-shadow: inset 0 0 0 1px var(--av3-line-strong); }
.av3-fchip-count { font-family: var(--av3-mono); font-size: 10.5px; color: var(--av3-subtle); font-variant-numeric: tabular-nums; }

.av3-viewtoggle { display: inline-flex; gap: 2px; padding: 2px; background: var(--av3-s2); border: 1px solid var(--av3-line); border-radius: var(--av3-r-sm); }
.av3-viewtoggle button { display: grid; place-items: center; width: 28px; height: 26px; border: none; background: transparent; border-radius: 4px; color: var(--av3-muted); cursor: pointer; }
.av3-viewtoggle button.is-active { background: var(--av3-s3); color: var(--av3-fg); box-shadow: inset 0 0 0 1px var(--av3-line-strong); }
.av3-viewtoggle svg { width: 15px; height: 15px; }
/* `.is-text` variant: buttons size to an icon+label instead of a square icon
   box, so toggles whose meaning isn't self-evident from an icon alone (By role
   / By user) read cleanly. */
.av3-viewtoggle.is-text button { width: auto; height: 28px; padding: 0 12px; gap: 6px; grid-auto-flow: column; font: inherit; font-size: 12.5px; font-weight: 500; white-space: nowrap; }
.av3-viewtoggle.is-text svg { width: 14px; height: 14px; }

/* ==========================================================================
   12. Kanban board
   ========================================================================== */
.av3-kanban { display: grid; grid-auto-flow: column; grid-auto-columns: minmax(232px, 1fr); gap: var(--av3-gap-3); overflow-x: auto; padding-bottom: 4px; }
.av3-kcol { display: flex; flex-direction: column; min-width: 0; background: var(--av3-s2); border: 1px solid var(--av3-line); border-radius: var(--av3-r-lg); }

.av3-ocard { text-align: left; width: 100%; background: var(--av3-s1); border: 1px solid var(--av3-line); border-radius: var(--av3-r-md); padding: 10px 11px; cursor: pointer; box-shadow: var(--av3-sh-1); transition: border-color var(--av3-t-fast) var(--av3-ease), transform var(--av3-t-fast) var(--av3-ease), box-shadow var(--av3-t-fast) var(--av3-ease); }
.av3-ocard:hover { border-color: var(--av3-line-strong); transform: translateY(-1px); box-shadow: var(--av3-sh-2); }
.av3-ocard:focus-visible { outline: 2px solid var(--av3-brand); outline-offset: 1px; }
.av3-ocard-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.av3-ocard-id { font-family: var(--av3-mono); font-size: 11px; color: var(--av3-subtle); }
.av3-ocard-amt { font-family: var(--av3-mono); font-size: 13px; font-weight: 500; }
.av3-ocard-name { font-size: 13px; font-weight: 600; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.av3-ocard-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; font-size: 11px; color: var(--av3-muted); }
.av3-ocard-meta svg { width: 12px; height: 12px; }
.av3-ocard-dot { width: 6px; height: 6px; border-radius: 50%; }

/* ==========================================================================
   13. Dialog (portaled overlay)
   ========================================================================== */
.av3-dialog-root { position: fixed; inset: 0; z-index: 80; display: grid; place-items: center; padding: 20px; }
.av3-dialog-scrim { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(3px); animation: av3-scrim-in var(--av3-t-base) var(--av3-ease); }
.av3-dialog { position: relative; width: 100%; max-height: calc(100vh - 40px); display: flex; flex-direction: column; background: var(--av3-s1); border: 1px solid var(--av3-line-strong); border-radius: var(--av3-r-lg); box-shadow: var(--av3-sh-2); overflow: hidden; animation: av3-dialog-in var(--av3-t-base) var(--av3-ease); transform-origin: center; }
@keyframes av3-scrim-in { from { opacity: 0; } to { opacity: 1; } }

.av3-dialog-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--av3-line); }
.av3-dialog-title { font-size: 15px; font-weight: 600; }
.av3-dialog-sub { font-size: 12px; color: var(--av3-muted); margin-top: 2px; }
.av3-dialog-body { padding: 16px; overflow-y: auto; }
.av3-dialog-foot { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--av3-line); background: var(--av3-s2); flex-wrap: wrap; }

/* order detail bits */
.av3-od-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; margin-bottom: 14px; }
.av3-od-field .k { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--av3-subtle); }
.av3-od-field .v { font-size: 13px; margin-top: 2px; }
.av3-od-line { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; padding: 7px 0; border-bottom: 1px solid var(--av3-line); font-size: 13px; }
.av3-od-line:last-child { border-bottom: none; }
.av3-od-line .q { font-family: var(--av3-mono); color: var(--av3-muted); margin-right: 8px; }
.av3-od-line .lp { font-family: var(--av3-mono); color: var(--av3-muted); }
.av3-od-note { font-size: 11.5px; color: var(--av3-subtle); margin-top: 1px; }
.av3-od-total { display: flex; align-items: baseline; justify-content: space-between; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--av3-line-strong); }
.av3-od-total .v { font-family: var(--av3-mono); font-size: 19px; font-weight: 600; }

/* ==========================================================================
   14. Form fields (dialogs / editors)
   ========================================================================== */
.av3-field { display: flex; flex-direction: column; gap: 4px; }
.av3-field-label { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--av3-subtle); }
/* Two-up field grid for dialog forms; bottom-aligns so a label-above-input
   field lines up with a single-row toggle. Collapses to one column on phones. */
.av3-formgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: end; }
@media (max-width: 560px) { .av3-formgrid { grid-template-columns: 1fr; } }
/* Toggle row — label + slider on ONE line in a bordered box, height-matched to
   inputs/selects so toggles align with them. Replaces the old "tiny uppercase
   label stacked above a bare slider" which wrapped and collided at narrow
   widths (the Disclosures chaos + Service&channel overlap). */
.av3-togglerow { display: flex; align-items: center; justify-content: space-between; gap: 12px; min-height: 34px; padding: 4px 12px; border: 1px solid var(--av3-line-strong); border-radius: var(--av3-r-sm); background: var(--av3-s1); }
.av3-togglerow-label { font-size: 12.5px; font-weight: 500; color: var(--av3-fg); }
.av3-togglerow:has(.av3-switch[aria-checked="true"]) { border-color: color-mix(in oklab, var(--av3-ok) 35%, var(--av3-line-strong)); }
/* Clone bar — fan a per-site config (e.g. modifiers) out to any chosen subset
   of other sites. Head row holds the label + filter + All/None + Clone; the
   target chips sit in a capped, scrollable well so 2 sites or 25 both fit. */
.av3-clonebar { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; padding: 10px; border: 1px solid var(--av3-line); border-radius: var(--av3-r-sm); background: var(--av3-s2); }
.av3-clonebar-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.av3-clonebar-head .av3-input { height: 28px; width: auto; flex: 1; min-width: 120px; max-width: 220px; font-family: var(--av3-ui); }
.av3-clonebar-targets { display: flex; gap: 6px; flex-wrap: wrap; max-height: 128px; overflow-y: auto; padding: 2px; }
.av3-clonebar-count { font-size: 11px; color: var(--av3-subtle); font-variant-numeric: tabular-nums; }
.av3-input, .av3-select {
  height: 32px; padding: 0 10px; border: 1px solid var(--av3-line-strong); border-radius: var(--av3-r-sm);
  background: var(--av3-s1); color: var(--av3-fg); font: inherit; font-size: 13px;
  transition: border-color var(--av3-t-fast) var(--av3-ease), box-shadow var(--av3-t-fast) var(--av3-ease);
}
.av3-input { font-family: var(--av3-mono); font-variant-numeric: tabular-nums; }
.av3-input::placeholder { color: var(--av3-subtle); }
.av3-input:hover:not(:disabled), .av3-select:hover:not(:disabled) { border-color: var(--av3-muted); }
.av3-input:focus, .av3-select:focus { outline: none; border-color: var(--av3-brand); box-shadow: 0 0 0 3px var(--av3-brand-soft); }
.av3-input:disabled, .av3-select:disabled { opacity: 0.55; cursor: not-allowed; }
/* `appearance: none` strips the native dropdown arrow, so we paint our own
   chevron (muted, theme-flipped) — without it the select reads as a bare box. */
.av3-select {
  appearance: none; cursor: pointer; padding-right: 30px;
  background-image: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2012%2012'%20fill='none'%20stroke='%23a6a099'%20stroke-width='1.6'%20stroke-linecap='round'%20stroke-linejoin='round'%3E%3Cpath%20d='M2.5%204.5%206%208%209.5%204.5'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 10px center; background-size: 12px;
}
[data-admin-theme="light"] .av3-select {
  background-image: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2012%2012'%20fill='none'%20stroke='%2357504a'%20stroke-width='1.6'%20stroke-linecap='round'%20stroke-linejoin='round'%3E%3Cpath%20d='M2.5%204.5%206%208%209.5%204.5'/%3E%3C/svg%3E");
}

/* Checkbox — the native control is unstyled and reads foreign in this theme,
   so restyle every v3 checkbox: a dense box that fills brand with a white
   check. Radios keep their shape but pick up the brand accent. */
.av3-root input[type="checkbox"] {
  appearance: none; -webkit-appearance: none;
  flex-shrink: 0; width: 16px; height: 16px; margin: 0;
  border: 1px solid var(--av3-line-strong); border-radius: var(--av3-r-sm);
  background: var(--av3-s1); cursor: pointer;
  transition: background var(--av3-t-fast) var(--av3-ease), border-color var(--av3-t-fast) var(--av3-ease), box-shadow var(--av3-t-fast) var(--av3-ease);
}
.av3-root input[type="checkbox"]:hover:not(:disabled) { border-color: var(--av3-muted); }
.av3-root input[type="checkbox"]:checked {
  background-color: var(--av3-brand); border-color: var(--av3-brand);
  background-image: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2012%2012'%20fill='none'%20stroke='%23ffffff'%20stroke-width='2'%20stroke-linecap='round'%20stroke-linejoin='round'%3E%3Cpath%20d='M2.5%206.5%205%209%209.5%203.5'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: center; background-size: 11px;
}
.av3-root input[type="checkbox"]:focus-visible { outline: 2px solid var(--av3-brand); outline-offset: 2px; }
.av3-root input[type="checkbox"]:disabled { opacity: 0.5; cursor: not-allowed; }
.av3-root input[type="radio"] { accent-color: var(--av3-brand); cursor: pointer; }
.av3-formrow { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.av3-subhead { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--av3-subtle); margin: 16px 0 8px; }

/* per-location price rows (Menu editor) */
.av3-locrow { display: grid; grid-template-columns: 1fr 92px 92px 56px; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--av3-line); }
.av3-locrow:last-child { border-bottom: none; }
/* Calculator behaviour/seasonality lever rows — toggle + name + inline fields. */
.av3-leverrow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 6px 0; border-bottom: 1px solid var(--av3-line); }
.av3-leverrow:last-child { border-bottom: none; }
.av3-lever-name { font-size: 12px; font-weight: 500; flex: 1; min-width: 120px; }
.av3-locrow-city { font-size: 13px; font-weight: 500; }
.av3-locrow-head { display: grid; grid-template-columns: 1fr 92px 92px 56px; gap: 8px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--av3-subtle); padding-bottom: 4px; }
.av3-locrow .av3-input { height: 30px; width: 100%; }
.av3-toggle { height: 30px; border: 1px solid var(--av3-line-strong); border-radius: var(--av3-r-sm); background: var(--av3-s2); color: var(--av3-muted); font: inherit; font-size: 11px; font-weight: 600; cursor: pointer; }
.av3-toggle[data-on="true"] { background: var(--av3-ok-soft); border-color: color-mix(in oklab, var(--av3-ok) 35%, transparent); color: var(--av3-ok); }

/* On/off switch — THE boolean control (role="switch"). One definition, every
   enable/disable toggle follows. The slider track + thumb are decorative; the
   optional label sits beside it and clicking either toggles. */
.av3-switch { display: inline-flex; align-items: center; gap: 8px; padding: 0; border: none; background: none; color: var(--av3-muted); font: inherit; font-size: 12px; font-weight: 500; cursor: pointer; }
.av3-switch-track { position: relative; flex-shrink: 0; width: 38px; height: 22px; border-radius: var(--av3-r-pill); background: var(--av3-s3); border: 1px solid var(--av3-line-strong); transition: background var(--av3-t-fast) var(--av3-ease), border-color var(--av3-t-fast) var(--av3-ease); }
.av3-switch-thumb { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: var(--av3-subtle); transition: transform var(--av3-t-base) var(--av3-ease), background var(--av3-t-fast) var(--av3-ease); }
.av3-switch[aria-checked="true"] { color: var(--av3-fg); }

.av3-switch[aria-checked="true"] .av3-switch-thumb { transform: translateX(16px); background: var(--av3-ok); }
.av3-switch:disabled { opacity: 0.45; cursor: not-allowed; }
.av3-switch:focus-visible { outline: 2px solid var(--av3-brand); outline-offset: 2px; border-radius: var(--av3-r-sm); }
.av3-switch-sm .av3-switch-track { width: 32px; height: 18px; }
.av3-switch-sm .av3-switch-thumb { width: 13px; height: 13px; }
.av3-switch-sm[aria-checked="true"] .av3-switch-thumb { transform: translateX(13px); }
.av3-pricecell { display: inline-flex; align-items: center; gap: 6px; }
.av3-varies { font-size: 9.5px; }

/* recipe formula editor rows */
.av3-reciperow { display: grid; grid-template-columns: 1fr 84px 60px 76px 30px; gap: 8px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--av3-line); }
.av3-reciperow:last-child { border-bottom: none; }
.av3-reciperow .av3-input, .av3-reciperow .av3-select { height: 30px; width: 100%; }
.av3-reciperow-head { display: grid; grid-template-columns: 1fr 84px 60px 76px 30px; gap: 8px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--av3-subtle); padding-bottom: 4px; }
.av3-reciperow-cost { font-family: var(--av3-mono); font-size: 12px; color: var(--av3-muted); text-align: right; }
.av3-iconbtn-sm { display: grid; place-items: center; width: 28px; height: 28px; border: 1px solid var(--av3-line); border-radius: var(--av3-r-sm); background: transparent; color: var(--av3-muted); cursor: pointer; }
.av3-iconbtn-sm:hover { color: var(--av3-bad); border-color: color-mix(in oklab, var(--av3-bad) 30%, transparent); }
.av3-iconbtn-sm:focus-visible { outline: 2px solid var(--av3-brand); outline-offset: 1px; }
.av3-iconbtn-sm svg { width: 14px; height: 14px; }
.av3-recipe-summary { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--av3-line-strong); }
.av3-recipe-summary .v { font-family: var(--av3-mono); font-size: 18px; font-weight: 600; }

/* ==========================================================================
   14. Alerts inbox (/admin/alerts) — bucketed action queue
   ========================================================================== */
.av3-alert-sect-h { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--av3-subtle); padding: 13px 14px 3px; }
.av3-alert-list { display: flex; flex-direction: column; }
.av3-alert-row { display: flex; align-items: flex-start; gap: 11px; width: 100%; text-align: left; padding: 10px 14px; background: none; border: none; border-top: 1px solid var(--av3-line); cursor: pointer; font: inherit; color: var(--av3-fg); transition: background var(--av3-t-fast) var(--av3-ease); }
.av3-alert-list .av3-alert-row:first-child { border-top: none; }

/* ==========================================================================
   19. Dialog editors — in-dialog tabs, money affix, polished rows
   ========================================================================== */
/* `flex:1` tabs share the bar full-width when they fit (desktop); when the

/* ==========================================================================
   23. Auth — the login door (/login + /admin/login)
   The one av3 surface that renders OUTSIDE the shell. "Spotlight minimal": a
   single column centred on both axes on the bare canvas, lit by one overhead
   brand spotlight + a slow scanline, framed by a thin platinum corner bracket.
   No card chrome; underline-only fields. The header is the brand lockup (mark +
   wordmark + portal eyebrow). av3 tokens only — no new hue, no raw hex.
   See docs/design-system/admin/v3/README.md → "Auth door".
   ========================================================================== */
.av3-auth {
  position: relative;
  /* flex-fill the (flex-col) #admin-portal-root so the canvas always covers the
     viewport even when min-height:100dvh under-resolves; min-height is the floor. */
  flex: 1;
  min-height: 100vh;
  min-height: 100dvh;
  display: grid;
  /* `safe` so a viewport shorter than the column pins it to the TOP (header
     stays visible) instead of centring and clipping the header off-screen.
     The plain `center` is the fallback for engines without the safe keyword. */
  place-items: center;
  place-items: safe center;
  padding: 40px 32px;
  overflow: hidden;
  background: var(--av3-bg);
}
/* one overhead brand spotlight — the only colour on the canvas */
.av3-auth::before {
  content: "";
  position: absolute;
  left: 50%;
  top: -30%;
  width: 120vw;
  height: 120vh;
  transform: translateX(-50%);
  pointer-events: none;
  background: radial-gradient(38% 46% at 50% 0%, color-mix(in oklab, var(--av3-brand) 22%, transparent), transparent 70%);
}
/* a slow scanline, masked to a soft central pool so it never reaches the edges */
.av3-auth::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.5;
  background: repeating-linear-gradient(0deg, transparent 0 3px, rgba(255, 255, 255, 0.012) 3px 4px);
  -webkit-mask-image: radial-gradient(60% 60% at 50% 40%, #000, transparent 85%);
  mask-image: radial-gradient(60% 60% at 50% 40%, #000, transparent 85%);
}

.av3-auth-col {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 344px;
  text-align: center;
  animation: av3-auth-in var(--av3-t-slow) var(--av3-ease) both;
}
@keyframes av3-auth-in {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: none; }
}
@media (prefers-reduced-motion: reduce) { .av3-auth-col { animation: none; } }

/* platinum bracket — top-left + bottom-right corners only, frames the column */
.av3-auth-frame { position: relative; padding: 40px 30px 34px; }
.av3-auth-frame::before,
.av3-auth-frame::after {
  content: "";
  position: absolute;
  width: 26px;
  height: 26px;
  pointer-events: none;
  border-color: color-mix(in oklab, var(--av3-platinum) 60%, transparent);
  border-style: solid;
}
.av3-auth-frame::before { top: 0; left: 0; border-width: 1px 0 0 1px; }
.av3-auth-frame::after { bottom: 0; right: 0; border-width: 0 1px 1px 0; }

/* header — the brand lockup (mark + wordmark + portal eyebrow), centred */
.av3-auth-lockup {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 30px;
  text-align: left;
}
.av3-auth-mark {
  display: grid;
  place-items: center;
  width: 44px;
  height: 44px;
  flex-shrink: 0;
  border-radius: var(--av3-r-md);
  background: var(--av3-brand);
  color: #fff;
  font-family: var(--av3-display);
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 0.02em;
  box-shadow:
    inset 0 0 0 1px color-mix(in oklab, var(--av3-platinum) 50%, transparent),
    0 12px 30px -12px color-mix(in oklab, var(--av3-brand) 80%, transparent);
}
.av3-auth-wordmark { font-family: var(--av3-display); font-size: 20px; font-weight: 600; line-height: 1.1; }
.av3-auth-eyebrow { margin-top: 2px; font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.16em; color: var(--av3-subtle); }

.av3-auth-form { display: flex; flex-direction: column; gap: 18px; text-align: left; }
.av3-auth-form .av3-field { gap: 6px; }
/* underline-only field for the minimal door — overrides the boxed .av3-input */
.av3-auth-form .av3-field-label { font-family: var(--av3-mono); font-size: 9.5px; letter-spacing: 0.18em; }
.av3-auth-form .av3-input {
  width: 100%;
  height: 30px;
  padding: 0 2px;
  border: none;
  border-bottom: 1px solid var(--av3-line-strong);
  border-radius: 0;
  background: transparent;
  color: var(--av3-fg);
  font-family: var(--av3-ui);
  font-size: 15px;
  transition: border-color var(--av3-t-base) var(--av3-ease), box-shadow var(--av3-t-base) var(--av3-ease);
}
.av3-auth-form .av3-input::placeholder { color: var(--av3-subtle); }
.av3-auth-form .av3-input:hover { border-bottom-color: var(--av3-muted); }
.av3-auth-form .av3-input:focus { outline: none; border-bottom-color: var(--av3-brand); box-shadow: 0 1px 0 0 var(--av3-brand); }
.av3-auth-otp { text-align: center; letter-spacing: 0.42em; font-family: var(--av3-mono) !important; }

.av3-auth-error {
  font-size: 12px;
  text-align: center;
  color: color-mix(in oklab, var(--av3-bad) 78%, var(--av3-fg));
  background: var(--av3-bad-soft);
  border: 1px solid color-mix(in oklab, var(--av3-bad) 30%, transparent);
  border-radius: var(--av3-r-sm);
  padding: 8px 10px;
}

/* primary CTA — solid brand, full-width, lifted on a soft brand shadow */
.av3-auth-form .av3-btn-primary {
  margin-top: 6px;
  width: 100%;
  height: 44px;
  font-size: 13px;
  font-weight: 600;
  box-shadow: 0 10px 26px -12px color-mix(in oklab, var(--av3-brand) 85%, transparent);
}
/* passkey — a quiet text action beneath the CTA (no "or" divider) */
.av3-auth-passkey {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 8px;
  border: none;
  background: none;
  color: var(--av3-muted);
  font: inherit;
  font-size: 12px;
  cursor: pointer;
  transition: color var(--av3-t-fast) var(--av3-ease);
}
.av3-auth-passkey:hover { color: var(--av3-fg); }
.av3-auth-passkey:focus-visible { outline: 2px solid var(--av3-brand); outline-offset: 2px; border-radius: var(--av3-r-sm); }
.av3-auth-passkey:disabled { opacity: 0.5; cursor: not-allowed; }
.av3-auth-passkey svg { width: 14px; height: 14px; }

.av3-auth-foot {
  margin-top: 26px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  text-align: center;
  font-size: 11.5px;
  color: var(--av3-muted);
}
.av3-auth-foot a { color: var(--av3-platinum); text-decoration: none; }
.av3-auth-foot a:hover { text-decoration: underline; }

/* Role portal home (Manager / Franchisee). The standalone dashboards that live
   OUTSIDE the AdminShell share the sign-in canvas's signature look — the
   overhead brand spotlight + masked scanline on the dark canvas, the same SI
   mark + Ottaviano wordmark + eyebrow lockup (`.av3-auth-*`, reused) — but
   top-align their content (they're scrollable overviews, not a centred form)
   and compose it from the standard `.av3-kpi*` / `.av3-card` primitives. */
.av3-portal {
  position: relative;
  flex: 1;
  min-height: 100vh;
  min-height: 100dvh;
  padding: 44px 24px 72px;
  overflow: hidden;
  background: var(--av3-bg);
}
.av3-portal::before {
  content: "";
  position: absolute;
  left: 50%;
  top: -34%;
  width: 120vw;
  height: 120vh;
  transform: translateX(-50%);
  pointer-events: none;
  background: radial-gradient(36% 42% at 50% 0%, color-mix(in oklab, var(--av3-brand) 20%, transparent), transparent 70%);
}
.av3-portal::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.5;
  background: repeating-linear-gradient(0deg, transparent 0 3px, rgba(255, 255, 255, 0.012) 3px 4px);
  -webkit-mask-image: radial-gradient(72% 48% at 50% 0%, #000, transparent 80%);
  mask-image: radial-gradient(72% 48% at 50% 0%, #000, transparent 80%);
}
.av3-portal-col {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 1000px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: var(--av3-gap-5);
  animation: av3-auth-in var(--av3-t-slow) var(--av3-ease) both;
}
@media (prefers-reduced-motion: reduce) { .av3-portal-col { animation: none; } }
.av3-portal-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--av3-gap-4);
  flex-wrap: wrap;
}
.av3-portal-greet { font-family: var(--av3-display); font-size: 27px; font-weight: 600; line-height: 1.08; margin-top: 14px; }
.av3-portal-sub { margin-top: 5px; font-size: 12.5px; color: var(--av3-muted); }
.av3-portal-section { display: flex; flex-direction: column; gap: var(--av3-gap-3); }
.av3-portal-empty { padding: var(--av3-gap-4); font-size: 12.5px; color: var(--av3-muted); }
/* Jump-to / quick-link grid of link cards. */
.av3-portal-jump { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: var(--av3-gap-3); }
.av3-portal-jcard {
  display: flex; align-items: center; gap: var(--av3-gap-3);
  padding: var(--av3-gap-3) var(--av3-gap-4);
  background: var(--av3-s1); border: 1px solid var(--av3-line);
  border-radius: var(--av3-r-lg); box-shadow: var(--av3-sh-1);
  text-decoration: none; color: inherit;
  transition: border-color var(--av3-t-fast) var(--av3-ease), box-shadow var(--av3-t-fast) var(--av3-ease), transform var(--av3-t-fast) var(--av3-ease);
}
.av3-portal-jcard:hover { border-color: var(--av3-brand-line); box-shadow: var(--av3-sh-2); transform: translateY(-1px); }
.av3-portal-jico { display: grid; place-items: center; width: 38px; height: 38px; flex-shrink: 0; border-radius: var(--av3-r-md); background: var(--av3-s3); color: var(--av3-platinum); }
.av3-portal-jico svg { width: 18px; height: 18px; }
.av3-portal-jbody { min-width: 0; flex: 1; display: flex; flex-direction: column; }
.av3-portal-jname { font-size: 13.5px; font-weight: 600; }
.av3-portal-jdesc { font-size: 11.5px; color: var(--av3-muted); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.av3-portal-jcard > svg:last-child { width: 15px; height: 15px; color: var(--av3-subtle); flex-shrink: 0; }
/* People-on-shift chips + simple two-column stat blocks used on the portals. */
.av3-portal-chips { display: flex; flex-wrap: wrap; gap: var(--av3-gap-2); }
.av3-portal-chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: var(--av3-r-pill); background: var(--av3-s2); border: 1px solid var(--av3-line); font-size: 12px; }
.av3-portal-chip span { color: var(--av3-subtle); }
.av3-portal-stat-label { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--av3-subtle); }
.av3-portal-stat-value { font-family: var(--av3-mono); font-size: 19px; font-weight: 500; font-variant-numeric: tabular-nums; margin-top: 3px; }
.av3-portal-stat-sub { font-size: 11.5px; color: var(--av3-muted); margin-top: 2px; }

/* ---- Personal comms: the Daily routine checklist + Your to-do list rows ----
   Shared row chrome for both lists in PortalInbox. Rows sit flush in the card;
   hovering (or focusing) lifts a faint surface and fades the per-row action
   buttons in — so the resting state reads clean and scannable, the controls
   appear on intent. Touch devices (no hover) keep the actions always-visible. */
.av3-todo-progress { height: 5px; border-radius: var(--av3-r-pill); background: var(--av3-s3); overflow: hidden; }
.av3-todo-progress > i {
  display: block; height: 100%; border-radius: var(--av3-r-pill);
  background: linear-gradient(90deg, color-mix(in oklab, var(--av3-ok) 78%, var(--av3-info)), var(--av3-ok));
  transition: width var(--av3-t-slow) var(--av3-ease);
}
.av3-todo-row {
  display: flex; align-items: flex-start; gap: 11px; padding: 9px 10px;
  margin: 0 -10px; border-radius: var(--av3-r-md);
  transition: background var(--av3-t-fast) var(--av3-ease);
}
.av3-todo-row:hover, .av3-todo-row:focus-within { background: var(--av3-s2); }
.av3-todo-acts {
  display: flex; gap: 4px; align-self: flex-start; flex-shrink: 0;
  opacity: 0; transform: translateX(3px);
  transition: opacity var(--av3-t-fast) var(--av3-ease), transform var(--av3-t-fast) var(--av3-ease);
}
.av3-todo-row:hover .av3-todo-acts, .av3-todo-row:focus-within .av3-todo-acts { opacity: 1; transform: none; }
@media (hover: none) { .av3-todo-acts { opacity: 1; transform: none; } }
.av3-todo-act {
  width: 28px; height: 28px; display: grid; place-items: center; border-radius: var(--av3-r-md);
  background: var(--av3-s3); border: 1px solid var(--av3-line); color: var(--av3-muted); cursor: pointer;
  transition: color var(--av3-t-fast) var(--av3-ease), border-color var(--av3-t-fast) var(--av3-ease);
}
.av3-todo-act:hover { color: var(--av3-fg); border-color: var(--av3-line-strong); }
.av3-todo-act.is-danger:hover { color: var(--av3-bad); border-color: color-mix(in oklab, var(--av3-bad) 45%, transparent); }
.av3-todo-act svg { width: 15px; height: 15px; }

/* The square tick box for a routine — animates its check in/out on toggle. */
.av3-todo-check {
  flex-shrink: 0; width: 20px; height: 20px; margin-top: 1px; border-radius: 6px; cursor: pointer;
  display: grid; place-items: center; background: transparent; border: 1.5px solid var(--av3-line-strong);
  transition: background var(--av3-t-fast) var(--av3-ease), border-color var(--av3-t-fast) var(--av3-ease);
}
.av3-todo-check:hover { border-color: var(--av3-ok); }
.av3-todo-check[aria-checked="true"] { background: var(--av3-ok); border-color: var(--av3-ok); }
.av3-todo-check svg { width: 12px; height: 12px; color: #fff; opacity: 0; transform: scale(0.5); transition: opacity var(--av3-t-fast) var(--av3-ease), transform var(--av3-t-fast) var(--av3-ease); }
.av3-todo-check[aria-checked="true"] svg { opacity: 1; transform: scale(1); }

.av3-todo-title { font-size: 13.5px; font-weight: 600; color: var(--av3-fg); }
.av3-todo-title.is-done { color: var(--av3-subtle); text-decoration: line-through; }
.av3-todo-detail { font-size: 12px; color: var(--av3-muted); margin-top: 2px; }
.av3-todo-meta { font-size: 11.5px; color: var(--av3-subtle); margin-top: 4px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.av3-todo-dot { width: 7px; height: 7px; border-radius: var(--av3-r-pill); flex-shrink: 0; }

/* Scope chip — Team (manager-defined) vs Yours (personal). */
.av3-todo-scope { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; border-radius: var(--av3-r-pill); padding: 1px 7px; }
.av3-todo-scope.is-team { color: var(--av3-info); background: var(--av3-info-soft); }
.av3-todo-scope.is-mine { color: var(--av3-platinum); background: color-mix(in oklab, var(--av3-platinum) 15%, var(--av3-s1)); }

/* "All caught up" flourish when every routine is ticked for the day. */
.av3-todo-alldone { display: flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 600; color: var(--av3-ok); padding: 4px 0; }
.av3-todo-alldone svg { width: 16px; height: 16px; }

/* Count pill on the to-do lifecycle tabs. */
.av3-todo-tabcount { font-size: 10px; font-weight: 600; line-height: 1; color: var(--av3-muted); background: var(--av3-s1); border: 1px solid var(--av3-line); border-radius: var(--av3-r-pill); padding: 2px 6px; }
.av3-todo-tabcount.is-active { color: var(--av3-fg); }
/* Daily routine + Your to-do list sit side by side on wide portals, and stack
   on narrow ones. align-items:start so each column keeps its natural height. */
.av3-todo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--av3-gap-5); align-items: start; }
@media (max-width: 720px) { .av3-todo-grid { grid-template-columns: 1fr; } }
/* Equal-height header for the two grid columns so the cards below them start on
   the same line (the to-do header carries taller pill tabs; the routine header
   is shorter — this floors both to the same height). */
.av3-todo-head { min-height: 30px; }
/* Quick-add box: a full-width text field above a controls row (priority [+ due]
   + Add, with Add pushed to the right edge). Both columns' add areas are then
   the same height and the Add buttons line up. All controls are the shared 32px
   height (.av3-input / .av3-select / .av3-btn), so nothing is uneven. */
.av3-todo-add { display: flex; flex-direction: column; gap: 8px; }
.av3-todo-add > .av3-input { width: 100%; }
.av3-todo-add-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.av3-todo-add-row .av3-btn { margin-left: auto; }
/* Responsive header pill bar: on a narrow portal the tab group wraps under the
   section title (the header is flex-wrap), and the pill bar itself scrolls
   horizontally rather than overflowing the card — scrollbar hidden for polish. */
.av3-todo-tabscroll { max-width: 100%; overflow-x: auto; scrollbar-width: none; }
.av3-todo-tabscroll::-webkit-scrollbar { display: none; }
.av3-todo-tabscroll > button { flex: 0 0 auto; }

/* PIN terminal — the shared-device keypad door (/terminal). Same canvas, column,
   bracket + lockup as the sign-in form; below the lockup it swaps the form for a
   location segmented control, a PIN-progress dot row and a touch keypad, all
   built from the same --av3-* tokens (no new hue, no card chrome). */
.av3-auth-locs { display: flex; gap: var(--av3-gap-2); margin-bottom: 20px; }
.av3-auth-loc {
  flex: 1;
  height: 34px;
  border: 1px solid var(--av3-line-strong);
  border-radius: var(--av3-r-md);
  background: transparent;
  color: var(--av3-muted);
  font-family: var(--av3-ui);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: color var(--av3-t-fast) var(--av3-ease), border-color var(--av3-t-fast) var(--av3-ease), background var(--av3-t-fast) var(--av3-ease);
}
.av3-auth-loc:hover { color: var(--av3-fg); border-color: var(--av3-muted); }
.av3-auth-loc.is-active { background: var(--av3-brand); border-color: var(--av3-brand); color: #fff; }
.av3-auth-loc:focus-visible { outline: 2px solid var(--av3-brand); outline-offset: 2px; }
/* locked while a PIN is in flight — dim, no hover affordance */
.av3-auth-loc:disabled { opacity: 0.5; cursor: not-allowed; }
.av3-auth-loc:disabled:hover { color: var(--av3-muted); border-color: var(--av3-line-strong); }

/* PIN-progress dots — one per entered digit (min PIN_MIN_LENGTH), brand when filled */
.av3-auth-dots { display: flex; justify-content: center; gap: var(--av3-gap-2); margin-bottom: 20px; }
.av3-auth-dot {
  width: 10px;
  height: 10px;
  border-radius: var(--av3-r-pill);
  background: var(--av3-line-strong);
  transition: background var(--av3-t-fast) var(--av3-ease), transform var(--av3-t-fast) var(--av3-ease);
}
.av3-auth-dot.is-on { background: var(--av3-brand); transform: scale(1.1); }

/* touch keypad — 3-col grid, big targets, no keyboard */
.av3-auth-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--av3-gap-3); }
.av3-auth-key {
  height: 56px;
  display: grid;
  place-items: center;
  border: 1px solid var(--av3-line-strong);
  border-radius: var(--av3-r-md);
  background: var(--av3-s1);
  color: var(--av3-fg);
  font-family: var(--av3-ui);
  font-variant-numeric: tabular-nums;
  font-size: 20px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--av3-t-fast) var(--av3-ease), border-color var(--av3-t-fast) var(--av3-ease), transform var(--av3-t-fast) var(--av3-ease);
}
.av3-auth-key:hover { background: var(--av3-s2); border-color: var(--av3-muted); }
.av3-auth-key:active { transform: scale(0.96); }
.av3-auth-key:focus-visible { outline: 2px solid var(--av3-brand); outline-offset: 2px; }
/* locked while a PIN is in flight — dim, no hover/press affordance. Listed
   before .av3-auth-key-go so the confirm CTA's own :disabled rules win. */
.av3-auth-key:disabled { opacity: 0.5; cursor: not-allowed; }
.av3-auth-key:disabled:hover { background: var(--av3-s1); border-color: var(--av3-line-strong); }
.av3-auth-key:disabled:active { transform: none; }
.av3-auth-key svg { width: 20px; height: 20px; }
/* delete reads quieter; confirm is the brand CTA, echoing .av3-btn-primary */
.av3-auth-key-del { color: var(--av3-muted); }
.av3-auth-key-go {
  background: var(--av3-brand);
  border-color: var(--av3-brand);
  color: #fff;
  box-shadow: 0 10px 26px -12px color-mix(in oklab, var(--av3-brand) 85%, transparent);
}
.av3-auth-key-go:hover { background: color-mix(in oklab, var(--av3-brand) 88%, #fff); border-color: var(--av3-brand); }
.av3-auth-key-go:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
.av3-auth-key-go:disabled:hover { background: var(--av3-brand); }
.av3-auth-keypad + .av3-auth-error { margin-top: 18px; }

@media (max-width: 420px) { .av3-auth-frame { padding: 32px 18px 28px; } }

<body class="av3-root">
<div style="font-size:11.5px;color:var(--av3-subtle);background:var(--av3-s2);border:1px dashed var(--av3-line-strong);border-radius:var(--av3-r-md);padding:8px 12px;margin-bottom:16px">Agent HQ — <b style="color:var(--av3-platinum)">Console</b> (full build) · real admin-v3 stylesheet, dark theme. Data illustrative.</div>
