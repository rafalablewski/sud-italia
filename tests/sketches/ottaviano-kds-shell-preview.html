<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OttavianoKDS — operator shell preview</title>
<!--
  Faithful HTML preview of the OttavianoKDS (operator) app shell after the
  "shell polish + universal surface search" wave. SwiftUI can't render in the
  web container, so this mirrors the SwiftUI exactly in the browser:

    • Palette = the GENERATED web Core dark tokens carried into Swift verbatim
      (native/.../Sources/DesignSystem/Tokens.generated.swift ← themes/core/tokens.css).
      Every colour/radius below is the same value the Swift Theme.kds resolves.
    • IA      = the full 54-surface OPERATOR_NAV (docs/native/parity/PARITY-LEDGER.md),
      role-filtered exactly like filteredNav(for:) (rank: owner100 / manager50 /
      staff20 / kitchen10). Flip "Viewing as" to watch the rail gate.
    • Shell   = the identity header, the .searchable jump bar, OperatorNavRow
      (icon chip + scaffold wrench), and the per-list .searchable row-finder.

  Native chrome (the split-view, search field, content-unavailable states) is
  SwiftUI in the app; here it's HTML standing in for it. Figures are illustrative.
  Nothing in /tests/ ships.
-->
<style>
  :root{
    /* KDS skin — Tokens.generated.swift (themes/core/tokens.css dark) */
    --accent:#D23A55; --on-accent:#FFFFFF; --brand:#D23A55;
    --surface:#100F12; --surface2:#1A191E; --line:#39383A;
    --text:#F4F1EC; --text2:#B8B0A6;
    --success:#3AA978; --warning:#D99A3C; --danger:#E2574F;
    --info:#5B8BD0; --risk:#8B5BD0;
    --r-sm:7px; --r-md:10px; --r-lg:14px; --r-xl:20px;
    --sel:rgba(210,58,85,.14);
    --hair:rgba(255,255,255,.05);
  }
  *{box-sizing:border-box}
  svg{width:18px;height:18px;flex:none}   /* default icon size; contexts below override */
  html,body{height:100%}
  body{
    margin:0; background:var(--surface); color:var(--text);
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .app{display:grid; grid-template-columns:320px 1fr; height:100vh}

  /* ---- Sidebar ---- */
  .side{border-right:1px solid var(--line); background:var(--surface); display:flex; flex-direction:column; min-height:0}
  .side-top{padding:14px 12px 8px}
  .ident{
    width:100%; display:flex; align-items:center; gap:10px; text-align:left; cursor:pointer;
    background:var(--surface2); border:1px solid var(--line); border-radius:var(--r-lg);
    padding:10px; color:inherit; transition:.15s;
  }
  .ident:hover{border-color:rgba(255,255,255,.18)}
  .ident .mark{
    width:44px;height:44px;border-radius:var(--r-md);background:var(--accent);
    display:grid;place-items:center;color:var(--on-accent);flex:none
  }
  .ident .mark svg{width:22px;height:22px}
  .ident .who{flex:1;min-width:0}
  .ident .name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ident .role{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:13px;margin-top:2px}
  .ident .dot{width:6px;height:6px;border-radius:50%;background:var(--success)}
  .ident .chev{color:var(--text2);flex:none}

  .viewas{display:flex;align-items:center;gap:8px;padding:10px 4px 6px;color:var(--text2);font-size:12px}
  .viewas select{
    background:var(--surface2);color:var(--text);border:1px solid var(--line);
    border-radius:var(--r-sm);padding:5px 8px;font:inherit;font-size:12px
  }

  .searchwrap{padding:6px 12px 10px}
  .search{position:relative}
  .search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text2)}
  .search input{
    width:100%;background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--text);
    border-radius:var(--r-md);padding:9px 10px 9px 32px;font:inherit;font-size:14px;outline:none
  }
  .search input:focus{border-color:var(--accent)}
  .search input::placeholder{color:var(--text2)}

  .rail{flex:1;overflow:auto;padding:0 8px 16px}
  .rail::-webkit-scrollbar{width:8px}
  .rail::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  .sec-hd{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    color:var(--text2);padding:14px 10px 5px}
  .navrow{
    display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:var(--r-md);
    cursor:pointer;color:var(--text);transition:.12s;border:1px solid transparent
  }
  .navrow:hover{background:var(--hair)}
  .navrow.active{background:var(--sel);border-color:rgba(210,58,85,.35)}
  .navrow .chip{
    width:28px;height:28px;border-radius:var(--r-sm);flex:none;display:grid;place-items:center;
    background:rgba(210,58,85,.12);color:var(--accent)
  }
  .navrow .chip svg{width:15px;height:15px}
  .navrow .lbl{flex:1;font-size:14.5px}
  .navrow .wrench{color:var(--text2);opacity:.55;flex:none}
  .navrow .wrench svg{width:13px;height:13px}
  .noresult{padding:30px 16px;text-align:center;color:var(--text2)}
  .noresult svg{width:34px;height:34px;opacity:.5;margin-bottom:8px}

  /* ---- Detail ---- */
  .detail{overflow:auto;min-height:0}
  .detail::-webkit-scrollbar{width:10px}
  .detail::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px}
  .navbar{
    position:sticky;top:0;z-index:5;background:rgba(16,15,18,.86);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);padding:14px 22px;display:flex;align-items:center;gap:12px
  }
  .navbar h1{font-size:18px;margin:0;font-weight:700}
  .navbar .sp{flex:1}
  .toolbtn{
    background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:var(--r-md);
    padding:7px 12px;font:inherit;font-size:13px;font-weight:600;cursor:pointer;display:flex;gap:6px;align-items:center
  }
  .toolbtn.primary{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
  .body{padding:22px;max-width:920px}

  /* shared bits */
  .chips{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .statchip{flex:1;min-width:120px;background:var(--surface2);border:1px solid var(--line);
    border-radius:var(--r-md);padding:12px 14px;text-align:center}
  .statchip .v{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
  .statchip .l{font-size:12px;color:var(--text2);margin-top:2px}

  .listsearch{position:relative;margin-bottom:12px}
  .listsearch svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text2)}
  .listsearch input{width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--text);
    border-radius:var(--r-md);padding:10px 12px 10px 36px;font:inherit;outline:none}
  .listsearch input:focus{border-color:var(--accent)}

  .list{background:var(--surface2);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden}
  .li{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--hair)}
  .li:last-child{border-bottom:none}
  .li .av{width:36px;height:36px;border-radius:var(--r-sm);flex:none;display:grid;place-items:center;
    background:rgba(210,58,85,.12);color:var(--accent);font-weight:700;font-size:14px}
  .li .main{flex:1;min-width:0}
  .li .t{font-weight:600}
  .li .s{font-size:13px;color:var(--text2);margin-top:1px}
  .li .r{text-align:right;font-variant-numeric:tabular-nums}
  .li .money{font-weight:600}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
    padding:2px 8px;border-radius:999px;border:1px solid}
  .b-danger{color:var(--danger);background:rgba(226,87,79,.16);border-color:rgba(226,87,79,.3)}
  .b-success{color:var(--success);background:rgba(58,169,120,.16);border-color:rgba(58,169,120,.3)}
  .b-warning{color:var(--warning);background:rgba(217,154,60,.16);border-color:rgba(217,154,60,.3)}
  .b-info{color:var(--info);background:rgba(91,139,208,.16);border-color:rgba(91,139,208,.3)}
  .b-neutral{color:var(--text2);background:rgba(255,255,255,.04);border-color:var(--line)}
  .stars{color:var(--warning);letter-spacing:1px}

  /* metric tiles */
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
  .tile{background:var(--surface2);border:1px solid var(--line);border-radius:var(--r-lg);padding:14px}
  .tile .top{display:flex;justify-content:space-between;align-items:center;color:var(--text2);font-size:12px}
  .tile .top svg{width:16px;height:16px}
  .tile .val{font-size:24px;font-weight:700;margin-top:6px;font-variant-numeric:tabular-nums}
  .tile .delta{font-size:12px;margin-top:4px;display:flex;align-items:center;gap:3px}
  .tile .delta svg{width:13px;height:13px}
  .li .av svg{width:18px;height:18px}
  .up{color:var(--success)} .down{color:var(--danger)}

  /* generic live / scaffold cards */
  .surf-hd{display:flex;gap:14px;align-items:center;margin-bottom:18px}
  .surf-hd .big{width:54px;height:54px;border-radius:var(--r-md);background:rgba(210,58,85,.14);
    color:var(--accent);display:grid;place-items:center;flex:none}
  .surf-hd .big svg{width:26px;height:26px}
  .surf-hd .ttl{font-size:22px;font-weight:700}
  .surf-hd .sub{color:var(--text2);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;margin-top:3px}
  .panel{background:var(--surface2);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px;margin-bottom:14px}
  .panel .k{font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--text2);text-transform:uppercase;margin-bottom:8px}
  .kv{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--hair)}
  .kv:last-child{border-bottom:none}
  .kv .vv{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px}
  .empty{padding:60px 20px;text-align:center;color:var(--text2)}
  .empty svg{width:42px;height:42px;opacity:.5;margin-bottom:10px}

  .note{margin:2px 22px 22px;color:var(--text2);font-size:12px;border-top:1px dashed var(--line);padding-top:12px;max-width:920px}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="side-top">
      <button class="ident" onclick="alert('Opens the Account sheet — identity + sign out (OperatorAccountView).')">
        <span class="mark"></span>
        <span class="who">
          <div class="name" id="identName">Rafał Ablewski</div>
          <div class="role"><span class="dot"></span><span id="identRole">Owner</span></div>
        </span>
        <span class="chev"></span>
      </button>
      <div class="viewas">
        <span>Viewing as</span>
        <select id="roleSel" onchange="setRole(this.value)">
          <option value="owner">Owner (100)</option>
          <option value="manager">Manager (50)</option>
          <option value="staff">Staff (20)</option>
          <option value="kitchen">Kitchen (10)</option>
        </select>
      </div>
    </div>
    <div class="searchwrap">
      <div class="search">
        <input id="navSearch" type="search" placeholder="Search surfaces" oninput="renderRail()" />
      </div>
    </div>
    <div class="rail" id="rail"></div>
  </aside>

  <main class="detail">
    <div class="navbar">
      <h1 id="detTitle">Dashboard</h1>
      <span class="sp"></span>
      <span id="detTool"></span>
    </div>
    <div class="body" id="detBody"></div>
    <div class="note" id="detNote"></div>
  </main>
</div>

let role='owner', selected='/admin';
const flat=()=>NAV.flatMap(s=>s[1]);
const reach=()=>flat().filter(i=>RANK[role]>=RANK[i[3]]).length;

function setRole(r){
  role=r;
  document.getElementById('identRole').textContent={owner:'Owner',manager:'Manager',staff:'Staff',kitchen:'Kitchen'}[r];
  const cur=flat().find(i=>i[0]===selected);
  if(!cur || RANK[role]<RANK[cur[3]]) selected = (role==='kitchen')?'/core/kds':'/admin';
  renderRail(); renderDetail();
}

function renderRail(){
  const q=document.getElementById('navSearch').value.trim().toLowerCase();
  document.getElementById('navSearch').placeholder='Search '+reach()+' surfaces';
  let html='', any=false;
  for(const [sec,items] of NAV){
    const vis=items.filter(i=>RANK[role]>=RANK[i[3]] &&
      (!q || i[1].toLowerCase().includes(q) || i[5].toLowerCase().includes(q)));
    if(!vis.length) continue; any=true;
    html+='<div class="sec-hd">'+sec+'</div>';
    for(const i of vis){
      html+='<div class="navrow'+(i[0]===selected?' active':'')+'" onclick="pick(\''+i[0]+'\')">'
        +'<span class="chip">'+svg(i[2])+'</span><span class="lbl">'+i[1]+'</span>'
        +(i[4]==='scaffold'?'<span class="wrench" title="Layout-parity scaffold">'+svg('wrench')+'</span>':'')+'</div>';
    }
  }
  if(!any) html='<div class="noresult">'+svg('search')+'<div>No surfaces match “'+q+'”.</div></div>';
  document.getElementById('rail').innerHTML=html;
}
function pick(id){selected=id; renderRail(); renderDetail();}

function listSearch(ph){return '<div class="listsearch">'+svg('search')+'<input type="search" placeholder="'+ph+'" oninput="filterList(this)"></div>';}
function filterList(inp){
  const q=inp.value.trim().toLowerCase();
  inp.closest('.body').querySelectorAll('.li').forEach(li=>{
    li.style.display = !q || li.dataset.s.includes(q) ? '' : 'none';
  });
}

function renderDetail(){
  const item=flat().find(i=>i[0]===selected) || flat()[0];
  document.getElementById('detTitle').textContent=item[1];
  // toolbar example: write surfaces carry a primary action in the app
  const tools={'/admin/haccp':'Log temperature','/admin/waste':'Log waste','/admin/cash':'Open till','/admin/comms/announcements':'New announcement'};
  document.getElementById('detTool').innerHTML = tools[item[0]]
    ? '<button class="toolbtn primary">+ '+tools[item[0]]+'</button>' : '';
  let body;
  if(item[4]==='scaffold') body=detailScaffold(item);
  else if(item[0]==='/admin') body=detailDashboard(item);
  else if(item[0]==='/admin/customers') body=detailCustomers();
  else if(item[0]==='/admin/inventory') body=detailInventory();
  else if(item[0]==='/admin/feedback') body=detailFeedback();
  else body=detailGeneric(item);

    'Preview of the <b>OttavianoKDS</b> operator shell · dark Core skin from <code>Tokens.generated.swift</code>. '
