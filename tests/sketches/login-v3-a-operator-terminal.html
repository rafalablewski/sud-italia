<!doctype html>
<html lang="en" data-admin-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login · Version A — Operator Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<!--
  Login · Version A — "Operator Terminal" (this is the direction wired into the app).
  Centered card on the deep av3 canvas: a faint, radially-masked structural grid +
  one brand glow, with the card's brand→platinum signature hairline. Tokens lifted
  1:1 from src/app/themes/admin-v3/index.css. Static mockup — figures illustrative.
-->
<style>
  :root {
    --bg:#0a0a0c; --s1:#141417; --s2:#1b1b1f; --s3:#24242a;
    --line:rgba(255,255,255,.07); --line-strong:rgba(255,255,255,.13);
    --fg:#f4f3f1; --muted:#a6a099; --subtle:#8a837b;
    --brand:#c2384f; --platinum:#cbb48a; --ok:#34b27b; --bad:#e8554f;
    --bad-soft:color-mix(in oklab, var(--bad) 16%, var(--s1));
    --r-sm:5px; --r-md:8px; --r-lg:11px;
    --ui:"Inter",system-ui,sans-serif; --display:"Fraunces",Georgia,serif; --mono:"JetBrains Mono",monospace;
    --ease:cubic-bezier(.4,0,.2,1);
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font-family:var(--ui); -webkit-font-smoothing:antialiased; }

  .auth { position:relative; min-height:100vh; display:grid; place-items:center; padding:24px; overflow:hidden; }
  .auth::before {
    content:""; position:absolute; inset:0; pointer-events:none; opacity:.7;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:46px 46px;
    -webkit-mask-image:radial-gradient(ellipse 72% 64% at 50% 36%,#000 30%,transparent 80%);
    mask-image:radial-gradient(ellipse 72% 64% at 50% 36%,#000 30%,transparent 80%);
  }
  .auth::after {
    content:""; position:absolute; left:50%; top:-12%; width:640px; height:640px; max-width:130vw;
    transform:translateX(-50%); pointer-events:none;
    background:radial-gradient(circle,color-mix(in oklab,var(--brand) 30%,transparent),transparent 62%);
  }

  .card {
    position:relative; z-index:1; width:100%; max-width:384px; padding:32px;
    background:color-mix(in oklab,var(--s1) 84%,transparent);
    border:1px solid var(--line-strong); border-radius:var(--r-lg);
    box-shadow:0 8px 28px -8px rgba(0,0,0,.55);
    backdrop-filter:blur(14px) saturate(140%);
    animation:in .26s var(--ease) both;
  }
  .card::before {
    content:""; position:absolute; inset:0 0 auto 0; height:1px; border-radius:var(--r-lg) var(--r-lg) 0 0;
    background:linear-gradient(90deg,transparent,var(--brand) 28%,var(--platinum) 72%,transparent);
  }
  @keyframes in { from{opacity:0;transform:translateY(8px) scale(.985);} to{opacity:1;transform:none;} }

  .head { display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:24px; text-align:center; }
  .mark {
    display:grid; place-items:center; width:52px; height:52px; border-radius:var(--r-md);
    background:var(--brand); color:#fff; font-family:var(--display); font-size:20px; font-weight:600; letter-spacing:.02em;
    box-shadow:inset 0 0 0 1px color-mix(in oklab,var(--platinum) 50%,transparent),0 10px 26px -10px color-mix(in oklab,var(--brand) 75%,transparent);
  }
  .title { font-family:var(--display); font-size:24px; font-weight:600; letter-spacing:-.01em; }
  .sub { margin-top:4px; font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:.14em; color:var(--subtle); }

  form { display:flex; flex-direction:column; gap:14px; }
  .field { display:flex; flex-direction:column; gap:4px; }
  .label { font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--subtle); }
  .input {
    width:100%; height:38px; padding:0 10px; border:1px solid var(--line-strong); border-radius:var(--r-sm);
    background:var(--s1); color:var(--fg); font:inherit; font-size:13px;
    transition:border-color .11s var(--ease),box-shadow .11s var(--ease);
  }
  .input::placeholder { color:var(--subtle); }
  .input:hover { border-color:var(--muted); }
  .input:focus { outline:none; border-color:var(--brand); box-shadow:0 0 0 3px color-mix(in oklab,var(--brand) 18%,var(--s1)); }

  .btn {
    width:100%; height:40px; display:inline-flex; align-items:center; justify-content:center; gap:6px;
    border:1px solid var(--line-strong); border-radius:var(--r-sm); background:var(--s2); color:var(--fg);
    font:inherit; font-size:13px; font-weight:500; cursor:pointer; transition:background .11s var(--ease);
  }
  .btn:hover { background:var(--s3); }
  .btn-primary { background:var(--brand); border-color:transparent; color:#fff; }
  .btn-primary:hover { background:color-mix(in oklab,var(--brand) 88%,#fff); }
  .btn svg { width:14px; height:14px; }

  .or { display:flex; align-items:center; gap:12px; font-size:10.5px; text-transform:uppercase; letter-spacing:.12em; color:var(--subtle); }
  .or::before,.or::after { content:""; flex:1; height:1px; background:var(--line); }

  .foot { margin-top:22px; display:flex; flex-direction:column; gap:5px; text-align:center; font-size:11.5px; color:var(--muted); }
  .foot a { color:var(--fg); text-decoration:none; border-bottom:1px solid var(--line-strong); }
  .foot a:hover { border-color:var(--brand); }
</style>
</head>
<body>
  <div class="auth">
    <div class="card">
      <div class="head">
        <span class="mark">SI</span>
        <div>
          <div class="title">Ottaviano</div>
          <div class="sub">Owner console</div>
        </div>
      </div>
      <form onsubmit="return false">
        <div class="field">
          <label class="label" for="a-email">Email (optional)</label>
          <input id="a-email" class="input" type="email" placeholder="Leave blank for the shared owner session" />
        </div>
        <div class="field">
          <label class="label" for="a-pass">Password</label>
          <input id="a-pass" class="input" type="password" placeholder="••••••••" autofocus />
        </div>
        <button class="btn btn-primary" type="submit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Sign in
        </button>
        <div class="or">or</div>
        <button class="btn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg>
          Passkey / security key
        </button>
      </form>
      <div class="foot">
        <p>Manager or staff? <a href="#">Sign in here</a></p>
      </div>
    </div>
  </div>
</body>
</html>
