# ============================================================================
# project.yml — XcodeGen spec for the bare React Native 0.79.5 iOS apps.
#
# This is the readable, reviewable source of truth for the Xcode project. The
# binary .xcodeproj is GENERATED (and gitignored) — never commit it.
#
# BUILD FLOW (macOS / CI / Xcode Cloud):
#
#   1.  cd native/ottaviano-rn && npm install        # install node_modules
#   2.  cd ios && xcodegen generate                  # project.yml -> Ottaviano.xcodeproj
#   3.  bundle install && bundle exec pod install     # CocoaPods -> Ottaviano.xcworkspace
#   4.  xcodebuild -workspace Ottaviano.xcworkspace -scheme <Ottaviano|OttavianoKDS> ...
#
# Because this is React Native + CocoaPods, ALL builds go through the WORKSPACE
# (Ottaviano.xcworkspace, created by pod install) — never the bare .xcodeproj.
#
# Two app targets share one AppDelegate.swift, one LaunchScreen, one JS bundle
# and the same moduleName "Ottaviano". They differ only in:
#   - bundle id        (pl.ottaviano.customer vs pl.ottaviano.kds)
#   - display name     (Ottaviano vs OttavianoKDS)
#   - Info.plist       (customer = portrait-first iPhone; operator = landscape-first iPad)
#
# Each target:
#   - embeds the JS bundle in Release/archive via the RN "Bundle React Native
#     code and images" script phase (react-native-xcode.sh),
#   - bundles MaterialCommunityIcons.ttf (registered via UIAppFonts in Info.plist)
#     so react-native-vector-icons glyphs render. (Alternative: run
#     `npx react-native-asset` to copy/register fonts automatically — see README.)
# ============================================================================

name: Ottaviano

options:
  bundleIdPrefix: pl.ottaviano
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

# Settings applied to every target/config.
settings:
  base:
    # CFBundleShortVersionString (the marketing version testers SEE). This MUST
    # stay >= the live TestFlight train, or App Store Connect files the upload as
    # an OLDER version and it never surfaces as an update — the "no update" bug
    # (we sat frozen at 0.3.0 while the app shipped 0.4.x, so every KDS upload was
    # invisible to testers). Bumped to 0.5.0 to clear the 0.4.x train. When the
    # team cuts a train past this, bump here — or pass `marketing_version` to the
    # TestFlight workflow for a one-off. CI echoes the resolved version in the log
    # so a stale value is caught before upload.
    #
    # BUMP CONVENTION: increment the PATCH (the last number) — 0.5.0 → 0.5.1 →
    # 0.5.2 — NOT the minor. Only move the minor (→ 0.6.0) on a deliberate new
    # train, not for routine TestFlight pushes.
    MARKETING_VERSION: "0.5.9"
    # CFBundleVersion (build number). Old app shipped build 51; the bare-RN line
    # starts at 60 (strictly > 51). CI auto-increments it monotonically per run
    # (60 + github.run_number) so every upload climbs and TestFlight always
    # accepts it — see .github/workflows/ios-testflight.yml.
    CURRENT_PROJECT_VERSION: "60"
    DEVELOPMENT_TEAM: T4WC9M8Y3S
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    SWIFT_VERSION: "5.0"
    # React Native build phases shell out to node and write into DerivedData;
    # the user-script sandbox must be off or react-native-xcode.sh fails.
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CLANG_ENABLE_MODULES: YES
    LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"

# Reusable script-phase fragments referenced by both targets below.
# (Anchors keep the two target definitions DRY.)
_rnBundlePhase: &rnBundlePhase
  name: Bundle React Native code and images
  basedOnDependencyAnalysis: false
  shell: /bin/sh
  script: |
    set -e
    WITH_ENVIRONMENT="$REACT_NATIVE_PATH/scripts/xcode/with-environment.sh"
    REACT_NATIVE_XCODE="$REACT_NATIVE_PATH/scripts/react-native-xcode.sh"
    if [ -f "$WITH_ENVIRONMENT" ]; then
      /bin/sh -c "$WITH_ENVIRONMENT \"$REACT_NATIVE_XCODE\""
    else
      /bin/sh "$REACT_NATIVE_XCODE"
    fi
  inputFiles:
    - $(SRCROOT)/.xcode.env.local
    - $(SRCROOT)/.xcode.env

targets:
  # --------------------------------------------------------------------------
  # Ottaviano — customer app (pl.ottaviano.customer), portrait-first iPhone.
  # --------------------------------------------------------------------------
  Ottaviano:
    type: application
    platform: iOS
    sources:
      - path: Ottaviano/AppDelegate.swift
      - path: Ottaviano/LaunchScreen.storyboard
      - path: Ottaviano/Images.xcassets
      # Bridged native SwiftUI Liquid Glass element (ADR-001) — shared by both apps.
      - path: Ottaviano/LiquidGlassView.swift
      - path: Ottaviano/AuroraView.swift
      - path: Ottaviano/LiquidGlassViewManager.swift
      - path: Ottaviano/LiquidGlassViewManager.m
      - path: Ottaviano/PrivacyInfo.xcprivacy
        buildPhase: resources
      # NOTE: the MaterialCommunityIcons font is shipped by the RNVectorIcons
      # pod's "[CP] Copy Pods Resources" phase — do NOT also copy it here (Xcode
      # errors with "Multiple commands produce …MaterialCommunityIcons.ttf").
      # Info.plist UIAppFonts registers it; the pod provides the file.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pl.ottaviano.customer
        PRODUCT_NAME: Ottaviano
        INFOPLIST_FILE: Ottaviano/Info.plist
        REACT_NATIVE_PATH: $(SRCROOT)/../node_modules/react-native
    preBuildScripts: []
    postCompileScripts:
      - *rnBundlePhase

  # --------------------------------------------------------------------------
  # OttavianoKDS — operator / kitchen display (pl.ottaviano.kds), landscape-first iPad.
  # Same JS bundle + moduleName "Ottaviano"; differs by bundle id / name / plist.
  # --------------------------------------------------------------------------
  OttavianoKDS:
    type: application
    platform: iOS
    sources:
      - path: Ottaviano/AppDelegate.swift
      - path: Ottaviano/LaunchScreen.storyboard
      - path: Ottaviano/Images.xcassets
      # Bridged native SwiftUI Liquid Glass element (ADR-001) — shared by both apps.
      - path: Ottaviano/LiquidGlassView.swift
      - path: Ottaviano/AuroraView.swift
      - path: Ottaviano/LiquidGlassViewManager.swift
      - path: Ottaviano/LiquidGlassViewManager.m
      - path: Ottaviano/PrivacyInfo.xcprivacy
        buildPhase: resources
      # Font shipped by the RNVectorIcons pod (see customer target note).
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pl.ottaviano.kds
        PRODUCT_NAME: OttavianoKDS
        INFOPLIST_FILE: OttavianoKDS/Info.plist
        REACT_NATIVE_PATH: $(SRCROOT)/../node_modules/react-native
    preBuildScripts: []
    postCompileScripts:
      - *rnBundlePhase

schemes:
  Ottaviano:
    build:
      targets:
        Ottaviano: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
  OttavianoKDS:
    build:
      targets:
        OttavianoKDS: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
