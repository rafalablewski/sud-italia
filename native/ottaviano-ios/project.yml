# XcodeGen spec → run `xcodegen generate` (on a Mac or in CI) to produce
# Ottaviano.xcodeproj with the two installable app targets. Authored as text so
# the project is fully reproducible without committing a binary .xcodeproj (and
# without a Mac here).
#
# Both apps are the SAME pure-UIKit web-shell (Sources/WebShell) — a WKWebView
# that renders the live web app, so each screen is the web UI 1:1 and can never
# drift. The only per-app difference is data in each Apps/<App>/Info.plist
# (OTTWeb* keys: which URL to open, the brand chrome). No SwiftUI, no SwiftPM
# package — the whole iOS surface is the WebShell files + two Info.plists.
name: Ottaviano
options:
  bundleIdPrefix: pl.ottaviano
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: T4WC9M8Y3S # Ottaviano Apple Developer team (public id, not a secret)
    TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad (universal)
    # Release (user-facing) version. Bumped for the move to the native web shell.
    MARKETING_VERSION: "0.4.0"
    # Build number (CFBundleVersion) — a plain, monotonically increasing INTEGER,
    # strictly greater than every prior build (…, 49, 50, 51). Apple compares
    # build numbers numerically, so keep this an integer above the current max.
    # Source of truth here; bump +1 each TestFlight release.
    CURRENT_PROJECT_VERSION: "52"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  Ottaviano:
    type: application
    platform: iOS
    sources:
      - Sources/WebShell
      - Apps/Ottaviano
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pl.ottaviano.customer
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Apps/Ottaviano/Info.plist
        # iPhone-first customer app: portrait primary, both idioms allowed.
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  OttavianoKDS:
    type: application
    platform: iOS
    sources:
      - Sources/WebShell
      - Apps/OttavianoKDS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pl.ottaviano.kds
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Apps/OttavianoKDS/Info.plist
        # iPad-first operator app: landscape primary on iPad.
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"

schemes:
  Ottaviano:
    build:
      targets:
        Ottaviano: all
    run:
      config: Debug
  OttavianoKDS:
    build:
      targets:
        OttavianoKDS: all
    run:
      config: Debug
