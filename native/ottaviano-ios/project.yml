# XcodeGen spec → run `xcodegen generate` (on a Mac or in CI) to produce
# Ottaviano.xcodeproj with the two installable app targets, both depending on the
# local OttavianoKit SwiftPM package. Authored as text so the project is fully
# reproducible without committing a binary .xcodeproj (and without a Mac here).
name: Ottaviano
options:
  bundleIdPrefix: pl.ottaviano
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

packages:
  OttavianoKit:
    path: .

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: T4WC9M8Y3S # Ottaviano Apple Developer team (public id, not a secret)
    TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad (universal)
    # Bumped above the stray 0.2.1 build already in TestFlight so the parity
    # release supersedes it — TestFlight compares this (CFBundleShortVersionString)
    # first, so a build that's merely newer by date/build-number but a LOWER
    # version is never offered as an update. Keep this ahead of every prior upload.
    MARKETING_VERSION: "0.3.0"
    CURRENT_PROJECT_VERSION: "1"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  Ottaviano:
    type: application
    platform: iOS
    sources:
      - Apps/Ottaviano
    dependencies:
      - package: OttavianoKit
        product: OttavianoKit
      - package: OttavianoKit
        product: AppFeatures
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pl.ottaviano.customer
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Ottaviano
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        # iPhone-first customer app: portrait primary, both idioms allowed.
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  OttavianoKDS:
    type: application
    platform: iOS
    sources:
      - Apps/OttavianoKDS
    dependencies:
      - package: OttavianoKit
        product: OttavianoKit
      - package: OttavianoKit
        product: AppFeatures
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pl.ottaviano.kds
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: OttavianoKDS
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        # iPad-first operator app: landscape primary on iPad.
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"

schemes:
  Ottaviano:
    build:
      targets:
        Ottaviano: all
    run:
      config: Debug
  OttavianoKDS:
    build:
      targets:
        OttavianoKDS: all
    run:
      config: Debug
