# XcodeGen spec → run `xcodegen generate` (on a Mac or in CI) to produce
# Ottaviano.xcodeproj with the OttavianoKDS app target, depending on the local
# OttavianoKit SwiftPM package. Authored as text so the project is fully
# reproducible without committing a binary .xcodeproj (and without a Mac here).
#
# Scope: OttavianoKDS (operator) only. The customer app target was retired —
# "we build only SwiftUI, OttavianoKDS only" (owner directive). The shared
# OttavianoKit spine + AppFeatures (Operator + KDS) is the whole product.
name: Ottaviano
options:
  bundleIdPrefix: pl.ottaviano
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

packages:
  OttavianoKit:
    path: .

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: T4WC9M8Y3S # Ottaviano Apple Developer team (public id, not a secret)
    TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad (universal)
    # Release (user-facing) version.
    MARKETING_VERSION: "0.3.0"
    # Build number (CFBundleVersion) — a plain, monotonically increasing INTEGER,
    # bumped +1 on every TestFlight upload. It must be strictly greater than every
    # prior build's number, and Apple compares build numbers numerically — so a
    # lower integer sorts BELOW existing builds and TestFlight treats it as older.
    # CRITICAL: this app shares the bundle id pl.ottaviano.kds with the React
    # Native OttavianoKDS target (native/ottaviano-rn), so its builds land in the
    # SAME App Store Connect record. The RN pipeline reached build 60, so build 52
    # sorted underneath it and never became the "latest" testers see. This is set
    # ABOVE the RN max so the SwiftUI build is unambiguously the newest. (Fix the
    # collision for good by retiring the RN KDS TestFlight target — only one
    # pipeline should own pl.ottaviano.kds.)
    CURRENT_PROJECT_VERSION: "61"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  OttavianoKDS:
    type: application
    platform: iOS
    sources:
      - Apps/OttavianoKDS
    dependencies:
      - package: OttavianoKit
        product: OttavianoKit
      - package: OttavianoKit
        product: AppFeatures
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pl.ottaviano.kds
        GENERATE_INFOPLIST_FILE: YES
        # Export compliance: the app uses only standard, exempt encryption (HTTPS /
        # URLSession + Keychain), so declare it here. WITHOUT this key every
        # TestFlight build lands in "Missing Compliance" and is unavailable to
        # testers until answered by hand — i.e. the upload succeeds but testers
        # can't install it. (The RN app sets the same key in its Info.plist.)
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_CFBundleDisplayName: OttavianoKDS
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        # iPad-first operator app: landscape primary on iPad.
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"

schemes:
  OttavianoKDS:
    build:
      targets:
        OttavianoKDS: all
    run:
      config: Debug
