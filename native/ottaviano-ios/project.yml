# XcodeGen spec → run `xcodegen generate` (on a Mac or in CI) to produce
# Ottaviano.xcodeproj with the OttavianoKDS app target, depending on the local
# OttavianoKit SwiftPM package. Authored as text so the project is fully
# reproducible without committing a binary .xcodeproj (and without a Mac here).
#
# Scope: OttavianoKDS (operator) only. The customer app target was retired —
# "we build only SwiftUI, OttavianoKDS only" (owner directive). The shared
# OttavianoKit spine + AppFeatures (Operator + KDS) is the whole product.
name: Ottaviano
options:
  bundleIdPrefix: pl.ottaviano
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

packages:
  OttavianoKit:
    path: .

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: T4WC9M8Y3S # Ottaviano Apple Developer team (public id, not a secret)
    TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad (universal)
    # Release (user-facing) version. Bumped 0.3.0 → 0.4.0 so this SwiftUI build
    # sorts ABOVE every prior 0.3.0 build by VERSION — TestFlight orders builds by
    # (version, build), and a higher marketing version wins regardless of build
    # number. This makes the SwiftUI operator app the unambiguous "latest" testers
    # see even if a stray 0.3.0 upload lingers in the shared record.
    MARKETING_VERSION: "0.4.0"
    # Build number (CFBundleVersion) — a plain, monotonically increasing INTEGER,
    # bumped on every TestFlight upload. It must be strictly greater than every
    # prior build's number, and Apple compares build numbers numerically — a lower
    # integer sorts BELOW existing builds and TestFlight treats it as older.
    # HISTORY OF THIS COLLISION: this app shares the bundle id pl.ottaviano.kds
    # with the React Native OttavianoKDS scheme (native/ottaviano-rn), so both
    # land in the SAME App Store Connect record. The RN TestFlight workflow set
    # its build number to `60 + github.run_number`, so an RN KDS upload (dispatch
    # run #143) landed at build 203 at 0.3.0 — while the SwiftUI fix in #222 only
    # bumped to 61. 61 < 203, so the SwiftUI build stayed BURIED and testers were
    # never offered it. Fixed for good two ways: (1) this build number is set well
    # ABOVE the RN max (203) AND the marketing version is bumped so version sorts
    # it on top regardless; (2) the RN TestFlight workflow (ios-testflight.yml) is
    # now customer-only (Ottaviano / pl.ottaviano) and can no longer upload
    # pl.ottaviano.kds, so nothing else ever leapfrogs this record again — the
    # SwiftUI pipeline is the sole owner of pl.ottaviano.kds.
    CURRENT_PROJECT_VERSION: "210"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  OttavianoKDS:
    type: application
    platform: iOS
    sources:
      - Apps/OttavianoKDS
    dependencies:
      - package: OttavianoKit
        product: OttavianoKit
      - package: OttavianoKit
        product: AppFeatures
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pl.ottaviano.kds
        GENERATE_INFOPLIST_FILE: YES
        # Export compliance: the app uses only standard, exempt encryption (HTTPS /
        # URLSession + Keychain), so declare it here. WITHOUT this key every
        # TestFlight build lands in "Missing Compliance" and is unavailable to
        # testers until answered by hand — i.e. the upload succeeds but testers
        # can't install it. (The RN app sets the same key in its Info.plist.)
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_CFBundleDisplayName: OttavianoKDS
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        # iPad-first operator app: landscape primary on iPad.
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"

schemes:
  OttavianoKDS:
    build:
      targets:
        OttavianoKDS: all
    run:
      config: Debug
