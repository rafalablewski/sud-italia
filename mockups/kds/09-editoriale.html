<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sud Italia KDS — Editoriale</title>
<style>
  :root{
    --paper:#F6F1E7;
    --paper-2:#FBF8F1;
    --card:#FCFAF4;
    --ink:#1A1A1A;
    --ink-soft:#3C3A35;
    --ink-dim:#6E6A60;
    --ink-faint:#9A9488;
    --hair:rgba(26,26,26,0.14);
    --hair-soft:rgba(26,26,26,0.08);
    --accent:#9C3B23;        /* deep terracotta */
    --accent-soft:rgba(156,59,35,0.10);
    --olive:#5C5A2E;
    --amber:#A8741A;
    --amber-soft:rgba(168,116,26,0.12);
    --danger:#9C3B23;
    --danger-soft:rgba(156,59,35,0.10);
    --calm:#5C5A2E;
    --calm-soft:rgba(92,90,46,0.10);
    --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px; --s7:48px;
    --serif:Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    font-size:14px;
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}

  /* ---------- Header ---------- */
  header{
    flex:0 0 auto;
    background:var(--paper-2);
    border-bottom:1px solid var(--hair);
    padding:var(--s4) var(--s7) var(--s3);
  }
  .topline{
    display:flex;align-items:flex-start;justify-content:space-between;gap:var(--s5);
  }
  .brand{display:flex;flex-direction:column;gap:2px}
  .wordmark{
    font-family:var(--serif);
    font-weight:700;
    font-size:24px;
    letter-spacing:0.30em;
    text-transform:uppercase;
    color:var(--ink);
    line-height:1;
  }
  .sub{
    display:flex;align-items:center;gap:var(--s3);
    font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink-dim);
  }
  .sub .tag{color:var(--accent);font-weight:600}
  .gallery{
    color:var(--ink-dim);text-decoration:none;font-size:11px;letter-spacing:0.16em;
    text-transform:uppercase;border-bottom:1px solid transparent;padding-bottom:1px;
  }
  .gallery:hover{color:var(--accent);border-bottom-color:var(--accent)}

  .clockwrap{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
  .clock{
    font-family:var(--serif);font-size:26px;font-weight:400;color:var(--ink);line-height:1;
    letter-spacing:0.04em;
  }
  .clock-label{font-size:10px;letter-spacing:0.24em;text-transform:uppercase;color:var(--ink-faint)}

  .filterbar{
    margin-top:var(--s4);
    display:flex;align-items:center;gap:var(--s4);
    border-top:1px solid var(--hair-soft);
    padding-top:var(--s3);
  }
  .filter-label{
    font-size:10px;letter-spacing:0.24em;text-transform:uppercase;color:var(--ink-faint);
    font-family:var(--serif);font-style:italic;
  }
  .chips{display:flex;gap:var(--s1);flex-wrap:wrap}
  .chip{
    appearance:none;border:1px solid var(--hair);background:transparent;
    color:var(--ink-soft);font-family:var(--sans);font-size:12px;letter-spacing:0.08em;
    padding:5px 13px;border-radius:999px;cursor:pointer;transition:all .15s ease;
  }
  .chip:hover{border-color:var(--ink-dim)}
  .chip[aria-pressed="true"]{
    background:var(--ink);color:var(--paper-2);border-color:var(--ink);
  }

  /* ---------- Board ---------- */
  main{
    flex:1 1 auto;overflow:hidden;
    padding:var(--s5) var(--s7) var(--s6);
    display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s6);
    min-height:0;
  }
  .column{display:flex;flex-direction:column;min-height:0}
  .col-head{
    display:flex;align-items:baseline;justify-content:space-between;
    padding-bottom:var(--s3);margin-bottom:var(--s4);
    border-bottom:2px solid var(--ink);
  }
  .col-title{
    font-family:var(--serif);font-size:18px;font-weight:700;letter-spacing:0.02em;color:var(--ink);
  }
  .col-title .kicker{
    display:block;font-family:var(--sans);font-size:9px;letter-spacing:0.30em;
    text-transform:uppercase;color:var(--ink-faint);margin-bottom:3px;font-weight:600;
  }
  .col-count{
    font-family:var(--serif);font-size:20px;font-weight:400;color:var(--ink-dim);
  }
  .col-body{flex:1 1 auto;overflow-y:auto;padding-right:6px;display:flex;flex-direction:column;gap:var(--s4)}
  .col-body::-webkit-scrollbar{width:6px}
  .col-body::-webkit-scrollbar-thumb{background:var(--hair);border-radius:3px}

  .empty{
    border:1px dashed var(--hair);border-radius:3px;padding:var(--s5);text-align:center;
    font-family:var(--serif);font-style:italic;color:var(--ink-faint);font-size:14px;
  }

  /* ---------- Ticket ("menu card") ---------- */
  .ticket{
    position:relative;background:var(--card);border:1px solid var(--hair);
    border-top:3px solid var(--ink);
    border-radius:2px;padding:var(--s4) var(--s5) var(--s5);
    box-shadow:0 1px 0 rgba(26,26,26,0.04),0 8px 22px -16px rgba(26,26,26,0.35);
  }
  .ticket.warn{border-top-color:var(--amber)}
  .ticket.danger{border-top-color:var(--danger)}
  .ticket.calm{border-top-color:var(--calm)}

  .t-top{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--s3)}
  .t-id{
    font-family:var(--serif);font-size:19px;font-weight:700;letter-spacing:0.04em;color:var(--ink);
    line-height:1;
  }
  .t-name{font-size:12px;color:var(--ink-dim);margin-top:5px;letter-spacing:0.02em}
  .t-meta{text-align:right;display:flex;flex-direction:column;gap:3px;align-items:flex-end}
  .t-channel{
    font-size:9px;letter-spacing:0.20em;text-transform:uppercase;font-weight:600;
    color:var(--ink-soft);border:1px solid var(--hair);padding:2px 7px;border-radius:2px;
  }
  .t-channel.delivery{color:var(--accent);border-color:var(--accent-soft)}
  .t-loc{font-size:10px;letter-spacing:0.10em;color:var(--ink-faint);text-transform:uppercase}

  .rule{height:1px;background:var(--hair-soft);margin:var(--s4) 0}
  .rule.dotted{
    height:0;border-top:1px dotted var(--hair);background:none;
  }

  .group{margin-bottom:var(--s3)}
  .group:last-child{margin-bottom:0}
  .group-h{
    font-family:var(--serif);font-style:italic;font-size:11px;color:var(--accent);
    letter-spacing:0.04em;margin-bottom:var(--s1);
  }
  .item{display:flex;align-items:baseline;gap:var(--s2);font-size:14px;color:var(--ink-soft);line-height:1.5}
  .item .q{
    font-family:var(--serif);font-weight:700;color:var(--ink);min-width:26px;
  }
  .item .nm{flex:1 1 auto}
  .item .note{
    display:block;font-style:italic;font-size:11.5px;color:var(--ink-dim);margin-left:34px;margin-top:1px;
  }

  .special{
    margin-top:var(--s3);font-size:12px;font-style:italic;color:var(--ink-soft);
    background:var(--accent-soft);border-left:2px solid var(--accent);
    padding:var(--s2) var(--s3);border-radius:0 2px 2px 0;
  }
  .special b{font-style:normal;font-weight:600;color:var(--accent);letter-spacing:0.04em;
    font-size:9px;text-transform:uppercase;display:block;margin-bottom:1px}

  /* footer of card: timers + action */
  .t-foot{display:flex;align-items:flex-end;justify-content:space-between;gap:var(--s3);margin-top:var(--s4)}
  .timers{display:flex;gap:var(--s5)}
  .timer{display:flex;flex-direction:column;gap:2px}
  .timer .lab{font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink-faint)}
  .timer .val{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--ink);line-height:1}
  .timer.due .val.warn{color:var(--amber)}
  .timer.due .val.danger{color:var(--danger)}
  .timer.due .val.calm{color:var(--calm)}
  .items-count{font-size:10px;color:var(--ink-faint);letter-spacing:0.06em;margin-top:3px}

  .action{
    appearance:none;cursor:pointer;border:1px solid var(--ink);background:var(--ink);
    color:var(--paper-2);font-family:var(--sans);font-size:11px;font-weight:600;
    letter-spacing:0.14em;text-transform:uppercase;padding:9px 15px;border-radius:2px;
    transition:all .15s ease;white-space:nowrap;
  }
  .action:hover{background:var(--accent);border-color:var(--accent)}
  .action.ghost{background:transparent;color:var(--ink);}
  .action.ghost:hover{background:var(--ink);color:var(--paper-2)}

  /* slot pill */
  .slot{font-size:10px;letter-spacing:0.10em;color:var(--ink-dim);font-family:var(--serif);font-style:italic}
</style>
</head>
<body>
  <header>
    <div class="topline">
      <div class="brand">
        <div class="wordmark">Sud Italia</div>
        <div class="sub">
          <span>Kitchen Display</span>
          <span aria-hidden="true">·</span>
          <span class="tag">09 · Editoriale</span>
          <span aria-hidden="true">·</span>
          <a class="gallery" href="index.html">&larr; Gallery</a>
        </div>
      </div>
      <div class="clockwrap">
        <div class="clock tnum" id="clock">--:--:--</div>
        <div class="clock-label">Line Time</div>
      </div>
    </div>
    <div class="filterbar">
      <span class="filter-label">Station</span>
      <div class="chips" id="chips"></div>
    </div>
  </header>

  <main id="board"></main>

<script>
  "use strict";

  const ORDERS = [
    { id:"A4F9C2", name:"Marco R.",  channel:"takeout",  loc:"Kraków",   slot:"15:20", elapsed:192, sla:288, status:"prep",
      items:[{q:2,n:"Margherita",c:"Pizza"},{q:1,n:"Diavola",c:"Pizza"},{q:1,n:"Espresso",c:"Drinks"}] },
    { id:"B7K2D1", name:"Giulia M.", channel:"delivery", loc:"Kraków",   slot:"15:15", elapsed:540, sla:-65, status:"prep",
      items:[{q:1,n:"Quattro Formaggi",c:"Pizza"},{q:1,n:"Spaghetti Carbonara",c:"Pasta",note:"no garlic"},{q:1,n:"Tiramisù",c:"Desserts"}], note:"Leave at reception" },
    { id:"C1M8X4", name:"Paweł K.",  channel:"takeout",  loc:"Warszawa", slot:"15:30", elapsed:48,  sla:612, status:"new",
      items:[{q:1,n:"Diavola",c:"Pizza"},{q:2,n:"Aranciata",c:"Drinks"}] },
    { id:"D9P3Q7", name:"Anna W.",   channel:"delivery", loc:"Warszawa", slot:"15:28", elapsed:95,  sla:505, status:"new",
      items:[{q:3,n:"Margherita",c:"Pizza"},{q:1,n:"Penne Arrabbiata",c:"Pasta"},{q:2,n:"Limonata Fresca",c:"Drinks"}] },
    { id:"E5R6T2", name:"Luca B.",   channel:"takeout",  loc:"Kraków",   slot:"15:22", elapsed:300, sla:120, status:"prep",
      items:[{q:1,n:"Tartufata Reale",c:"Pizza",note:"extra truffle"},{q:1,n:"Burrata con Pomodorini",c:"Antipasti"}] },
    { id:"F2H4J8", name:"Sofia L.",  channel:"takeout",  loc:"Kraków",   slot:"15:10", elapsed:720, sla:0,   status:"ready",
      items:[{q:1,n:"Panino Caprese",c:"Panini"},{q:1,n:"Garlic Bread",c:"Antipasti"},{q:1,n:"Espresso",c:"Drinks"}] },
    { id:"G8L1N5", name:"Tomek Z.",  channel:"delivery", loc:"Warszawa", slot:"15:32", elapsed:150, sla:450, status:"new",
      items:[{q:2,n:"Penne Arrabbiata",c:"Pasta"},{q:1,n:"Linguine al Pesto",c:"Pasta"}] },
    { id:"H3W7Y9", name:"Elena P.",  channel:"takeout",  loc:"Kraków",   slot:"15:08", elapsed:660, sla:0,   status:"ready",
      items:[{q:1,n:"Prosciutto e Rucola",c:"Pizza"},{q:1,n:"Arancini (3 pcs)",c:"Antipasti"}] },
  ];

  // working copy
  let tickets = ORDERS.map(o=>({ ...o, items:o.items.map(i=>({...i})) }));

  const STATIONS = ["All","Pizza","Pasta","Antipasti","Panini","Drinks","Desserts"];
  let activeStation = "All";

  const STAGES = [
    { key:"new",   title:"New",            kicker:"Just paid" },
    { key:"prep",  title:"In progress",    kicker:"Cooking" },
    { key:"ready", title:"Ready · Expo",   kicker:"Awaiting handoff" },
  ];
  const NEXT = { new:"prep", prep:"ready", ready:"__done__" };
  const ACTION_LABEL = { new:"Start prep", prep:"Mark ready", ready:"Bump · Done" };

  function fmt(sec){
    const neg = sec < 0;
    const a = Math.abs(sec);
    const m = Math.floor(a/60);
    const s = a%60;
    const body = m + ":" + String(s).padStart(2,"0");
    return neg ? "Late " + body : body;
  }
  function urgency(t){
    if(t.status === "ready") return "calm";
    if(t.sla < 0) return "danger";
    if(t.sla < 180) return "warn";
    return "neutral";
  }

  /* ----- chips ----- */
  const chipsEl = document.getElementById("chips");
  function buildChips(){
    chipsEl.innerHTML = "";
    STATIONS.forEach(st=>{
      const b = document.createElement("button");
      b.className = "chip";
      b.textContent = st;
      b.setAttribute("aria-pressed", String(st === activeStation));
      b.addEventListener("click", ()=>{ activeStation = st; buildChips(); render(); });
      chipsEl.appendChild(b);
    });
  }

  function ticketMatchesStation(t){
    if(activeStation === "All") return true;
    return t.items.some(i=>i.c === activeStation);
  }

  /* ----- render ----- */
  const board = document.getElementById("board");

  function render(){
    board.innerHTML = "";
    STAGES.forEach(stage=>{
      const col = document.createElement("section");
      col.className = "column";

      const list = tickets.filter(t=>t.status === stage.key && ticketMatchesStation(t));

      col.innerHTML =
        '<div class="col-head">'+
          '<div class="col-title"><span class="kicker">'+stage.kicker+'</span>'+stage.title+'</div>'+
          '<div class="col-count tnum">'+String(list.length).padStart(2,"0")+'</div>'+
        '</div>';

      const body = document.createElement("div");
      body.className = "col-body";
      if(list.length === 0){
        body.innerHTML = '<div class="empty">No tickets in this station.</div>';
      } else {
        list.forEach(t=> body.appendChild(buildTicket(t)));
      }
      col.appendChild(body);
      board.appendChild(col);
    });
  }

  function buildTicket(t){
    const u = urgency(t);
    const card = document.createElement("article");
    card.className = "ticket" + (u==="warn"?" warn":u==="danger"?" danger":u==="calm"?" calm":"");
    card.dataset.id = t.id;

    const itemCount = t.items.reduce((s,i)=>s+i.q,0);

    // group items by category preserving first-seen order
    const order = [];
    const groups = {};
    t.items.forEach(i=>{
      if(!groups[i.c]){ groups[i.c]=[]; order.push(i.c); }
      groups[i.c].push(i);
    });
    let groupsHtml = "";
    order.forEach(cat=>{
      let rows = "";
      groups[cat].forEach(i=>{
        rows += '<div class="item"><span class="q tnum">'+i.q+'×</span><span class="nm">'+i.n+'</span></div>'+
          (i.note ? '<div class="note">'+i.note+'</div>' : "");
      });
      groupsHtml += '<div class="group"><div class="group-h">'+cat+'</div>'+rows+'</div>';
    });

    const dueClass = u==="danger"?"danger":u==="warn"?"warn":u==="calm"?"calm":"";

    card.innerHTML =
      '<div class="t-top">'+
        '<div><div class="t-id">#'+t.id+'</div><div class="t-name">'+t.name+'</div></div>'+
        '<div class="t-meta">'+
          '<span class="t-channel '+(t.channel==="delivery"?"delivery":"")+'">'+(t.channel==="delivery"?"Delivery":"Takeout")+'</span>'+
          '<span class="t-loc">'+t.loc+'</span>'+
          '<span class="slot">Slot '+t.slot+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="rule dotted"></div>'+
      groupsHtml +
      (t.note ? '<div class="special"><b>Special instruction</b>'+t.note+'</div>' : "") +
      '<div class="rule"></div>'+
      '<div class="t-foot">'+
        '<div>'+
          '<div class="timers">'+
            '<div class="timer"><span class="lab">Elapsed</span><span class="val tnum" data-elapsed>'+fmt(t.elapsed)+'</span></div>'+
            '<div class="timer due"><span class="lab">Due</span><span class="val tnum '+dueClass+'" data-due>'+fmt(t.sla)+'</span></div>'+
          '</div>'+
          '<div class="items-count tnum">'+itemCount+' items</div>'+
        '</div>'+
        '<button class="action'+(t.status==="ready"?" ghost":"")+'" data-advance>'+ACTION_LABEL[t.status]+'</button>'+
      '</div>';

    card.querySelector("[data-advance]").addEventListener("click", ()=>advance(t.id));
    return card;
  }

  function advance(id){
    const t = tickets.find(x=>x.id===id);
    if(!t) return;
    const nx = NEXT[t.status];
    if(nx === "__done__"){
      tickets = tickets.filter(x=>x.id!==id);
    } else {
      t.status = nx;
      if(nx === "ready"){ t.sla = 0; } // ready tickets neutralize SLA
    }
    render();
  }

  /* ----- live tick ----- */
  function tickTimers(){
    tickets.forEach(t=>{
      t.elapsed += 1;
      if(t.status !== "ready") t.sla -= 1;
    });
    // update DOM in place, re-apply urgency colors
    document.querySelectorAll(".ticket").forEach(card=>{
      const t = tickets.find(x=>x.id === card.dataset.id);
      if(!t) return;
      const u = urgency(t);
      card.classList.toggle("warn", u==="warn");
      card.classList.toggle("danger", u==="danger");
      card.classList.toggle("calm", u==="calm");
      const el = card.querySelector("[data-elapsed]");
      const du = card.querySelector("[data-due]");
      if(el) el.textContent = fmt(t.elapsed);
      if(du){
        du.textContent = fmt(t.sla);
        du.classList.remove("warn","danger","calm");
        if(u==="danger") du.classList.add("danger");
        else if(u==="warn") du.classList.add("warn");
        else if(u==="calm") du.classList.add("calm");
      }
    });
  }

  /* ----- clock ----- */
  const clockEl = document.getElementById("clock");
  function tickClock(){
    const d = new Date();
    clockEl.textContent =
      String(d.getHours()).padStart(2,"0")+":"+
      String(d.getMinutes()).padStart(2,"0")+":"+
      String(d.getSeconds()).padStart(2,"0");
  }

  buildChips();
  render();
  tickClock();
  setInterval(()=>{ tickClock(); tickTimers(); }, 1000);
</script>
</body>
</html>
