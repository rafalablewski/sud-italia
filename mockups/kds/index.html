<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sud Italia — Kitchen Display System (Redesign)</title>

<!--
  ============================================================================
  Sud Italia — KDS redesign mockup
  ----------------------------------------------------------------------------
  Self-contained, no backend. Tailwind (Play CDN) for utilities + a small
  custom <style> block for animations / scrollbars, and vanilla JS that renders
  the whole board from a sample ORDERS array. Built to run on a large landscape
  kitchen screen.

  Layout
    ┌───────────────────────────── header ─────────────────────────────┐
    │ brand · clock · open-orders · sound                               │
    ├──────────┬──────────────────────────────────┬────────────────────┤
    │ queue    │ selected-order detail            │ stations / expo     │
    │ (left)   │ (main)                           │ (right)             │
    ├──────────┴──────────────────────────────────┴────────────────────┤
    │ bottom action bar (recall / start / ready / bump / cancel)        │
    └───────────────────────────────────────────────────────────────────┘

  Colour language (status-driven, kitchen-legible from across the line):
    red    = new / urgent       amber = in progress       green = ready
    a pulsing danger emphasis is layered on top when an order is past its SLA.
  ============================================================================
-->

<script src="https://cdn.tailwindcss.com"></script>
<script>
  // Custom theme so the mockup matches the Sud Italia brand palette.
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink:    "#080b12", // deepest background
          panel:  "#0f1420", // panel surface
          panel2: "#151c2b", // raised surface
          panel3: "#1d2638", // hover / active surface
          line:   "rgba(255,255,255,0.07)",
          brand:  "#e11d2a", // Sud Italia red
          newq:   "#f43f5e", // new / urgent (rose-red)
          prog:   "#f59e0b", // in progress (amber)
          ready:  "#10b981", // ready (emerald)
          info:   "#38bdf8", // accent cyan
        },
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
      },
    },
  };
</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />

<style>
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(1200px 600px at 12% -10%, rgba(225,29,42,0.10), transparent 60%),
      radial-gradient(1000px 700px at 100% 0%, rgba(56,189,248,0.07), transparent 55%),
      #080b12;
    color: #f4f6fb;
    -webkit-font-smoothing: antialiased;
  }

  /* Slim, dark scrollbars so the lists feel native on a kitchen screen. */
  .scroll { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.18) transparent; }
  .scroll::-webkit-scrollbar { width: 9px; height: 9px; }
  .scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 99px; border: 2px solid transparent; background-clip: content-box; }
  .scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.28); background-clip: content-box; }

  .tnum { font-variant-numeric: tabular-nums; }

  /* Soft pulse for orders past their promised-ready time. */
  @keyframes overduePulse {
    0%, 100% { box-shadow: 0 0 0 1px rgba(244,63,94,0.55), 0 0 22px rgba(244,63,94,0.20); }
    50%      { box-shadow: 0 0 0 1px rgba(244,63,94,0.95), 0 0 36px rgba(244,63,94,0.45); }
  }
  .is-overdue { animation: overduePulse 1.4s ease-in-out infinite; }

  /* Brief flash when a fresh ticket lands (demoed on the "+ New ticket" button). */
  @keyframes ticketIn {
    0%   { transform: translateY(-10px) scale(0.98); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  .ticket-in { animation: ticketIn 0.32s cubic-bezier(.2,.8,.2,1) both; }

  /* The "bump" — order is sent away. Whoosh up, flash green, collapse. */
  @keyframes bumpAway {
    0%   { transform: translateY(0) scale(1); opacity: 1; }
    35%  { transform: translateY(-6px) scale(1.02); box-shadow: 0 0 0 2px rgba(16,185,129,0.9), 0 0 40px rgba(16,185,129,0.55); }
    100% { transform: translateY(-130%) scale(0.9); opacity: 0; }
  }
  .bump-away { animation: bumpAway 0.5s cubic-bezier(.5,0,.75,0) forwards; pointer-events: none; }

  /* Full-screen confirmation tick when something is bumped. */
  @keyframes bumpBurst {
    0%   { transform: translate(-50%,-50%) scale(0.4); opacity: 0; }
    25%  { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    80%  { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(1.15); opacity: 0; }
  }
  .bump-burst { animation: bumpBurst 0.85s ease forwards; }

  /* Pressed-button squish for tactile feel under busy hands. */
  .btn-press:active { transform: translateY(1px) scale(0.985); }

  /* Station load bar fill transition. */
  .load-fill { transition: width 0.5s cubic-bezier(.2,.8,.2,1); }

  [hidden] { display: none !important; }
</style>
</head>

<body class="font-sans antialiased overflow-hidden">

<!-- App grid: header / body / action bar -->
<div class="grid h-screen w-screen" style="grid-template-rows: auto 1fr auto;">

  <!-- ───────────────────────── HEADER ───────────────────────── -->
  <header class="flex items-center justify-between gap-4 border-b border-line bg-panel/70 backdrop-blur px-5 py-3">
    <!-- Brand + location -->
    <div class="flex items-center gap-3 min-w-0">
      <div class="grid place-items-center h-11 w-11 rounded-2xl bg-brand text-white font-black text-lg shadow-lg shadow-brand/30 select-none">SI</div>
      <div class="min-w-0">
        <div class="flex items-center gap-2">
          <h1 class="text-[17px] font-extrabold tracking-tight leading-none">Sud Italia</h1>
          <span class="text-[11px] font-bold uppercase tracking-widest text-white/45">Kitchen Display</span>
        </div>
        <div class="mt-1 flex items-center gap-2 text-[12px] text-white/55">
          <span class="inline-flex items-center gap-1.5">
            <span class="h-1.5 w-1.5 rounded-full bg-ready animate-pulse"></span> Live
          </span>
          <span class="text-white/20">·</span>
          <button id="locBtn" class="inline-flex items-center gap-1 rounded-md px-1.5 py-0.5 hover:bg-white/5 font-semibold text-white/75">
            <svg viewBox="0 0 24 24" class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            <span id="locLabel">Kraków</span>

    <!-- Clock -->

    <!-- Open orders + sound -->
    <div class="flex items-center gap-2.5">

        <div class="text-right leading-none">

          <div class="text-[10px] uppercase tracking-widest text-white/45 mt-1">Open</div>

        <div class="h-9 w-px bg-line"></div>
        <div class="text-right leading-none">
          <div id="lateCount" class="font-mono text-2xl font-bold tnum text-newq">0</div>
          <div class="text-[10px] uppercase tracking-widest text-white/45 mt-1">Late</div>
        </div>
      </div>
      <button id="addBtn" title="Simulate a new incoming ticket"
        class="btn-press inline-flex items-center gap-1.5 rounded-xl bg-info/15 hover:bg-info/25 text-info border border-info/30 px-3 py-2.5 text-sm font-bold transition">
        <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        New ticket
      </button>
      <button id="soundBtn" title="Toggle new-ticket sound"
        class="btn-press grid place-items-center h-[42px] w-[42px] rounded-xl bg-panel2 hover:bg-panel3 border border-line transition text-white/80">
        <svg id="soundOn" viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>
        <svg id="soundOff" viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="m23 9-6 6M17 9l6 6"/></svg>
      </button>
    </div>
  </header>

  <!-- ───────────────────────── BODY ───────────────────────── -->
  <div class="grid min-h-0" style="grid-template-columns: 340px minmax(0,1fr) 360px;">

    <!-- LEFT: order queue -->
    <aside class="flex flex-col min-h-0 border-r border-line bg-panel/40">
      <!-- Search + filters -->
      <div class="p-3 border-b border-line space-y-3">
        <div class="relative">
          <svg viewBox="0 0 24 24" class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-white/35" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="search" type="text" placeholder="Search order #, name, item…"
            class="w-full rounded-xl bg-panel2 border border-line pl-9 pr-3 py-2.5 text-sm placeholder:text-white/35 focus:outline-none focus:border-info/60 focus:ring-2 focus:ring-info/20" />
        </div>
        <div id="statusFilters" class="flex items-center gap-1.5"></div>
        <div id="stationFilters" class="flex flex-wrap items-center gap-1.5"></div>
      </div>
      <!-- Ticket list -->
      <div id="queue" class="scroll flex-1 min-h-0 overflow-y-auto p-3 space-y-2.5"></div>
    </aside>

    <!-- MAIN: selected order detail -->
    <main id="detail" class="scroll min-h-0 overflow-y-auto"></main>

    <!-- RIGHT: stations + ready-to-serve -->
    <aside class="flex flex-col min-h-0 border-l border-line bg-panel/40">
      <div class="p-4 border-b border-line">

        <div id="stations" class="mt-3 space-y-2.5"></div>

      <div class="flex items-center justify-between px-4 pt-4 pb-2">
        <h2 class="text-[11px] font-bold uppercase tracking-widest text-white/45">Ready · Expo</h2>
        <span id="readyCount" class="font-mono text-xs font-bold text-ready">0</span>
      </div>
      <div id="ready" class="scroll flex-1 min-h-0 overflow-y-auto px-4 pb-4 space-y-2.5"></div>
    </aside>
  </div>

  <!-- ───────────────────────── BOTTOM ACTION BAR ───────────────────────── -->
  <footer class="border-t border-line bg-panel/80 backdrop-blur px-4 py-3">
    <div id="actionBar" class="flex items-center gap-3">
      <div id="actionContext" class="flex items-center gap-3 min-w-0 flex-1">
        <span class="text-sm text-white/45">Select a ticket to act on it.</span>
      </div>
    </div>
  </footer>
</div>

<!-- Bump confirmation burst (centered overlay) -->
<div id="burst" class="pointer-events-none fixed left-1/2 top-1/2 z-50 hidden">
  <div class="bump-burst grid place-items-center h-28 w-28 rounded-full bg-ready/20 border-2 border-ready">
    <svg viewBox="0 0 24 24" class="h-14 w-14 text-ready" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
  </div>
</div>

<script>
/* ============================================================================
   DATA — sample orders.
   Each order carries an `elapsedMin` (minutes since it was placed) and a
   `promiseMin` (the SLA: minutes the kitchen has to fire it). We turn those
   into real timestamps at load so the live countdowns are honest.
   ========================================================================== */

const STATIONS = {
  pizza:     { label: "Pizza · Oven",   icon: "flame" },
  pasta:     { label: "Pasta",          icon: "pasta" },
  antipasti: { label: "Antipasti · Cold",icon: "leaf" },
  panini:    { label: "Panini · Grill",  icon: "sandwich" },
  drinks:    { label: "Bar",            icon: "cup" },
  desserts:  { label: "Dolci",          icon: "cake" },
};
const STATION_ORDER = ["pizza", "pasta", "antipasti", "panini", "drinks", "desserts"];

let SEQ = 100;
function uid() { return (++SEQ).toString(36).toUpperCase().padStart(2, "0"); }

const RAW = [
  {
    code: "A7F3", customer: "Anna Kowalska", channel: "takeout", location: "Kraków",
    status: "new", elapsedMin: 1.1, promiseMin: 14,
    note: "Allergy: NO NUTS — separate prep board.",
    items: [
      { qty: 1, name: "Margherita", cat: "pizza", mods: ["Extra basil", "Well done"] },
      { qty: 1, name: "Espresso", cat: "drinks", mods: [] },
    ],
  },
  {
    code: "B2K9", customer: "Marco R.", channel: "delivery", location: "Kraków",
    status: "new", elapsedMin: 4.6, promiseMin: 12,
    note: "",
    items: [
      { qty: 2, name: "Diavola", cat: "pizza", mods: ["Extra spicy nduja"] },
      { qty: 1, name: "Garlic Bread", cat: "antipasti", mods: [], itemNote: "cut in 6" },
      { qty: 1, name: "Aranciata San Pellegrino", cat: "drinks", mods: [] },
    ],
  },
  {
    code: "C71F", customer: "Giulia M.", channel: "takeout", location: "Kraków",
    status: "progress", elapsedMin: 8.7, promiseMin: 15,
    note: "",
    items: [
      { qty: 1, name: "Quattro Formaggi", cat: "pizza", mods: ["Light gorgonzola"] },
      { qty: 1, name: "Spaghetti Carbonara", cat: "pasta", mods: ["No black pepper on top"] },
      { qty: 1, name: "Tiramisù", cat: "desserts", mods: [] },
    ],
  },
  {
    code: "D4E8", customer: "Tomek W.", channel: "delivery", location: "Kraków",
    status: "progress", elapsedMin: 16.4, promiseMin: 13, // OVERDUE
    note: "Birthday order — add a candle to the dessert.",
    items: [
      { qty: 3, name: "Margherita", cat: "pizza", mods: [] },
      { qty: 1, name: "Penne Arrabbiata", cat: "pasta", mods: ["Mild"], itemNote: "kid's portion" },
      { qty: 2, name: "Limonata Fresca", cat: "drinks", mods: [] },
      { qty: 1, name: "Cannoli Siciliani (2 pcs)", cat: "desserts", mods: [] },
    ],
  },
  {
    code: "E9A1", customer: "Sara P.", channel: "takeout", location: "Kraków",
    status: "progress", elapsedMin: 3.2, promiseMin: 11,
    note: "",
    items: [
      { qty: 1, name: "Panino Caprese", cat: "panini", mods: ["No basil"] },
      { qty: 1, name: "Burrata con Pomodorini", cat: "antipasti", mods: [] },
    ],
  },
  {
    code: "F0C5", customer: "Luca B.", channel: "delivery", location: "Kraków",
    status: "ready", elapsedMin: 11.0, promiseMin: 16,
    note: "Leave with reception.",
    items: [
      { qty: 2, name: "Margherita", cat: "pizza", mods: [] },
      { qty: 1, name: "Cannoli Siciliani (2 pcs)", cat: "desserts", mods: [] },
    ],
  },
  {
    code: "G3H7", customer: "Ola Z.", channel: "takeout", location: "Kraków",
    status: "ready", elapsedMin: 6.5, promiseMin: 12,
    note: "",
    items: [
      { qty: 1, name: "Linguine al Pesto", cat: "pasta", mods: ["Add chilli flakes"] },
      { qty: 1, name: "Acqua Minerale", cat: "drinks", mods: [] },
    ],
  },
];

const now0 = Date.now();
let ORDERS = RAW.map((o) => ({
  id: uid(),
  ...o,
  placedAt: now0 - Math.round(o.elapsedMin * 60000),
  promiseMs: o.promiseMin * 60000,
}));

/* ============================================================================
   STATE
   ========================================================================== */
const state = {
  selectedId: ORDERS.find((o) => o.status !== "ready")?.id || ORDERS[0].id,
  statusFilter: "all", // all | new | progress | ready
  stationFilter: "all",
  query: "",
  sound: true,
  location: "Kraków",
};

/* ============================================================================
   STATUS META + helpers
   ========================================================================== */
const STATUS = {
  new:      { label: "New",        color: "newq",  hex: "#f43f5e", next: "progress", nextLabel: "Start prep" },
  progress: { label: "In progress",color: "prog",  hex: "#f59e0b", next: "ready",    nextLabel: "Mark ready" },
  ready:    { label: "Ready",      color: "ready", hex: "#10b981", next: null,       nextLabel: "Bump · Done" },
};

const $  = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

function elapsedSec(o)  { return Math.max(0, Math.round((Date.now() - o.placedAt) / 1000)); }
function remainingSec(o){ return Math.round((o.placedAt + o.promiseMs - Date.now()) / 1000); }
function isOverdue(o)   { return o.status !== "ready" && remainingSec(o) < 0; }
function isDueSoon(o)   { const r = remainingSec(o); return o.status !== "ready" && r >= 0 && r < 180; }

function fmtClock(s) {
  const a = Math.abs(s), m = Math.floor(a / 60), r = a % 60;
  return `${s < 0 ? "-" : ""}${String(m).padStart(2, "0")}:${String(r).padStart(2, "0")}`;
}
function itemCount(o) { return o.items.reduce((n, i) => n + i.qty, 0); }
function fmtTime(ms)  { return new Date(ms).toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" }); }

// Tone that drives a ticket's accent: status first, overdue overrides.
function toneOf(o) {
  if (isOverdue(o)) return "newq";
  return STATUS[o.status].color;
}

/* ---- tiny inline icon set (lucide-style) ---- */
const ICONS = {
  truck:    '<path d="M14 18V6H2v12h12Z"/><path d="M14 9h4l4 4v5h-8"/><circle cx="6.5" cy="18.5" r="1.8"/><circle cx="17.5" cy="18.5" r="1.8"/>',
  bag:      '<path d="M6 2 4 6v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6l-2-4Z"/><path d="M4 6h16"/><path d="M16 10a4 4 0 0 1-8 0"/>',
  clock:    '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  timer:    '<path d="M10 2h4"/><path d="M12 14v-4"/><circle cx="12" cy="14" r="8"/>',
  pin:      '<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>',
  flame:    '<path d="M12 2c1 4 5 5 5 9a5 5 0 0 1-10 0c0-2 1-3 2-4 0 2 1 3 2 3 1-2-1-4-1-8Z"/>',
  pasta:    '<path d="M4 20c0-7 4-12 8-12s8 5 8 12"/><path d="M8 20V9M12 20V8M16 20V9"/>',
  leaf:     '<path d="M11 20A7 7 0 0 1 4 13c0-5 4-9 16-9 0 8-4 12-9 12Z"/><path d="M11 20c0-4 2-7 5-9"/>',
  sandwich: '<path d="M3 8h18l-2-3H5L3 8Z"/><path d="M3 8v3a3 3 0 0 0 3 3h12a3 3 0 0 0 3-3V8"/><path d="M4 17h16"/>',
  cup:      '<path d="M6 8h12l-1 11a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L6 8Z"/><path d="M6 8a3 3 0 0 1 0-6h9"/>',
  cake:     '<path d="M4 21h16v-7a3 3 0 0 0-3-3H7a3 3 0 0 0-3 3v7Z"/><path d="M4 16h16M12 4v4M9 6v2M15 6v2"/>',
  check:    '<path d="M20 6 9 17l-5-5"/>',
  play:     '<path d="M6 4v16l13-8Z"/>',
  x:        '<path d="M18 6 6 18M6 6l12 12"/>',
  undo:     '<path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-4"/>',
  alert:    '<path d="M12 3 2 21h20L12 3Z"/><path d="M12 10v5M12 18h.01"/>',
  note:     '<path d="M4 4h16v12l-4 4H4Z"/><path d="M16 20v-4h4"/>',
};
function icon(name, cls = "h-4 w-4") {
  return `<svg viewBox="0 0 24 24" class="${cls}" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name] || ""}</svg>`;
}
function channelIcon(ch, cls) { return icon(ch === "delivery" ? "truck" : "bag", cls); }

/* Map a tone key to concrete Tailwind/CSS values (Play CDN can't see dynamic classes). */
const TONE = {
  newq:  { text: "text-newq",  bg: "bg-newq",  ring: "rgba(244,63,94,0.55)",  soft: "rgba(244,63,94,0.12)",  hex: "#f43f5e" },
  prog:  { text: "text-prog",  bg: "bg-prog",  ring: "rgba(245,158,11,0.5)",  soft: "rgba(245,158,11,0.12)",  hex: "#f59e0b" },
  ready: { text: "text-ready", bg: "bg-ready", ring: "rgba(16,185,129,0.5)",  soft: "rgba(16,185,129,0.12)",  hex: "#10b981" },
};
</script>

<script>
/* ============================================================================
   RENDER
   ========================================================================== */

function visibleOrders() {
  const q = state.query.trim().toLowerCase();
  return ORDERS.filter((o) => {
    if (state.statusFilter !== "all" && o.status !== state.statusFilter) return false;
    if (state.stationFilter !== "all" && !o.items.some((i) => i.cat === state.stationFilter)) return false;
    if (q) {
      const hay = (o.code + " " + o.customer + " " + o.items.map((i) => i.name).join(" ")).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

/* ---- header counters ---- */
function renderCounters() {
  const open = ORDERS.length;
  const late = ORDERS.filter(isOverdue).length;
  $("#openCount").textContent = open;
  $("#lateCount").textContent = late;
  $("#lateCount").classList.toggle("opacity-40", late === 0);
}

/* ---- filter chips ---- */
function renderFilters() {
  const sf = $("#statusFilters");
  const counts = {
    all: ORDERS.length,
    new: ORDERS.filter((o) => o.status === "new").length,
    progress: ORDERS.filter((o) => o.status === "progress").length,
    ready: ORDERS.filter((o) => o.status === "ready").length,
  };
  const tabs = [
    { id: "all", label: "All", tone: null },
    { id: "new", label: "New", tone: "newq" },
    { id: "progress", label: "Prep", tone: "prog" },
    { id: "ready", label: "Ready", tone: "ready" },
  ];
  sf.innerHTML = tabs.map((t) => {
    const active = state.statusFilter === t.id;
    const dot = t.tone ? `<span class="h-2 w-2 rounded-full ${TONE[t.tone].bg}"></span>` : "";
    return `<button data-status="${t.id}"
      class="flex-1 inline-flex items-center justify-center gap-1.5 rounded-lg px-2 py-1.5 text-xs font-bold transition
      ${active ? "bg-white/10 text-white ring-1 ring-white/15" : "text-white/55 hover:bg-white/5"}">
      ${dot}${t.label}<span class="font-mono opacity-60">${counts[t.id]}</span></button>`;
  }).join("");

  const stf = $("#stationFilters");
  const chips = [{ id: "all", label: "All stations" }].concat(
    STATION_ORDER.filter((s) => ORDERS.some((o) => o.items.some((i) => i.cat === s)))
      .map((s) => ({ id: s, label: STATIONS[s].label.split(" · ")[0] }))
  );
  stf.innerHTML = chips.map((c) => {
    const active = state.stationFilter === c.id;
    return `<button data-station="${c.id}"
      class="rounded-full px-2.5 py-1 text-[11px] font-semibold transition
      ${active ? "bg-info/20 text-info ring-1 ring-info/40" : "bg-white/5 text-white/55 hover:bg-white/10"}">${c.label}</button>`;
  }).join("");
}

/* ---- left queue ticket card ---- */
function queueCard(o) {
  const tone = TONE[toneOf(o)];
  const selected = o.id === state.selectedId;
  const rem = remainingSec(o);
  const overdue = isOverdue(o);
  const timerColor = o.status === "ready" ? "text-ready" : overdue ? "text-newq" : isDueSoon(o) ? "text-prog" : "text-white/80";
  const slaLabel = o.status === "ready" ? "READY" : overdue ? `LATE ${fmtClock(Math.abs(rem))}` : `DUE ${fmtClock(rem)}`;

  return `
  <button data-select="${o.id}"
    class="ticket-card group relative w-full text-left rounded-2xl border bg-panel2 p-3 transition
    ${selected ? "ring-2 ring-info border-info/40 bg-panel3" : "border-line hover:bg-panel3 hover:-translate-y-0.5"}
    ${overdue ? "is-overdue" : ""}">
    <span class="absolute left-0 top-3 bottom-3 w-1.5 rounded-full ${tone.bg}"></span>
    <div class="pl-2.5">
      <div class="flex items-start justify-between gap-2">
        <div class="min-w-0">
          <div class="font-mono text-lg font-bold leading-none">#${o.code}</div>
          <div class="mt-1 flex items-center gap-1.5 text-[12px] text-white/55">
            ${channelIcon(o.channel, "h-3.5 w-3.5")}
            <span class="truncate font-semibold text-white/80">${o.customer}</span>
          </div>
        </div>
        <div class="text-right shrink-0">
          <div class="font-mono tnum text-xl font-bold leading-none ${timerColor}">${fmtClock(elapsedSec(o))}</div>
          <div class="mt-1 text-[10px] font-bold tracking-wide ${timerColor}">${slaLabel}</div>
        </div>
      </div>
      <div class="mt-2 flex items-center gap-1.5 flex-wrap">
        <span class="inline-flex items-center gap-1 rounded-md bg-white/5 px-1.5 py-0.5 text-[11px] font-semibold text-white/60">
          ${itemCount(o)} item${itemCount(o) === 1 ? "" : "s"}
        </span>
        ${[...new Set(o.items.map((i) => i.cat))].slice(0, 4).map((c) =>
          `<span class="text-white/40">${icon(STATIONS[c].icon, "h-3.5 w-3.5")}</span>`).join("")}
        ${o.note ? `<span class="ml-auto inline-flex items-center gap-1 text-[11px] font-bold text-newq">${icon("alert","h-3.5 w-3.5")}Note</span>` : ""}
      </div>
    </div>
  </button>`;
}

function renderQueue() {
  const list = visibleOrders();
  const queue = $("#queue");
  if (list.length === 0) {
    queue.innerHTML = `<div class="grid place-items-center h-full text-center text-white/35 text-sm py-16">
      <div>${icon("check", "h-8 w-8 mx-auto mb-2 opacity-50")}<div>No tickets match.</div></div></div>`;
    return;
  }
  // Oldest-first within the list so the most-urgent floats up.
  list.sort((a, b) => a.placedAt - b.placedAt);
  queue.innerHTML = list.map(queueCard).join("");
}

/* ---- main detail panel ---- */
function renderDetail() {
  const o = ORDERS.find((x) => x.id === state.selectedId);
  const main = $("#detail");
  if (!o) {
    main.innerHTML = `<div class="grid place-items-center h-full text-white/35">
      <div class="text-center"><div class="text-5xl mb-3 opacity-30">${icon("bag","h-16 w-16 mx-auto")}</div>Select a ticket from the queue.</div></div>`;
    return;
  }
  const tone = TONE[toneOf(o)];
  const overdue = isOverdue(o), rem = remainingSec(o);
  const timerColor = o.status === "ready" ? "text-ready" : overdue ? "text-newq" : isDueSoon(o) ? "text-prog" : "text-white";
  const st = STATUS[o.status];

  // group items by station, in line order
  const byCat = {};
  o.items.forEach((i) => (byCat[i.cat] = byCat[i.cat] || []).push(i));
  const cats = STATION_ORDER.filter((c) => byCat[c]);

  const stationBlocks = cats.map((c) => {
    const dim = state.stationFilter !== "all" && state.stationFilter !== c;
    const rows = byCat[c].map((it) => `
      <li class="flex items-start gap-3 py-2.5 ${dim ? "opacity-35" : ""}">
        <span class="grid place-items-center min-w-[2.6rem] h-10 rounded-xl font-mono text-lg font-bold
          ${it.qty > 1 ? "bg-brand text-white" : "bg-white/8 text-white/80"}">${it.qty}×</span>
        <div class="min-w-0 flex-1">
          <div class="text-[19px] font-bold leading-tight">${it.name}</div>
          ${it.mods.length ? `<div class="mt-1 flex flex-wrap gap-1.5">
            ${it.mods.map((m) => `<span class="inline-flex items-center gap-1 rounded-md bg-info/12 text-info border border-info/25 px-2 py-0.5 text-[12px] font-semibold">+ ${m}</span>`).join("")}
          </div>` : ""}
          ${it.itemNote ? `<div class="mt-1 inline-flex items-center gap-1 text-[12px] font-bold text-prog">${icon("alert","h-3.5 w-3.5")} ${it.itemNote}</div>` : ""}
        </div>
      </li>`).join("");
    return `<section class="rounded-2xl border border-line bg-panel2/60 overflow-hidden">
      <header class="flex items-center gap-2 px-4 py-2 bg-white/[0.03] border-b border-line">
        <span class="text-white/55">${icon(STATIONS[c].icon, "h-4 w-4")}</span>
        <span class="text-[12px] font-bold uppercase tracking-widest text-white/55">${STATIONS[c].label}</span>
        <span class="ml-auto font-mono text-xs text-white/40">${byCat[c].reduce((n,i)=>n+i.qty,0)}</span>
      </header>
      <ul class="divide-y divide-white/5 px-4">${rows}</ul>
    </section>`;
  }).join("");

  main.innerHTML = `
  <div class="p-5 max-w-[860px] mx-auto">
    <!-- detail header -->
    <div class="rounded-3xl border bg-panel2 p-5 ${overdue ? "is-overdue" : "border-line"}"
         style="${overdue ? "" : `box-shadow: inset 4px 0 0 ${tone.hex};`}">
      <div class="flex items-start justify-between gap-6">
        <div class="min-w-0">
          <div class="flex items-center gap-3">
            <span class="font-mono text-4xl font-black tracking-tight">#${o.code}</span>
            <span class="inline-flex items-center gap-1.5 rounded-full ${tone.bg} px-3 py-1 text-sm font-bold text-ink">
              ${overdue ? icon("alert","h-4 w-4") : ""}${overdue ? "LATE" : st.label}
            </span>
          </div>
          <div class="mt-2 flex items-center gap-3 text-white/65">
            <span class="text-lg font-bold text-white/90">${o.customer}</span>
            <span class="inline-flex items-center gap-1.5 text-sm">${channelIcon(o.channel,"h-4 w-4")}${o.channel === "delivery" ? "Delivery" : "Takeout"}</span>
            <span class="inline-flex items-center gap-1.5 text-sm">${icon("pin","h-4 w-4")}${o.location}</span>
          </div>
        </div>
        <div class="text-right shrink-0">
          <div class="font-mono tnum text-6xl font-black leading-none ${timerColor}">${fmtClock(elapsedSec(o))}</div>
          <div class="mt-2 text-sm font-bold ${timerColor}">
            ${o.status === "ready" ? "Waiting at pass" : overdue ? `${fmtClock(Math.abs(rem))} over SLA` : `${fmtClock(rem)} to promised`}
          </div>
        </div>
      </div>
      <div class="mt-4 flex items-center gap-4 text-[12px] text-white/45 border-t border-line pt-3">
        <span class="inline-flex items-center gap-1.5">${icon("clock","h-4 w-4")}Placed ${fmtTime(o.placedAt)}</span>
        <span class="inline-flex items-center gap-1.5">${icon("timer","h-4 w-4")}SLA ${o.promiseMin} min</span>
        <span class="inline-flex items-center gap-1.5">${itemCount(o)} items · ${cats.length} station${cats.length===1?"":"s"}</span>
      </div>
    </div>

    ${o.note ? `<div class="mt-4 flex items-start gap-3 rounded-2xl border border-newq/40 bg-newq/10 p-4">
      <span class="text-newq mt-0.5">${icon("alert","h-5 w-5")}</span>
      <div><div class="text-[11px] font-bold uppercase tracking-widest text-newq">Special request</div>
      <div class="mt-0.5 text-[16px] font-semibold text-white/90">${o.note}</div></div>
    </div>` : ""}

    <!-- items by station -->
    <div class="mt-4 space-y-3">${stationBlocks}</div>
  </div>`;
}

/* ---- right: station load ---- */
function renderStations() {
  const wrap = $("#stations");
  // pending units per station across non-ready orders
  const load = {};
  STATION_ORDER.forEach((s) => (load[s] = 0));
  ORDERS.filter((o) => o.status !== "ready").forEach((o) =>
    o.items.forEach((i) => (load[i.cat] += i.qty)));
  const max = Math.max(1, ...Object.values(load));
  const active = STATION_ORDER.filter((s) => load[s] > 0 || ORDERS.some((o) => o.items.some((i) => i.cat === s)));

  wrap.innerHTML = active.map((s) => {
    const v = load[s];
    const pct = Math.round((v / max) * 100);
    const hot = v >= 4;
    const barColor = hot ? "bg-newq" : v >= 2 ? "bg-prog" : "bg-info";
    return `<button data-station="${s}" class="block w-full text-left group">
      <div class="flex items-center justify-between text-[13px] mb-1">
        <span class="inline-flex items-center gap-2 font-semibold text-white/75 group-hover:text-white">
          ${icon(STATIONS[s].icon, "h-4 w-4 text-white/45 group-hover:text-info")}${STATIONS[s].label}</span>
        <span class="font-mono font-bold ${hot ? "text-newq" : "text-white/60"}">${v}</span>
      </div>
      <div class="h-2 rounded-full bg-white/8 overflow-hidden">
        <div class="load-fill h-full rounded-full ${barColor}" style="width:${v ? Math.max(8, pct) : 0}%"></div>
      </div>
    </button>`;
  }).join("");
}

/* ---- right: ready to serve ---- */
function renderReady() {
  const ready = ORDERS.filter((o) => o.status === "ready").sort((a, b) => a.placedAt - b.placedAt);
  $("#readyCount").textContent = ready.length;
  const wrap = $("#ready");
  if (ready.length === 0) {
    wrap.innerHTML = `<div class="text-center text-white/30 text-sm py-8">Nothing waiting at the pass.</div>`;
    return;
  }
  wrap.innerHTML = ready.map((o) => `
    <div data-readycard="${o.id}" class="rounded-2xl border border-ready/30 bg-ready/[0.06] p-3">
      <div class="flex items-center justify-between gap-2">
        <button data-select="${o.id}" class="min-w-0 text-left">
          <div class="font-mono text-base font-bold">#${o.code}</div>
          <div class="text-[12px] text-white/55 truncate">${o.customer} · ${itemCount(o)} items</div>
        </button>
        <button data-bump="${o.id}"
          class="btn-press shrink-0 inline-flex items-center gap-1.5 rounded-xl bg-ready px-3 py-2 text-sm font-bold text-ink hover:brightness-110 transition">
          ${icon("check","h-4 w-4")}Bump</button>
      </div>
    </div>`).join("");
}

/* ---- bottom action bar (context = selected order) ---- */
function renderActions() {
  const bar = $("#actionContext");
  const o = ORDERS.find((x) => x.id === state.selectedId);
  if (!o) {
    bar.innerHTML = `<span class="text-sm text-white/45">Select a ticket to act on it.</span>`;
    return;
  }
  const st = STATUS[o.status];
  const tone = TONE[toneOf(o)];

  const btn = (action, label, ic, cls) =>
    `<button data-action="${action}" data-id="${o.id}"
      class="btn-press inline-flex items-center justify-center gap-2 rounded-xl px-4 py-3 text-[15px] font-bold transition ${cls}">
      ${icon(ic, "h-5 w-5")}${label}</button>`;

  // left: identity + recall (undo) when past 'new'
  const left = `
    <div class="flex items-center gap-3 min-w-0">
      <span class="h-9 w-1.5 rounded-full ${tone.bg}"></span>
      <div class="leading-tight min-w-0">
        <div class="font-mono text-lg font-bold">#${o.code} <span class="text-white/40 text-sm">· ${st.label}</span></div>
        <div class="text-[12px] text-white/50 truncate">${o.customer} · ${itemCount(o)} items</div>
      </div>
    </div>`;

  const right = `
    <div class="flex items-center gap-2.5 shrink-0">
      ${o.status !== "new" ? btn("recall", "Recall", "undo", "bg-white/5 hover:bg-white/10 text-white/75 border border-line") : ""}
      ${btn("cancel", "Cancel", "x", "bg-white/5 hover:bg-newq/20 text-white/75 hover:text-newq border border-line")}
      ${o.status === "new"      ? btn("advance", st.nextLabel, "play",  "bg-prog text-ink hover:brightness-110 px-6") : ""}
      ${o.status === "progress" ? btn("advance", st.nextLabel, "check", "bg-ready text-ink hover:brightness-110 px-6") : ""}
      ${o.status === "ready"    ? btn("bump",    "Bump · Done", "check", "bg-ready text-ink hover:brightness-110 px-6 text-base") : ""}
    </div>`;

  bar.innerHTML = `<div class="flex items-center justify-between gap-4 w-full flex-1">${left}${right}</div>`;
}

function renderAll() {
  renderCounters();
  renderFilters();
  renderQueue();
  renderDetail();
  renderStations();
  renderReady();
  renderActions();
}
</script>

<script>
/* ============================================================================
   INTERACTIONS
   ========================================================================== */

function selectOrder(id) {
  state.selectedId = id;
  renderQueue();
  renderDetail();
  renderActions();
  renderReady();
}

function advance(id) {
  const o = ORDERS.find((x) => x.id === id);
  if (!o) return;
  const nx = STATUS[o.status].next;
  if (nx) { o.status = nx; renderAll(); }
  else { bump(id); }
}

function recall(id) {
  const o = ORDERS.find((x) => x.id === id);
  if (!o) return;
  if (o.status === "ready") o.status = "progress";
  else if (o.status === "progress") o.status = "new";
  renderAll();
}

function cancelOrder(id) {
  ORDERS = ORDERS.filter((o) => o.id !== id);
  if (state.selectedId === id) state.selectedId = ORDERS[0]?.id || null;
  renderAll();
}

function showBurst() {
  const b = $("#burst");
  b.hidden = false;
  const inner = b.firstElementChild;
  inner.classList.remove("bump-burst"); void inner.offsetWidth; inner.classList.add("bump-burst");
  clearTimeout(showBurst._t);
  showBurst._t = setTimeout(() => (b.hidden = true), 850);
}

let animating = false; // pauses the per-second re-render so animations can play out
function freeze(ms) { animating = true; clearTimeout(freeze._t); freeze._t = setTimeout(() => (animating = false), ms); }

function bump(id) {
  // animate whichever card references this order, then remove it.
  const card = $(`[data-readycard="${id}"]`) || $(`[data-select="${id}"]`)?.closest(".ticket-card");
  showBurst();
  freeze(600);
  if (card) {
    card.classList.add("bump-away");
    setTimeout(() => finalizeBump(id), 480);
  } else {
    finalizeBump(id);
  }
}
function finalizeBump(id) {
  ORDERS = ORDERS.filter((o) => o.id !== id);
  if (state.selectedId === id) {
    state.selectedId = ORDERS.find((o) => o.status !== "ready")?.id || ORDERS[0]?.id || null;
  }
  renderAll();
}

/* ---- simulate a fresh incoming ticket ---- */
const POOL = [
  { name: "Margherita", cat: "pizza", mods: ["Extra basil"] },
  { name: "Diavola", cat: "pizza", mods: ["Extra spicy"] },
  { name: "Tartufata Reale", cat: "pizza", mods: [] },
  { name: "Tagliatelle Bolognese", cat: "pasta", mods: [] },
  { name: "Arancini (3 pcs)", cat: "antipasti", mods: [] },
  { name: "Panino Milano", cat: "panini", mods: ["No onion"] },
  { name: "Limonata Fresca", cat: "drinks", mods: [] },
  { name: "Panna Cotta", cat: "desserts", mods: [] },
];
const NAMES = ["Kasia D.", "Paolo V.", "Ela N.", "Hubert S.", "Marta G.", "Davide L."];
function addTicket() {
  const n = 1 + Math.floor(Math.random() * 3);
  const items = [];
  for (let i = 0; i < n; i++) {
    const p = POOL[Math.floor(Math.random() * POOL.length)];
    items.push({ qty: 1 + Math.floor(Math.random() * 2), ...p, mods: [...p.mods] });
  }
  const o = {
    id: uid(),
    code: (Math.random().toString(36).slice(2, 6)).toUpperCase(),
    customer: NAMES[Math.floor(Math.random() * NAMES.length)],
    channel: Math.random() > 0.5 ? "delivery" : "takeout",
    location: state.location,
    status: "new",
    placedAt: Date.now(),
    promiseMs: (10 + Math.floor(Math.random() * 8)) * 60000,
    promiseMin: 12,
    note: Math.random() > 0.7 ? "No cutlery, eco request." : "",
    items,
  };
  o.promiseMin = Math.round(o.promiseMs / 60000);
  ORDERS.push(o);
  freeze(500);
  renderAll();
  // flash the new card + chime
  requestAnimationFrame(() => {
    const card = $(`[data-select="${o.id}"]`);
    if (card) { card.classList.add("ticket-in"); card.scrollIntoView({ block: "nearest", behavior: "smooth" }); }
  });
  chime();
}

/* ---- tiny WebAudio chime for new tickets (no asset needed) ---- */
let audioCtx = null;
function chime() {
  if (!state.sound) return;
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const t = audioCtx.currentTime;
    [880, 1320].forEach((f, i) => {
      const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
      osc.type = "sine"; osc.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t + i * 0.12);
      g.gain.exponentialRampToValueAtTime(0.18, t + i * 0.12 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.12 + 0.22);
      osc.connect(g).connect(audioCtx.destination);
      osc.start(t + i * 0.12); osc.stop(t + i * 0.12 + 0.24);
    });
  } catch (e) { /* audio not available */ }
}

/* ============================================================================
   EVENT WIRING (delegation)
   ========================================================================== */
document.addEventListener("click", (e) => {
  const sel = e.target.closest("[data-select]");
  if (sel) { selectOrder(sel.dataset.select); return; }

  const bumpBtn = e.target.closest("[data-bump]");
  if (bumpBtn) { e.stopPropagation(); bump(bumpBtn.dataset.bump); return; }

  const act = e.target.closest("[data-action]");
  if (act) {
    const { action, id } = act.dataset;
    if (action === "advance") advance(id);
    else if (action === "bump") bump(id);
    else if (action === "recall") recall(id);
    else if (action === "cancel") cancelOrder(id);
    return;
  }

  const statusTab = e.target.closest("[data-status]");
  if (statusTab) { state.statusFilter = statusTab.dataset.status; renderFilters(); renderQueue(); return; }

  const stationChip = e.target.closest("[data-station]");
  if (stationChip) {
    state.stationFilter = state.stationFilter === stationChip.dataset.station && stationChip.dataset.station !== "all"
      ? "all" : stationChip.dataset.station;
    renderFilters(); renderQueue(); renderDetail(); renderStations(); return;
  }
});

$("#search").addEventListener("input", (e) => { state.query = e.target.value; renderQueue(); });
$("#addBtn").addEventListener("click", addTicket);
$("#soundBtn").addEventListener("click", () => {
  state.sound = !state.sound;
  $("#soundOn").hidden = !state.sound;
  $("#soundOff").hidden = state.sound;
  $("#soundBtn").classList.toggle("text-white/30", !state.sound);
});

/* keyboard shortcuts for a hands-busy line */
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT") return;
  const o = ORDERS.find((x) => x.id === state.selectedId);
  const list = visibleOrders().sort((a, b) => a.placedAt - b.placedAt);
  const idx = list.findIndex((x) => x.id === state.selectedId);
  if (e.key === "ArrowDown") { e.preventDefault(); if (list[idx + 1]) selectOrder(list[idx + 1].id); }
  else if (e.key === "ArrowUp") { e.preventDefault(); if (list[idx - 1]) selectOrder(list[idx - 1].id); }
  else if ((e.key === "Enter" || e.key === " ") && o) { e.preventDefault(); advance(o.id); }
  else if (e.key === "Backspace" && o) { e.preventDefault(); recall(o.id); }
});

/* ============================================================================
   CLOCK + LIVE TIMERS
   ========================================================================== */
function tickClock() {
  const d = new Date();
  $("#clock").textContent = d.toLocaleTimeString("en-GB");
  $("#dateline").textContent = d.toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" });
}

// Re-render the time-sensitive panels each second. Cheap at this scale; we
// preserve scroll positions and skip while an animation is mid-flight.
function tickTimers() {
  renderCounters();
  if (animating) return;
  const queueEl = $("#queue"), detailEl = $("#detail");
  const qTop = queueEl.scrollTop, dTop = detailEl.scrollTop;
  renderQueue();
  renderDetail();
  queueEl.scrollTop = qTop;
  detailEl.scrollTop = dTop;
}

tickClock();
renderAll();
setInterval(tickClock, 1000);
setInterval(tickTimers, 1000);
</script>
</body>
</html>
