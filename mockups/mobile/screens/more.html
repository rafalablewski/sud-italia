<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mobile More — Sud Italia</title>
<link rel="stylesheet" href="../assets/screen.css" />
</head>
<body>
<div class="shell">
  <div class="statusbar">
    <span>9:41</span>
    <span class="icons">●●● ● 100%</span>
  </div>
  <header class="topbar">
    <div class="topbar-left"><span class="brand-mark">SI</span><span class="title">Home</span></div>
    <div class="topbar-right">
      <button class="iconbtn"><span class="glyph gl-search"></span></button>
      <button class="iconbtn"><span class="glyph gl-bell"></span><span class="badge">4</span></button>
    </div>
  </header>

  <div class="content" style="filter:blur(0.5px) brightness(0.55)">
    <div><h1 class="page-title">KRAKÓW</h1><div class="page-subtitle">Live • 14:42</div></div>
  </div>

  <div class="scrim"></div>
  <div class="sheet" style="height:92%">
    <div class="sheet-handle"><span></span></div>
    <div class="sheet-header"><div class="sheet-title">All sections</div><button class="iconbtn">✕</button></div>
    <div class="sheet-body">
      <label style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;color:var(--fg-subtle)">
        <span class="glyph gl-search"></span>
        <input type="search" placeholder="Search…" style="flex:1;background:transparent;border:0;outline:0;color:var(--fg);font-size:14.5px"/>
      </label>

      <section style="display:flex;flex-direction:column;gap:6px">
        <div style="font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--fg-subtle);padding:0 6px">Operations</div>
        <a class="more-item" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;text-decoration:none;color:var(--fg)">
          <span style="width:18px;height:18px;color:var(--fg-muted)">🍽</span><span style="flex:1;font-size:14.5px;font-weight:500">Menu</span><button class="iconbtn" style="width:28px;height:28px"><span class="glyph gl-pin"></span></button><span class="glyph gl-chev" style="color:var(--fg-disabled);font-size:14px"></span>
        </a>
        <a class="more-item" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:var(--fg)">
          <span style="width:18px;height:18px;color:var(--fg-muted)">🧪</span><span style="flex:1;font-size:14.5px;font-weight:500">Recipes</span><button class="iconbtn" style="width:28px;height:28px"><span class="glyph gl-pin"></span></button><span class="glyph gl-chev" style="color:var(--fg-disabled);font-size:14px"></span>
        </a>
        <a class="more-item" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:var(--fg)">
          <span style="width:18px;height:18px;color:var(--fg-muted)">📅</span><span style="flex:1;font-size:14.5px;font-weight:500">Slots</span><button class="iconbtn" style="width:28px;height:28px"><span class="glyph gl-pin"></span></button><span class="glyph gl-chev" style="color:var(--fg-disabled);font-size:14px"></span>
        </a>
      </section>

      <section style="display:flex;flex-direction:column;gap:6px">
        <div style="font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--fg-subtle);padding:0 6px">People</div>
        <a class="more-item" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:var(--fg)">
          <span style="width:18px;height:18px;color:var(--fg-muted)">👷</span><span style="flex:1;font-size:14.5px;font-weight:500">Staff</span><button class="iconbtn" style="width:28px;height:28px"><span class="glyph gl-pin"></span></button><span class="glyph gl-chev" style="color:var(--fg-disabled);font-size:14px"></span>
        </a>
        <a class="more-item" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:var(--fg)">
          <span style="width:18px;height:18px;color:var(--fg-muted)">🗓</span><span style="flex:1;font-size:14.5px;font-weight:500">Schedule</span><button class="iconbtn" style="width:28px;height:28px"><span class="glyph gl-pin"></span></button><span class="glyph gl-chev" style="color:var(--fg-disabled);font-size:14px"></span>
        </a>
      </section>

      <section style="display:flex;flex-direction:column;gap:6px">
        <div style="font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--fg-subtle);padding:0 6px">Finance</div>
        <a class="more-item" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:var(--fg)">
          <span style="width:18px;height:18px;color:var(--fg-muted)">📊</span><span style="flex:1;font-size:14.5px;font-weight:500">Reports</span><button class="iconbtn" style="width:28px;height:28px"><span class="glyph gl-pin"></span></button><span class="glyph gl-chev" style="color:var(--fg-disabled);font-size:14px"></span>
        </a>
        <a class="more-item" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:var(--fg)">
          <span style="width:18px;height:18px;color:var(--fg-muted)">💵</span><span style="flex:1;font-size:14.5px;font-weight:500">Cash</span><button class="iconbtn" style="width:28px;height:28px"><span class="glyph gl-pin"></span></button><span class="glyph gl-chev" style="color:var(--fg-disabled);font-size:14px"></span>
        </a>
      </section>

      <div style="margin-top:6px;padding-top:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:10px">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--fg-subtle)"><span class="glyph gl-loc"></span> Location</span>
          <div class="segment" style="background:var(--surface-2);padding:3px;display:inline-flex">
            <div class="segment-opt" style="font-size:11px;padding:5px 10px">All</div>
            <div class="segment-opt active" style="font-size:11px;padding:5px 10px">Kraków</div>
            <div class="segment-opt" style="font-size:11px;padding:5px 10px">Warsaw</div>
          </div>
        </div>
        <button style="display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:42px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--danger);font-size:13px;font-weight:600">
          <span class="glyph gl-logout"></span> Log out
        </button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-tab"><span class="icon glyph gl-home"></span><span>Home</span></div>
    <div class="nav-tab"><span class="icon glyph gl-orders"></span><span>Orders</span></div>
    <div class="nav-fab glyph gl-plus"></div>
    <div class="nav-tab"><span class="icon glyph gl-stock"></span><span>Stock</span></div>
    <div class="nav-tab active"><span class="icon glyph gl-grid"></span><span>More</span></div>
  </nav>
</div>
</body>
</html>
